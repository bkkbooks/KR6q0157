body:
  text: 楚衡雲峯智祥述此篇誨人道德為立身之本尊之美之最為急要故此以冠三百篇之首意有所在也明教嵩和尚曰尊莫尊乎道美莫美乎德道德之所存雖匹夫非窮也道德之所不存雖王天下非通也明教即杭州佛日契嵩禪師字仲靈自號潛子藤州鐔津李氏子嗣洞山曉聰禪師青原下十世七歲出家十三得度十九遊方常戴觀音像一軸日誦聖號十萬率以為常世間經書莫不遍覽作原教論十萬餘言儒釋之道一貫以抗韓愈排佛之説知開封府龍圖王公素歐陽修程師孟奏進仁宗覽之嘉歎付編修入藏曰輔教篇三卷賜紫衣方袍明教之號和尚是梵語此云力生謂因師之力而得生長法身又云依學謂依隨此師學出世法也曰語也此節先明道德存不存之人尊重也美嘉也道德解見前謂世間可尊可重者莫有過於道可嘉可美者莫有過於德若人心能存道身能養德縱居於窮困之中如匹夫匹婦不以為苦故曰非窮設或道德不修身心泆蕩雖貴同天子不以為榮故曰非通匹夫者窮獨之稱所謂三軍之中可奪帥匹夫之志不可奪也三軍者周天子有六軍一萬二千五百人為一軍大國三軍次國二軍小國一軍王字去聲身臨四海曰王此先舉尊崇貧賤兩般立定有道德無道德為格式然後出其較論使人不言自化伯夷叔齊昔之餓夫也今以其人而比之而人皆喜桀紂幽厲昔之人主也今以其人而比之而人皆怒此節引證道德有不有之實伯夷叔齊是有道德之匹夫今以之比於人而人皆歡喜是喜其有道德也桀紂幽厲乃無道德之人君今以之比於人而人皆忿怒乃怒其無道德也伯夷叔齊孤竹君之二子也孤竹即殷湯所封之邦君在永平府西北十八里孤竹城有夷齊廟存焉姓墨胎氏名初字子朝其子伯夷名允字公信季子叔齊名智字公達諡曰伯夷叔齊也其父將薨遺命立叔齊齊以天倫為重我在位不義伯夷以父命為尊我在位不孝二人俱逃國人立其仲子為君其二人聞西伯昌善養老往而歸之文王卒武王伐紂二人叩馬首而諫曰父死不葬爰及干戈可謂孝乎以臣弒君可謂忠乎左右欲兵之太公曰此義人也扶而出之武王平定天下宗周夷齊耻不食周粟遂隱首陽山即山西蒲州東南三十里雷首山也採薇而食卒之餓死史咏曰孤竹夷齊耻戰爭望塵遮道請休兵首陽山倒為平地應始無人説姓名夏桀名履癸帝發之子諡法賊人多殺曰桀荒淫無道得施氏女名妹喜作瓊樓瑤臺極意取媚酒池運船糟堤可望十里龍逢以忠諫不從而殺殷湯有德伊尹佐湯伐桀桀戰不勝奔三棕國在山東定陶縣有三棕亭在焉湯又從而伐之放桀於南巢而死在廬州府九十里巢縣史咏曰頑亂寵妹喜瑤臺玩酒池九夷不助尅巢放喪龍肢九夷者玄菟樂浪高麗滿飭鳧叟索當東屠倭人天部商紂名辛亦名受帝乙之子諡法殘義損善曰紂得蘇氏女名妲己甚寵愛之設酒池肉林使男女裸形相逐其間作長夜宮一百一十日為一晝用炮烙之刑刳孕剒涉造鹿臺七年而成虐害忠良臣叔比干竭忠而諫遂剖心而死太師箕子佯狂而為奴庶兄微子為其亡仁避而去之後武王舉兵伐之敗登鹿臺蒙頭赴火而死史咏曰積粟成塵竟不開誰知拒諫剖英才武王兵起無人敵遂作商郊一聚灰周幽名宮涅宣王之子諡法壅遏不通曰幽殆政虐民遂致岐山自崩山川水竭得褒人女名褒姒以寵之乃貶申后並太子宜臼褒姒不好笑於驪山舉火戲媚褒姒之笑驪山在西安府臨潼縣東南三里後申侯怒召犬戎殺於驪山之下史咏曰恃寵多嬌得自由驪山舉火戲諸侯豈知一笑傾城國不覺胡塵滿玉樓周厲名胡夷王之子諡法殺戮無辜曰厲王行無道侈傲暴虐國人謗之王使衛巫監謗但有謗者盡殺之衛國名巫乃神降之男子召公諫曰塞下之口遂上之過恐為社稷憂王不聽國人叛之禍及於王王乃出奔於彘彘古邑名今為霍州屬平陽府太子幼周召二公相和協共理國事故稱共和也小雅二十二篇皆文武成康之善政至此而盡廢矣史咏曰暴惡凶囂喜結戎忠心數諫不為憂二公計襲逃乎彘至死無歸未奠丘是故學者患道德之不充乎身不患勢位之不在乎己鐔津集此節方是教人知其所患是故二字乃承上二種人見修不修之利害患者憂也如云以是之故學者當憂道德之不充足於身不必要憂聲名勢位之不在我也若使道充德備天龍恭敬不以為喜何勢位之可憂須知道德恆存千古勢位及身而盡千古重乎及身重乎學者于此當猛省深修可也此篇訓人學當辨問乃可暢發其義理補益於性地也明教曰聖賢之學固非一日之具日不足繼之以夜積之歲月自然可成此節先明積功靈明洞鑑曰聖超凡亞聖曰賢言聖賢之學要知非尋常文字乃成聖成賢之語也固本也謂本不是一日可能具辦設使日學不足則相繼續之以夜如是從月至歲學之不倦則聖賢之至學自然可能成就也自然二字是決定意故曰學以聚之問以辨之斯言學非辨問無以發明此節引證學問出易經經云君子學以聚之問以辨之寬以居之仁以行之學聚辨問進業也寬居行仁修德也故曰者昔人曾説之語師今引以訓人使人知非獨我所言也斯言者乃師復舉以曉悟學人斯者此也謂古人此語學必要問問必要辨若非辨問則何以能明聖賢之至理今學者所至罕有發一言問辨於人者不知將何以裨助性地成日新之益乎此節直責學者不問不辨正教人要問要辨也謂古人操學必問必辨今之學者凡所到之處罕者少也少見有發一言問之辨之於人此等學人我不知他時中將何以補助性地成日新之利益乎裨者補也性地者地有乘載義能發生萬物言自家心性地上必假聖學能發生諸有始得日日增新今一言不措則性地上無一可發復何利益哉日新出大學苟日新日日新又日新學聖賢的人不是常人必其有聖賢之志庶可以學得聖賢此篇誡學者除利欲為止亂之源也明教曰太史公讀孟子至梁惠王問何以利吾國不覺置卷長歎嗟乎利誠亂之始也故夫子罕言利常防其原也原者始也尊崇貧賤好利之弊何以別焉此節明利為衆害之基太史公姓司馬名談為太史令其子名遷襲其父職乃尊其父故稱公也西漢龍門人讀者誦其文孟子名軻字子輿鄒國人作孟子之書七篇梁惠王魏武侯名擊都汴城改稱梁其子名罃僭稱王諡曰惠史記惠王三十五年乙酉齊強梁弱王立招賢館卑禮厚幣廣納良才而孟子至梁王問曰叟不遠千里而來亦將有以利吾國乎孟子對曰王何必曰利亦有仁義而已王問意強兵富國之類孟子之對不以富為利以義為利也不覺者出於無意置者放下書卷要知胸中大有感發長歎者出其感發之聲嗟乎是歎辭謂惠王開口即提出箇利字便是置天下人于禍胎也誠者實也實實是亂之根本次引夫子以明之謂我夫子不多言利者正見平常隄防維謹恐為倡亂之本原何也夫子所以將此利字常時隄防蓋知盡天下人上至尊崇之天子下至貧賤之庶民尊卑雖別而好利之弊病無以別焉夫在公者取利不公則法亂在私者以欺取利則事亂事亂則人爭不平法亂則民怨不服其悖戾鬬諍不顧死亡者自此發矣是不亦利誠亂之始也此節明上下取利之弊夫者承上起下之辭在公者應上尊崇一輩取利不公所令不行法則亂矣私者應貧賤一輩取利以欺則名分喪失事則亂矣事若亂彼此不分強弱競爭無所分曉所以人爭不平矣法若亂以法凌人無分曲直理不能伸所以民怨不服矣如此上下交亂雖有法度民則不從悖乖也戾違也事無分曉鬪諍便起由是人之不顧死亡者皆從此一利字發之矣是不亦如云豈不是利字誠亂之始也至此方才結還太史公歎息之意且聖賢深戒去利尊先仁義而後世尚有恃利相欺傷風敗教者何限況復公然張其征利之道而行之欲天下風俗正而不澆利薄其可得乎此節重提聖賢之語使人知戒知尊深戒者非淺也聖賢戒人去利欲尊仁義意非淺淺而後世不惟不遵行戒利存仁之教而返恃利以相欺恃者依賴也如此者傷古人之風化敗聖賢之教法何限者不能盡數言其多也次又進説一層曰不特此也更有一種無耻之徒公然行之公然者堂堂乎施張其取利之法而大行之也張施也征取也然要天下風俗正肅全在禮法今利途顯禮法亡而要天下風俗端正不致澆漓衰薄斷斷乎不可得也澆者沃也有浸濕義薄者不厚也上化為風下習為俗利乃迷魂狂藥不可飲飲之殺人無疑矣此篇戒學者防惡于未萌所以遠害也明教曰凡人所為之惡有有形者有無形者無形之惡害人者也有形之惡殺人者也殺人之惡小害人之惡大此節先出其惡且學者安得有殺人害人之惡為師所戒然人居凡夫地上根本無明念念熏染觸境生情令人不覺不知一時念起於人我中生出幾多嫉妬貪嗔搆起是非喪亡道本所以説害人之惡大也論云有形之惡其來有方其敵可禦無形之惡其來不測其害非細故所以殺人之惡小害人之惡大殺以迹言害以心論所以遊晏中有鴆毒談笑中有戈矛堂奧中有虎豹鄰巷中有戎狄此節正明惡事遊晏乃賓主合歡安靜之筵也豈料食中置毒令人死不旋踵廣志云鴆毒鳥大如子頸長八寸紫緑色以蛇蠍為食雄為暈雌名陰其毛入酒則火焰生以之插鼻中腸斷即死惟犀牛角可解談笑出于無意不覺一語如戈如矛令人吞聲忍氣而不自安也戈平頭戟長六尺六寸矛其形如鈎長二丈俱傷人利器也正房為堂幽深為奧虎豹能食人堂奧中安有虎豹此謂能設計害人者有如此也五家為鄰二十五家為巷戎狄者西戎北狄此是不存禮法之人難與同居自非聖賢絶之於未萌防之以禮法則其為害也不亦甚乎此節方教人屏惡防害自非二字是反語如云若是聖賢自能絶于未萌防以禮法則無惡念可生故無所害然今者汝非聖賢既不能絶於未萌萌者草之將芽又不能防以禮法倘一念促生則其利害有不勝言者矣禮法者天理之節文人事之宜則法者制度品節也左傳曰藏於杳然冥然之間而發於卒然之際非聖人以禮為之防則人之類滅久矣防害遠惡的至訓明明具載只是人心險極熟處難忘戒之哉此篇引義士以愧貪僧使之自省也明教曰大覺璉和尚住育王因二僧爭施利不已主事莫能斷大覺呼至責之曰昔包公判開封民有自陳以白金百兩寄我者亡矣今還其家其子不受望公召其子還之公歎異即召其子語之其子辭曰先父存日無白金私寄他室二人固讓久之公不得已責付在城寺觀修冥福以薦亡者大覺即明州育王寺懷璉禪師字器之福建漳州陳氏子嗣泐潭澄禪師青原下十四世此節先舉其事住育王時因二僧爭財利不止主事者竟莫能判斷師呼二僧至責之引往事為二僧作法包公名拯字希仁官至御史天性嚴厲未嘗有笑容知開封府日有民李覺安生子名景文年幼因病以白金百兩寄與友人張惠明覺安終後惠明還金于子其子不受一謂受人之寄必當還之一謂父無所囑不當受之惠明即訴于公公歎奇異即召子還金子固不受一要還金一斷不受公見二人如此義勇不得已將此金責付本城寺觀中修齋以薦悼亡者責任也任責於人而行其事也豫目覩其事且塵勞中人尚能疏財慕義如此爾為佛弟子不識廉耻若是遂依叢林法擯之此節責僧無耻曰此事吾目所覩者彼塵勞中原以財利為心尚且能疏其財而慕其義如此如此二字是極力稱其有義你二人剃髮披緇當行檀度乃佛子也返要爭財競利真不守清廉不識羞耻之若是若是二字是痛責其無耻理宜依叢林古規擯出不得有污清衆也今之爭錢好利者捧讀之羞乎否也此篇見師家具知人之眼乃不失衲子有拔萃之資也大覺璉和尚初遊廬山圓通訥禪師一見直以大器期之或問何自而知之訥曰斯人中正不倚動靜尊嚴加以道學行誼言簡盡理凡人資稟如此鮮有不成器者九峯集廬山圓通居訥禪師字仲敏西蜀梓州蹇氏子嗣延慶子榮禪師青原下十世初見大覺知為大器一見者初不相知才一見便知為大法器也期限也限定其成事無疑或問者設或有人作如此問何故一見便自知也對曰此人之資格中正而不倚中是不偏正乃不邪一動一靜自尊自嚴此即知其形之奇也加以內心所存有道有學有行有誼凡所發言辭簡而理盡此即知其心之妙也資稟也二字一義鮮少也大凡人之體性稟得如此人者少有不成大器者也知識頂門有眼識人必到極真極美處非等間也此篇舉賢慧濶達訓人當法古師今謹始慎終也仁祖皇祐初遣銀璫小使持録綈尺一書召圓通訥住孝慈大伽藍訥稱疾不起表疏大覺應詔此節先舉其事仁祖宋四帝仁宗也皇祐即年號初字即皇祐一二年間遣者使命也銀璫耳㻔有金玉銀三種以別等級也秦漢中以小宦官著銀璫右貂明帝改為金璫左貂宮中出入傳命乃閹人也持者手賫詔命緑綈者緑色書囊也尺一漢時制尺一之板以駕詔書詔告也上命也孝慈者汴京自唐朝毀寺至太祖建隆間復興兩街皆義學銀璫使李允寧奏施汴宅創立禪席賜額十方淨因禪院帝留意空宗詔下三省定議召有道者住持歐陽修程師孟奏請圓通訥禪師允寧親持詔下江州訥稱目疾耳背不赴帝益敬重聽舉自代訥舉大覺和尚應詔伽藍梵語此云衆僧園即僧衆共居之地疏者疏通其不能奉命之情表者以表上進舉大覺為有道能應天子之詔命也或曰聖天子旌崇道德恩被泉石師何固辭訥曰豫濫廁僧倫視聽不聰幸安林下蔬飲水雖佛祖有所不為況其他耶先哲有言大名之下難以久居豫平生行知足之計不以聲利自纍若厭於心何日而足故東坡嘗曰知安則榮知足則富此節出呈其意或者假借之稱旌欽仰也崇敬重也或有人言今聖天子旌仰崇重吾師之道德其恩澤普被泉石蒙潤也師何固辭固辭者再三懇辭濫廁泛雜也倫者類也幸與幸同不當得而得也蔬粗食也如謂我今為僧泛雜于僧類之中又得安於山林亦僥幸也時中食其蔬飲其水可謂千足萬足矣當此之時縱教我作佛作祖吾亦無所好況為天子師耶耶是吸問之辭此見胸中空洞無物玉潔氷清賢哉師也又引范蠡語大名之下難以久居況我生平所行之事頭頭皆是知足之計聲名利養實有纍繫於人我豈以此聲利而自纍纍者縈縛也且世人之貪心如渴鹿然何有厭足若欲飽厭於心終無了日厭滿足也故復引東坡語云知安則榮知足則富以完其生平知足之實避名全節善始善終在圓通得之矣行實此節方是集書者美師之言曰名乃人人之所欲師今避之可謂德備而節全矣出家而成美器善始也道成而保令名善終也如斯衆美在師得之矣東坡姓蘇名軾字子瞻眉山人得法於東林聰官至翰林後築室于黃州城東因號東坡居士讀之宛然道骨謦咳猶存不禁令人羡殺此篇訓人守節義毋恃外勢也圓通訥和尚曰躄者命在杖失杖則顛渡者命在舟失舟則溺凡林下人自無所守挾外勢以為重者一旦失其所挾皆不能免顛溺之患躄跛不能行顛仆也溺淹沒也借此形容有所挾持之意如跛足者力全在杖失杖而行必顛仆矣渡河者命全在舟失舟于水必淹沒矣以此而知大凡林下道人當守節義以自重不可假權勢以御人挾扶持也若一朝業盈福謝權勢既失節義不存其顛其溺胡能免乎彼恃勢者當猛然自返殆至顛溺悔之何及此篇言叢林之興衰在德不在法也圓通訥曰昔百丈大智禪師建叢林立規矩欲救像季不生之弊曾不知像季學者盜規矩以破百丈之叢林江西百丈山懷海大智禪師福州常樂王氏子嗣馬祖道一禪師南嶽下二世此節明因法致弊建置也立成也多草為藂多木為林乃衆僧依止之處棲心修道之所也圓者為規方者為矩因之以為模範也謂百丈建置藂林立成規矩意在救濟末世人不正之弊病佛住世為正法佛滅像存曰像法季末世也縱貪嗔癡存生滅念皆不正之弊曾乃也盜規矩者假公濟私因法作姦也乃不知末世學者盜取前人之法度返壞前人之叢林何也且古人見學者意縱心狂難以入道故藉規矩以制伏之而不知法久弊生返藉規矩假以制貪嗔人我為名而實以為利欲之媒斯所以叢林破矣上古之世雖巢居穴處人人自律大智之後雖高堂廣廈人人自廢故曰安危德也興亡數也此節明古今差別古者夏則居巢冬則處穴彼居巢穴者豈有規矩而人人自成規矩故曰自律律條令也今之人高堂百尺廣廈千楹雖有規矩而不遵人人皆縱情恣意流蕩而忘返故曰自廢以是而知人之安危在乎德事之興替在乎數數者時也理數也苟德可將何必叢林苟數可憑曷用規矩野録此方斷定其説苟果也將持守也謂學人果能有德可持雖深山窮谷俱可修行何必故欲叢林果能達乎理數則困頓折挫皆成禮法又曷必故用規矩也曷者何也師意在教人修德明理為急務非弛廢叢林蔑視規矩也學者須知之談子化書亦云苟德可將何必廣粟帛乎苟數可憑何必廣兵甲乎自律自廢誰使之然也學者宜當自惜此篇訓學者居安慮危始得無終身之虞也圓通謂大覺曰古聖治心於未萌防情於未亂蓋豫備則無患所以重門擊柝以待暴客而取諸豫也此節明豫備無患謂者與之言也先舉古聖者要使人知其取法之正治心者修心也未萌在一念未動之先若待心念動作則成妄矣情是識情防情須在未亂之前若使識情奔競則人迷矣豫先也備是防備教豫先防備則無過患也次引易經雷地豫卦取象以發明之震上坤下安和悅樂之義楊氏曰川途既通則暴客至矣不可不禦之以術也故取諸豫重門以禦之擊柝以警之則暴客無自而入矣二陰在上重門之象一陽在下擊柝之象三陰在內悅豫之象柝斫木為之夜行所擊也事豫為之則易卒為之固難古之賢哲有終身之憂而無一朝之患者誠在於斯九峰集此節教戒謹毋忘大凡世間一切事業豫先調攝其行則易倉卒為之事不周矣哲即賢也謂古來哲人智士無一時一刻而不憂勤惕勵以自警故所以無卒暴之憂者由其有先照之智也昃豫備二字是甚麼人做得到文王之日不遑周公之所其無逸庶幾得之此篇謂學問是立身之大本不可不猛力行之也大覺璉和尚曰玉不琢不成器人不學不知道今之所以知古後之所以知先善者可以為法惡者可以為戒先舉喻以明謂如玉在石中必假雕琢置而不琢何能成其美器學者亦然若不勤學何能知其妙理如今人能知古人之所到後人能知先人之所行皆因學識之力也此二句出韓文公進唐順宗表古之善者吾當取法先之不善者吾當為戒歷觀前輩立身揚名於當世者鮮不學問而成之矣此方教觀前古歷觀者次第而觀謂你次第著眼看從前古人凡是有卓識操修播揚美名于當代者誰不是勤勤懇懇博覽經史咨詢賢哲而得成就者故此學者當勇力深修也學問二字不是説過便了其間實有精進不已之功偶得輒止身名何立學者勉之此篇是答侍郎孫莘老書謂三教本是一體只因人情變故內起人我爭競是非以致斯道云亡矣大覺曰妙道之理聖人嘗寓之於易至周衰先王之法壞禮義亡然後奇言異術間出而亂俗此節明立教有時道本無名亦無有相窮三際遍十方無在不在加一妙字始見體不變而用隨緣聖不增而凡不減非生非滅無去無來豈不是妙所謂妙道之理理即義也聖人嘗寓之於易此聖人指伏羲文王孔子也寓寄也易即易經謂此妙道之義理難於指示上古諸聖人只得寄言於易而發揮之以無極生太極生二儀四象八卦萬事萬法生死窮通隱顯之機無不備具周衰謂幽厲以後世道既衰法度亦壞禮義亦亡正既衰而邪必顯故有種種奇怪流言異端邪術間出而亂風俗間出者投間隙而私出也當此之際道統幾乎危矣逮我釋迦入中土醇以第一義示人而始末設為慈悲以化衆生亦所以趨於時也此節明因時設教逮及也釋迦梵語此云能仁謂及我釋迦降誕于中土即竺國中印土佛降生處醇者純一不雜也一味以中道為教不落二邊第一義諦者非二非三之諦理開發乎人從始至終所施所設皆慈悲之道以教化衆生也慈能與樂悲能拔苦衆生者衆法相生即五蘊四大為身相六塵緣影為心相也趨向也謂佛之來亦所以趨向其時皆有由也時字當珍所謂藥因救病出金瓶之意此時不出何時乃出後以民風分四時總皆歸于冬意有在也自生民以來淳朴未散則三皇之教簡而素春也及情竇日鑿五帝之教詳而文夏也時與世異情隨日遷故三王之教密而嚴秋也昔商周之誥誓後世學者故有不能曉比當時之民聽之而不違則俗與今如何也及其弊而為秦漢也則無所不至矣故天下有不忍願聞者於是我佛如來一推之以性命之理冬也此節牒明四時蓋自天生蒸民以來淳朴之質性渾然未漓故三皇之教法簡略而朴素如天時之春萬物萌伏而未動也三皇即太昊伏羲氏炎帝神農氏黃帝有熊氏皇大也道大配天故稱三皇竇竅穴也鑿開發也如莊子云七日鑿而渾沌死謂及至人之情竅隨日開鑿則事路漸生故五帝之教法詳備而文華如天時之夏萬物芬敷而茂長也五帝即少昊金天氏顓頊高陽氏帝嚳高辛氏帝堯陶唐氏帝舜有虞氏主社稷安人民合於帝道故稱五帝時與世異者時謂四時十二時時以近言三十年為一世有過去未來現在世以遠論謂時更世改人情亦隨之而遷變情遷必巧作故三王之教法肅密而威嚴如天時之秋有肅殺之氣也三王乃夏禹王姒姓殷湯王子姓周文王姬姓王者往也天下所歸往也三王之時九五之位不傳賢而傳子禮樂文章刑政法度至此大備誥者告也訴上曰告發下曰誥尚書篇名如商書仲虺之誥湯誥周書康誥酒誥是也誓者約也如禹之甘誓湯誓周之秦誓皆盟於諸侯者也第誥誓之文理精而義備學者有誦習而不能通曉者以今較古當時之民淳朴成風聽其誓約而不敢違以古風比今俗何其如斯之遠也及其流弊日降而到嬴秦劉漢敗理傷風無所不為如臣弒君子弒父之事比比皆然天下賢士傷悲有不忍願聞此無道傷生之事於是我佛如來始下生人間教化衆生總攝以性命之理慈悲之道而化其轉邪為正轉惡為善故云始末設為慈悲如天道之有冬收之藏之也梵語佛陀此云覺者有三謂自覺覺他覺滿也如來者從如實道而來又如謂本覺來謂始覺始本不二故稱如來天有四時循環以生成萬物聖人設教迭相扶持以化成天下亦猶是而已矣此節總以發明三教聖人互相化成天下之意天有四時循環環者周而復始也如天道之始而終終而始流行不止只是要生成萬物而已三教聖人施設教化迭相扶持迭者也互也亦不過作之成之長養人之心性以風化而成天下也亦猶是者指天道四時運行而言然至其極也皆不能無弊弊者迹也要當有聖賢者世起而救之此節因莘老有獨善其身名而異行假而非真之問故又以然字下轉答究之彼此行道到極盡處皆不能周全無弊弊者迹也如孔子雖聖不能格君之非周公雖聖不能律魯之欺堯舜雖聖不能化其子之善先聖後聖其揆一也道之行不行乃時數使之以時變責聖人之心非愚即狂但當此衰惡之世必須有大賢至聖愍物垂慈興起于濁惡海中極力拯濟則道統庶幾乎可挽矣自秦漢以來千有餘載風俗靡靡愈薄聖人之教列而鼎立互相詆訾大道寥寥莫之返良可歎也此節方結成教同而人異自秦漢至今千有餘年民風土俗靡靡愈薄靡靡猶漸漸愈益也轉加義謂漸漸轉薄日益日下矣聖人之教法陳列于世如鼎之三足缺一不可今人不惟不互相扶持而返互相詆訾詆呵也訾毀也致使妙道之理轉行轉晦寥寥然往而不返傷哉惜哉良可歎也一篇大文字波浪掀騰透頂透底自道源根本説至人情轉變皆攝歸至道結以良可歎是頂門一針立教伊起死回生真妙手也附來書三代以降列聖相承政通人和道傳統續不以佛教未來為欠周姬訖籙更秦換漢憲網刑巢蔽空落野不以佛教已至而革四海派分異説捷出由唐而至五季為甚庶務萬機理亂非常奉佛之教奚益間有草衣木食巖棲澗飲不過獨善其身耳又有名而異行假而非真教化未孚弊乃生焉然師必有辨佇聞其説此篇誨行道者捐己利人以不貪為要用也大覺曰夫為一方主者欲行所得之道而利於人先須克己惠物下心於一切然後視金帛如糞土則四衆尊而歸之矣一方者或一省一邑一郡一鄉總曰一方主者乃行教化之主人所得之道是昔所參所悟之學為自利今欲以斯道覺斯民是利人大凡為他師法者須是模範端正且先要克除自己私心以專澤及人更要謙下其心以待一切然後將錢穀布帛輕視如糞土如此持身接物則四衆自然尊敬而歸服之矣四衆出家二衆在家二衆通篇只有六句萬卷書意皆盡於此此篇誡人安不忘危當深思而不可忽慢也大覺曰前輩有聰明之資無安危之慮如石門聰棲賢舜二人者可為戒矣此節教安危須謹襄州石門寺蘊聰禪師嗣首山念禪師南嶽下九世住石門日嘗好積古人墨迹太守入寺見之去後使借三次師不允太守怒使擎師重責師既歸衆僧迎於道側首座趨前問訊曰太守無故屈辱和尚師以手指地曰平地起骨堆隨手湧一堆高三尺太守聞知令人削去三次復湧如初太守懼之朝夕不悅不月內全家喪于襄州南康雲居曉舜禪師字老夫瑞州胡氏子嗣洞山聰禪師青原下十世住廬山棲賢寺寺後多大樹太守入山見之意欲伐起公所師弗之後被人挾讐乘隙訐告太守捉師苦責令還俗民其衣大覺昔曾入舜之室故往京都訪之大覺讓舜正寢璉居側室仁宗數詔入內問道竟不言舜事偶一日聖旨敕淨因僧見大覺侍舜甚恭歸奏帝召見之乃歎曰道韻奇偉真山林達士遂於扇書曰免咎為僧復住棲賢更賜紫衣金鉢遣使送歸舜罷棲賢日有二力士舁轎至羅漢寺前二人相謂曰今不是我院長老不須遠送棄轎而回舜既再來令人安撫曰你當時做得是但安心不必疑懼入院上堂曰無端被譖枉遭迍半載有餘作俗人今日再歸三峽寺幾多歡喜幾多瞋今大覺舉謂前輩有聰明之資耳利為聰眼利為明無安不忘危之慮如石門以不自防忍而罹襄州之辱棲賢以不自調攝而有南康之追二師豈不是天資粹美之人且有斯失誠可以為後人之戒然則人生定業固難明辨細詳其原安得不知其為忽慢不思之過歟故曰禍患藏於隱微發於人之所忽用是觀之尤宜謹畏此節教須當覺察然則人生固有定不可逃之夙業本難明辨細詳審其根原豈得不是忽意怠慢不思不察之過歟歟疑辭謙退而未敢決也故曰人之禍害憂患藏于幽隱微細之間何以發之發于人之一時忽略而不謹也以二師觀之愈宜敬謹而畏懼之也尤愈也忽慢二字各有其失忽失于心不細慢失於心不恭處世行事不可不時時戒畏之也此篇教人用情必在平日情至而事自得也雲居舜和尚字老夫住廬山棲賢日以郡守槐都官私忿罹橫逆民其衣往京都訪大覺此節明因事故訪雲居在江西南康稱江左首剎此述師往事故曰住廬山棲賢日以因也因郡守槐都官南康府前有古槐故稱槐都私忿非正法也罹遭也橫逆不順理也出孟子民其衣著民之衣京都即帝京至山陽楚州也阻雪旅邸一夕有客擕二僕破雪而至見老夫如舊識已而易衣拜於前老夫問之客曰昔在洞山隨師荷擔之漢陽幹僕宋榮也老夫共語疇昔客嗟歎之久凌晨備飯贈白金五兩仍喚一僕客曰此兒來往京城數矣道途間關備悉師行固無慮乎老夫由是得達輦下此節明昔情所遇路次楚州阻雪旅邸旅邸即客店也一夕是將暮又有一客擕隨帶僕用人也破雪者帶雪而至見老夫如故舊相識已而者不久也乃更換其衣致禮於老夫之前老夫因問其致敬之故答曰昔在洞山隨師荷行李之往也往漢陽幹辦事務之僕使姓宋名榮也疇昔即往昔共語往昔之事罹難之故客咨嗟歎息不已凌晨即次早備送路費五兩仍復喚一僕客曰我此子京城來往數次道途中所有間關崎嶇屈轉處一一備知師此去不必慮也老夫因此得達輦下輦是天子所乘之車推此益知其二人平昔所存矣九峰集此節結明深情有在推此者是集書人推詳此段因緣我固知他二人主賓之情平時愛惜之私有存乎胸中矣施恩者情必至也人受恩而情存情存則事無不濟矣此篇明古人立志堅強不以老而怠其行也大覺曰舜老夫賦性簡直不識權衡貨殖等事日有定課曾不少易雖炙燈掃地皆躬為之嘗曰古人有一日不作一日不食之戒豫何人也雖垂老其志益堅或曰何不使左右人老夫曰經涉寒暑起坐不常不欲勞之賦稟也謂老夫生來之性簡而不繁直而不曲權即稱錘衡即稱竿以財變物日貨積聚生財日殖如戥稱賣買一切世故俱所不知每日功夫俱有一定之課計曾不少改雖極小事如然燈掃地皆親自為之每常自警引百丈大智禪師每日力作以償其供有勸止者則曰我無德以勞人衆不忍而藏其作具遍索不得遂不食故有一日不作一日不食之語流播寰宇古人尚且如此我何等人敢生懈怠垂將也年雖老而志轉堅或曰些細之事何不令左右執侍者為之老夫曰經嚴寒歷酷暑動靜不常不必煩之噫而今人只要寬袍大袖何曾曉得古人置足處此篇謂人操守貴真實虗妄無所益也舜老夫曰傳持此道所貴一切真實別邪正去妄情乃治心之實識因果明罪福乃操履之實弘道德接方來乃住持之實量才能請執事乃用人之實察言行定可否乃求賢之實此節貴一切真實代代相承曰傳拳拳執守曰持此道即無上妙道所貴的貴字最重一切二字總舉下略開五條使人知所持守也真者不妄實而不虗第一治心者要先分別邪心正心虗妄心邪妄者當遣去之正直者當究竟之此即治心之真實也第二操履者守志不改曰操所行合理曰履先須知有善惡因果罪因何致福由何生時中敬謹不敢錯因果致罪招愆者滅之合理生福者為之此即操履之真實也第三住持者住法王家持佛法事必要弘彰聖化力行道德持最上之法印惟誠惟確接四方之學者不矜不慢此即持法之真實也第四用人者宜先量度孰有才略當幹何事孰有力能當司何執調和燮理內外悅豫此即用人之真實也第五求賢者先須審其言行相應否察其內外如一否當其可用不可用之間尤貴有先見之明稍失覺察利害即見此乃求賢之真實也不存其實徒衒虗名無益於理是故人之操履惟要誠實苟執之不渝雖夷險可以一致二事坦然葊集此節結一切真實前五者大槩言之至于一切所作如不存真實徒然賣一虗名於理何益衒彰賣也所以住持人操守行履必要真實若果能執守此真實二字不變不遷雖是平夷險阻皆可同歸一轍無二理也渝變也夷是平夷險是險阻致者理也造得到真實二字是佛祖儕類此篇教人立堅固志毋懷名利喪至德也舜老夫謂浮山遠録公曰欲究無上妙道窮則益堅老當益壯不可循俗苟竊聲利自喪至德此節先明存守至德舒州浮山法遠圓鑑禪師鄭州王氏子嗣葉縣省禪師遠嘗與達觀頴薛大頭七八人遊蜀幾次遭迍師以智脫之衆以曉吏事故稱之為遠録公謂學人要研究無上妙道乃佛果也必須立決定志身雖窮困其志須增益而轉堅年雖衰老其力當增益而轉壯切不可順隨流俗苟且希圖聲名利養自喪大德循順也苟且不正貌苟容而取安也夫玉貴潔潤故丹紫莫能渝其質松表歲寒霜雪莫能凋其操是故節義為天下之大此節喻明堅持節義且玉之所貴在乎潔淨溫潤也玉有七德謂堅實況仁不變況義貴佩況禮潤彩況智色潔況信難污況忠覩悅況樂縱以丹砂硃紫塗之亦不能染變其素質表耐也松耐盡寒威故嚴霜重雪亦不能傷敗其青英以此而知人不可無玉質松操之節義乃天地間至大之要也惟公標致可尚得不自強古人云逸翮獨翔孤風絶侶宜其然矣廣録此節嘆美囑其自勉惟獨也公指遠録公獨公之標格品致可嘉可貴豈得不自強以立志乎節義謂有節操而行合乎義理也標舉也言其超卓傑立之極也自強易云君子之道終日乾乾而自強不息逸縱也翮羽徑也古云大鵬展翅乘六息而背負青天豈凡鳥能及宜乎其然也節義乃聖賢根本佛祖靈苗學者宜謹守珍惜之此篇明親師友不可自怠怠則學無成也浮山遠和尚曰古人親師擇友曉夕不敢自怠至於執㸑負舂陸沉賤役未嘗憚勞此節勸人力行謂上古之求道者近明師擇良友朝勤夕惕不敢自求安逸㸑是炊㸑取其進火謂之㸑取其氣上謂之炊負舂是搗米寧與世違而不圖顯著曰陸沉賤役者人所差為難行之事謂至於執㸑負舂不以為勞陸沉賤役不以為耻終不敢生怠墮疲厭之心也豫在葉縣備曾試之然一有顧利害較得失之心則依違姑息靡所不至且身既不正又安能學道乎嶽侍者法語此節以己作證如此等事我昔在葉縣參省和尚時備細而曾試之汝州葉縣廣教院歸省禪師冀州賈氏子嗣首山念禪師南嶽下九世其住持枯淡嚴密衲子畏之浮山遠天衣懷聞其高風特往參叩正值雪寒省呵罵驅逐將水潑地衣褥皆濕他僧怒去惟遠與懷整衣敷具復坐如故省到呵曰你更不去待我打你遠近前云某二人數千里特來參和尚禪豈以一杓水潑之便去省笑曰你兩個果來要參禪卻去挂搭遠充典座衆苦其枯淡省偶出莊去遠私取油作五味粥方熟省忽歸粥罷命典座遠至省曰汝竊取油係盜用常住遠云實取油願乞責罰省令算估衣還訖更打三十挂杖趕出院道友勸勉省不允友曰若不容歸只乞隨衆聽法省亦不許省一日出街見遠旅邸前立省曰此是院門房廊汝何住此令人追算店錢遠無難色遂持於市化還之省歸謂衆曰法遠真參禪之法器也遂令歸上堂對衆付衣嗣法焉謂凡諸逆順境界一一經歷若我當時有一念顧惜利害之心較量得失之意則依違之亦何有所定出小雅姑息者苟容取安也出禮記若如是者於身既爾不正又何能治心以學道乎者般做處是第一等人流學得的是好手此篇明學道要在志力堅行不可疑信相參也遠公曰夫天地之間誠有易生之物使一日暴之十日寒之亦未見有能生者此節先譬一暴十寒必不生先舉世間萬物生長者為譬誠實也謂凡物雖是易於生長者設使一日方得暖氣蒸熏而又為十日寒雨浸漬亦未見有能生長者藉以比學者用功之不恆也無上妙道昭昭然在於心目之間故不難見要在志之堅行之力坐立可待其或一日信而十日疑之朝則勤而夕則憚之豈獨目前難見豫恐終其身而背之矣雲首座書此節方明一信十疑必不悟無上妙道昭昭即了然也了了然在於六根門頭放光動地有何難見然雖要在立志堅卓如生鐵橛相似行之勇猛如與萬人敵一般如此管取立地搆去其或一日方有信力而行且又有十日疑而不行早起方才勤力而作之至夜則又畏憚而止之如是求道不獨目前難得成辦豫恐盡此一生背馳不得見矣膏肓之針起死之藥俱在勤字中收此篇明住持人凡事取捨宜當細審也遠公曰住持之要莫先審取捨取捨之極定於內安危之萌定於外矣然安非一日之安危非一日之危皆從積漸不可不察此節舉其大槩謂為住持之緊要莫先於審察其取捨看何者為急務此宜該取何者為無益此宜當捨取捨之籌極定於胸中則安危之萌芽即定於外矣然致人之安非一日能安致人之危亦非一日便危咸從積纍漸浸久之方發斯不可不察也以道德住持積道德以禮義住持積禮義以刻剝住持積怨恨怨恨積則中外離背禮義積則中外和悅道德積則中外感服此節細分利害蓋所察者有三焉若常時我以道德行住持事則所積之人皆能修道德矣我以禮義行住持事則所積之人皆能行禮義矣若我刻苦衆利剝削賢良則人人口出惡言胸含毒意積成怨恨矣怨恨既積則內外無不生離散背逆之心中以近言外以遠論禮義既積則內外無不和悅道德既積則內外無不感服是故道德禮義洽則中外樂刻剝怨恨極則中外哀夫哀樂之感禍福斯應矣此節結成禍福是故道德禮義周遍於一方則內外歡樂洽霑濡周遍也若使刻苦剝削人到至極處則內外哀傷哀則禍生樂必福至夫哀樂感于內則禍福應於外矣人情取捨是大關鍵若不審察未免不顛倒苦樂也此篇言住持之要有三不可缺一而廢道也遠公曰住持有三要曰仁曰明曰勇仁者行道德興教化安上下悅往來明者遵禮義識安危察賢愚辨是非勇者事果決斷不疑姦必除必去此節先舉三要仁明勇司馬光諫仁宗表仁者純乎天理無一毫私欲也明者燭物理辨是非無一事之疑惑也勇者見義必為聞善必遷無一念之退怯也謂為住持者必先存乎仁有仁則可以行持道德興揚教化教化者躬行於上風動於下使人變化氣質也安撫上下悅樂往來此第一件緊要也次則必要明能洞燭乎物理無一事一物之或蔽則能遵行禮義審識安危辨察愚賢分別是非是第二件緊要也復而又要勇能見義必為見善必遷毫無退怯則能作事果敢剖斷不疑知姦必除知必去是第三件緊要也仁而不明如有田不耕明而不勇如有苗不耘勇而不仁猶知刈而不知種三者備則叢林興缺一則衰缺二則危三者無一則住持之道廢矣二事與淨因臻和尚書此節明不可缺若但有其仁而無明如世人有田而不能耕良可惜也然仁明雖具而無勇以繼之亦如世人田雖已種而不能耘鋤無所得也若有明有勇而無仁以先之又如世人但知收穫而不知下種必無益也刈割也以是觀之三者必不可缺若住持人三者全備則叢林必興缺一叢林必衰缺二叢林必危若三者俱缺佛法必至掃地叢林自見寥落矣且看世出世做漢子的誰不有此缺一如車脫轄也此篇言住持以擇賢愚為要賢愚分則法道自顯也遠公曰智愚賢不肖如水火不同器寒暑不同時蓋素分也此節舉智愚本自生成智者稟清和之氣生人才識明敏愚者稟昏濁之氣生人頑蠢無知賢者稟和煦之氣生人慈儉溫良不肖者稟乖謬之氣生人凶險姦邪四者如明暗相傾薰蕕不並決然之理故喻如水火不同器寒暑不同時此蓋平素之分定也賢智之士醇懿端厚以道德仁義是謀發言行事惟恐不合人情不通物理不肖之者姦險詐矜己逞能嗜欲苟利一切不顧此節明賢愚品類逈別蓋賢智之士生來性分醇和懿美端莊厚重所謀所趨者道德仁義時而發言時而行事唯恐與衆人心性不合與事物道理不通兢兢業業以任道為己心彼愚不肖之人一味姦邪險偽欺詐諂發言如同聖賢行事宛爾鬼魅矜己自負逞能自高貪嗜私欲苟取財利無所不為故禪林得賢者道德修綱紀立遂成法席廁一不肖者在其間攪羣亂衆中外不安雖大智禮法縱有何用智愚賢不肖優劣如此爾烏得不擇焉惠力芳和尚書此節結成優劣當擇所以禪林下得一賢者則道德可修綱紀自立總繩曰綱衆目曰紀致令規矩整齊法社必盛矣廁者雜也若其間雜著箇不肖者在衆人之中則攪擾叢林惑亂大衆一院不安雖有大智之規矩禮法亦無所用何也由無廉耻不可治也且智與賢是一種愚不省是一種此兩種勝劣利害皎然如此爾何得不致力揀擇焉優勝也劣弱也烏何也性本無二習之有異人胡其不自省也此篇誡人情不可滯塞情通而道行乎其間也遠公曰住持居上當謙恭以接下執事在下要盡情以奉上上下既和則住持之道通矣居上者驕倨自尊在下者怠慢自疏上下之情不通則住持之道塞矣此節先標情之通塞謂住持之位本常居上時中須要謙和恭謹以接納於人為執事者本當居下時中必要盡情致敬以承奉于上如此上能謙和下能承奉則住持之法道自流通矣設若在上者驕侈倨傲以自尊則在下之人必然怠墯輕慢而自疏遠上下之人情既爾不通則住持之道法必滯塞矣古德住持間暇無事與學者從容議論靡所不至由是一言半句載於傳記逮今稱之此節方明情通之故故又引古之通情者以明之試看古來有道德之師間暇無事必謙光接物常與可語之學者從容議論從容者和緩而不迫議者評定古今之事宜論辨也有所不明而辨柝之或論辨古人公案或品評賢德機語世法佛法無所不到偶爾師資機語相契合乎至理或一言或半句言雖少而語意奇必當載於傳記古今稱之也如太陽問梁山如何是無相道場山指大士像曰此是吳道子畫的陽擬進語山曰者箇是有像的那箇是無像陽即有省山曰何不道取一句陽曰道即不辭恐落紙筆山笑曰此語上去在其故何哉一則欲使上情下通道無壅蔽二則預知學者才性能否其於進退之間皆合其宜自然上下雍肅遐邇皈敬叢林之興由此致耳與青華嚴書此節結完情通事恰然必欲與學者間時議論其故何哉一則使上下情通不致法道壅蔽二則預先知得學者才力性情可用不可用所謂從苗辨地因語識人然後於當進當退之間總得其宜相孚如此自然上下雍容整肅遠近歸從敬信叢林之興豈有別法不過由此情通而致也間暇議論正是發潛德之幽光不是細事此篇訓人宜務實學而不宜賣虗飾假也遠公謂道吾真曰學未至於道衒耀見聞馳騁機解以口舌辨利相勝者猶如廁屋塗污丹艧祇增其臭耳西湖記聞潭州道吾寺可真禪師嗣石霜圓禪師南嶽下十世謂學道未造到極處切不可虗頭粉未見以為見裝點未聞以為聞馳騁機解馳騁者馬疾走也只以口快舌便多得一句以為勝如此者猶如廁屋塗畫些五彩丹艧者彩色之總名外面雖是好看其實裏內臭不可聞如此虗頭不如不做好孰不知其為假銀城也此篇教治心須求妙悟以為除妄見真之本也遠公謂演首座曰心為一身之主萬行之本心不妙悟妄情自生妄情既生見理不明見理不明是非謬亂此節顯心為根本蘄州五祖法演禪師綿州鄧氏子嗣白雲端禪師南嶽下十三世謂心者靈明洞徹具衆理而應萬機百千三昧無量妙義莫不由之而生必須要研窮透徹得妙悟也心若不悟妄念情識自然發生妄生則鑑理不明理不明則是非必訛謬錯亂矣所以治心須求妙悟悟則神和氣靜容敬色莊妄想情慮皆融為真心矣以此治心心自靈妙然後導物指迷孰不從化浮山實録此節教必修必悟所以學人修治自心當求徹證悟入之後使人神志和氣息靜容貌恭敬色相端莊設有妄想情慮以此妙心照之皆融為真心矣若如此修治其心心必靈通精妙然後開導羣品指接蒙迷誰不相從其教化耶悟要工夫意出語言之外若但如此讀去有甚麼交涉此篇教清修實德母務浮華而蔽其要妙也五祖演和尚曰今時叢林學道之士聲名不揚匪為人之所信者蓋為梵行不清白為人不諦當輒或苟求名聞利養乃廣衒其華飾遂被識者所譏故蔽其要妙雖有道德如佛祖聞見疑而不信矣爾輩他日若有把茅蓋頭當以此而自勉與佛鑑佛果書謂近今叢林中做長老者美名不得播揚又不為四衆之所信敬者無別只因梵行有虧不清淨不潔白也加之做人行事又不審實穩當輒者每事即然也輒或每事舉動多苟且貪求名聞利養又作事虗浮衒賣光華粉飾行止以欺惑愚俗遂被明眼人看破即生譏誚由此將幾多緊急妙事皆障蔽之矣即使有證悟有神機如諸佛祖但所聞見之事皆令人生疑惑而不諦信也爾輩他日若出世為人結箇茅葊守護己身調伏他意當以吾言自勉勵也老實二字值得千金若虗浮裝點不存實行乃業根種子也此篇戒人重本分勿務外緣而喪失法體也演祖曰師翁初住楊岐老屋敗椽僅蔽風雨適臨冬暮雪霰滿牀居不遑處此節明修不惜身袁州楊岐山方會禪師宜春冷氏子嗣慈明楚圓禪師南嶽下十世謂我會師翁初住楊岐之時屋老桷爛兩間破房僅略能也略可遮蔽風雨而已適至也適值冬暮即臘月也霰是雪粒雖人人臥榻雪粒滿布亦不分心于此安然處之事冗曰不暇心勤曰不遑謂榻雖積雪而不以寒苦動其心也衲子投誠願充修造師翁卻之曰我佛有言時當減劫高岸深谷遷變不常安得圓滿如意自求稱足此節顯事皆假合衲子中有志誠發心願當化募者充當也師翁卻辭不允曰你豈不聞我佛有言此時正當減劫也人人福壽亦隨之而減謂第九小劫人壽八萬四千歲減至六萬拘留孫佛出世減至四萬拘那含牟尼佛出世減至二萬迦葉佛出世減至一百歲釋迦牟尼佛出世故曰時當減劫然極峻之高岸最深之溪谷遷改變易尚爾不常或時高岸而崩頺或時深谷而平滿本不是堅周之法安得圓滿如人之意而自求稱足也汝等出家學道做手腳未穩已是四五十歲詎有間工夫事豐屋耶竟不從此節示其力學且汝等出家元為學道做手腳尚且未穩此言把捉不住也謂工夫尚做不定已是四五十歲了詎豈也豈得有間工夫再去化緣以華美其居而為事也昔宋李靖公名沆為丞相自奉甚薄所居陋巷廳事無重門家人勸修之沆曰身食厚祿安榮如意人生朝暮不保奚用工夫事豐屋耶竟不從翌日上堂曰楊岐乍住屋壁疏滿牀盡撒雪珍珠縮却項暗嗟吁翻憶古人樹下居廣録此節曉以大義翌日即明日上堂示衆曰楊岐乍住屋壁疏滿牀盡撒雪珍珠縮却項暗嗟吁翻憶古人樹下居翻憶者返追從上古人樹下修行值此風雨又書何如下逮於今尚要鬼弄他去做化主疇能却之耶此篇教學者須行解相應必謹必嚴也演祖曰衲子守心城奉戒律日夜思之朝夕行之行無越思思無越行有其始而成其終猶耕者之有畔其過鮮矣城字作譬喻古有偈云學道猶如守禁城晝防六賊夜惺惺中軍主將能行令不動干戈致太平此之謂也奉乃遵奉戒律即衆戒律儀也守心是學道奉戒是修德欲全道德須由日而夜亹亹思之自朝及夕孜孜行之蓋行時不可外于思思時不可越于行如是從始至終而不改異如耕田者中邊俱到可免荒怠之過矣禮約而義豐如九轉還丹點鐵即成金矣此篇戒住持不可專己之情而忘先聖法度也演祖曰所謂叢林者陶鑄聖凡養育才器之地教化之所從出雖羣居類聚率而齊之各有師承今諸方不務守先聖法度好惡偏情多以己是革物使後輩當何取法範土曰陶鎔金曰鑄叢林是一大爐冶以之鑄聖陶凡撫養鞠育人才器格之地住持人總其權柄則教化之所從出羣居者或百或千類聚者智愚賢否各從其類要其統率而齊整之則各有師承言各有者非各人自己有師承也謂必在住持於羣類中因人設教而調理之也此下謂不遵古自恃之過於今住持不遵古人之典訓一味以己之所好所惡而用情多偏且以自家杜撰之法教人依學以為己是而返改革前人規範如此任情縱意教後人將何以取法則也爐鞴之下原多鈍鐵只在匠者之巧心妙手否則總成廢器此篇誨住持欲知人之賢否必久乃得其真也演祖曰利生傳道務在得人而知人之難聖哲所病聽其言而未保其行求其行而恐遺其才自非素與交遊備詳本末探其志行觀其器能然後守道藏用者可得而知沽名飾貌者不容其偽縱其潛密亦見淵源此節明知人要在久識謂凡欲利益衆生傳授祖道所貴專在得真正良材乃堪承繼然知人一節最為難事古聖先賢亦以為憂何也聽其所言似實有德未審平日行履果如其言否也必求其所行造到古人地位又恐遺失其人之才力也自非猶云要在謂欲知人之的實要在平素與之交遊歲月既久則所知益深備詳他之本末探討他志向觀察他行履以及器量能幹然後真知實曉此人果是守道存德者果是韜光祕用者若是沽賣虗名粧飾顏貌者亦久而能知難以隱偽縱使彼做得深潛隱密我亦窺見他幽深源底也夫觀探詳聽之理固非一朝一夕之所能所以南嶽讓見大鑑之後猶執事十五秋馬祖見讓之時亦相從十餘載是知先聖授受之際固非淺薄所敢傳持如一器水傳於一器始堪克紹洪規如當家種草此其觀探詳聽之理明驗也豈容巧言令色便僻諂媚而充選者哉圓悟書此節謂授受必須親證且而觀探詳聽此四種道理原不是一朝一夕所能得的所以南嶽讓見大鑒之後猶然執侍巾瓶一十五秋南嶽懷讓禪師金州杜氏子嗣六祖大鑑禪師大鑑六祖慧能大師范陽盧氏子嗣五祖弘忍大師且馬祖見讓之時亦相從淘汰十有餘載江西馬祖道一禪師漢州什邡縣馬氏子嗣南嶽讓禪師是知先聖上授下受之際固非淺根薄德所能傳持所謂見與師齊減師半德見過於師方堪傳授猶如以此一器水傳入於彼之一器無欠無餘此喻為子者不妄受也如此之人始能克紹大法弘規擔當佛祖家業又如耕田者之的當人家收存好種種好則苗必秀此喻為師者不妄傳也如此觀探詳聽之理既盡始為明驗不誣也且能克紹能繼續之人豈容巧好其言令善其色便偏僻諂屈媚悅之徒可能當其任哉此不徒謂師家知人實要弟子耐久如是則水合水矣如今人才到門便付法吾不審是何知也此篇誨住持者須德專兼行以為興教傳道之本也演祖曰住持大柄在惠與德二者兼行廢一不可惠而罔德則人不敬德而罔惠則人不懷苟知惠之可懷加其德以相濟則所敷之惠適足以安上下誘四來苟知德之可敬加其惠以相資則所持之德適足以紹先覺導愚迷此節明德惠相資而互用謂為住持之大權柄大主宰在恩惠與德行兩種此兩種必欲兼行如鳥之兩翅廢一則不可也若但有恩惠與人而自不修德則人雖懷而不敬若但有德於己而無惠以及人則人雖敬而不懷罔無也果知惠澤能使人懷慕更加修德以相兼濟則所施之惠澤自然安撫人心上情下通誘引四來之衆矣果加修德能令人恭敬更加惠澤以相資助則所修之德行自足以繼紹先覺興隆佛種開導愚迷之人矣故善住持者養德以行惠宣惠以持德德而能養則不屈惠而能行則有恩由是德與惠相蓄惠與德互行如此則德不用修而敬同佛祖惠不勞費而懷如父母斯則湖海有志於道者孰不來歸住持將傳道德興教化不明斯要而莫之得也與佛眼書此節明德惠併施而同感故所以善為住持者自己養德又能行惠宣通恩惠以持其德德既能養則德用不竭惠既能施則惠有餘恩由此將德與惠共相蓄養惠與德互相流行如是則德已具於惠中德即不修而人敬之慕之如同佛祖矣惠既發于德內惠雖不費而人懷之愛之如同父母矣斯則五湖四海有志於道者誰不來歸住持將要宣傳道德興揚教化若不通明德惠二種之要妙必不能得也懷恩敬德人情皆然住持能兼之是將引天下人歸之敬之也此篇見師嚴子敬之道足為後人典則也演祖自海會遷東山太平佛鑒龍門佛眼二人詣山頭省覲祖集耆舊主事備湯果夜話祖問佛鑑舒州熟否對曰熟祖曰太平熟否對曰熟祖曰諸莊共收稻多少佛鑑籌慮間祖正色厲聲曰汝濫為一寺之主事無巨細悉要究心常住歲計一衆所係汝猶罔知其他細務不言可見山門執事知因識果若師翁輔慈明師祖乎汝不思常住物重如山乎此節明家教有方舒州太平佛鑑惠勤禪師龍門佛眼清遠禪師並嗣五祖演禪師南嶽下十四世值演祖自舒州海會寺移席往東山之日二師詣東山省覲詣往也省視也秋見曰覲祖集本寺中之耆舊並主事者備湯果夜間聚話祖問佛鑑今歲舒州地方田稻成熟否鑑對曰熟祖曰你太平常住熟否曰熟祖曰諸莊其收稻有多少佛鑑籌慮間籌量思慮不敢妄答祖即正其色勵其聲曰汝濫為一寺之主濫泛也既作主人凡事無大小盡要究竟於心稻谷乃常住一年家計大衆關係如此緊要汝猶不知其餘瑣末細務不言可見矣山門中汝雖作長老亦職事也須當知因識果如楊岐師翁輔弼慈明師祖始於南院終于興化三十年總柄網律汝豈不聞乎汝亦不思常住物粒米重如山乎慈明潭州石霜楚圓禪師金州李氏子嗣汾陽善昭禪師南嶽下九世蓋演祖尋常機辨峻捷佛鑑既執弟子禮應對含緩乃至如是古人云師嚴然後所學之道尊故東山門下子孫多賢德而超邁者誠源遠而流長也耿公與高葊書此節見師徒有德上是東山父子酬答之實事此是耿公判美師徒之至言蓋演祖平常機用辨才孤峻而又迅捷佛鑑既執弟子之禮應對之問從容含緩理宜如是也學記云師嚴然後道尊道尊然後人知敬學故東山門下子孫多賢德而超羣越衆者實是來源遠而流故長也模範既正則效自端所謂有賢父乃有賢子也此篇見師家取捨有道愛之拒之各有深意存也演祖見衲子有節義而可立者室中峻拒不假辭色察其偏邪諂所為猥屑不可教者愈加愛重人皆莫測烏乎蓋祖之取捨必有道乎謂師每見衲子有節操誼義而可以成立者凡入室必多孤峻拒止之不假些毫和言喜色此正是要作成長養之心也察其一種偏邪諂所為卑猥鄙屑終不可教者師轉加愛重人皆不能測度是何等意烏乎蓋師之一取一捨必有道理存焉至人作略不是意想得的以情擬之則失矣此篇見古人天資厚重不以得喪易其心志也演祖曰古人樂聞己過喜於為善長於包荒厚於隱惡謙以交友勤以濟衆不以得喪二其心所以光明碩大照映今昔矣答靈源書謂古人好樂聞人説己之過如子路然喜於為善如禹聞善言則拜長于包荒如周公謂君子處泰之道必有包荒之量厚于隱惡如大舜隱惡而揚善謙以交友如晏平仲善與人交久而敬之勤以濟衆如端木賜能博施于民而能濟衆又不以得喪易其心所以亘古今來總見其光明廣大而能照映之也此章只有四十三字丈夫事業備之矣此篇言住持當存誠克己不假威力而自尊嚴也演祖謂佛鑑曰住持之要臨衆貴在豐盈處己務從簡約其餘細碎悉勿關心此節明持身行事之體謂凡為住持臨蒞大衆貴乎要豐盛要盈滿處置自己宜簡省宜儉約其餘細末瑣碎之事不必要關係于我心也用人深以推誠擇言故須取重言見重則主者自尊人推誠則衆心自感尊則不嚴而衆服感則不令而自成自然賢愚各通其懷小大皆奮其力與夫持以勢力迫以驅喝不得已而從之者何啻萬倍哉見蟾侍者日録此節明發言用人之實用人須加推選其至誠者用之擇言必當徵究須鄭重者言之言若重則為主者自然而尊用人實則於衆心自然而感主既尊則不必故用威嚴而人自然悅服人既感則不必更加命令而事自能成就如此行去致使賢與愚各人通其所懷小與大皆得奮勇其力較之那一等持以威勢之力迫以驅喝之情使人不得已而相從者何止一萬倍哉啻止也用人誠發言重損己益人達於衆機如響斯應矣此篇言學者當確志操修期於必悟而後已也演祖謂郭功輔曰人之性情固無常守隨化日遷自古佛法雖隆替有數而興衰之理未有不由教化而成此節標教化勢必由師郭功輔諱正祥號淨空居士官至提刑嗣白雲守端禪師演祖與之言曰凡一切人之性情本無一定所守隨教化而遷移之自古來佛法或有時興有時廢原本乎理數而致興衰之理未必不從人之教化而成也昔江西南嶽諸祖之利物也扇以淳風節以清淨被以道德教以禮義使學者收視聽塞邪僻絶嗜欲忘利養所以日遷善遠過道成德備而不自知此節舉師承施教有方當初如江西馬祖南嶽石頭以及諸祖利生接人之時扇字妙有吹拂之意每每吹人以淳朴之風節人以清淨之操被人以道德之心教人以禮義之學使學者收攝其視聽不妄見聞塞絶其邪僻不妄動止絶其嗜欲之私忘其利養之想日復一日遷於至善而遠諸過失不覺道日成德日備使學者之性靈潛移默化而不自知所以佛法必然興矣今之人不如古之人遠矣必欲參究此道要須確志勿易以悟為期然後禍患得喪付之造物不可苟免豈可預憂其不成而不為之耶才有絲毫顧慮萌於胸中不獨今生不了以至千生萬劫無有成就之時坦然葊集此節明乏師各宜自勉今之行教化者大不如古人遠矣既乏其師而必欲參究此道須是自己立堅確志勿半途改易以悟入為期限即或有禍患得失之事總付之於天數儒言天命釋言定業既有定業即不可逃不可苟且求免豈可預先憂其不得成辦便不肯勉力而求之乎若有一絲毫顧惜念慮之情萌動於胸中不獨今生不得了悟以至千生萬劫似無有成就之時也顧慮是最愚癡的根本不可存而所當存者堅確志耳此篇見伊針芥相投是機是教也功輔自當塗太平州也絶江訪白雲端和尚於海會白雲問公牛淳乎公曰淳矣白雲叱之公拱而立白雲曰淳乎淳乎南泉大溈無異此也此節明箭鋒相值絶江是直渡訪參求也舒州白雲守端禪師衡陽葛氏子嗣楊岐方會禪師南嶽下十二世功輔現宰官身而作佛事可謂在欲而無欲居塵不染塵亦是他宿植德本有大因緣方能根塵脫卸一念無依但到此橋斷路窮不免求人指示故絶江訪白雲於海會白雲具通方正眼運匠石斧斤既無礙辨別資一路便問公牛淳乎公非粗心鹵莽已到不疑之地即全身擔荷脫體承當應之曰淳矣白雲居養子之緣恐他見道未穩故以雷轟電掣之機奮獅子威而叱䇿之所謂把關須用精嚴吏不驗分明不放行公已是鼻孔撩天腳跟點地縱使八面風吹他亦不動遂拱然而立真可謂鐵牛不怕獅子吼矣白雲至此雪後始知松柏操便應許他道淳乎淳乎實知他有主宰可與祖師把手共行故曰南泉大溈無異此也南泉即池州普願禪師鄭州王氏子嗣馬祖道一禪師一日上堂曰王老師自小牧一頭水牯牛擬向溪東牧不免犯官家苗稼擬向溪西牧亦不免犯官家苗稼不如隨分納些些總不見得大溈潭州靈祐禪師福州長溪趙氏子嗣百丈懷海禪師南嶽下三世一日上堂曰老僧百年後向山下檀越家作一頭水牯牛右脅書五字曰溈山僧某甲當時喚作溈山僧却是水牯牛喚作水牯牛却是溈山僧畢竟喚作甚麼即得時仰山出衆禮拜而退仍贈以偈曰牛來山中水足草足牛出山去東觸西觸又曰上大人化三千可知禮也行狀此節是格外提持仍贈以偈曰牛來山中水足草足此頌他見地明白謂飢餐嫩草遙山去渴飲寒泉繞澗回牛出山去東觸西觸頌他放曠今時所謂放曠不耕空劫地暮天何用牧歌催又曰上大人化三千可知禮也一是歸美之辭二是出身活句可謂大冶精金還他作者獅絃撥動聽者為誰只見羣音響絶大地山河總作琴聲且道他二人相見處作何話會此篇訓人學道貴在實悟若大法不明終一死漢也白雲謂功輔曰昔翠巖真點胸耽味禪觀以口舌辨利呵罵諸方未有可其意者而大法實不明了此節明實悟未證洪州翠巖可真禪師福州人嗣石霜楚圓禪師點胸因欲裝點胸襟高過於人故有是名耽樂也禪止散亂也觀照心昏也謂尋常耽樂取味於禪觀以其口舌辨利競爭機鋒呵叱諸方禪德覺無有一人可如己意者其實自家于向上大法未得明了一日金鑾善侍者見而笑曰師兄參禪雖多而不妙悟可謂癡禪矣白雲夜話此節明點罰得人金鑾善侍者金鑾寺名善乃慈明之高弟福州人道吾真楊岐會皆推伏之一日遊山次善拈一瓦礫置於石上謂真曰向此下得一轉語親切許你親見慈明速道速道真擬議善呵曰佇思停機情關未透何曾夢見先師在師兄參禪雖多而不妙悟誠可謂耽枯守寂之癡禪矣宗鏡云背教而唯成暗證只為己眼不明守默而單坐癡禪所以慧燈不朗而今木不識丁者也要如是亂做讀此置身於何地也此篇言道在人弘要教之至行之力也白雲曰道之隆替豈常耶在人弘之耳故曰操則存捨則亡然非道去人而人去道也此節明道本不易謂道之或時興隆或時衰替豈一定之常法耶在人真操實踐而弘揚之耳故子輿有云人能時時操守之則此道自存或放逸捨置之則道自喪亡且不是道欲遠人而人自遠於道也古之人處山林隱朝市不牽於名利不惑於聲色遂能清振一時美流萬世豈古之可為今之不可為也由教之未至行之不力耳此節明行之在人試看上古之士或深隱於山林不為名利所牽引或獨處於朝市不為聲色所惑亂斯其任道真而立志穩遂能清譽振於一時美名流於萬世然此事豈獨古人可為而今人不可為耶非也殆由人之教化未到而我行之不猛力耳或謂古人淳朴故可教今人浮薄故不可教斯實鼓惑之言誠不足稽也答功輔書此節轉謂無知或言古人淳厚朴素故可教今人囂浮輕薄所以不可教此等説話實是鼓動人心惑亂人志不見之于典籍無所稽考之言誡不足信操存捨亡的是箇甚麼教人去學正學時以千斤猛力尚難把捉如何聽其日去如是者蘄其道成無有是處此篇明言行乃立身之大本不可不謹而擇之也白雲謂無為子曰可言不可行不若勿言可行不可言不若勿行發言必慮其所終立行必稽其所蔽於是先哲謹於言擇於行此節明言行必不可妄發無為子姓楊名傑字初公號無為居士無為州人官至禮部嗣天衣懷禪師先引馬氏曰夫可言不可行君子弗言也則言顧行而言不違行也可行不可言君子弗行也則行顧言而行不違言也大凡發言必先思慮可能行否即能行亦須慮其始終凡立行必要稽考能為法否即能法更須防其遮蔽蓋先聖之常謹於言而擇於行也發言非苟顯其理將啓學者之未悟立行非獨善其身將訓學者之未成所以發言有類立行有禮遂能言不集禍行不招辱言則為經行則為法故曰言行乃君子之樞機治身之大本動天地感鬼神得不敬乎白雲廣録此節謂言行乃經世大本發言非苟能顯其道理實欲將此言啓迪學者之未悟必使之而悟也立行非苟且獨善吾身實欲以此行訓誨學者之未成必使之而成也所以發言必要使人可類類者法也立行必要成其禮體遂能言滿天下無口過行滿天下無怨惡言則可以為人之常準行則可以為人之法式故易曰言行乃君子之樞機樞門臼也機弩牙也樞機之發榮辱之主也治身之大本也所以能動乎天地能感致鬼神者唯言行而已得不慎乎昔商湯王有七年之旱太史占之曰當以人禱之王曰吾所為請雨者民也若以人禱返害其民吾當自禱遂齋戒翦髮斷爪素車白馬身穿白苧以身為犧禱于桑林之野遂以六事自責曰政不節歟民失職歟女謁盛歟宮室崇歟苞苴行歟讒夫昌歟言訖忽大雨數千里所以謂言行之能動天地也世語載魯嶺先生隱山修道忽失報曉雞以偈禱社神曰吾家住在山溪間養個雞兒當鳳看昨被狐狸拖將去家無惡犬去追還盤陀石上毛猶在紫竹林中血未乾本欲修表申上帝先來説與社公壇明日見一狸死於社前自是狸代報曉晝則不見所以見言行之能感鬼神也言行乃撑天柱地之主宰入聖超凡之要關失此如朽木無用矣此篇訓人專志於道宜絶念於未萌也白雲謂演祖曰禪者智能多見於已然不能見於未然止觀定慧防於未然之前作止任滅覺於已然之後故作止任滅所用易見止觀定慧所為難知此節明未然當覺謂習禪者有智有能只見得有形有相之已然而不能見於無動無迹之未然止者停息諸念也觀者如理思惟也定是內心不動慧是隨緣照了然此四法正是隄防於一念未然之前者也遇善則作逢惡則止真理即任煩惱即滅此四者乃覺察於諸法已然之後者也故作善止惡任真滅過所用有形故易見也止念觀理定心慧照所為無迹故難知也惟古人志在於道絶念於未萌雖有止觀定慧作止任滅皆為本末之論也所以云若有毫端許言於本末者皆為自欺此古人見徹處而不自欺也實録此節明智照無餘惟是古人之志專切于道念念在定絶諸想念于未萌雖有止觀定慧作止任滅俱無所用止觀定慧對治于未然始也作止任滅對治于已然末也此八種皆剿賊之器具也若有毛頭許舉到此八種本末之上則知此心不寧是自欺也大學曰所謂誠其意者毋自欺也説著一毛頭便不是了此正是古人見得透徹處而不自欺不自欺三字好生著眼須心領神會始得此章意旨甚深要在念未起處看此篇誨人篤志勤學當懷遠大之志也白雲曰多見衲子未嘗經及遠大之計豫恐叢林自此衰薄矣楊岐先師每言上下偷安最為法門大患此節教立志須遠大謂多見今之學者所謀近小未有經思到遠大之計䇿得一日過一日吾恐叢林由自乏遠計必衰薄矣楊岐先師每言上不勤教誡下不真操學總只各自要偷安間圖自在最是法門之大患害也豫昔隱居歸宗書堂披閲經史不啻數百過目其簡編弊故極矣然每開卷必有新獲之意豫以是思之學不負人如此白雲廣録此節明用功必深切上舉先宗此論自己豫昔隱居歸宗書堂歸宗寺名在廬山之南昔王羲之讀書處洗硯池至今尚在披展也披展經典閲看史書凡一切經書不止數百遍過眼其中簡編弊壞之極然每開卷再讀必有今日新得之意豫以是思之勤學真不負人如此如此二字至重當思之簡紙素也編篇章也弊故者破壞也東坡云故書不厭百回讀細讀深思理自知與此參觀則知學矣此篇謂哲人能知幾微明造物之所惜也白雲初住九江承天次遷圓通年齒甚少時晦堂在寶峯謂月公晦曰新圓通洞徹見元不忝楊岐之嗣惜乎發用太早非叢林福此節謂發用不宜太早九江府名承天寺名圓通亦寺名齒年也晦堂黃龍祖心寶覺禪師南雄塢氏子嗣黃龍南禪師南嶽下十二世寶峯寺名月公晦諱曉月字公晦得法于琅琊覺禪師于宋熙寧間住洪州泐潭寶峯精舍作楞嚴標旨謂新圓通長老見處高妙洞明徹證至道之源底不忝為楊岐之嗣忝辱也只是可惜他發機太早恐非叢林之福公晦因問其故晦堂曰功名美器造物惜之不與人全人固欲之天必奪之逮白雲終於舒之海會方五十六歲識者謂晦堂知幾知微真哲人矣湛堂記聞此節明造物不與人全公晦因而問之是何故也答曰功名美器造物惜之功名即出世行道也美器即洞徹見元也有功名無美器有美器無功名蓋天命也不與人全人誰不欲兩全其事者天故奪之也昔种放隱終南聞希夷之風往見之希夷曰當有顯宦但名者古今美器造物所忌子名將天命也不未如言及至白雲終於舒之海會時方才五十六歲僅中壽焉小人曰死君子曰終有識者曰晦堂知幾之神知微之顯真賢哲之人也易繫辭曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之微吉凶之先見者也我嘗痛惜人才最不易得但不奈造化小兒何必欲自主宰去來無礙須蘊空乃得此篇見古人不自負尊德而樂道也晦堂心和尚參月公晦於寶峯公晦洞明楞嚴深旨海上獨步晦堂每聞一句一字如獲至寶喜不自勝衲子中間有竊議者晦堂聞之曰扣彼所長礪我所短吾何慊焉此節明至人重道楞嚴梵語此云一切事究竟堅固謂公晦深通此經至理海上叢林中可稱獨步昔袁淑謂謝莊曰江東無我卿當獨步獨步者無人及之也晦堂每聞一句或得一字猶如得一至寶喜之不勝猶云喜之極也衲子中間或有私地議論者謂不當屈從如此晦堂聞之曰扣取彼之所長磨礪我之所短猶云取他有餘補我不足吾何慊焉慊者自滿也英邵武曰晦堂師兄學道為禪衲所宗猶以尊德自勝為強以未見未聞為愧使叢林自廣而狹於人者有所矜式豈小補哉靈源拾遺此節教衆人當法隆興府洪英禪師邵武陳氏子嗣黃龍南禪師謂晦堂師兄道德學識皆為禪衲之所宗尚者猶然尊人之德勝我為強以向所未見未聞自生慚愧如是者使叢林中一等自高自大而輕小於人者可以為法則也補益于人豈淺鮮哉人以自勝為嫌師以自勝為強此真為瑕不掩瑜直使賢愚品類自天壤也此篇誨住持要智識濶達勿逞私心也晦堂曰住持之要當取其遠大者略其近小者事固未決宜咨詢於老成之人尚疑矣更扣問於識者縱有未盡亦不致甚矣此節明住持取捨有方謂住持大要于其所當取者須遠大一日而具百千年眼目其所略者目前些細不必較論或有事故當前未能決斷宜咨求詢問於老練成實之人設或其疑未決更當扣問於博識之君子如此勤求縱猶有未盡亦不爭多矣其或主者好逞私心專自取與一旦遭小人所謀罪將誰歸故曰謀在多斷在獨謀之在多可以觀利害之極致斷之在我可以定叢林之是非與草堂書此節教虗己謀斷得宜其或主者矜己逞能偏私自用一味專己取與不聽人諫忽爾一朝為小人伺便遭他所謀此罪只得自任將誰歸耶故曰謀事須在多人斷事只在我也何故謀在多者一人見識有限多謀則利與害最極之處亦可參觀也斷必在我不可依違於人我決則是與非一定之機皆不能撓也取遠略近不專己用是持法利生之魁碩矣此篇誨人以利生為要不可獨善己也晦堂不赴溈山請延平陳瑩中移書勉之曰古人住持無職事選有德者居之當是任者必將以斯道覺斯民終不以勢位聲利為之變延平縣名陳子翁名瓘字瑩中又號華嚴居士沙縣人宋徽宗時登進士初任延平後為丞相留心空宗未詳得法者移延也勉勸也謂延書相勸也此節明古人鄭重云古來做住持原無職位要選有德者居其任居斯任者必將以我所證之道覺我所化之人所謂唯有此事更無他事縱有權勢高位聲名利養皆不能為之改變也今學者大道未明各趨異學流入名相遂為聲色所動賢不肖雜糅不可別白此節明今時溷亂今之學者大道不自究明只顧各人趨向異學此乃棄本逐末日久月深不覺流入名言教相之中自己無主宰遂為聲色所動賢與不肖溷雜糅亂于其間不可別白也正宜老成者惻隱存心之時以道自任障回百川固無難矣若夫退求靜謐務在安逸此獨善其身者所好非叢林所以望公者出靈源拾遺此節方是勸勉行道言今此之際正要有道德老成之師以慈悲惻隱之心而行教化孟子曰惻隱之心仁之端也惻者傷之切隱者痛之深善知識本以行道為己任自能挽頺風於末世回既倒之狂瀾固無難矣謂百川皆從下流有力者遮之使倒流也韓文公進學解云障百川而東之回狂瀾於既倒謂入垂手接物利生也若夫退隱窮谷求寂靜寧謐不過時中得些安間逸樂此乃獨善一身者之所好今叢林所望者唯公而已何得退藏以自安耶古人惟恐出今人惟恐不出即此便見人品之高下古今之差持也此篇誨用人不可不謹凡於有國有家者皆必然之理也晦堂一日見黃龍有不豫之色因逆問之黃龍曰監收未得人晦堂遂薦感副寺黃龍曰感尚暴恐為小人所謀晦堂曰化侍者稍廉謹黃龍謂化雖廉謹不若秀莊主有量而忠此節明得人之難豫悅也逆問以下而問上也黃龍答以監收未得人晦堂遂薦感副寺南嶽福嚴慈感禪師潼州杜氏子嗣黃龍南禪師龍曰感為人性暴恐為小人所謀晦堂又曰化侍者為人清廉而謹慎隆興府雙嶺心化禪師嗣黃龍祖心禪師龍曰化雖廉謹還不如秀莊主有量而忠潭州大溈懷秀禪師信州應氏子嗣黃龍南禪師有量則容納衆事有忠則盡情奉上也靈源嘗問晦堂黃龍用一監收何過慮如此晦堂曰有國有家者未嘗不本此豈特黃龍為然先聖亦曾戒之大溈秀雙嶺化感鐵面三人也通菴壁記此節因問發明靈源惟清禪師本州陳氏子嗣黃龍祖心禪師嘗舉以問晦堂曰黃龍師翁不過用一監收何過慮如此晦堂曰此事如天子之有國士庶之有家何嘗不以得人用人為本如是籌量細心豈獨黃龍為然先聖亦曾以此而為戒也古今用人是第一件大事得其人使法道自彰失之則亂斯致矣此篇誨學人當確志力行乃能登彼道岸也晦堂謂朱給事世英曰豫初入道自恃甚易逮見黃龍先師後退思日用與理矛盾者極多此節明先時孟浪與道相違朱給事名顯謨字世英任至給事問道於黃龍南禪師晦堂謂曰余當初才入道自負聰明之資輕視佛祖之道以為不難及見黃龍先師之後退思我日用中道與理相矛盾者極多矛即鎗盾即護身牌昔人以二事並賣各歎其勝智者語云我買汝矛還刺汝盾入與不入則無辭矣以況自相違也由是自生慚愧遂力行之三年雖祁寒溽暑確志不移然後方得事事如理而今咳唾掉臂也是祖師西來意章江集此節明知愧力行爾乃得道遂力行之三年雖祁寒溽暑祁大也溽盛熱也確定主宰決志不移功力純熟然後方得事事皆如理也到而今即咳唾掉臂也是祖師西來意此真頭頭是道左右逢源之謂也者箇行徑不是勸你做得的須你自家知愧知耻奮發猛力方有水到渠成時也此篇謂君子小人之不同由所守之有異也朱世英問晦堂曰君子不幸小有過差而見聞指目之不暇小人終日造惡而不以為然其故何哉此節問何故重小而輕大君子不幸偶然略有些小過差見聞指顧之不暇不暇者連忙指説也如小人竟日造惡人皆不以為然何也晦堂曰君子之德比美玉焉有瑕生內必見於外故見者稱異不得不指目也若夫小人者日用所作無非過惡又安用言之章江集此節答原因德重而身輕此答謂君子所養之德如美玉無瑕玷有些些瑕玷在內其迹必現於外故見玉者稱異稱異者驚歎其有玼也不得不指顧之若是小人日用中所作所為無非過惡如瓦礫然又安用言之古來賢豪寧為人所責毋為人所容良有以也此篇言道本無二由得之有深淺也晦堂曰聖人之道如天地育萬物無有不備於道者衆人之道如江河淮濟山川陵谷草木昆蟲各盡其量而已此節舉聖凡所證不同聖人所證之道至深至廣如天地覆載萬物何法不在其中至如衆人所得之道隨其自力深淺受用不同故有如江者江有三江松婁東水出岷山又川之大者曰江又有如河者河水出積石山自乾位來千里一曲九曲而入海亦有如淮者淮水出河南汝寧府至直隸淮安府入海至有如濟者濟水出常山然則四水各有遠近深淺而總皆歸之于海也山川者衆流入海曰川陵谷者大阜曰陵谷溪谷也草木昆蟲昆諸也此總舉一切有情無情雖靈蠢不同而所存之理皆各盡己量而已不知其外無有不備者夫道豈二耶由得之深淺成有大小耶答張無盡書此節方出大同之道竟不知自我所知所見之外還有箇無不包容無不具足的大境界在所謂道無方行者莫能至然道豈有大小長短差別耶由得者有淺有深故成者亦有大有小也其外無不備的境界非思量分別所及唯佛與佛乃能究盡學者當細心體究此篇教住持涉世免害之方也晦堂曰久廢不可速成積弊不可頓除優遊不可久戀人情不能恰好禍患不可苟免夫為善知識達此五事涉世可無悶矣與祥和尚書謂凡久廢之事不可祈以速成速成必易壞也積聚弊病不可頓為革除頓除返增弊也優遊之境不可久長留戀久戀必易變也人情世故不能全美恰好恰好必難得也禍害患難不可苟且求免苟免必多事也夫為善知識達得此五種事緣涉歷世間自然無所憂悶矣難得到這般田地到得即克昌運祚矣此篇見古人有愛人恭孝之心也晦堂曰先師進止嚴重見者敬畏衲子因事請假多峻拒弗從惟聞省侍親老氣色穆然見於顏面盡禮津遣其愛人恭孝如此與謝景溫書謂我先師進退舉止威嚴尊重見者無不敬之畏之也或衲子因有事緣告假者多峻絶拒止不許唯聞人有欲歸省親老者氣色和穆自然現于顏面而更盡以禮物津送之此其愛人恭順孝敬之心如此此乃聖賢肝膽非常人可及何故恭孝乃聖人至要不可斯須去己也此篇見古人之量度足為後人法式也晦堂曰黃龍先師昔同雲峯悅和尚夏居荊南鳳林悅好辨論一日與衲子作喧先師閲經自若如不聞見已而悅詣先師案頭瞋目責之曰爾在此習善知識量度耶先師稽首謝之閲經如故已上並見靈源拾遺南嶽雲峯文悅禪師南昌徐氏子嗣大愚守芝禪師南嶽下十一世謂昔同先師行腳時休夏于荊州鳳林寺悅和尚每好辨論一日與衲子大聲喧閙先師閲經自若與常日一樣如不聞見已而喧譁之後悅往先師案頭張其目而責之曰爾在此裝模作樣學善知識量度麼先師但作禮謝之然後仍復閲經如故雲峯威不可犯黃龍慈不可當總是天生成的非恆情可擬此篇教學者勿耽外物有廢己業也黃龍南和尚曰豫昔同文悅遊湖南見衲子擔籠行腳者悅驚異蹙頞已而呵曰自家閨閣中物不肯放下返纍及他人擔夯無乃太勞乎林間録黃龍舉往事而激勵于人謂豫昔同悅和尚遊湖南見衲子有擔著箱籠行腳者悅見之驚而且歎以為異事攢其眉蹙其頞久之更呵叱其僧曰你自家閨閣中物尚不肯放下閨閣物者房室中物謂情識不捨戀外物也返纍及他人與你擔夯肩挑為擔背負為夯豈不自勞而勞人耶閨閣中物既放得下更有何事留戀此真造道第一捷徑也此篇誨住持要情通上下知損益否泰之由也黃龍曰住持要在得衆得衆要在見情先佛言人情者為世之福田蓋理道所由生也故時之否泰事之損益必因人情情有通塞則否泰生事有厚薄則損益至此節先明情通謂住持人第一要深識人情安撫大衆先佛有言人情者為世間第一種致福良田蓋一切事理一切道法皆由人情而生也故時世之否泰事物之損益皆必因人情所致情通則泰生情塞則否至事若豐厚情必至故於事必益事若微薄情必疏故于事必損矣惟聖人能通天下之情故易之別卦乾下坤上則曰泰乾上坤下則曰否其取象損上益下則曰益損下益上則曰損夫乾為天坤為地天在下而地在上位固乖矣而返謂之泰者上下交故也主在上而賓處下義固順矣而返謂之否者上下不交故也是以天地不交庶物不育人情不交萬事不和損益之義亦由是矣此節引聖以證唯獨聖人自能通天下之情何以知然豈不見易之別卦乾下坤上則曰泰謂坤上乾下名地天泰卦泰者通也小往大來小陰也往居於外大陽也來居於內陽氣下降陰氣上升二氣相交而萬物化生則天地通泰也以人事言大為君小為臣君推誠以任下臣盡忠以奉上上下之志通而天下皆通泰矣乾上坤下則曰否謂乾上坤下名天地否卦否者閉塞也大往小來陽往居外陰來居內陰氣不上升陽氣不下降二氣不交而萬物不生故至天地否塞也以人事言君不下孚於臣臣不上奉于君上下不交人情則否塞矣其取象損上益下則曰益謂巽上震下名風雷益卦益增益也巽為風震為雷雷激則風怒二者相助所以為益以人事言在上者施其澤以及下在下者盡其誠以奉上是兩相增益也故本義云損上卦初畫之陽益下卦初畫之陰故曰益損下益上則曰損謂艮上兌下名山澤損卦損減損也損兌澤之深益艮山之高取內於外所以為損以人事言在上者取民以自厚在下者專己以薄君必至上下俱損矣故本義云損下卦上畫之陽益上卦上畫之陰故曰損且夫乾本為天坤本為地天本在上而返居其下地本在下而返居其上論其位固乖違矣而返謂之泰者由上下之氣交通故也主在上而賓處下義固為順而返謂之否者由上下不交通故也是以天地之氣不交則使萬物皆不能生育人情之道不交以致萬事皆不能和悅前之所言損益之義正如此之説也夫在人上者能約己以下下必悅而奉上矣豈不謂之益乎在上者蔑下而肆諸己下必怨而叛上矣豈不謂之損乎故上下交則泰不交則否自損者人益自益者人損情之得失豈容易乎先聖嘗喻人為舟情為水水能載舟亦能覆舟水順舟浮違則沒矣此節明上下交通夫在上者自能簡約以寬於人下必歡悅而承奉之豈不謂之益乎在上者若輕蔑於人而恣肆乎己下必怨恨而叛逆之豈不謂之損乎故上下情能交通即為之泰不交則為之否自肯損者使人益自若益者使人損人情之得失豈容易而能致乎先聖嘗喻孔子答魯哀公語人喻以為舟情喻之如水然則水本能載舟忽然風逆浪生覆舟亦為水也故謂水順則舟浮違之則沒矣故住持得人情則興失人情則廢全得則全興全失則全廢故同善則福多同惡則禍甚善惡同類端如貫珠興廢象行明若觀日斯歷代之元龜也與黃檗勝書此節總結通情故住持得人之情則法道興失人之情則百事廢人情到處俱通是謂全得于事則全興使人情處處不通而全失則事無可濟而全廢矣故與善人同居者則福多與惡人同處者必禍甚善惡兩種本同其類如黑白相承正如穿貫其珠無二也興之與廢由善惡所致其事理明白猶如觀日歷歷可見也善惡與興廢的道理全在人情之到與不到即此用情一事便如歷代之元龜也元龜莊子云宋元君夜半而夢人披髮窺阿門曰豫自宰路之淵為清江使河伯之所漁者余且得豫元君覺使人占之曰此神龜也君曰漁者有余且乎左右曰有君曰合余且會朝明日余且朝君曰漁何得對曰且之網得白龜焉其圜五尺君曰獻若之龜龜至君再欲殺之再欲活之心疑卜之曰殺龜以卜吉乃刳龜七十二鑽而無遺策仲尼曰神龜能見夢于元君而不能避余且之網知能七十二鑽而無遺莢不能避刳腸之患如是則知有所困神有所不及也類德通情千聖持身要訣豈但知之當銘諸座右此篇謂凡人作事立志要濶大境界不局蹐也黃龍謂荊公曰凡操心所為之事常要面前路徑開闊使一切人行得始是大人用心若也險隘不通不獨使他人不能行兼自家亦無措足之地矣章江集荊公姓王名安石字介甫臨川人宋神宗熙寧間拜相封為荊國公問道於黃龍南禪師師謂凡人操心欲為一件正徑之事立意先須要濶達勿以一己之私為是於面前行徑之道理必須開闊使天下古今智愚遠近皆可能行始見是大丈夫用心處若是作用巇險立意阻隘不獨使他人行之有礙兼且自家亦無安身措足之地也者等説話也要是者般人方領會得不然多作等間看過此篇教人戒謹於人不知而己所獨知之地以絶其欺也黃龍曰夫人語默舉措自謂上不欺天外不欺人內不欺心誠可謂之得矣然猶戒謹乎獨居隱微之間果無纖毫所欺斯可謂之得矣答荊公書夫起語辭凡世人於一語一默一動一靜之間自己信知我上不敢欺天外不敢欺人內不敢欺我自心此實可謂得不欺也然而猶要戒謹慎獨于幽隱微細之間諦審此心果無纖毫欺昧處斯可謂真有所得也果然纖毫無欺即入初地位矣此篇謂既當長老之名必以行道為任乃不虗其名也黃龍曰夫長老之職乃道德之器先聖建叢林陳紀綱立名位選擇有道德衲子命之曰長老者將行其道德非苟竊是名也此節謂立名須當知義長老亦一職事也此職乃是載道乘德之器具如百丈建立叢林陳列紀綱樹立住持之名堂頭之位先必選其有道德之衲子命之名曰長老本欲使之行道德非謂苟且私竊做箇長老之虗名也慈明先師嘗曰與其守道老死丘壑不若行道領衆於叢林豈非善守長老之職者則佛祖之道德存歟與翠巖真書此節顯利己不若利人慈明先師嘗曰衲僧家與其抱道藏拙老死于丘壑獨善其身不若奉行道德統理大衆為法於叢林豈不是善能持守長老之職者使佛祖之道德恆存而不亡也陳紀綱立名位要一團骨氣不是支吾名件做得的事此篇謂學道固在專勤尤要絶嗜好以擴充豫道也黃龍謂隱士潘延之曰聖賢之學非造次可成須在積纍積纍之要惟專與勤屏絶嗜好行之勿倦然後擴而充之可盡天下之妙龍山廣録隱士不求榮顯以道自樂者潘延之名興號清逸居士問道于黃龍師謂為聖為賢的學問非造次可以成得造次者急遽苟且之謂要在積功纍德而積纍之緊要又在專切與勤懇耳更須屏絶口所欲的與心所愛的嗜欲行之勿容懈倦如是十年五載然後使道理推擴之心量充滿之始得盡天下至極之妙豈不美哉積纍二字不可以歲月論更要在專勤上著眼自然領會此篇謂師法威嚴乃異時之良模也潘延之聞黃龍法道嚴密因問其要黃龍曰父嚴則子敬今日之規訓後日之模範也此節謂持法全在規訓延之見黃龍持法行道威嚴而謹密因而問其綱要黃龍答曰如世之為父道者嚴使兒孫必生恭敬如馬援征交趾以書戒子姪曰莫貪嗜好勤學事業子姪從而不敢違故知子敬由父嚴也我今日之規矩教誡乃將來與人為模範也譬治諸地隆者下之窪者平之彼將登於千仞之山吾亦與之俱困而極於九淵之下吾亦與之俱伎之窮妄之盡彼則自休也此節喻明持守之力譬如世人平治諸地隆高也窪深也凡高處削之使卑深處填之使平然我所以用法嚴密者非無意致乃因人而施之也彼若欣欣然欲登于萬仞之巔我亦隨彼而與之俱登彼若弊弊然困極于九淵之下我亦隨彼而與之俱下待彼欲高之伎倆窮欲下之妄想盡彼則自然而休也吾豈肯縱之由高由下耶故如治地者無以異也又曰姁之嫗之春夏所以生育也霜之雪之秋冬所以成熟也吾欲無言可乎林間録此節見嚴和方始成功又曰姁之嫗之春夏所以生育也禮記云天以氣姁地以形嫗乃陰陽相得覆育萬物霜之雪之秋冬所以成熟也意謂陰陽雖能生育若不假霜雪則無以成熟之也吾既居師席豈緘默無言不訓不誠使之能成就乎煅聖鎔凡豈易易事全在師家精心妙手能完美也此篇見師家妙用有佛祖罔測之機非淺識所能知也黃龍室中有三關語衲子少契其機者脫有酬對惟斂目危坐殊無可否延之益扣之黃龍曰已過關者掉臂而去從關吏問可否此未透關者也林間録黃龍每見衲子投參便問人人有箇生緣上座生緣在甚麼處龍慶間答曰早晨喫白粥至晚又覺飢又問我手何似佛手間曰月下弄琵琶又問我腳何似驢腳間曰鷺鷥立雪非同色師每以問人三十年少有契其機者脫或有人酬對惟斂目危然獨坐可與不可皆無所謂焉由此叢林目為三關語師自頌曰生緣斷處伸驢腳驢腳伸時佛手開為報五湖參禪者三關一一透將來潘延之莫測其用乃請益于師師曰若是已過關者不再問人但掉臂長往矣若欲向把關人問此關可過不可過便是未透過此關者矣多少人奈不何只是摸伊關竅不著識得了是甚破草鞋此篇謂有志者乃能窮其道而造其極也黃龍曰道如山愈升而愈高如地愈行而愈遠學者卑淺盡其力而止耳惟有志於道者乃能窮其高遠其他孰與焉記聞學者意欲修道須辦一片決定之心然此道猶如極高之山愈升而愈高愈益也又如極逈之地愈行而愈遠學者識見卑小立志淺近只好盡其力而止耳惟決定有志力于造道始能窮其高而至其遠其餘他輩見卑力淺誰能及也與及也學者定要窮到徹頂徹底方是歇處否則一碌碌庸物矣此篇戒學者不可厭故悅新若然則與道相遠也黃龍曰古之天地日月猶今之天地日月古之萬物性情猶今之萬物性情天地日月固無易也萬物性情固無變也道何為而獨變乎此節返顯道本不變謂古先有的天地日月即便是今日之天地日月也古先有的萬物性情即便是今日之萬物性情也天地日月萬物性情自古至今既是不更不遷為何道法獨易獨變耶嗟其未至者厭故悅新捨此取彼猶適越者不之南而之北誠可謂異於人矣然徒勞其心苦其身其志愈勤其道愈遠矣遁葊壁記此節方明人不力學噫蓋由學者力薄不能至於道便自謂學道至難不如學些外書典籍以為易得此所謂厭故悅新捨此取彼乃時人自變耳猶如適向越地者不往南行而返往北走南北懸絶誠可謂異於人矣之往也如學者不肯力學此道返求異學殊不知徒勞其心徒苦其身汝學之志益勤而不知其去道益遠矣得不惜哉而今學者多是厭故悅新的孰能以鐵骨冰心究不變之道也此篇教學者立志固要專一無雜尤要持久不變乃為得也黃龍謂英邵武曰志當歸一久而勿退他日必知妙道所歸其或心存好惡情縱邪僻雖有志氣如古人豫終恐不得見其道矣壁記謂學道人只要一念真誠置心一處遲之久遠亦勿退怯他時後日自然徹底掀翻必知妙道之所在也其或胸中存得有好惡之心情識多積其邪僻之念雖有志向有骨氣猶如古人無二我恐你終不得見其道矣才有一絲頭便被一絲頭礙何況好惡邪僻也道豈泛泛而可致哉此篇教人知所當為自諒可也寶峯英和尚曰諸方老宿批判先覺語言拈提公案猶如捧土培泰山掬水沃東海然彼豈賴此以為高深耶觀其志在益之而不自知非其當也廣録謂如今諸方老宿往往批評剖判古人語言抑知古人先賢心如寶鏡物來即現事到便言未曾生心起念要皆出自本源真實語也今之分章析句批點拈提大似描虗空而刻湛水甚無益也公案者猶如公府之案牘法之所在而正道治焉蓋取其法而治天下之不正佛祖機緣原為啓人之未悟百千開示同稟至理豈以臆見言之我見批判公案者猶如以兩手捧一坯土欲增培泰山之高掬一勺水要沃灌滄海之深然彼古人豈賴汝此拈提批判以為增高沃深耶觀汝之志在補益于古人之所立而不自知其所作者卻不當也者是一服解毒散能味此者自然心地清涼此篇教學者識因果力行此道勿失卻靈種也英邵武每見學者恣肆不懼因果歎息久之曰勞生如旅泊住則隨緣去則亡矣彼所得能幾何爾輩不識廉耻干犯名分汙瀆宗教乃至如是此節明學者貪求而忘本分嘗見一班學者放肆不懼罪業不識因果因嗟歎久之曰人在世間營營碌碌謂之勞生如旅泊者猶客寓於店如舟泊於岸只暫寄耳豈是久常之計住之則物皆我在只好隨緣受用去之則俱無用矣如彼昧心貪求者能有幾何安得不避罪業如此爾輩如何者等不識廉耻竟爾干犯名分之禮法玷污祖宗之教化乃至於此大丈夫志在弘祖道誘掖後來不應私擅己欲無所避忌媒一身之禍造萬劫之殃三途地獄受苦者未是苦也向袈裟下失卻人身實為苦也壁記此節勸蓄志弘道勿陷其身若是大丈夫蓄志在彰弘揚祖道誘掖後昆誘引也掖扶也不應作此無慚愧僧私擅己欲擅專也無所避忌公然取之也如此貪求乃媒成一身之禍造就萬劫之殃你要曉得三途地獄受苦者不教做苦向此袈裟之下失却了此箇人身不知何時再得出頭實為苦也媒者釀成其罪又招也千言萬論只教人識因果無知者頑然不聽佛祖再世亦莫如之何此篇謂長老當以道德自重勿招天人之厭也英邵武謂晦堂曰凡稱善知識助佛祖揚化使衲子回心向道移風易俗固非淺薄者之所能為此節明弘道必是其智者凡稱名為善知識者本為助揚佛祖教化使衲子輩回轉其心直向妙道正欲移其惡逆之風而改其不善之俗豈是淺根薄德者之所能為末法比丘不修道德少有節義往往苞苴骯髒搖尾乞憐追求聲利於權勢之門一旦業盈福謝天人厭之玷汙正宗為師友纍得不太息晦堂頷之此節顯貪求定為人厭惡吾見末法中有諸比丘梵語比丘此云乞士上乞諸佛之理以資慧命下乞檀信之施以養色身既稱比丘而不修道不養德且又不能守節存義往往即每每也苞苴謂包褁奇物奉獻諂以求囑托也骯髒幸值貌後漢書云骯髒倚門邊搖尾乞憐者如犬見人搖尾以媚之求人憐憫而已狀小人之諂如是追趨也是小人之行狀追隨有權勢之人到處尋將去亦不過求他聲名貪他利養誇示於人謂某宰官某老爺是我相知送我厚禮而不知歷年久遠一旦所積之業滿矣所餘之福謝矣由是天人共厭不惟自家取禍返玷污法門致纍師友良可太息太息者長歎也領字點頭而諾口不言而心許也到天人交厭時便苦殺人你何不借一面鏡照看臉面羞澀自見矣此篇謂人不務本而取末其相去不啻徑庭也英邵武謂潘延之曰古之學者治心今之學者治迹然心與迹相去霄壤矣古來學道之士時中屏息諸緣一心究道始終不易故所以謂治心乃務本也今之學者總只向外奔趨日用所作皆浮想為功故所以謂治迹皆為末也然心法無相亦無作為事迹有差紛紜無緒故與道不相應乃本末不相勝是所謂如天地之遠隔也今時總皆治迹者矣要到古人地位大似以蠓負山必不勝任此篇言學道不可倉卒要在積纍以漸入為期也英邵武謂真淨文和尚曰物暴長者必夭折功速成者必易壞不推久長之計而造卒成之功皆非遠大之資此節教立志長遠隆興府寶峯真淨克文禪師陝府閔卿鄭氏子嗣黃龍南禪師南嶽下十一世謂凡世間所生之物卒然暴長不期而成者必定夭折凡豐功偉業欲速疾而成者必竟易壞若不推求個久長之計而造作此等卒成之功總皆不是長遠高大之資質也夫天地最靈猶三載再閏乃成其功備其化況大道之妙豈倉卒而能辦哉要在積功纍德故曰欲速則不達細行則不失美成在久遂有終身之謀聖人云信以守之敏以行之忠以成之事雖大而必濟此節明倉卒無成且夫天地具最靈之理猶然以三載一閏五載再閏始乃成其造物之功備其生長之化也載者爾雅云夏曰歲取歲行之次也商曰祀取四時祭祀一終也周曰年取禾熟之意也唐虞曰載取物終更始之義也再閏者張純曰三年一閏天氣小備五年再閏天氣大備蓋閏月之不足日之有餘也古時一年三百六十六日分為十二月每月三十日一年共三百六十日餘剩六日又六個月小又剩六日一年共餘二六一十二日積至三年則有三十六日閏去一月還餘六日在後至下二年則餘二十四日並前六日共三十日則又閏一月是為三載一閏五載再閏則天地之功始大備矣況無上妙道至極至玄豈倉卒暴用而能成辦之耶要在日積其功歲纍其德始能至其極故曰欲速則不能通達細行則無所失誤凡欲至美妙之地者原在乎久久則乃是終身之謀望也聖人云篤信以操守之敏捷以力行之忠厚以成立之此三句左傳范文子答晉景公語誠能如是縱是極大之事皆可以能必濟也昔哲侍者夜坐不睡以圓木為枕小睡則枕轉覺而復起安坐如故率以為常或謂用心大過哲曰我於般若緣分素薄若不刻苦勵志恐為妄習所牽況夢幻不真安得為久長計豫昔在湘西目擊其操履如此故藂林服其名敬其德而稱之靈源拾遺此節是引證堅修舉古人以作則潭州大溈真如慕哲禪師撫州臨川聞氏子嗣翠巖真禪師南嶽下十一世云昔日哲侍者學道至真至切夜坐不睡設意欲睡以圓木為枕才睡未久則枕動便覺即起敷坐還復如未睡之先率此以為常法率準也或曰如此用心似乎大過哲曰我于生死大事未得透脫皆由與般若緣分平素淡薄若不刻定苦工磨勵其志恐為妄想習氣之所牽引況我此身如夢幻本不真實安得有百年作久長計也此足見哲公之堅志如是豫昔在湘陰親見其操履如此故叢林中聞之見之皆服其有道之名敬其有德之實而以是稱贊之苦工夫無人肻下如何做得出終身暗暗自負多矣此篇見德重終不能隱所謂時至理彰也真淨文和尚久參黃龍初有不出人前之言後受洞山請道過西山訪香城順和尚順戲之曰諸葛昔年稱隱者茅廬堅請出山來松華若也沾春力根在深巖也著開真淨謝而退順語録謂真淨和尚依黃龍最久居學地日每謂不欲出世作人師者後洞山虗席特請主之路必由西山過乃入山訪候香城景順禪師順乃蜀人嗣黃龍後坐脫於香城順以偈戲之曰諸葛昔年稱隱者此句正述真淨昔年之願茅廬堅請出山來此句況今朝受請之意松華若也沾春力春力者正謂時運該興不能隱藏根在深巖也著開比有德者終隱不住實歸美之辭也諸葛姓也名亮字孔明琅琊人躬耕于南陽之西臥龍岡與徐庶為友時劉玄德屯兵於新野庶見之告曰諸葛孔明臥龍也將軍盍往見之此人可以就見不可以屈由是玄德遂詣亮所凡三往而從命遂拜為軍師後為蜀漢相諡忠武候史咏曰世亂雄兵百載餘孔明曾此樂耕鋤蜀王不自垂三顧爭得先生出故廬至人出之與處各自有時時至而強隱翻為不智此篇教學者不可輕易是非於人當細察其實也真淨舉廣道者住五峯輿議廣疏拙無應世才逮廣住持精以治己寬以臨衆未幾百廢具舉衲子往來競爭喧傳真淨聞之曰學者何易毀譽邪此節明學者無識廣道者瑞州九峯希廣禪師西蜀梓州人嗣真淨文禪師南嶽下十二世師賦性仁慈愛物不瑣瑣於尋常細故故叢林號為廣無心一日舉為五峯住持輿衆也衆人皆私議謂廣為人疏散而又拙鈍恐無應世之才何能住得及至廣住後治己甚是精嚴臨衆極為寬不久之間寺中凡百弛廢者咸皆備具衲子往來競爭喧傳乃衆口稱善也真淨聞之曰學者何故易毀易譽於人耶豫每見叢林竊議曰那箇長老行道安衆那箇長老不侵用常住與衆同甘苦夫稱善知識為一寺之主行道安衆不侵常住與衆甘苦固當為之又何足道如士大夫做官為國安民乃曰我不受贓不擾民且不受贓不擾民豈分外事耶山堂小參此節復舉通病豫每見叢林禪和子竊議曰那箇長老肻行道能安衆那箇長老不侵用常住與衆同甘苦夫既然稱為善知識乃荷佛祖重任為一寺之主行持道法安撫大衆不侵用常住與衆人同甘苦理所當然譬如士大夫做官的一般上致君而忠下澤民而仁皆本分所當行事也乃曰我做官不受贓不擾民呵呵不受贓不擾民豈分外之事耶贓者吏受賄也凡非理所得財賄皆曰贓妄議人者最是折福的根本願當自惜毋伐德也此篇見古人愧己自責能知止也真淨住歸宗每歲化主納疏布帛雲委真淨視之顰蹙已而嘆曰信心膏血豫慙無德何以克當李商老日涉記真淨和尚住廬山歸宗寺每年化主還山交納緣疏所有錢穀布帛如雲屯聚委集之多真淨見之顰眉蹙額不以聚集之多為喜也已而乃嘆息曰如此等物總皆是信心檀越之膏血也豫甚自慚愧我無道德何以能當此信心之施也那一班人猶嫌其少無慙愧心於異類幾希此篇教學者存心須中正不隱乃不失節義之操也真淨曰末法比丘鮮有節義每見其高談濶論自謂人莫能及逮乎一之惠則始異而終輔之先毀而後譽之求其是曰是非曰非中正而不隱者少矣壁記謂末法比丘本無操守又乏義氣每常見他出語高談濶論如雲興浪湧自言我能如此人誰能及逮乎受人一食之恩先與之異而後即輔翊之先才毀謗而後則稱譽之求其一個是即言是非即言非決定不為利欲所惑中正無隱諱者少矣小家子本不足齒只是古人格言在此也要知羞此篇訓人體度宜乎慎重操修貴乎實踐也真淨曰比丘之法受用不宜豐滿豐滿則溢稱意之事不可多謀多謀終敗將有成之必有壞之此節教所作當慎謂出家者時中受用不宜過于豐滿過必溢溢流去也凡稱心之事不可多謀過謀終敗事有成必有壞理之常也豫見黃龍先師應世四十年語默動靜未嘗以顏色禮貌文才牢籠當世衲子唯確有見地履實踐真者委曲成褫之其慎重真得古人體裁諸方罕有倫比故今日臨衆無不取法日涉記此節舉先宗行徑豫每見黃龍先師應世利生已四十年語默之間動靜之際竟不曾將顏色取悅人以禮貌牽合人亦不曾以文字才學牢籠人衆中果有見地穩密履踐真實者則委曲以成褫之褫成就也其謹慎尊重處真得古人體格諸方似難得與之倫類而比擬之也是故我今日臨衆無一事一法而不取之為軌則也豐滿便溢多謀即敗誰不悉知往往到者裏蒙然若昧乏智眼也此篇見古人朴素無貪知足自安也真淨住建康保寧舒王齋嚫素縑因問侍僧此何物對曰紡絲羅真淨曰何用侍僧曰堪做袈裟真淨指所衣布伽黎曰我尋常披此見者亦不甚嫌惡即令送庫司估賣供衆其不事服飾如此日涉記建康即金陵保寧寺名舒王宋徽宗進荊公為舒王荊公于熙寧間拜為相作務新法病民其子王雱為崇正殿大學士因佐父務新法必行雱卒父罷相晏間間如夢𥧌見一鬼使領雱荷鐵枷泣于公前曰因父務新法所致公問使乞解使曰建寺僧可免公遂捨金陵田地宅舍為寺賜額保寧請真淨主之縑絹也以素絹為齋嚫問侍者曰此何物也對曰紡絲羅師曰何用侍者曰可作袈裟此云離塵服師指所著布伽黎曰我平常披此見者亦不甚嫌惡用此何為即令送入庫司估賣以為供衆之資其不好服飾裝點如此事雖小而榜樣真後人知此豈不慎其所以效之耶此篇教人不可以難易變志須鄭重力行也真淨謂舒王曰日用是處力行之非則固止之不應以難易移其志苟以今日之難掉頭弗顧安知他日不難於今日乎日涉記謂凡世人日用中所作為事是者與理相合宜常著力而行之悖乎理者即非是也則堅其意而速止之凡事但問理之是非勿論事之難易以更易其心志或以今日之難為者便掉頭不顧安知他日事成業就之時有更不難於今日者乎幾句説話是躋聖賢捷徑誠為人所難行吾輩當猛力為之可也此篇見前輩為法重人之深心也真淨聞一方有道之士化去惻然歎息至於泣涕時湛堂為侍者乃曰物生天地間一兆形質枯死殘蠧似不可逃何苦自傷真淨曰法門之興賴有德者振之今皆亡矣叢林衰替用此可卜日涉記真淨和尚聞一方有道德之知識化去化去者有而忽無也惻然痛惜也吁嗟歎息至于泣涕眼出為泣鼻出為涕時湛堂為侍者隆興府泐潭文準禪師興元府梁氏子嗣真淨文禪師南嶽下十三世見師過於悲慟乃曰凡人生於天地之間一兆發之後受此形質兆有形顯之義枯老死滅殘缺蠧損皆不能預為逃遁和尚安得苦于自傷也如此師曰法門之興咸皆倚賴有德之師能振起之所謂道人存而法存德人滅則法滅今日有道德者俱亡矣叢林之下誰堪復振之而今而後必衰替矣惜人重法之誠乃聖賢性分之所具非作意為之也心痛法衰泣烏能忍此篇教人絶異學求妙悟治心以務本也湛堂準和尚初參真淨常炙燈帳中看讀真淨呵曰所謂學者求治心也學雖多而心不治縱學而奚益而況百家異學如山之高海之深子若為盡之此節教絶異學謂湛堂和尚初參真淨禪師未得入理時嘗點燈帳中看讀真淨見即呵責之曰所謂學者非徒務文字之學以求諸外也當要息諸想而治其心心若不治則根本不立縱多學皆摘葉尋枝有何利益況諸子百家之異學諸子者如老莊荀墨之類百家者如韓柳歐蘇之類異學者謂各有所主也如山之高海之深子何能盡究今棄本逐末如賤使貴恐妨道業直須杜絶諸緣當求妙悟他日觀之如推門入臼故不難矣此節當求妙悟爾今如此為學正所謂棄本逐末猶如卑賤者返役使尊貴之人是為倒置于理不當其實有妨道業從此直須塞絶諸分別妄緣必當專求妙悟若使一旦豁然頓悟然後看讀經史如推門入臼一任開合故不難矣湛堂即時屏去所習專注禪觀一日聞衲子讀諸葛孔明出師表豁然開悟凝滯頓釋辨才無礙在流輩中鮮有過者此節聞示專修湛堂聞示即時者就在今日教誡之下便自屏去向來所習學之事屏除也專注如瓶注水禪觀使心不亂一日聞衲子讀諸葛孔明出師表諸葛武侯受顧命輔後主七擒孟獲已定南方乃出師伐魏臨行遺表於後主表云先帝創業未半而中道崩殂云云至宮中府中俱為一體師遂豁然開悟將平日𮌎中所有凝結積滯之物頓然冰釋從此辨才無礙其悟入之深在同流輩中少有能超過其靈妙者治心乃世出世之至學心不治而多學典章所謂算沙徒困終無益也讀至此乃知良馬見鞭影而行到則不難矣此篇教住持當與衆同好惡乃合乎大中至正之義也湛堂曰有道德者樂於衆無道德者樂於身樂於衆者長樂於身者亡此節明樂有所當謂凡有道德之人無一己之私己有其樂則與衆同樂無道德之人只圖自家安樂不顧大衆殊不知與衆同樂者其樂悠長為己求樂者其樂無幾不久即亡矣今稱住持者多以好惡臨衆故衆人拂之求其好而知其惡惡而知其好者鮮矣故曰與衆同憂樂同好惡者義也義之所在天下孰不歸焉二事癩可贅疣集此節教存大義今時之稱為住持者多以自己好惡之心臨于大衆不與衆同情故拂逆而不就要求箇公心直膽者諦審人情看我既好而衆人何故返惡我既惡衆人因甚返好此中必有其故如此住持天下鮮矣傳云好人之所惡惡人之所好是故拂人之性災必逮夫身拂者逆也故曰寒暑飢渴衆所同憂安逸飽暖衆所同樂道德仁義衆所同好傷殘刻剝衆所同惡住持人于此四種能同於衆者義也義在則衆美具在天下誰不歸之敬之哉義字當諦思不可輕忽讀去得此者無在不在也此篇言持法者貴在變通不知變通則自救不暇安能為人也湛堂曰道者古今正權善弘道者要在變通不知變者拘文執教滯相殢情此皆不達權變此節教人通權達變謂道乃往古來今一大權柄主宰萬物成立聖凡通融無礙之法不是一定作死馬醫的若是善于弘揚此道者自能通權達變所謂八面玲瓏四方洞徹由其入理之深也設使不知變通拘定文字執著教典留滯名相困殢識情殢困極也一味作死法拈弄有甚快活分故僧問趙州萬法歸一一歸何處州云我在青州做領布衫重七斤謂古人不達權變能若是之酬酢此節引古以證權變試看僧問趙州萬法歸一一歸何處州曰我在青州做領布衫重七斤趙州觀音院從諗禪師曹州郝氏子嗣南泉普願禪師南嶽下二世古人若不通權達變深融至理豈能有如是之酬酢耶主答客曰酬客答主曰酢聖人云幽谷無私遂致斯響洪鐘受扣無不應是知通方上士將返常合道不守一而不應變也與李商老書此節結無私能應變聖人指老子云幽谷無私遂致斯響如幽深巖谷中有人大呼則大應小呼則小應者以其無私心彼我故作此應也又如洪鐘受扣之無不答也天上神獸鹿頭龍身説文云鐘鼓之也橫曰栒縱曰乃擊鐘之具以是而知通方上士返將平常之事一一皆合於至道所謂信手拈來無不是終不是那守定一法而不知隨事應用變通無礙者比也變通之境終不易到須是𮌎中無塊壘舌上無交紋乃得隨聲應響如只口説變通總若羣盲摸象了無實見此篇教人求友須勝己如其鄙匪無益也湛堂曰學者求友須是可為師者時中長懷尊敬作事取法期有所益或智識差勝於我亦可相從警所未逮萬一與我相似則不如無也寶峯實録謂凡學者尋求友人須是可為我師法者二六時中常懷尊敬每作事必當取法于他期有利益又或彼智力見識略有勝過于我者亦可以相從差次也何故警䇿我所不及處萬一與我一樣則不如無也古德云選擇良朋要老成不如己者莫同盟譬如水入污泥去縱若清兮也未清其斯之謂歟此篇要人真履實踐務華非所宜也湛堂曰祖庭秋晚林下人不為囂浮者固自難得昔真如住智海嘗言在湘道吾時衆雖不多猶有老衲數輩履踐此道自大溈來此不下九百僧無七五人會我説話豫以是知得人不在衆多矣實録祖庭即佛祖之門庭也秋晚即末法凋零之時也謂林下學人於此凋零之際有不為囂喧浮薄之事者實是難得昔真如哲禪師住智海時嘗言我在湘江之西住道吾寺時衆雖不多猶有老成衲子幾人行持此道自大溈遷來智海時論衆不止九百僧其間無七五人會得我説話的舌頭落處以是而知得人只要真修實行者固不在衆數之多也人之性分固是生成而亦因時升降者有之不隨時變者幾人哉須知古人之意在實而不在華此篇謂人情澆薄知之最為難也湛堂曰惟人履行不可以一酬一詰固能盡知蓋口舌辨利者事或未可信辭語拙訥者理或未可窮雖窮其辭恐未窮其理能服其口恐未服其心惟人難知聖人所病此節明知人之難曰世間惟獨有知人實處不是容易非是一酬對一詰問便能悉知何也蓋有一等口舌辨論鋒利者聽其言似有可取至于行事之真假未可信也又一種辭語拙訥者訥語遲鈍也聞其聲似無可聽而究竟其道理卻難以極窮所以拙訥者雖能窮其辭恐未能窮他之理利口者雖能服其口恐未能服他之心此所以知人之難即聖人亦有所患焉況近世衲子聰明不務通物情視聽多只伺過隙與衆違欲與道乖方相尚以欺相冒以詐使佛祖之道靡靡而愈薄殆不可救矣答魯直書此節出今時弊病且近來衲子聞見處竟不專以通達人情為事而一味以此視聽多只伺候人之過隙隙縫罅也所以與衆人之情欲相違與大道之方向相乖時中所競尚者一味是欺瞞不實之心蒙昧諂詐之念蒙昧也如此行徑使佛祖之道漸漸轉衰危乎不可救也近世人情多尚浮靡行説俱非重厚所以知人之難不在于今也我願後人存守箇好念頭得來受用此篇教學者依附得人可以操持無妄成就品格也湛堂謂妙喜曰像季比丘外多徇物內不明心縱有弘為皆非究竟蓋所附卑猥而使然此節教依附得人謂像季學者外但隨順境緣逐諸聲色徇順也內不自求悟明心性此等人縱使有弘大作為處皆是虗浮實非究竟何故蓋是所依附之人卑淺鄙猥之所致也如搏牛之虻飛止數步若附驥尾便有追風逐日之能乃依托之勝也此節喻明所附譬如摶集牛身之虻據自力奮飛不過數步而已若附驥尾驥良馬也便見其有風可追日可逐之能也此亦無他乃依托之勝也是故學者居必擇處遊必就士遂能絶邪僻近中正聞正言也昔福嚴雅和尚每愛真如哲標致可尚但未知所附者何人一日見與大寧寬蔣山元翠巖真偕行雅喜不自勝從容謂哲曰諸大士法門龍象子得從之遊異日支吾道之傾頽彰祖教之利濟固不在豫之多囑也日涉記此節明依附之驗以是知學者居必擇其可居之處遊必擇其可與之人處若善人若良遂能絶其私邪偏僻之患而得近中正聞正言也昔澤州福嚴良雅禪師嗣洞山守初禪師青原下八世每愛真如哲之標格致趣實為可尚但未知所依附何人一日見與洪州大寧道寬禪師嗣石霜楚圓禪師蔣山贊元禪師亦嗣石霜南嶽下十一世及翠巖真禪師偕行偕同也雅師喜之不勝從容間暇日謂哲曰諸大士皆福慧深厚者乃法門中有大擔當大力量如龍如象之人子今得相從與之交遊他日支撑吾道之傾頺彰顯祖教之利濟固不在我之再三囑付也失身匪類萬事瓦裂依托二字可不慎哉此篇教學人須懷遠大之志不可徇俗苟利也湛堂謂妙喜曰參禪須要識慮高遠志氣超邁出言行事持信於人勿隨勢利苟枉自然不為朋輩描摸時所上下也寶峰記聞謂參禪人先必要識見高思慮遠志與氣俱宜高超遠邁邁遠也凡出言行事之間總皆要存誠立信使人不疑惑又不可隨順勢力貪求財利苟且枉屈之事果能如此自然使朋輩中人無處下手來描畫你摸索你自然不似他輩亦隨時世可上可下之人也循俗苟利心性昏迷即墮為流俗人矣此篇見古人發言行事要皆以不欺為先也湛堂曰豫昔同靈源侍晦堂於章江寺靈源一日與二僧入城至晚方歸晦堂因問今日何往靈源曰適往大寧來此節直述往事謂豫曾同靈源奉侍晦堂和尚於章江寺靈源一日偶與二僧入城至晚方始歸來晦堂因問曰今日向甚麼處來靈源以無事入城自覺不便但對曰適才往大寧來時死心在旁厲聲呵曰參禪欲脫生死發言先要誠實清兄何得妄語此節明益友無諱時死心正值在旁侍立不忍其虗妄乃大聲呵之曰參禪本為超脫生死發言必先要至誠老實清兄你何得作此妄語死心即隆興府黃龍悟新禪師韶州黃氏子嗣黃龍祖心禪師南嶽下十三世靈源面熱不敢對自爾不入城郭不妄發言豫固知靈源死心皆良器也日涉記此節明知過能改靈源聞呵大漸面熱不敢別對自此以後更不敢復入城郭外城曰郭亦不敢虗妄發言豫固知靈源知過必改死心正而不屈如二人者真良器也良美也古人存心此中無絲毫欺吝死心以不自欺之心責友靈源以不自吝之心改過此各得其正也學者審之此篇説古人好學不倦一皆出自天真非勉強也湛堂曰靈源好閲經史食息未嘗少憩僅能背諷乃止晦堂因呵之靈源曰嘗聞用力多者收功遠此節謂究學之功深湛堂和尚舉靈源禪師好學以䇿進後人閲觀也經即一切經書史即一切吏籍食飲食息安寢憩息也謂靈源好學于飲食睡眠之間未嘗少歇凡讀書必到背諷得乃止晦堂呵之以謂不當苦讀如是靈源對曰嘗聞凡事用力多者收功亦遠教中有云勇猛精進自強不息者則三昧易成彼岸易到圓滿功德亦得永遠也故黃太史魯直曰清兄好學如飢渴之嗜飲食視利養紛華若臭惡蓋其誠心自然非特爾也贅疣集此節出性分之本具黃太史諱庭堅字魯直號山谷居士得法于黃龍祖心禪師故嘗稱靈源曰清兄好學如飢渴者之欲飲食視利養紛雜浮華之事如惡臭蓋其天性至誠自然如此非勉強為之也請問今時學者一本書你曾讀過幾遍敢言背諷乎勉之勉之
