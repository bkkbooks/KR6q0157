body:
  text: 楚衡雲峯智祥述此篇教人持法當以中道含緩為要也靈源清和尚住舒州太平每見佛眼臨眾周密不甚失事因問其要佛眼曰用事寧失於寬勿失於急寧失於略勿失於詳急則不可救詳則無所容當持之於中道待之以含緩庶幾為臨眾行事之法也拾遺清和尚住太平日每常見佛眼和尚臨於大眾凡百所為無不周旋無不細密不甚失其事之所宜因而問其要義佛眼答曰大凡所作之事安得全保其無失寧可失之於寬緩不可失之于急迫寧可失之于簡略不可失之于詳細葢事失於急救之不及也失于詳則人無所容矣但當持守中道待以食緩庶幾即方可也方可以為臨眾行事之法則也古人披肝露膽誠不啻如父母之教子寧寬忽急寧略勿詳此二言立身處世之道盡之矣此篇謂道人出處自有其時強之勿庸也靈源謂長靈卓和尚曰道之行固自有時昔慈明放意於荊楚間含耻忍垢見者忽之慈明笑而已有問其故對曰連城與瓦礫相觸予固知不勝矣東京天寧長靈守卓禪師嗣靈源清禪師南嶽下十四世此節明養道以待時謂得道之士將欲行其所得之道不是強為必有其時時至而理自彰也昔日慈明和尚放意于荊楚間放意者非放蕩其意因時不至放蕩形迹于稠人中也雖遇幾多耻辱垢污皆含藏忍受而已往往人見他如此放縱其形多輕忽之慈明但笑而止有問曰他如此輕忽你何故返笑對曰連城與瓦礫相觸予固知不勝矣礫小石也趙有卞和璧秦昭王欲以十二連城貿之趙遣相如送之入秦相如視秦王惟有愛璧之心而無割城之意乃詐曰璧有瑕請示之王授璧與相如如將璧却倚柱立怒髮衝冠謂曰臣聞布衣之交尚不忍相欺況大國乎王若急臣臣頭璧俱碎於柱王恐碎璧使人扶相如起逮見神鼎後譽播叢林終起臨濟之道嗟乎道與時也苟可強乎筆帖此節明時至以成化逮見神鼎後潭州神鼎洪諲禪師襄水氏子嗣首山念禪師南嶽下九世尋常一衲以度寒暑後隱衡嶽有一豪貴來山遊見師氣貌閑靜一鉢無餘遂拜請住神鼎十年枯淡室無升米日收盞飯一枯木床為法座殘僧數輩圍之始終不易後宗風大振望尊一時門弟子氣吞諸方是時慈明往謁髮長不翦敝衣楚音通謁稱法姪一眾大笑鼎遣童子問長老誰之嗣明仰視屋曰親見汾陽來鼎杖而出顧見欣然問曰汾州有西河師子是否明指其後絕呌曰屋倒矣童子返走鼎回顧相矍鑠明地坐脫隻履眎之鼎老忘所問又失明所在明徐起整衣且行且語曰見面不如聞名遂去鼎遣人追之不可歎曰汾州乃有此兒耶慈明自此美譽播揚于叢林重興臨濟之道嗟乎二字乃靈源歎息勉強出世者謂道雖具時不至強之亦奚益耶道之成在我道之行惟時時不至烏能行其道所謂不是春風花不開時所限也此篇教人時中以理防患急則不可救也靈源謂黃太史曰古人云抱火措於積薪之下而𥨊其上火未及然固以為安此誠喻安危之機死生之理明如杲日間不容髮此節先明無智防患古人即前漢書文帝六年丁卯淮南厲王長謀反廢處蜀郡憤恚不食而死梁太傅賈誼上疏曰臣竊惟今之事勢可為痛哭者一可為流涕者二可為長太息者六若其他背理而傷道者難徧以疏舉進言者皆言天下已安已治矣臣獨以為未也曰安且治者非愚則諛皆非實知治亂之體者也夫抱火厝于積薪之下而𥨊其上火未及然固以為安方今之勢何以異此本末舛逆首尾衡決國制搶攘非甚有紀陛下可不壹令臣得熟數之於前因陳治安之䇿試詳擇焉師謂此語實可以喻人安危之機死生之理其明白如杲日麗天此間難容絲髮隱昧也夫人平居燕處罕以生死禍患為慮一旦事出不測方頓足扼腕而救之終莫能濟矣筆帖此節正教時中自警我見世人平居閑處之日未甞以生死禍患為慮者正如那安𥨊積薪之人無所惧也一旦禍患之事發于忽然不測之間如積薪下火起至此方纔來頓足扼腕扼腕即捶胸也冀欲救之終不可得矣平常能以生死禍患為慮者今時能有幾箇扼腕追之者無限此篇見古人念念以弘道為己任真祖師心也靈源謂佛鑑曰凡接東山師兄書未甞言世諦事惟丁寧忘軀弘道誘掖後來而已此節明古人志在于道謂每凡接五祖師兄書其中總不曾言世諦中事丁寧即教誡也惟教誡人要忘軀弘道誘引諸子扶掖後昆而已近得書云諸莊旱損我總不憂只憂禪家無眼今夏百餘人室中舉箇狗子無佛性話無一人會得此可為憂此節見智者濟人事急近得書云今歲雖則諸莊旱損我總不以為憂只憂禪者家無道眼今夏山中百餘人室中舉個狗子因甚無佛性話竟無一人會得此誠可以為憂矣至哉斯言與憂院門不辦怕官人嫌責慮聲位不揚恐徒屬不盛者實霄壤矣此節謂常人憂之有別與那一等憂院中諸事不辦者怕官府嫌責者慮聲名勢位不顯揚者恐其徒眷不盛者以此較之真天地懸隔矣每念此稱實之言豈復得聞吾姪為嫡嗣能力振家風當慰宗屬之望是所切禱蟾侍者日錄此節乃囑以力行此道吾甞思念此稱意真實之言今日豈再得聞吾姪乃師兄之嫡子必能殫力以振家風今本宗眷屬所企望者無他唯公一人而已須當安慰宗屬之所望是我所激切而懇禱之此一段憂人之心真不可解此篇言凡事皆在積累而成功力不可不深致也靈源曰磨礱砥礪不見其損有時而盡種樹蓄養不見其益有時而大積德累行不知其善有時而用棄義背理不知其惡有時而亡學者果熟計而履踐之成大器播美名斯今古不易之道也磨治石也礲磨也砥以砥磨物也礪砥石也磨砥乃用石磨物也礲礪是以物于石上磨也靈源要人知得積累所成之意謂如磨子與磨石相似累年積月雖不見其有損却有箇時節不覺而盡又如種樹木蓄瓜果者時中不見有增益却有時而大須知人之積德累行亦然每日之中雖不知其善却有時而用也至于棄義背理者雖不知其惡却有時而亡全篇出說苑正諫章學者果能熟計此語善不可以微而不修惡不可以微而不戒依而行之將來必成大器播揚美名斯今古不易之正論也聖賢雖有不可思議之境界亦是積累而至此篇教住持去私心宏器量是其要也靈源謂古和尚曰禍福相倚吉㐫同域惟人自召安可不思或專己之喜怒而隘於含容或私心靡費而從人之所欲皆非住持之急茲實恣肆之攸漸禍害之基源也筆帖惠古禪師嗣靈源清禪師南嶽下十四世謂人之禍福本相依倚吉㐫亦同其處要皆人之行事自所招致安得不時中而細思之也何言自招曰或專自己之喜怒而心胷窄隘無包容之量或縱吾之私心無故浪費而順從人之所欲如此皆不是住持之急務而實是恣情肆意之所由來將成禍害之基址本源也私心狹量人本不是做住持的器格有如斯者難保無虞此篇訓人安不忘危理不忘亂是遠禍生福之大主宰也靈源謂伊川先生曰禍能生福福能生禍禍生於福者緣處災危之際切於思安深於求理遂能祗畏敬謹故福之生也宜矣福生於禍者緣居安泰之時縱其奢欲肆其驕怠尤多輕忽侮慢故禍之生也宜矣此節明順逆唯自感伊川姓程名頤字正叔號伊川河南人問道于靈源禪師師謂伊川先生曰禍雖是不可意的事而實能生福福雖是樂意之境而必能生禍何也禍中能生于福者緣人居在災危之際處百不如意之地專切欲思安樂之方深窮求其解脫之理由者祗畏敬謹凡事皆小心翼翼一息不懈故福從此而漸生矣福能生禍者緣人處於安泰之時百凡皆稱心如意縱其奢華樂欲肆其驕倨怠慢由是多輕忽其事侮慢于人故禍自此而畢至矣聖人云多難成其志無難喪其身得乃喪之端喪乃得之理是知福不可屢僥倖得不可常覬覦居福以慮禍則其福可保見得而慮喪則其得必臻故君子安不忘危理不忘亂者也筆帖此節明得失唯自知聖人指老子警世篇云多難成其志無難喪其身有得即有失所以得即是喪的根本喪却又是得的道理以是而知凡人既居于福中當須知足不可屢僥倖屢數數也僥是不當求而求倖是不當得而得既有所得宜乎知止不可常覬覦覬覦者希望欲得也若使居福之時而能慮禍則其福必定可保見得之際便能慮喪則其得必竟能臻是故為君子者居安必不敢忘危在治必不敢忘亂斯為得矣教你細觀禍福之所由非他人置之也居安治毋忘危亂是最得力的明訓此篇教人即忘明真勿起生滅心也靈源謂伊川先生曰夫人有惡其迹而畏其影却背而走者然走愈急迹愈多而影愈疾不如就陰而止影自滅而迹自絕矣日用明此可坐進斯道筆帖所行之事喻迹起生滅心喻影背走喻捨忘歸真就陰喻即忘明真所謂揚湯止沸不如釜底抽薪夫欲人無聞莫若無聲欲人無知莫若無為是知迹從念起影逐身生絕異念而妄迹自消息幻體而虗影亦滅學者但解迴光就己返境觀心則法眼明而業影自消真身現而塵迹自絕若是則不滯化城而徑趣寶所矣日用明此於一坐之間得斯道矣就陰而止在你自己分上如何理會若理會得清楚則斯道可進不然多在鬼窟裏作活計此篇教人量力而行勿自廣也靈源曰凡住持位過其任者鮮克有終葢福德淺薄量度狹隘聞見鄙陋又不能從善務義以自廣而致然也日錄謂住持乃擔當佛祖之重任者若力小而任重多不能完美倒底何故葢由他福德淺薄又兼志識不廣量度不弘聞見皆鄙陋不堪又不能依從良善務合事宜以自高自廣而使然也從善務義乃智者生涯致力而行雖愚必智雖弱必強此篇說至人當韜光晦迹勿炫露取敗也靈源聞覺範貶竄嶺海歎曰蘭植中塗必無經時之翠桂生幽壑終抱彌年之丹古今才智喪身讒謗罹禍者多求其與世浮沉能保其身者少此節明才藏必無虞瑞州清源寺德洪覺範禪師本郡彭氏子嗣真淨文禪師南嶽下十三世南宋高宗帝賜寶覺圓明之號時稱寂音尊者因秦檜專權惡天下好人讒奏師過遂貶竄于嶺海貶謫也竄驅逐也靈源聞之乃歎曰蘭極香者也由種之于當路故欲求其經一時之翠不可得也桂亦香也因生於幽巖深壑之間故能抱守長年之丹且古今有才智之士亦然或致喪身或招讒謗或罹禍害者極多求其與世無忤隨其波流情和意合能保其身者無幾故聖人言當世聰明深察而近於死者好議人者也博辯宏大而危其身者好發人之惡也在覺範有之矣章江集此節明智露必遭迍故聖人言史記孔子適周問禮於老子將辭老子曰吾聞富貴者贈人以財仁者送人以言吾雖不能富貴而竊仁者之號今送子以言也當今之士聰明深察而近於死者好譏議人者也博辯宏遠而危其身者好發人之惡也為人臣子可不慎乎孔子敬奉其教自周返魯道愈尊矣今靈源和尚引以為歎曰如老子此言在覺範禪師實有之矣要知者等行徑原不可以與世浮沉全身遠害者此當須別著眼此篇謂學道以玅悟為先不可泥于文字也靈源謂覺範曰聞在南中時究楞嚴特加箋釋非不肖所望葢文字之學不能洞當人之性源徒與後學障先佛之智眼病在依他作解塞自悟門資口舌則可勝淺聞廓神機終難極玅證故於行解多致參差而日用見聞尤增隱昧也靈源聞覺範在嶺南時中細究楞嚴梵語首楞嚴此云一切事究竟堅固特加箋釋箋乃傳之未盡也釋是解釋謂公雖如此用心非不肖所望于公者葢文字之學不能洞徹當人妙性之根源也徒然返與後生學者障蔽先佛智慧法眼何故病在依他文字作解會故塞絕自己妙悟之門若論資助人之口舌得此箋釋可以勝過於淺聞至若廓徹神機終不能使人極窮妙證故于行解多致參差參差不齊貌乃言行相違也而日用中所見者文字所聞者義理將自家一段照天照地的光明多增隱昧矣此是直捷提持向上語當深心諦審此篇教住持當曲全人材不可以偶失而偏廢也靈源曰學者舉措不可不審言行不可不稽寡言者未必愚利口者未必智鄙樸者未必悖承順者未必忠故善知識不以辭盡人情不以意選學者此節言知識要稽審人情謂作長老者于學人舉止處不可不細細審察言行處不可不時時稽考寡言者口雖拙訥心中未必愚蠢利口者言雖巧便𦚾中未必智識鄙樸者行履雖或拘謹未必咸出悖逆承順者言貌雖或謙恭未必盡能忠信故善知識不可以辭盡人情不可以意選學者兵部侍郎陸贄上唐德宗諫曰明王不可以辭盡人情不可以意選進士進退隨愛憎之情離合繫異同之趣是猶捨繩墨而意裁曲直棄權衡而手揣重輕雖曰精微不能無謬此靈源特引用以示人夫湖海衲子誰不欲求道於中悟時見理者千百無一其間修身勵行聚學樹德非三十年而不能致偶一事過差而叢林棄之則終身不可立夫耀乘之珠不能無纇連城之璧寧免無瑕凡在有情安得無咎夫子聖人也猶以五十學易無大過為言契經則曰不怕念起惟恐覺遲況自聖賢已降孰無過失哉在善知識曲成則品物不遺矣此節謂學者要知過自檢葢湖海衲子誰不欲求道其間悟明自心見徹本性者千百人中難得一二于中精修其身勉勵其行聚積學問樹立德業成就一箇人品非三十年功夫不能到偶然間有一事或失檢點便成過差而叢林中以為有過輒棄之矣使三十年積習一旦皆廢而終身不可立夫耀乘之珠不能無纇纇絲節也魏惠王曰寡人有徑寸之珠照車前後各十二乘者數枚齊王曰吾有四臣照千里之外豈特十二乘也魏王有媿連城之璧寧免無瑕解見前凡在有情識中安得俱然無咎夫子聖人也猶以五十學易明乎吉㐫消長之理進退存亡之道故可以無大過為言爾梵語修多羅此云契經謂契理契機上契諸佛玅理下契眾生機宜契合也則曰不怕有念斯起惟恐覺照生遲況自聖賢已降降下也熟無過失哉在善知識委曲作成則高低大小利鈍雜出之人物俱無遺失矣故曰巧梓順輪桷之用枉直無廢材良御適險易之宜駑驥無失性物既如此人亦宜然若進退隨愛憎之情離合繫異同之趣是猶捨繩墨而裁曲直棄權衡而較重輕雖曰精微不能無謬矣此節教師承宜當公正故曰巧梓順輪桷之用枉直無廢材梓木匠也輪車輪桷榱桷謂巧匠用木枉者可為輪直者可為桷使不廢其材也昔齊桓公讀書于堂上輪扁斵輪于堂下釋鑿而問曰敢問君之所讀者何書公曰聖人之言也扁曰聖人在乎公曰聖人死矣扁曰然君所讀者糟粕耳公怒曰寡人讀書輪人安得譏乎有說則可無說則死扁曰以臣事觀之臣當斵輪徐則甘而不固疾則苦而不入不徐不疾得之于心應之于手口不能言有數存焉臣不能諭臣之子子不能受之于臣臣年七十而老斵輪古之斵輪者與其不可傳而死者多矣故君之所讀者糟粕耳桓公大喜出莊子天道篇良御適險易之宜駑驥無失性善使馬者稱良御駑鈍馬也驥良馬也如善于用馬者險處則馳之以驥易處則馳之以駑使遲速各得其宜自不失其所賦之性也凡物既皆如是而人豈不如其然也若進退隨愛憎之情離合繫異同之趣此兩句謂知識用人倘愛者非其材亦進而與之合同其事也憎者是其人亦退而與之離異其志也如是者猶如梓人捨其繩墨而欲裁曲直亦如賈者棄其權衡而欲較重輕雖則日技藝精微終不能免其無謬矣如此作成人方是佛菩薩真實念頭此篇教住持以至公為心不可偏狥己私也靈源曰善住持者以眾人心為心未甞私其心以眾人耳目為耳目未甞私其耳目遂能通眾人之志盡眾人之情此節明情通無外謂善能為住持者但以眾人心為己心不必私用吾心以眾人耳目為己之耳目不必私用吾之耳目遂能通眾人之志盡眾人之情夫用眾人之心為心則我之好惡乃眾人好惡故好者不邪惡者不謬又安用私託腹心而甘服其諂媚哉既用眾人耳目為耳目則眾人聰明皆我聰明故明無不鑒聰無不聞又安用私託耳目而固招其蔽惑耶此節顯情同不二夫用眾人之心為己之心則無二心所以我之好惡乃眾人之好惡故所好者決定不邪所惡者決定不謬又何必于私地囑託他人之心腹甘服他人之諂媚於我哉既用眾人之耳目為己之耳目則見聞無隱所以眾人聰明即是我之聰明故明無所不鑒照聰無所不通曉又何必于私隱中囑託他人之耳目固招他人之蔽惑于我耶夫布腹心託耳目惟賢達之士務求己過與眾同欲無所偏私故眾人莫不歸心所以道德仁義流布遐遠者宜其然也而愚不肖之意務求人之過與眾違欲溺於偏私故眾人莫不離心所以惡名險行傳播遐遠者亦宜其然也此節明同不同之故然則展布多人之腹心囑託眾人之耳目者或亦有之但賢達之士假此聞見託借腹心專求己之過失與眾人同其所欲無所偏私故眾人莫不歸心所以住持之道德仁義流布於遐方者宜其所然也而愚者之意惟囑託人之腹心耳目務求他人之過失則與眾人違其所欲墮于偏私故眾人莫不離心使住持之惡名險行傳播於遐方者亦宜其所當然也是知住持人與眾同欲謂之賢哲與眾違欲謂之庸流大率布腹心託耳目之意有殊而善惡成敗相返如此得非求過之情有異任人之道不同者哉此節顯同不同之騐是知為住持者與眾人同欲者即賢哲也與眾人違欲者乃庸流耳大槩布腹心託耳目之意有求人過求己過之不同而善惡成敗相返之利害實有如此豈得不是求過之情有人己之異而任人之道有公私之不同者哉此章貴在自求己過始不與凡夫為匹偶若然是世間第一種英烈丈夫此篇謂凡為道人者輕財重德可以為攝化之緣也靈源曰近世作長老涉二種緣多見智識不明為二風所觸喪於法體一應逆緣多觸衰風二應順緣多觸利風既為二風所觸則喜怒之氣交於心鬱勃之色浮於面是致取辱法門譏誚賢達此節謂應緣當以智照近世作長老者所經涉有二種因緣多見人之智識不明白為此二種境風所觸動竟爾喪失自家持法之體段其二種者何一者應不如意逆緣多乎觸發者衰風乃煩惱忿恨之氣二者應如意的順緣多乎觸發者利風乃貪愛忻喜之氣既為二風之所觸則有喜怒之氣交攻于心鬱勃之色浮見于面也鬱喜貌勃色變貌吃吃窮年得之則喜失之則怒必為具眼之賢達譏誚隨之是致取辱于法門也惟智者善能轉為攝化之方美導後來如瑯琊和尚往蘇州看范希文因受信施及千餘緡遂遣人陰計在城諸寺僧數皆密送錢同日為眾檀設齋其即預辭范公是日侵蚤發船逮天明眾知已去有追至常州而得見者受法利而迴觀此老一舉使姑蘇道俗悉起信心增深道種此所謂轉為攝化之方與夫竊法位苟利養為一身之謀者實霄壤也與德和尚書此節明起信惟在疎財惟獨有大智慧者遇此境緣善能轉作攝受教化之方便以此美聲引導于後來如瑯琊和尚即𣻄州廣照慧覺禪師嗣汾陽昭禪師南嶽下十世往蘇州看范希文姓范名仲淹字希文汝南人宋仁宗慶曆間為參政諡文正公問道于瑯琊瑯琊和尚因訪之得受信施及千餘緡緡錢串也遂遣人陰隱中籌計在城諸寺僧眾皆密送錢同日為眾檀越設齋和尚即預先辭范公是同為設齋之日侵早發船人皆不知逮天明眾知已去有念師之切者追至常州而得見師如法開導皆受法施利益而迴靈源和尚謂觀此老者一番舉作使姑蘇道俗悉起信心增將來甚深之道種如此真所謂轉為攝化之方也與夫那一種竊法位苟求利養為一身之謀者實天地懸隔矣我不知竊位求財者閱此當作何面目此篇教人修德力行不求聞知於人自為人之所敬也文正公謂瑯琊曰去年到此思得林下人可語者甞問一吏諸山有好僧否吏稱北寺瑞光希茂二僧為佳此節謂德存而名顯謂去年到此蘇州蒞任已來思得箇林下道人可相語者甞問一吏本城內外及諸山有好道德僧否吏稱北寺瑞光希茂二僧為佳瑞光寺名有四瑞鐘皷自鳴寶墖放光瑞竹交加白龜聽法故稱瑞光即今之臥佛寺也希未詳氏族嗣法茂即茂月禪師嗣大愚守芝禪師南嶽下十一世予曰此外諸禪律中別無耶吏對予曰儒尊士行僧論德業如希茂二人者三十年蹈不越閫衣惟布素聲名利養了無所滯故邦人高其操履而師敬之若其登座說法代佛揚化機辯自在稱善知識者非頑吏能曉此節證名實而行真予曰此二人外諸禪師律師中別無耶吏對曰儒者獨重士行僧家多尊德業如希茂二人者三十年履蹈不越門閫衣服惟以布素聲名利養了無所滯于胸中故我此郡人皆高尚此二師之操守行履而以師敬之也若論他登座說法代佛弘揚教化以機鋒辯才自在稱為善知識者此則非頑吏所能曉也逮暇日訪希茂二上人視其素行一如吏言予退思舊稱蘇秀好風俗今觀老吏尚能分君子小人優劣況其識者耶此節顯目擊而道存逮閒暇日訪尋希茂二上人上人者內有智德外有勝行在人之上者也觀他所行事實一一皆如吏言予退而思之從來稱蘇秀好風俗蘇即蘇州秀即嘉興今觀此老吏尚能分君子小人之優劣何況其有識者耶瑯琊曰若吏所言誠為高議請記之以曉未聞瑯琊別錄此節紀其事以曉眾瑯琊和尚聞而喜曰若此吏言誠為高上之議論請筆記之以遍曉于未聞者黃金白玉本質自珍何患無有識者學者讀此自知好人當做此篇要人深蓄厚養不宜躁進以求名也靈源曰鍾山元和尚平生不交公卿不苟名利以卑自牧以道自樂此節明務實存真鍾山元即蔣山贊元禪師靈源和尚述他平生行業以警後學謂元和尚生平以來不欲交結公卿士大夫不苟求聲名利養惟獨以謙卑自牧易象曰謙謙君子卑以自牧卑者謙之至也以養道自樂不願出世為人也士大夫初勉其應世元曰苟有良田何憂晚成第恐乏才具耳此節明自足之樂士大夫喜其為人高蹈勸勉應緣世間元曰凡學者果有良美之田苗豐子實雖遲亦妙何憂晚成以良田喻人所守之道第但也但恐乏才智器具耳荊公聞之曰色斯舉矣翔而後集在元公得之矣贅疵集此節出判美之詞荊公聞元和尚此語曰色斯舉矣翔而後集如鳥之為物也見人顏色不善則飄然而逝廻翔審視至彈射不驚之處而後集之謂在元公之見機亦如此也有良田不憂晚成是極受用處著忙作麼此篇言學道人行難于悟守當損己利人為要也靈源曰先哲言學道悟之為難既悟守之為難既守行之為難今當行時其難又過於悟守葢悟守者精進堅卓勉在己躬而已惟行者必等心死誓以損己益他為任若心不等誓不堅則損益倒置便墮為流俗阿師是宜祇畏謂世間學道人惟有悟證自心最是難的既悟矣又常常持守操修所謂水邊林下保養聖胎猶為不易既能守矣又貴乎行然至于行此道法接引眾人更為難中之難何也葢悟守者精進不退三年五載自然打成一片守之堅固超卓不二其志然此不過勉力修持在我一身不懈不惰而已惟行此道者必要以平等心堅固願更須損己益人以為任乃可為之若使心不等誓不堅損人益我是顛倒行事不惟不能光揚祖道而自家亦墮為流俗阿師其利害有如此者須當祇敬而大畏之祇大也行道之難非粗心所知惟登地菩薩始能究也學者當細審而力行之可耳此篇見古人有謙光導物之用尤歉然不敢自恃也靈源曰東山師兄天資特異語默中度尋常出示語句其理自勝諸方欲效之不詭俗則淫陋終莫能及求於古人中亦不可得然猶謙光導物不啻饑渴嘗曰我無法寧克勤諸子真法門中罪人矣靈源和尚舉演祖為人之實行以勉後學謂東山師兄所稟之天資挺特而卓異或語或默皆中法度尋常出一言發一語開示于人其義理自然超勝設若諸方欲效之者不是詭譎鄙俗之言則為淫蕩狹陋之語竟莫有能及之不惟同時者不能及求于古人中亦不可多得雖然如是尚猶謙光導物不異如饑如渴嘗曰我無道法寧豈也克能也豈能䇿勤于諸子既不能䇿進學人可謂真法門中罪人也如此人品須知淵源而有本濶大而無方不是常人學得的古人集此以為法式讀之應生珍重此篇教住持要行解相應無沾沾於聲利也靈源道學行義純誠厚德有古人之風安重寡言尤為士大夫尊敬此節述露源生平行實謂師所證之道所操之學所行之義一味真純誠實不雜不妄其德至厚真有上古風規尋常起居之間安重寡言更為士大夫之所尊敬嘗曰眾人之所忽聖人之所謹況為叢林主助宣佛化非行解相應詎可為之要在時時檢責勿使聲名利養有萌於心儻法令有所未孚衲子有所未服當退思修德以待方來未見有身正而叢林不治者此節復明師教行解相應師每向人曰大凡眾人放心縱意忽略之處却是聖人至謹至慎之地況為一叢林主人元是助宣佛化若不是行解相應豈敢輕易為之要在時時自加檢責切不可使聲名利養有萌動于心如此細心守持猶或所行之法令人有所未孚孚信也衲子有所未服自當退思深修道德不可抑人從己以待將來自有從化之時也未見有身正而叢林不治者所謂觀德人之容使人之意消誠實在茲記聞此節引德人以証實所謂觀有德之人的容貌使人心下染惡冰消者無他其誠實在德而已田子方名無擇答魏文侯曰吾師東郭順子候曰子何故未嘗稱之方曰其為人也真人貌而天虗緣而葆真清而容物物無道正容以悟之使人之意也消無擇何足以稱之出莊子外篇能時時檢責便是最上品人人不從當責己真妙劑也此篇教人涵養勿暴免招禍辱也靈源謂圓悟曰衲子雖有見道之資若不深蓄厚養發用必峻暴非特無補教門將恐有招禍辱圓悟成都府昭覺寺佛果克勤禪師彭州駱氏子嗣五祖演禪師謂凡為衲子者雖則具有見道之資質假若不肯深蓄厚養發用出來所作所為必竟峻險暴虐如此作為非但無有補益于教化之門吾恐異日必招禍害謗辱矣衲子不可不慎惟深蓄厚養是真受用躁進奚益切宜加察此篇教學者以誠信為本不可斯須去己也圓悟禪師曰學道存乎信立信存乎誠存誠於中然後俾眾無惑存信於己可以教人無欺惟信與誠有補無失此節舉誠信為本心實曰誠乃信之體也言實曰信乃誠之用也謂學道先須存一信字立信全在一箇誠字若人能存至誠于心中然後使眾人自無所惑存至信于自己可以教人則無所欺惟信之與誠實有補于我而無失于人也是知誠不一則心莫能保信不一則言莫能行古人云衣食可去誠信不可失惟善知識當教人以誠信且心既不誠事既不信稱善知識可乎易曰惟天下至誠遂能盡其性能盡其性則能盡人之性此節教必誠必信是知人之誠心不一自有輕重則此心莫能保守信力不一自有勤怠則所言莫能施行魯論云衣切于體可以禦寒食切于命可以止饑似俱不可去者而猶可去誠信二字寧死不可失也惟善知識者必當教人以至誠感人以至信心若妄而不誠事若欺而不信稱之為善知識可乎易繫辭曰惟天下至誠遂能盡其性能盡其性則能盡人之性能盡人之性則能盡物之性能盡物之性則可以贊天地之化育可以贊天地之化育則可以與天地參矣註曰性者德無不實理無不具故無人欲之私能盡者知之無不明處之無不當天下至誠者言聖人之德天下莫能加也贊助也參者與天地並立也而自既不能盡於己欲望盡於人眾必紿而不從自既不誠於前而曰誠於後眾必疑而不信此節明自盡而能盡人設使自既不能盡誠存信于己而欲望人盡誠存信眾人必欺紿而不從紿者欺也自既不能盡誠行之於前以為軌範而曰我之行誠必在于後眾人愈見疑惑而不信矣所謂割髮宜及膚剪爪宜侵體良以誠不至則物不感損不至則益不臻葢誠與信不可斯須去己也明矣與虞察院書此節喻自誠而能致信所謂如剃髮者必當及于皮膚劈爪者自當侵于肉體良以我之誠信若不極至則人不能感服如剃髮之不及膚也我之減損若不極至則益不能咸臻如剪爪之不侵體也臻者至也葢誠之與信一體一用不可斯須離于我也明矣斯須蹔時也今多是不誠不信者欲作師法如何行得去感得動此篇言智人能改過遷善使道德日新也圓悟曰人誰無過過而能改善莫大焉從上皆稱改過為賢不以無過為美此節先明改過為美謂世間不論賢不肖君子小人誰得全無過失設有些些過差自能改革其善莫大于此焉從上之聖賢皆稱贊能改過者為賢德竟不曾以無過者為嘉美故人之行事多有過差上智下愚俱所不免惟智者能改過遷善而愚者多蔽過飾非遷善則其德日新是稱君子飾過則其惡彌著斯謂小人此節明人俱不免無過所以人於行事之間多有過差處上之賢人君子下之黎庶小人俱所不能免惟有智慧之人能改過自新遷善明理而愚癡者多遮蔽過差掩飾其非若能遷善則其德業日新是稱之為君子矣飾過則其惡迹日顯即謂之不才人也是以聞義能徙常情所難見善樂從賢德所尚望公相忘於言外可也與文主簿此節引古以勸知言是以聞善言則能遷徙常情之所難得也徙移也見善行即能樂從賢德之所尚也孔子曰德之不修學之不講聞義不能徙不善不能改是吾憂也註曰德必修而後成學必講而後明見義能徙改過無悋此四者日新之切要苟未能之聖人尚且憂之況學者乎謂如我所言者乃古人教誠之語也望公相忘我于語言之外唯得吾意可也改過二字是化迷為悟轉物為道的捷徑不可不刻意行焉此篇言住持當以德感人使人慕而愛之也圓悟曰先師言作長老有道德感人者有勢力服人者猶如鸞鳳之飛百禽愛之虎狼之行百獸畏之其感服則一其品類固霄壤矣謂吾先師演和尚曰作長老有以道德感發于人者有以威勢制服于人者以德感者如鸞鳳之飛百禽愛而從之也以力服者如虎狼之行百獸畏而避之也感之而來服之而去然感服雖則無二其用德用力之不同而名位實天地懸隔矣喻得爽快之極試看感之與服受用何如此篇言智者所從惟道所以情通而法治也圓悟謂隆藏主曰欲理叢林而不務得人之情則叢林不可理務得人之情而不勤於接下則人情不可得務勤接下而不辯賢不肖則下不可接務辯賢不肖而惡言其過悅順其己則賢不肖不可辯惟賢達之士不惡言過不悅順己惟道是從所以得人情而叢林理矣廣錄平江府虎丘紹隆禪師和之含山人嗣圓悟勤禪師南嶽下十五世謂整理叢林貴得眾人之情情不得則叢林何以治焉然欲得人之情貴在殷勤接引初學如不勤于接下則人情亦不可得欲勤于接下必要辯別賢德與不肖之者若不辯賢不肖混而為一則下不可接要辯賢與不肖不可惡人言我之過悅人順從于己若使你惡言其過悅順於己則賢不肖亦不可辯惟有賢達之士不惡人言己之過不悅人順己之好惟獨以道是從所以得眾人之情使叢林自然雍肅條件自然整理矣惟道是從一句是大關要更須回觀自己看情如何得通知此可以行道也此篇教住持所求惟善矜細行以全大德也圓悟曰住持以眾智為智眾心為心恒恐一物不盡其情一事不得其理孜孜訪納惟善是求此節言所求惟善分別是非曰智妙眾理而宰萬物也謂作住持人當以眾人之智為我智當以眾人之心為我心常當審思恐有一人不能盡之以情恐有一事不能通之以理孜孜猶切切也訪賢納諫惟善是我所當求也當問理之是非詎論事之大小若理之是雖靡費大而作之何傷若事之非雖用度小而除之何害葢小者大之漸微者著之萌故賢者慎初聖人存戒此節論理之所在凡所作為之事但問道理之當不當勿論所作之事大與小也若此一事與理相當利益叢林成就大眾縱奢費極大而作之何傷若事之不當道理雖用度些小而除之何害設謂些小之用不除可也抑知小者大之漸進微者著之萌芽故賢達之士慎行于初至聖之人戒謹于微也涓涓不遏終變桑田炎炎靡除卒燎原野流煽既盛禍災已成雖欲救之固無及矣古云不矜細行終累大德此之謂也與佛智書此節方借事以明涓涓猶滴滴也如治水者于一滴之初而不止遏終久成流必變更夫桑田矣炎炎星火也又如火于一星之初而不除滅及其熾然卒必燎於原野矣至於水流火煽之際勢已盛矣而禍災亦已成矣雖欲救之固無能及矣古云若不矜持其細行終有累失於大德正如此言之謂也書云烏乎夙夜罔或不謹不矜細行終累大德為山九仞功虧一簣註曰或猶言萬一也呂氏曰此是勤德工夫或之一字最有意味一暫止息則非勤德也矜者持也細行者小事也此章重在惟善是求與不矜細行上留意沉玩之其義自見此篇言長老以利濟為心是助宣法化之機也圓悟謂元布袋曰凡稱長老之軄助宣佛化常思以利濟為心行之而無矜則所及者廣所濟者眾然一有矜己逞能之心則僥倖之念起而不肖之心生矣雙林石刻元布袋即台州護國此菴景元禪師永嘉南溪張氏子嗣圓悟勤禪師南嶽下十五世以師常負布袋而行故人稱為布袋和尚謂凡稱為長老之軄品不是尋常乃助佛宣化豈容易事耶時時常要思念以利人濟世為心當其行化時又要無矜高自恃之念則所及者必廣所濟者必眾然一時忽有矜己逞能之心則僥倖欲得之念便起而不肖之心即生矣矜高之病極是難除我願諸君內省常歉久自無之此篇言人當謹始慎終以成令名也圓悟謂玅喜曰大凡舉措當謹終始故善作者必善成善始者必善終謹終如始則無敗事此節教謹始終謂大凡為人舉動止措之間必當要謹始慎終故善于作事者必能善成善于慎始者必能善終若謹守至終猶如最初無二則于事必無所取敗也古云惜乎衣未成而轉為裳行百里之半於九十斯皆歎有始而無終也故曰靡不有初鮮克有終此節舉事以騐古云惜乎作上衣者未得成便改作下裳又如行路者百里至五十里而返甚至行到九十里而返者斯皆歎有始而無終也故詩云靡不有初鮮克有終昔晦堂老叔曰黃檗勝和尚亦奇衲子但晚年謬耳觀其始得不謂之賢雲門葊集此節舉人以騐昔晦堂老叔曰黃檗山惟勝禪師潼州羅氏子嗣黃龍南和尚南嶽下十二世參黃龍日挺特卓立人皆稱之為奇衲子及至後來作事差謬便不如也觀其始豈得不謂之賢以此觀之人可不競競業業夙夜殷勤慎終如始乎此篇言凡事以稽古為訓乃無臆見之失也圓悟謂佛鑑曰白雲師翁動用舉措必稽往古嘗曰事不稽古謂之不法予多識前言往行遂成其志然非特好古葢今人不足法此節言事必依古昔我白雲師翁凡于動用之中必要稽考於往聖先賢以為法則甞曰凡人作事不稽察往古謂之沒有法則予多博採前賢之言往聖之行遂成我生平之志易大畜卦象曰天在山中大畜君子多識前言往行以畜其德註曰前言往行是古聖之言行也觀其言察其行以成德乃大畜之義畜積成也然我非是立意好古葢今時人實不足以為軌則也先師每言師翁執古不知時變師翁曰變故易常乃今人之大患予終不為也蟾和尚日錄此節又辯當執古先師每每謂曰師翁大煞執古竟不知隨時變通師翁曰更變故作改易常法乃今人之大患予終不作此變易之事也今人最怕執古不執古便稱為風流丈夫也異哉此篇見古人剛方自持不貶節以求名也佛鑑懃和尚自太平遷智海郡守曾公元禮問孰可繼住持佛鑑舉昺首座公欲得一見佛鑑曰昺為人剛正於世邈然無所嗜好請之猶恐弗從詎肻自來耶公固邀之昺曰此所謂呈身長老也竟逃於司空山公顧謂佛鑑曰知子莫若父即命諸山堅請抑不得已而應命蟾侍者日錄昔佛鑑和尚自太平移席于智海寺郡守曾公元禮問師既去誰能繼此席為住持者佛鑒舉韶州南華智昺禪師蜀川永康人為人嚴厲時號昺鐵面嗣佛鑑和尚南嶽下十五世曾公欲使之來求師一見佛鑒曰昺為人剛毅而中正于世事邈然胸中淡泊無所嗜好請之猶恐不從公命豈肯自來耶公固再三邀之昺曰此所謂呈身媒名自衒利賣之長老也竟逃于司空山地在安慶太湖縣乃二祖傳衣于三祖之處長老者耆德之稱了達法性內有智德使學者尊崇故稱長老公顧佛鑒曰知子者莫若父果然是父是子也此雙美之辭即命諸山堅請抑者逼也屈也強屈不已而後應𠃔來命從來自重者人方重之切莫謂他不通時變好此篇言高人𮌎中有一定主宰自不為榮辱所動也佛鑑謂珣佛燈曰高尚之士不以名位為榮達理之人不為抑挫所困其有承恩而効力見利而輸誠皆中人以下之所為日錄珣佛燈浙江湖州府安吉州何山佛燈守珣禪師本郡史氏子嗣佛鑑懃禪師南嶽下十五世謂凡有見識高上之士了知世間幻妄非真雖有名位不以之為榮華也通達至理之人縱有幾多抑屈折挫不以之為困窮也抑屈也挫摧折也有一種承人之恩便趨奉以力効之見他有利便輸誠以恭敬之如此等輩皆中人以下之所為何足道哉若蓄中人以下之心便孤負你自家一箇充塞天地人量也珍重珍重此篇言長老不可狥私自好為外物惑亂也佛鑑謂昺首座曰凡稱長老要須一物無所好一有所好則被外物賊矣首座表率叢林人天眼目分座說法開導後昆者此節教人潔心無所好凡稱曰長老者胸中要空廓無一物所好設一有所好所謂一塵起而蔽空便被所好之物為其賊矣好嗜欲則貪愛之心生好利養則奔競之念起好順從則阿諛小人合好勝負則人我之山高好掊克則嗟怨之聲作此節顯有好心隨事變設若好嗜欲則貪愛之賊心便生好利養則奔競之賊念便起好順從則阿屈諂詐小人之賊來合好勝負則人我之賊山轉高掊克聚斂也謂刻剝民財好掊克則嗟怨之賊聲便作總而窮之不離一心心若不生萬法自泯平生所得莫越於斯汝宜勉旃規正來學南華石刻此節總結一心無所變總而窮之外物豈能賊我哉其實不離我心也心若不生萬法自泯予平生所知所得無越于斯汝當勉力而深修之以此所得規正夫來學可也一物無所好其清潔可知矣一有所好便失身於不義可不慎乎此篇舉師行以誡人去奢從儉也佛鑑曰先師節儉一囊鞵袋百綴千補猶不忍棄置甞曰此二物相從出關僅五十年矣詎肯中道棄之此節出陳節儉節檢束也儉去奢從約也謂先師為人最節束儉約其餘姑置不論試看他一鉢囊一鞋袋百綴千補綴聯補也猶不忍棄置甞曰此二物相從我出夔關已來僅五十年矣豈肻中途棄之此正見其有節儉之實有泉南悟上座送褐布裰自言得之海外冬服則溫夏服則凉先師曰老僧寒有柴炭紙衾熱有松風水石蓄此奚為終却之日錄此節明無貪愛上是可棄不棄此是可取不取始見其妙有泉南悟上座送一褐布裰乃冰火二鼠之毛所織之布火鼠入火不焚毛長尺許污則以火浣之北方有冰厚百尺有鼠在下但食其冰毛長數寸可以為布二者合成冬暖夏凉出神異記自言得之海外冬服則溫夏服則凉此見珍奇之甚先師曰老僧寒則有柴炭有紙衾紙衾即紙縫之被熱則有松風有水石蓄此之物何為竟謝而却之也其節儉如此若不有後節直一慳吝長老也知此足見哲人之志不為外物動矣此篇見古人為道惜人不是尋常哀痛之謂也佛鑑曰先師聞真淨遷化設位辦供哀哭過禮歎曰斯人難得見道根柢不帶枝葉惜其早亡殊未聞有繼其道者江西叢林自此寂寥耳日錄師舉五祖聞真淨和尚入寂設位上供哀哭過禮謂輓悼之禮太過歎曰如斯之人實是難得見道直徹根柢花之根曰蒂木之根曰柢說法不帶枝葉何天不佑惜其早亡當今之際未聞有如師之證徹繼續道法者江西叢林自此恐寂寥耳得百庸人不如得一賢人一旦喪亡非夫人之慟而誰慟此篇舉先宗德業使後人取法安貧以守道也佛鑑曰先師言白雲師翁平生疏通無城府顧義有可為者踊躍以身先之好引拔賢能不喜附離苟合一榻翛然危坐終日此節見天性純粹謂先師生平以來胸襟中疏通不存一物城府者能遮能藏之地此曰無城府則知此老胸次廓落無隱無覆也凡見義合理之事則踊躍以身而先導之踴躍者欣然前進之貌其性極愛汲引提賢能之士而不喜者是一等有利者則附之無財者則離之此苟且求合之類也時中惟一榻翛然自如危然獨坐而已翛然如鳥之孤飛自如也甞謂凝侍者曰守道安貧衲子素分以窮達得喪移其所守者未可語道也日錄此節明抱道守德上是行實此是言切甞謂凝侍者曰抱守道德安處貧窮是衲子家本分若以窮通得失改移其操守者未可與之言道也你看他一直到底是箇本色宗師誰得而似之此篇教人當深操遠慮刻苦進修也佛鑑曰為道不憂則操心不遠處身常逸則用志不大古人歷艱難甞險阻然後享終身之安葢事難則志銳刻苦則慮深遂能轉禍為福轉物為道此節明歷以艱苦志則堅謂為道之人時中若不懷憂致想便知他操道之心不廣遠處身常求安逸則知他所用之志不濶大古人為道歷盡多少艱難甞遍幾多險阻道業成就然後享終身之安葢事若難行則志氣愈加勇銳刻苦用力則思慮益見淵深由是勇猛精修遂能轉禍為福轉物為道也多見學者逐物而忘道背明而投暗於是飾己之不能而欺人以為智彊人之不逮而侮人以為高以此欺人而不知有不可欺之先覺以此掩人而不知有不可掩之公論故自智者人愚之自下者人高之此節明飾過欺人道必喪多見近來學者逐外物竟忘所學之道正如背明而投暗也內問諸心于理不明返要莊飾自己之不能處而輕欺于人使人謂我是智者本不及人又要強勝于人以為他不我及而侮慢於人以己為高殊不知以此無智而欺人竟不知尚有不可欺之先覺在也以此欺侮而掩人竟不知尚有不可掩之公論在也故所以自家欲智人返以為愚自家欲下而人返以為高也惟賢者不然謂事散而無窮能涯而有盡欲以有盡之智而周無窮之事則識有所偏神有所困故於大道必有所闕焉此節謂賢者存誠而道證惟有賢達之士不然謂世間之事萬殊有何窮盡人之智能本有涯量爾今欲以有盡之智而欲周徧無窮之事則智識自然周致不到則有所偏神明自然徧察不來而有所困識偏神困故于大道不能完全而自闕矣古今成就道業者誰不是歷艱難嘗險阻的人不然立雪斷臂俱閑事也此篇謂應世當以三訣為主缺則事不行矣佛鑑謂龍牙才和尚曰欲革前人之弊不可亟去須因事而革之使小人不疑則庶無怨恨予嘗言住持有三訣見事能行果斷三者缺一則見事不明終為小人忽慢住持不振矣潭州龍牙寺智才禪師舒州施氏子嗣佛鑑懃禪師南嶽下十五世謂欲改革前人之弊病不可亟去亟急也須因一法革一事使小人不生疑惑而亦不致生怨恨也住持有三訣者第一見一切事如杲日當空無纖毫隱蔽第二應當行者如大象渡河一直向前第三剖斷是非如明鏡當臺妍媸俱在此三法中缺失一法則見事不明白終竟為小人忽慢使住持之道不得振起之矣此三訣是護身符子失之身則不寧事則不備矣此篇誨住持當操守清淨持信于人乃為真正體段也佛鑑曰凡為一寺之主所貴操履清淨持大信以待四方衲子差有毫髮猥媟之事於己不去遂被小人窺雖有道德如古人則學者疑而不信矣山堂小參謂凡為一寺之主人所貴者在自己操守行履要清淨潔白應機接物要持大信力以待四方衲子假若有一毫髮大的猥鄙媟污之事于自己分上不曾去除遂被小人窺窺探視也雖則道高德備與古人無異而學者窺其所行將疑而不信矣操履清淨豈獨住持為然孰不欲其然也逸欲生驕情起使大信一機隳喪殆盡矣此篇見古人梗直有節義人罕能及也佛鑑曰佛眼弟子唯高菴勁挺不近人情為人無嗜好作事無黨援清嚴恭謹始終以名節自立有古人之風近世衲子罕有倫比與耿龍學書謂佛眼和尚法嗣中唯獨有高葊悟勁徤而挺直又不以私情親順于人且而不貪愛自奉作事無朋黨援引加以清淨嚴密端恭而敬謹從始至終皆以名節自立實有古人之風範近世衲子中少有與人為倫為比矣者是今時立身行事第一箇模範宜刻意師之此篇言住持臨眾固貴無一時一刻之不謹而於臨事時尤貴博訪以善其行也佛眼遠和尚曰蒞眾之容必肅於閒暇之日對賓之語當嚴於私昵之時林下人發言用事舉措施為先須籌慮然後行之勿倉卒暴用舒州佛眼清遠禪師臨邛李氏子嗣五祖演禪師南嶽下十四世此節教住持作事先須審慮蒞臨也謂臨于大眾之容貌不在暫時作威作樣要在閑暇之日必端必肅也立身之道內剛而外柔蒞眾之容上承而下順不和則不可接物不嚴則不可御下凡對賓之語言要在平日言真語實臨時豈能裝點整飾耶私昵者閑居獨處之時葢林下道人揭示一言施行一事或舉止動靜施設之間必先要籌算思慮停當然後行之不得倉卒暴用自失善利也或自不能予決應須諮詢耆舊博問先賢以廣見聞補其未能燭其未曉豈可虗作氣勢專逞貢高自彰其醜苟一行失之於前則百善不可得而掩於後矣與真牧書此節明己不能決當詢先哲至於臨事之際或我不能自己決擇應須諮詢請教于耆舊博問廣扣于先賢以此開廣己之見聞補益己之未能燭破己之未曉始為善用心者豈可虗作氣勢專逞貢高自彰其醜耶若有一事不法失之于眾人之前雖有百善不可得而掩飾于後矣臨事不厭細審乃防微杜漸也致於博採見聞不驕虗勢又何患乎失之所有也此篇言利欲難防當以道德正其身心也佛眼曰人生天地間稟陰陽之氣而成形自非應真乘悲願力出現世間其利欲之心似不可卒去此節謂利欲難以卒去謂人生于天地造化之間稟賦陰陽之氣而成此形本是生成的凡夫豈能斷除遠劫以來三毒之習又非聖人應現真體乘悲願力出來現身而生此人間者則其財利愛欲之心似乎不能卒然而除去之也惟聖人知不可去人之利欲故先以道德正其心然後以仁義禮智教化隄防之日就月將使其利欲不勝其仁義禮智而全其道德矣與耿龍學書此節明聖人知深明遠所以古之聖人深知一切眾生有不可除之利欲苟今要使之轉凡為聖故先以道德使彼修之學之以正其心然後繼之以仁義禮智四端教之化之以為隄防之具如是久之積年累歲日就月將不覺不知而貪利趨欲之心不勝仁義禮智之志而道德于是乎得完全矣惑習深種也是豈卒然去哉唯律身嚴行乃可去其瑕玷而全乎道德也此篇教學者實悟自心不可泥於語言文字也佛眼曰學者不可泥於文字語言葢文字語言依他作解障自悟門不能出言象之表此節明文字能障塞悟門謂學者不可泥滯于文字語言之間葢文字語言乃古人之糟粕也依他人之言語作自己之解會返來障塞自家妙悟之門終不能出于語言文字之外昔達觀頴初見石門聰和尚室中馳騁口舌之辯聰曰子之所言乃紙上語若其心之精微則未覩其奧當求玅悟此節見文字於真修無力昔潤州金山曇頴禪師嗣石門聰和尚南嶽下十一世初見石門于室中往往馳騁口舌之辯聰曰子之所說乃紙上語若論你自心之精深微細實未曾親見其玄奧應當直求玅悟悟則超卓傑立不乘言不滯句如師子王吼哮百獸震駭迥觀文字之學何啻以什較百以千較萬也龍門記聞此節顯悟後知文字不實若使悟矣則爾自能超然雄傑卓爾成立凡有所說即不乘襲其文言不留滯于語句縱橫無礙如獅子王哮吼百獸皆震懼驚駭到此地位返觀向日文字之學不止以十比百以千比萬也文字非真不可學但以本末之分耳其病在泥字上泥則不變通而自性障蔽此篇訓人當以規矩防情救弊為入道之階墀也佛眼謂高葊曰百丈清規大槩標正檢邪軌物齊眾乃因時以制後人之情夫人之情猶水也規矩禮法為隄防隄防不固必致奔突人之情不制則肆亂故去情息妄禁惡止邪不可一時亡規矩此節謂意制規矩百丈所以欲立清規者大槩的意思只要標顯正法檢束邪行軌法于人整齊大眾乃因時取用以調制後人之情識而已且夫人之情猶之乎水也規矩禮法為隄岸以防備之設使隄岸之土石如不堅固其水必致奔衝而突出之也人之情亦然若使妄情不制止必放肆而淫亂之故所以去情識止妄想禁惡念息邪行不可一時一刻亡失規矩然則規矩禮法豈能盡防人之情茲亦助入道之階墀也規矩之立昭然如日月望之者不迷擴乎如大道行之者不惑先聖建立雖殊歸源無異此節明行之在人然則規矩禮法又豈能盡防人之情茲亦不過假此助人為入道之階梯如丹墀而可及門也規矩之建立其昭然如日月在天望之者不迷其廣濶如大道在前行之者不惑先聖之建立雖則各有不同總只使人至乎妙道之域所謂歸源無異也近代叢林有力役規矩者有死守規矩者有蔑視規矩者斯皆背道失禮縱情逐惡而致然曾不念先聖救末法之弊禁放逸之情塞嗜欲之端絕邪僻之路故所以建立也東湖集此節明不達其意近代叢林中有專務其勢而力役規矩者有不達權變而死守規矩者有不遵禮法而輕視規矩者如斯等見皆為背正道失正禮縱私情逐惡意而使之然也竟不思先聖之意原為救末法之積弊禁止放逸之妄情塞人嗜慾之端絕人邪僻之路乃所以建立此規矩也幸毋錯會古人意教你依規矩正是尊重自己之人品古今陰受其賜者普矣此篇教人責己恕人當返觀而自知矣佛眼謂高葊曰見秋毫之末者不自見其睫舉千鈞之重者不自舉其身猶學者明於責人昧於恕己者不少異也真牧集南康軍雲居高葊善悟禪師泮州李氏子嗣佛眼遠禪師南嶽下十五世秋毫者莊子曰秋獸生毛至微孟子曰明足以察秋毫之末而不見輿薪謂世人有眼力精明者能見秋毫之微末却不自見其眼上之睫睫眉毛也又有壯力勇徤者能舉千鈞之重而不能自舉其身三十斤為一鈞比二者猶之乎學者責人最明恕己便昧恰似與不見睫不舉身者無異也不自見不自舉是人說不到的地位試看明昧在誰知此可以與言矣此篇誨學者當具參學眼識真正人品也高菴悟和尚曰予初遊祖山見佛鑑小參謂貪欲瞋恚過於冤賊當以智敵之智猶水也不用則滯滯則不流不流則智不行矣其如貪欲瞋恚何予是時雖年少心知其為善知識也遂求挂搭謂予初行脚至祖山見佛鑑和尚小參曰貪欲瞋恚過于有冤之賊其利害不小當以智慧抵敵之夫人之智猶如水也不用則滯塞滯則不流通不流則智不行矣爭奈得貪欲瞋恚何予聞此開示雖則年少心中知其為真善知識也遂求挂鉢搭衣而依止之虎生三日有食牛氣纔出便具識人之眼何其偉哉此篇教人存心正大為入道之根基也高菴曰學者所存中正雖百折挫而浩然無憂其或所向偏邪朝夕區區為利是計予恐堂堂之軀將無措於天地之間矣真牧集謂凡做學者胸中所存的必要中而不偏正而不邪設使一時遇諸難事縱有百般折之挫之要使浩然之志氣常存絕無憂慮念頭此方是衲僧體段設或所向偏邪朝夕之間區區貪圖利養以為是計區區卑小之稱猶碌碌也我恐你者一表堂堂之身將來無可安于天地之間矣此是楊枝一滴水甦人多矣此篇教人當除妄去蔽以全道德仁義也高菴曰道德仁義不獨古人有之今人亦有之以其智識不明學問不廣根器不淨志氣狹劣行之不力遂被聲色所移使不自覺葢因妄想情念積習濃厚不能頓除所以不到古人地位耳與耿龍學書謂道德仁義乃人生秉彝之良不獨古人有之今人亦未嘗不有之也既皆有之焉有古今之差別耶由今人之智識不明白學問不廣博根器濁而不淨志氣狹而卑劣加之行持無有猛力主宰不定遂被外境聲色所移去致使不自覺知然則病在於何葢因人之妄想多情念重生平所積之習氣濃厚不能頓然除去所以不得到他古人地位耳妙哉斯訓可不一清心飲歟此篇言比丘以清儉為貴宜取法于古人也高菴聞成枯木住金山受用侈靡歎息久之曰比丘之法所貴清儉豈宜如此徒與後生輩習輕肥者增無厭之求得不愧古人乎東京淨因枯木法成禪師何朔人嗣芙蓉道楷禪師青原下十二世生平好坐枯木禪故以枯木稱之高菴和尚聞住金山日所受用者奢侈靡費因歎息久之曰比丘受用之法所貴在清廉而儉約豈宜作此奢華受用若為主人者如此華美徒然與後生一輩翫習輕肥者返增無有厭足之心而遍求之得不愧草衣木食之古人乎輕肥者謂乘肥馬衣輕裘也古云肥馬衣輕裘佯佯過閭里雖得市憐還為識者鄙多見後生輩只要美衣美食不知作何消受消受不去害亦深矣此篇言住持為人模範以法令為先也高菴曰住持大體以叢林為家區別得宜付授當器舉措係安危之理得失關教化之源為人模範安可容易此節明住持有體謂為住持之大體不可存私當以叢林為家業凡所作事分別要得其宜付授須當美器一舉一止之間即關安危之理于得于失之中總成教化之源作人模範豈可容易而能為耶時中必須如臨深履薄可也未見住持弛縱而能使衲子服從法度凌遲而欲禁叢林暴慢昔育王諶遣首座仰山偉貶侍僧載於典文足為令範此節教師法須嚴世未見有為師者弛廢放縱而能教衲子欽服而相從也法度既已凋喪豈能禁止叢林之橫暴侮慢乎昔慶元府育王寺無示介諶禪師溫州張氏子得法于長靈卓禪師南嶽下十五世其性剛毅有鐵面之稱一日因普請首座告疾眾去後座與侍僧茶友方外知事見而詰之座語逆抵知事知事白諶諶令擊鐘集眾責之欲擯出眾求憐免諶令去座職守擇木堂侍官客座佯佯不樂一日郡守至座不迎管與舊結侍僧閑語諶怒呼二人至重責擯出袁州邱山行偉禪師何朔人嗣黃龍南禪師南嶽下十二世為人性剛蒞事有法度使某人幹某事莫敢違者嘗將十二輩名付維那使明日俱到方丈受曲折及茶會時即少一人偉問為誰眾曰隨州永泰首座曰泰遊山未回可請他僧偉然之俄有告曰泰實在首座匿之偉色莊使搜之果在泰自陳拙弱恐失所受之事首座實不知也偉令擊鐘集眾白曰昧心欺眾他人猶不可為況首座分座授道是老師所賞之職而自破壞乎二人俱受罰出院由此眾服其公泰後嗣法住黃檗山首座即潭州大溈祖瑃禪師福州吳氏子得法于大溈秀禪師南嶽下十三世載于典文者出僧寶傳足可以為法門令範也今則各狥私欲大隳百丈規繩懈於夙興多缺參會禮法或縱貪饕而無忌憚或緣利養而致喧爭至於便僻醜惡靡所不有烏乎望法門之興宗教之盛詎可得耶龍昌集此節明師法不成且今之為住持者不然各隨己欲稱性任情大隳百丈所立之規矩準繩隳者壞也叢林本有早參晚參乃恒規也夙興即早起廢早參也又多缺于尋常省會之禮法或縱貪饕而無忌憚求之不足曰貪嗜之不足曰饕或因貪取利養以致于喧閙而爭競之其餘一切便僻醜惡之事無所不有烏乎如是之人要望法門興宗教盛如何能得斯真可歎也與人作師法當于寒烟荒雨時細看自家是何等模樣是何等行徑乃為得體此篇以父母師長期望之念惕動學人心志使之精進不已也高菴住雲居每見衲子室中不契其機者即把其袂正色責之曰父母養汝身師友成汝志無饑寒之迫無征役之勞於此不堅確精進成辦道業他日何面目見父母師友乎衲子聞其語有泣涕而不已者其號令整嚴如此高菴和尚住雲居日每見禪者入室答語不能契合其機者即把其衣袂正其顏色而斥責之曰父母生養汝之身師友成就汝之志而且依止叢林受檀信之施不為饑寒之所迫既出家了仗佛法之力不為征役之所勞軍差曰征民差曰役于此身安心閑之際而不肯立堅確之志起精進之心成辦自家道業他時異日將何面目去見你父母師友乎衲子聞其語有泣涕而不止者其號令整齊教誡威嚴之如此也聞語泣涕正良心發現處如此教之誨之孰不踊躍前進乎可見人材之成敗半由于主持者之善為造就可不慎哉此篇言古者以德育人愛之至憐之深也高菴住雲居聞衲子病移延壽堂咨嗟歎息如出諸己朝夕問候以至躬自煎煑不嘗不與食或遇天氣稍寒拊其背曰衣不單乎或值時暑察其色曰莫大熱乎不幸不救不問彼之有無常住盡禮津送知事或他辭高菴叱之曰昔百丈為老病者立常住爾不病不死也此節惻隱存誠師住雲居時每聞衲子有病移延壽堂堂名延壽者乃安撫老病之所也古來叢林老者送安樂堂病者送延壽堂今又名涅槃堂是也師乃咨嗟歎息如出諸己謂病者如己之所生也早夜躬親問候以至自己煎藥煑食每以食與病者先自嘗之若未嘗則不與之食或遇天氣稍寒拊彼病者之背曰衣不單乎或值一時暑熱即觀彼顏色曰莫大熱麼不幸彼之天數已盡無復生之理亦不問彼人衣鉢之有無一皆出于常住盡叢林之常禮以津送之知事者或以他故為辭師即呵叱之曰昔百丈原為老病者建立常住難道爾不病不死也四方識者高其為人及退雲居過天台衲子相從者僅五十輩間有不能往者泣涕而別葢其德感人如此山堂小叅此節至德有在四方有智識者尊其為人之高玅及至退雲居過天台衲子相從去者僅五十輩間或有不能同去者泣涕而別葢其師之盛德感人留戀如此邇來叢林見病人不嫌不恨足矣吾不審慈悲之心安在此篇見道人隨處可樂不擇居以自適也高菴退雲居圓悟欲治佛印臥龍葊為燕休之所高菴曰林下人苟有道義之樂形骸可外予以從心之年正如長庚曉月光影能幾時且西山廬阜林泉相屬皆予逸老之地何必有諸己然後可樂邪未幾即拽杖過天台後終於華頂峯真牧集高菴和尚既退雲居圓悟禪師極優愛之欲修治佛印禪師所創之臥龍菴為燕閑休老之所師曰林下學道之人本以道德節義為樂彼形骸可以擲于意外何足惜哉況予今已是從心之年光景不久也孔子曰七十而從心所欲不踰矩謂凡事從心所欲不過法度也年至此時正如長庚曉月光影能有幾時東有啟明曰金星西有長庚曰水星金星在西日出則現水星在東日沒則現又先日出曰啟明後日沒日長庚曉月如二十七八之月纔發則天曉矣謂光景不長若此且西山之廬阜山林泉石相屬相望之處總皆可以為予休老之地豈必要是自家所治之處然後乃可為樂耶未幾即拽杖過天台後示寂於華頂峯不獨萱艸忘憂讀此自然樂矣此篇謂住持當殷勤誘掖使學者得以成其美材也高菴曰衲子無賢愚惟在善知識委曲以崇其德業歷試以發其器能旌獎以重其言優愛以全其操歲月積久聲實竝豐葢人皆含靈惟勤誘致此節明人才在知識曲成凡為衲子原無一定是智是愚惟在師家委婉曲成使他進德修業時中令勤勞以磨之將事務以試之使之發其美器才能更須旌表之獎勸之以崇重他所發之言又要優待之眷愛之以曲全他所持之行如此從年至歲日積月累久久之間使其聲名行實二者俱豐豈不為善知識之方便作成之也葢人皆含具有靈知之性此性乃種子也其助發靈苗要藉外緣故須在殷勤誘致也如玉之在璞抵擲則瓦石琢磨則珪璋如水之發源壅閼則淤泥疏濬則川澤乃知像季非獨遺賢而不用其於養育勸獎之道亦有所未至矣此節喻明要賢人勸獎譬如美玉在璞石之中若抵擲之則終成瓦石抵擲拋棄也設若一遇良工琢磨之則必成珪成璋矣琢磨治玉石者既琢之而復磨之言其已精而益求其精也珪上圓下方瑞玉所成公執桓圭九寸侯執信圭伯執躬圭皆七寸半圭曰璋又如水之發源若壅塞之則成淤泥使有人為之疏濬則必成川成澤矣閼塞也濬深也以此觀之在像季之人非獨遺其賢者而不用其奈師家撫養恩育之情勸發獎導之道有所未到耳當叢林殷盛之時皆是季代棄材在季則愚當興則智故曰人皆含靈惟勤誘致是知學者才能與時升降好之則至獎之則崇抑之則衰斥之則絕此學者道德才能消長之所由也與李都運書此節結成見勤誘之功當其叢林殷盛雍肅之時那一班人都皆是季世之棄材豈異人哉所以在季無人撫養却是愚人當興為人誘誨即是智者故曰人皆含靈惟勤誘致是知學者之才能全在主法者用之耳當其時用之則升不當其時棄之便降故主人美好于學者則四來俱集獎導于學者則不約而崇若使抑逼之使人便衰斥逐之令人自絕此乃是學者之道德與才能或消或長之所由致也好男兒莫可惜願為人師者當懇懇于求賢而作成之也此篇論為人模範貴在自嚴所以上令下行也高菴曰教化之大莫先道德禮義住持人尊道德則學者尚恭敬行禮義則學者耻貪競住持有失容之慢則學者有凌暴之弊住持有動色之諍則學者有攻鬬之禍此節明教化須存大體謂凡要行教化所至大者莫先於以道德正其心復以仁義修其身住持人尊道德則學者亦尊道德而所懷者恭敬主人若行禮義則學者亦有禮義而自能耻其貪競主人若無雅量而有失容之慢則學者即有凌辱橫暴之弊主人若不莊重而有動色之諍則學者即有攻擊鬬爭之禍先聖知於未然遂選明哲之士主於叢林使人具瞻不喻而化故石頭馬祖道化盛行之時英傑之士出威儀柔嘉雍雍肅肅發言舉令瞬目揚眉皆可以為後世之範模宜其然矣與死心書此節見道成由於明哲古人所以有先見之明防于未然遂選明哲之士主于叢林使一切人具得瞻仰熏陶涵濡之餘不待聲色而頑愚自化矣故南嶽石頭希遷禪師瑞州高安陳氏子嗣青原行思禪師後于衡嶽寺之東有石狀如臺師結菴居之故稱石頭諡號無際大師及馬祖道一禪師道法盛行之時自有一輩英雄豪傑之士出咸有威可畏有儀可法而且至性和柔為人嘉美動靜之間雍雍肅肅者端嚴威儀也或發一言或舉一令乃至瞬其目揚其眉瞬動也皆可以為後學之模範者宜乎其然也形正影端聲和響順不遇真師法道自寂矣此篇教人行脚當思古人備嘗之苦自生胸中利益之境也高菴曰先師嘗言行脚出關所至小院多有不如意事因思法眼參地藏明教見神鼎時便不見有煩惱也記聞謂先師言我自臨邛發足行脚出夔關凡至小菴舊院多遇有不如意之事因念當初法眼參地藏時金陵清涼院法眼文益禪師餘杭魯氏子嘗與悟空修山主行脚至福州湖外值雨忽溪流瀑漲暫寓城西地藏阻雪附爐次藏曰上座何往眼曰迤邐行脚藏曰行脚事作麼生眼曰不知藏曰不知最親切眼豁然大悟遂嗣其法後創為法眼宗明教嵩禪師見神鼎鼎坐其堂上嵩展具敬禮鼎指堂上兩小瓮曰子來是其時寺中今年始有醬食至明時食粥見一淨人挾筐取物投僧鉢中嵩視上下有咀嚼者有置之自若者嵩袖之下堂看乃碎米餅餌嵩問於耆宿宿曰此寺自來不煑粥有檀越請齋日次第撥僧赴之剩其乾殘者歸納庫中無齋之日令碎焙均而分之表同甘苦也先師言我思他古人行脚如法眼之成頓悟明教之見德人我胸中便不見有煩惱也行脚到處遇境逢緣俱是淘汰人的器具學人若作逆順境看過便失參學名分也此篇見古人言行俱實無愧自心也高菴表裏端勁風格凜然動靜不忘禮法在眾日屢見侵害殊不介意終身以簡約自奉室中不妄許可稍不相契必正色直辭以裁之衲子皆信服嘗曰我學道無過人者但平生為事無媿於心耳謂高菴和尚為人內外一致表端莊裏勁直風範格式凜凜然不可犯兼且一動一靜不忘禮法居學地在大眾中屢次見有侵欺而凌害之殊絕也介在也絕不留于胸臆之中終身以簡約持身自奉也室中不妄自許可印證于人學者言論稍不相契必正其顏色直其言辭以裁制之要使人至于無過之地而終成大德也衲子皆信其言服其教嘗曰我之道德學識無有過人處但只平生作事無有愧於自心耳作事無愧于心者一句萬牛亦挽不動此篇教學人當涵養德性毋攻人之過也高菴住雲居見衲子有攻人隱惡者即從容諭之曰事不如此林下人道為急務和乃修身豈可苟縱愛憎壞人行止其委曲如此師住雲居之日每見衲子輩有攻訐他人之隱惡者即從容諭曉之曰做人行事不當如此林下人唯學道最為急要和合乃修身之本豈可苟且放縱其心隨自家之愛憎壞他人之行止其委曲于人有如此者一片返魂香惜乎人用不得此篇見古人重德不重名戒奔競以全節義也高菴初不赴雲居命佛眼遣書勉云雲居甲於江左可以安眾行道似不須固讓師曰自有叢林已來學者被遮般名目壞了節義者不為不少佛鑒聞之曰高菴去就衲子所不及記聞師初不肯赴雲居之請佛眼和尚遣書以勸勉之曰雲居乃江左之首剎極可以安眾行道今既有請似不須固意推讓高菴却之曰自從有此招提以來學者都要想名望却被遮般名字與遮等題目壞了自家節操失了生平禮義者極多佛鑒聞之謂眾曰高菴之當去當就的所在尋常衲子所不能及者般名目人欲求而不可得師視之如棄涕大似滄海以較溝渠何其廣也此篇教住持愛憐老病即遵佛勅也高菴勸安老病僧文曰貧道嘗閱藏教諦審佛意不許比丘坐受無功之食生懶惰心起吾我見每至晨朝佛及弟子持鉢乞食不擇貴賤心無高下使得福者一切均溥此節先舉佛制貧道甞看閱藏經諸教典籍諦實審詳如來本意却不許年少比丘安然坐受無功之食人若不去做些真實功夫便生出幾多懶惰之心人我之見所以每至晨朝佛及弟子躬自持鉢循方乞食于檀越不擇貴賤于自己心無高下意欲使他得福者不論貧富貴賤一切人平等溥濟此是佛住世時之行持也後所稱常住者本為老病比丘不能行乞者設非少壯之徒可得而食逮佛滅後正法世中亦復如是像季以來中國禪林不廢乞食但推能者為之所得利養聚為招提以安廣眾遂輟逐日行乞之規也此節乞食為眾及至後來所稱為常住者古人之意本為老病比丘不能出門行乞者所設原非是少壯之徒可得安坐而食及佛滅後正法流行之際叢林之中亦復行乞後至像法之時中國禪林猶然不廢古轍依舊乞食但推舉良能者為之所得之財物利養聚積于常住以便廣納其眾故此便止逐日行乞之恒規也今聞數剎住持不識因果不安老僧背戾佛旨削弱法門苟不住院老將安歸更不返思常住財物本為誰置當推何心以合佛心當推何行以合佛行此節背亡佛旨今聞有幾處為住持者不識前因後果不安老病僧人違背佛之意旨削弱古制法門設若你不住院老去何歸更不返思常住所積之財物本來原為誰人收置你既如是做長老將推何等心念去合得佛之慈心又推何等行力來合得佛之密行昔佛在日或不赴請留身精舍徧巡僧房看視老病一一致問一一辦置仍勸請諸比丘相恭敬隨順方便去其嗔嫌此調御師統理大眾之楷模也此節重引佛行你豈不聞佛在世日或不赴外請留存自己在精舍中精舍者乃達多長者所造之精置齊整房舍也遍處巡看各各僧房看視老者病者一箇箇都去致問一切事都去辦置仍復勸請諸比丘等相恭敬隨順老者病者之意復以種種方便去其眾人嗔嫌老病者之心此皆是調御師統攝理治大眾之法則也今之當代恣用常住資給口體結托權貴仍隔絕老者病者眾僧之物掩為己有佛心佛行渾無一也悲夫悲夫此節近時流弊今之當代主者恣意而用常住以資養自家口體或將大眾財物結托權貴之人求情固位仍隔絕老者病者眾僧之物掩覆之皆為己有佛心佛行渾然無一毫髮也可不悲歟可不悲歟古德云老僧乃山門之標榜也今之禪林百僧之中無一老者老而不納益知壽考之無補反不如夭死願今當代各遵佛語紹隆祖位安撫老病常住有無隨宜供給無使愚昧專權滅裂致招來世短促之報切宜加察此節勸安老病古德云老僧決不可少乃山門中之標格榜樣也今之禪林百僧之中無一老者若僧家到老而叢林不收老無所靠即增益幾多壽考何所補益反不如早死為妙願今當代各遵佛語既紹隆祖位宜當安撫老病常住之有無隨其所宜而供給之無使愚昧之人專其權柄而滅裂道法致使來世招感短命促死之報切宜加意而審察之鷄夜雨請拈來細讀看而悲心自現維持斯道也此篇見古人捨己利物急于行道也覺範和尚題靈源門榜曰靈源初不願出世隄岸甚牢張無盡奉使江西屢致之不可久之翻然改曰禪林下衰弘法者多假我偷安不急撑拄之其崩頹跬可須也於是開法於淮上之太平靈源門榜其略曰惟清名字住持實同寄客但以領眾弘法仰助教風為職事耳若其常住財物既非己有理不得專悉委執事僧徒分局主執照依公私合同支破惟清止同眾僧齋䞋隨身衣鉢任緣而住伏望四方君子來有所需惟顧𥨊食祗接之餘別難應供若論世情則屬官物若論佛法則屬眾財偷眾財盜官物買悅人情則實非素分志之所敢當預具白文冀垂鑒察也此節出其舉止覺範和尚題曰靈源初不願出世其意甚如堤岸之牢固無絲毫縫罅也丞相張商英字天覺號無盡居士十九登第後留心祖道宋哲宗元祐六年為江西漕運使參兜率悅禪師得悟屢致者頻頻請舉也不可者不許可也謂張無盡常常請舉出世師並不肯受請久久之間見世衰道危翻者反也翻然者萬章問曰人有言伊尹以割烹要湯有諸孟子曰否伊尹耕于有莘之野而樂堯舜之道焉湯使三往而聘之既而翻然改曰與我處畎畝之中由是樂堯舜之道吾豈若使君為堯舜之君哉吾豈若使民為堯舜之民哉吾豈若於吾身親見之哉故天生斯民也使先知覺後知也予將以斯道而覺斯民非予覺之而誰也師即翻然而改曰禪林下衰佛法濫矣雖有弘揚道法者多是假我佛法偷取安閑此時若不急急撑之拄之其道法傾崩頹落不爭半步之間即可見也跬半步尺五寸遠也于是即開堂說法于淮安之太平禪院予時東遊登其門叢林之整齊宗風之大振疑百丈無恙時不減也後十五年見此榜於逢原之室讀之凜然如見其道骨此節見其門風予東遊時曾登其門見他藂林之整齊宗風之大振疑與百丈住世無恙時無二也過後又十五年見此榜文于逢原老師之室讀之凜然令人敬畏如親見其道貌丰骨無異也山谷為擘窠大書其有激云烏呼使天下為法施者皆遵靈源之語以住持則尚何憂乎祖道不振也哉傳曰人能弘道非道弘人靈源以之石門集此節居士激言山谷居士專為作八分楷書書此榜文擘分也窠者字眼之方楷也末有激勵于後人云烏呼使天下為法施者皆遵靈源之言以為住持則又何憂佛祖之道不大振于將來也哉魯論云人心有覺而道體無為故人能大彰此道道不能大彰于人也子張曰心能盡性人能弘道也性不能檢其心道不能弘其人也盡心弘道在靈源和尚有之矣古人持法立極垂統功深德茂讀此榜知為萬世準則矣此篇言善當法惡當戒宜知所去取也歸雲本和尚辯篇曰本朝富鄭公弼問道於投子顒禪師書尺偈頌凡一十四紙於台之鴻福兩廊壁間灼見前輩主法之嚴王公貴人信道之篤也鄭國公社稷重臣晚年知向之如此而顒必有大過人者自謂於顒有所警發士夫中諦信此道能忘齒屈勢奮發猛利期於徹證而後已如楊大年侍郎李和文都尉見廣慧璉石門聰竝慈明諸大老激揚酬唱班班見諸禪書楊無為之於白雲端張無盡之於兜率悅皆扣關擊節徹證源底非苟然者也近世張無垢侍郎李漢老參政呂居仁學士皆見玅喜老人登堂入室謂之方外道友愛憎逆順雷揮電掃脫略世俗拘忌觀者斂袵辟易罔窺涯涘然士君子相求於空閑寂寞之濵擬棲心禪寂發揮本有而已此節見主賓皆妙撫州疎山歸雲如本禪師本州台城人嗣靈隱惠遠禪師南嶽下十六世丞相富弼字彥國河南府人宋仁宗拜為鄭國公諡文忠定公得法于投子修顒禪師致仕洛陽以偈答蘇州圓照本禪師云曾見顒師悟入深因緣傳得老僧心東南謾說江山遠目覩靈光演玅音舒州投子悟證修顒禪師嗣慧林宗本禪師青原下十二世鄭公與投子往來書尺偈頌一十四紙記于台州之鴻福寺兩廊壁間灼昭然也昭昭然見前輩主持佛法如此尊嚴王公貴人信向此道如此篤厚也鄭公為國家社稷重臣社土神稷穀神建國則立壇壝以祀葢國以安民為本社稷亦為民而立君之尊係于二者之存亡又掃蕩烟塵曰社起取稅賦曰稷公至末年知向此道如此堅固而投子顒和尚亦必有大境界超過于他人處鄭公自謂于顒有所警策能發玅悟故有曾見顒師悟入深之句其如士大夫能諦實信向此道而能忘齒不拘于年高又能屈勢不拘其位重奮然發其猛利之心真參實究期于大徹頓證而後乃止也又如宋時楊億字大年建州蒲城人諡文正公官至翰林得法于廣慧元璉禪師後於仁宗康定間與慧明為友駙馬都尉李遵勗號和文居士得法于谷隱蘊聰禪師初參聰時問出家事聰以崔趙公問徑山道欽禪師曰弟子今欲出家得否欽曰出家乃大丈夫事非將相之所能為勗于是有省遂呈偈曰學道須是鐵漢著手心頭便判直趨無上菩提一切是非莫管後亦與慈明為方外友汝州廣慧院元璉禪師泉州陳氏子嗣首山念禪師南嶽下九世激發也揚舉也激濁揚清之義謂混濁者激發之使自勉清潔者舉揚之使易見酬謂酬答唱即唱和謂此諸大老受其激勵舉揚一酬一唱班班列列載於傳燈皆有事實可考又如楊無為之參白雲端張無盡之見兜率悅悅即隆興府兜率寺從悅禪師贛州熊氏子嗣真淨文禪師皆扣關緊要處難過而能過擊節阻隔處不通而能通也謂扣其機關擊其節要提持祖印顯露真機使其慶快平生徹證根源之深底豈徒然哉近如張無垢侍郎諱九成字子韶號無垢居士杭州鹽官人得法于玅喜杲禪師參政李邴字漢老得法于玅喜禪師翰林呂本中字居仁問道于玅喜故曰皆見登堂入室者學者請益問道咨決心疑登于禪堂至于奧室也方外道友者出塵勞方隅之外脫凡情拘繫之中故謂方外友也彼此胸中或有愛憎之心逆順之境纔有些些奮然斥之如雷電之揮掃不容湊泊真果脫洒超略不為世情俗氣之所拘執忌憚也凡有見伊如是施為孰不斂其衣袵辟易惶悚如見大海然無有可窺見其邊涯際畔也然彼有名有位之士君子尚且要求禪林大老于空閑之地寂寞之濵水邊林下擬度其必欲安棲此心于禪寂之中待其發揮吾本來具有之玅性而已上一節要使人知善者當法次下教人不善者當戒後世不見先德楷模專事諛媚曲求進顯凡以住持薦名為長老者往往書刺以稱門僧奉前人為恩府取招提之物苞苴獻識者憫笑而恬不知耻此節謂持法無人上節歷舉前賢灑落境象超悟自性此節俻陳人趨承情狀敗壞法門各有所重也謂後來世人不見先德之端楷模範竟不以道自持專以巧言令色諛媚名公為事以此委曲無不過于求權勢之人圖其進趨顯達而已凡叢林中以住持薦名為長老者薦名者本不是其人而強為之也書刺者謂書寫姓名于簡牘曰刺往往寫書帖自稱為門下僧奉承面前貴姓為恩府大檀越取大眾共有之物苞苴者包褁珍奇以獻諂也故為有智者愍而失笑究竟自家亦恬然而不知羞耻恬安也烏呼吾沙門釋子一瓶一雲行鳥飛非有凍餒之迫子女玉帛之戀而欲折腰擁篲酸寒跼蹐自取辱賤之如此耶此節歎其無耻烏呼二字是歎息彼等無知之甚然吾沙門也釋迦之子也理宜效佛一瓶一鉢如雲之出岫如鳥之高飛所謂一鉢千家供孤身萬里遊且無饑寒為我逼迫又無子女玉帛為我留戀本來是一個脫洒丈夫何故返要折腰擁篲酸寒跼蹐自取凌辱自討卑賤至于如此耶折腰者腰折之勢也晉時陶潛字淵明號元亮門栽五柳自號五柳先生為彭澤令性簡貴不私事上官一日上遣督郵至縣吏謂應束帶見之淵明歎曰吾豈能為五斗米折腰向鄉里小兒即日解綬去職賦歸去來辭史咏曰英俊那堪屈下僚門栽五柳事蕭條鳳凰不共鷄爭食莫怪先生懶折腰擁篲者掃地之形也漢高祖即位五日一朝太公以父子禮待之其家令謂太公曰高祖雖子人主也太公雖父人臣也奈何以人主而拜人臣如此則威重不行矣後高祖朝太公太公擁篲迎門却行高祖大驚下扶太公公曰帝人主也奈何以我亂天下之法於是高祖尊太公為太上皇帝善家令之言賜金五百斤酸寒者言怖畏之勢身酸心寒也跼曲身也蹐累足小步也謂人恐懼身不敢伸足不敢放折腰下八字形容諂之狀殆盡稱恩府者出一己之私無所依據一妄庸唱之於其前百妄庸和之於其後擬爭奉之真卑小之耳削弱風教莫甚於人實姦邪欺偽之漸雖端人正士巧為其所入則陷身於不義失德於不救可不哀歟此節重出庸人稱恩府者出于人一己之私原無憑據一妄庸唱之於其前則有百妄庸和之於其後擬其爭相奉承此真是卑鄙下賤之小人耳削弱我祖風聖教莫有甚于此等之人更須知此實是姦邪欺偽之所由來也雖有端人正士為他巧弄即入他羣隊則使一班好人皆陷身于不義之地失德於無救之中可不哀歟破法比丘魔氣所鍾誑誕自若詐見知識身相指禪林大老為之師承媚當路貴人為之宗屬申不請之敬啟壞法之端白衣登床膜拜其下曲違聖制大辱宗風吾道之衰極至於此烏呼天誅鬼錄萬死奚贖非者歟此節痛責者者一等破壞我法道之比丘皆是魔氣所鍾故一味虗誑妄誕恬然自若全不知耻欺詐于人現一箇知識的身相指禪林有名望的大老為己之師承媚悅當道貴人為己之宗屬申其不請之敬全是瞞人啟其壞法之端不知自悞白衣人竟去登座戒行僧返來禮拜此是曲違佛制大辱宗風吾道法之衰豈期一旦至于此耶烏呼二字悲歎也實痛恨之極也歸雲和尚謂者一等業種天來殺他鬼來取他致他萬死有不可贖之罪非者而誰歟後人知此痛宜戒之嵩禪師原教有云古之高僧者見天子不臣預制書則曰公曰師鍾山僧遠鸞輿及門而床坐不迎虎谿慧遠天子臨潯陽而詔不出山當世待其人尊其德是故聖人之道振此節明至人自重更推進一層使人知佛法如此尊重但非至人不能行之存之耳明教和尚有原教論云古之高僧見天子不行臣禮天子慕高僧凡預有詔命之書必尊稱之曰公曰師鍾山僧遠禪師齊高祖建元元年庚辰八月有事駕臨鍾山因幸沙門僧遠帝訪之遠床坐辭老病不迎高祖將詣床下見之左右曰房榻窄狹不能容輿葢遂駐輦殷勤致問而去且遠居山五十餘年初時飲食不繼㵎飲木食二十餘年諸方仰其高風壽終之日以表奏帝帝遂以為師御塟鍾山焉廬山東林虎谿慧遠禪師鴈門樓煩賈氏子博通六經尤䆳周易甞與弟慧持造道安法師席下聞說般若經喜歎曰儒道九流特糠粃耳遂祝髮出家以大法為己任及關中擾亂師南遊至潯陽見匡山愛之結廬山中太守桓尹尊其道德為剏精舍時晉室衰微天下奇才隱居不仕師結蓮社會諸賢儒並沙門千餘人求生淨土東晉安帝駕臨潯陽詔遠一出師辭以老疾不出帝愈加敬敕九江太守歲時送資道之具師卜居三十年影不出山凡送客以虎溪橋為限著匡山集三十卷盛行於世蓮社十八賢社主東林辯覺慧遠大師鴈門慧持法師西林覺寂慧永大師天竺佛䭾䟦陀羅覺賢罽賓佛䭾耶舍覺明東林普濟道生大師曇恒法師僧叡法師曇順法師道昺法師曇銑法師道敬法師南陽張銓秀碩鴈門周續之道但彭城劉遺民仲思豫章雷次宗仲倫南陽張野菜民南陽宗炳少文盖當斯時非以佛心為心之天子不能尊崇其高僧非至德高僧亦不能感動乎天子有其人復有其德是故聖人之道振後世之慕其高僧者交卿大夫尚不得預下士之禮其出其處不若庸人之自得也況如僧遠之見天子乎況如慧遠之自若乎望吾道興吾人之修其可得乎存其教而不須其人存諸何以益乎惟此未甞不涕下淳熙丁酉余謝事顯恩寓居平田西山小塢以日近見聞事多矯偽古風凋落吾言不足為之重輕聊書以自警云藂林盛事此節言後世無僧後世之慕高僧者彼此特虗名耳今人交公卿大夫尚不得預行下士之禮凡其出時處時規規然拘拘然不敢自縱返不如尋常人自由自得豈得如僧遠床坐之相見于天子乎又何況如慧遠使命至而自若乎既不如常人之自得則養道無人矣而欲望吾法門之興吾行人之修其可得乎雖存其教法而不見有真修之師不見有真慕之士者存之何以益乎本和尚舉至于此曰予思維至此未甞不痛心涕下淳熙丁酉予始謝顯恩院事寓居於平田西山小塢以近日偶有所見所聞之事多諸矯偽古風凋落吾言不足以為重輕聊書之以自警耳古人盡情盡力說到千萬不奈何處只教後人知有所重烏呼其孰能一俗清于言下也此篇要人遵教行道毋負古人之意也圓極岑和尚䟦云佛世之遠正宗淡薄澆漓風行無所不至前輩凋謝後生無聞藂林典刑幾至掃地縱有扶救之者返以為王蠻子也今觀疎山本禪師辯詞遠而意廣深切著明極能箴其病第妄庸輩智識暗短醉心於邪之域必以醍醐為毒藥也太平州隱靜圓極彥岑禪師撫州台城人嗣雲居法如禪師南嶽下十六世前曰序後曰䟦云佛去世至今愈遠正法亦淡然微薄矣澆漓泛濫之風行無所不至前輩老成持重之人俱已凋謝後生晚學無所見聞叢林中所有之典型幾至掃地而盡孟子曰太甲顛覆湯之典刑掃地盡矣典刑者謂聖人正暴除亂懲惡勸善之法度也縱有一二扶持救攝之者返以為王蠻子也此是方語謂法門中奴今觀疎山本禪師辯篇詞極遠而意甚廣又深切諦理明顯佛意極能箴除人之毒病箴與鍼同又規誡也但一種妄庸之輩智識本暗而且短醉昏迷也昬醉心迷于邪之地必以最上醍醐返謂之為毒藥也此䟦正如錦上添花只要人爭相珍玩也此篇見古人謹嚴自惜不媿為藂林主也東山空和尚答余才茂借脚夫書云向辱枉顧荷愛之厚別後又承惠書益自感媿某本巖穴間人與世漠然才茂似知之今雖作長老居方丈只是前日空上座常住有無一付主事出入支籍並不經眼不畜衣不用常住不赴外請不求外援任緣而住初不作明日計才茂既以道舊見稱故當相忘於道此節先明自己行徑福州雪峯東山慧空禪師本郡陳氏子嗣泐潭善清禪師南嶽下十四世答書曰向日取辱蒙枉駕相顧感荷愛念之情甚厚別來又承惠書轉加增其感媿但某巖穴間人與世事淡然拙性才茂似知之矣今日雖則作長老居於方丈其實只是前日之慧空上座也常住中一切錢財有無總皆付之與主事僧徒出入支用簿籍總不過眼衣鉢之資本不曾蓄不敢侵用常住又不赴他外請亦不攀求外助終日只好任緣而住初不作明日之計也才茂既以平日道舊見稱于我斯則爾我皆為道中人也即當相忘于道出莊子大宗師篇曰孔子云魚相忘於江湖鳥相忘於虗空人相忘于道術註云水深游泳魚得其樂故相忘也虗空無礙鳥得其樂故相忘也道濶無涯物我俱泯人得其樂故相忘也今書中就覓數脚夫不知此脚夫出於常住邪空上座耶若出於空空亦何有若出常住是私用常住一涉私則為盜豈有善知識而盜用常住乎公既入帝鄉求好事不宜於寺院營此等事公閩人所見所知皆閩之長老一住著院則常住盡盜為己有或用結好貴人或用資給俗家或用接陪己知殊不念其為十方常住招提僧物也此節出呈所欲之事今書中就我覓數脚夫但不知此脚夫還出之于常住耶出之于空上座耶若使出之于空吾無所有也若出于常住我則私用常住一涉私則為盜豈有善知識而盜用常住乎公既入帝都原為欲求上達最美之事固不宜於寺院內三寶中求此等事公本福建之人也所知所見皆閩之長老一住著院了則常住之物盡盜為己有或有用去結好貴人或有用來資給俗家或有用接陪知己殊不念我所用者原是十方常住招提僧物也今之披毛戴角償所負者皆此等人先佛明言可不懼哉比年以來寺舍殘廢僧徒寥落皆此等咎願公勿置我於此等輩中公果見信則他寺所許者皆謝而莫取則公之前程未可量也逆耳之言不知以謂何如時寒途中保愛語錄此節誠勉所不當作如今之戴角披毛償還所欠者多是此等盜用常住之人先佛明言因果昭彰可不懼哉近年已來各處寺舍如是殘癈僧徒亦皆寥落總為是盜取常住之過願公勿將我亦置于此一等輩中公果見信于我則他寺所許有脚夫者皆往謝之而莫取則公之前程上達不可量也此不順情之語乃逆耳之言也不知尊意以謂何如時當寒甚途中善自保惜加餐是禱說得飃飃颻颻如花落瓊枝實令人愛殺想殺妬殺愧殺附歲貢余才茂來書適承慈愛容座下領教自違法顏以來不勝追感法乳之恩未甞忘也近聞老師法位高遷有缺奉賀茲因京都科場一事暫乏車從之給因此凟法顏庶脚力人夫見數枚倘若僥倖帝都還返面謝此篇教人拳拳奉行知因識果也浙翁琰和尚云此書真閻老子殿前一本赦書也今之諸方道眼不知若何果能受持此書則他日大有得力處浙翁每以此舉似於人此節見知法者自重金陵鍾山如琰禪師號浙翁嗣佛照光禪師南嶽下十八世師謂東山答才茂書真果是閻羅王殿前一本釋放罪人之赦書也今之諸方道眼見此一書不知胸中果如何也若信服受持依而行之他日大有得力處在浙翁每常舉此書以示人冀人人遵而行之也璨隱山亦云常住金穀除供眾之外幾如鴆毒住持人與司其出入者纔霑著則通身潰爛律部載之詳矣古人將錢就庫下回生薑煎藥葢可見此節明因果須當戒璨隱山即漳州淨眾寺佛真了璨禪師泉南羅氏子嗣佛鑑懃禪師南嶽下十六世亦云常住金糓除供眾之外一絲一毫猶如鴆毒住持人與主其出入者纔一霑著則通身骨肉潰散爛壞矣其利害律部中載之甚詳古人即瑞州洞山自寶禪師廬州人嗣五祖戒禪師青原下九世為人嚴謹甞在五祖為庫司戒因病令侍者取生薑煎藥寶叱之侍者白戒戒令取錢回買後筠州洞山缺住持郡守托戒令舉德人主之戒曰賣生薑漢住得遂請住持後移歸宗寺一日出門見喝道者師問為誰對曰縣尉令避路寶側立道傍馬忽跪寶曰畜生亦識人耶尉再拜而去後又遷雲居一夜為山神肩輿遶寺而行寶曰擡你爺老子上方丈去甞作達磨贊譽揚叢林今載正法眼藏中今之踞方丈者非特刮眾人盂中物以恣口腹且將以追陪自己非泛人情又其甚則剜去搜買珍奇廣作人情冀遷大剎只恐他日鐵面閻老子與計算哉拈崖漫錄此節明無知者自喪今之踞人座于方丈者非特刮削眾人鉢盂中物以恣口腹且將用來追陪自己非理泛用以作人情又更甚者則剜去搜尋求買珍奇廣作人情望遷大剎梵語剎瑟此云竿即旛柱也凡沙門得道建旛以告四方出要覽是則是我只恐他日鐵面閻老子與你一一計較打算將來不知你作何處分前篇清如秋水此篇厲似嚴霜捧讀數過敢不敬之畏之哉此篇明選賢繼席之要乃林下之盛事也雪堂行和尚住薦福一日問暫到僧甚處來僧云福州來雪堂曰㳂路見好長老麼僧云近過信州博山住持本和尚雖不曾拜識好長老也雪堂曰安得知其為好僧云入寺路徑開闢廊廡修整殿堂香燈不絕晨昬鐘皷分明二時粥飰清潔僧行見人有禮以此知其為好長老雪堂笑曰本固賢矣然爾亦具眼也此節因問知其人品衢州烏巨山雪堂道行禪師迅州葉氏子嗣佛眼遠禪師南嶽下十五世住薦福時一日問暫到僧你從甚麼處來僧曰福州來雪堂曰沿流一路曾見有甚好長老麼僧曰近過信州博山住持悟本和尚江州人嗣大慧禪師南嶽下十六世雖不曾禮拜相見他却是箇好長老也雪堂曰既不曾拜識安得知其為好僧曰某以六事知之入寺路徑開闢居處好廊廡修整建立好香燈不絕報恩好鐘皷分明法令好粥飰精潔恩眾好僧行有禮規矩好以此故知其為好長老也雪堂笑曰本固賢德之人也且你亦是箇具眼的衲僧直以斯言達於郡守吳公傅朋曰遮僧持論頗類范延齡薦張希顏事而閣下之賢不減張忠定公老僧年邁乞請本住持庶幾為林下盛事吳公大喜本即日遷薦福東湖集范延齡事出皇朝類苑此節轉祈薦易主人正以斯言通達于饒州郡守吳公傅朋曰者僧所持之議論頗類者略同也略同范延齡薦張希顏之事宋太宗時張希顏為萍鄉邑宰范延齡為殿直押兵過金陵陣前曰先鋒軍後曰殿直張詠上命知金陵事乃問曰天使沿路見好官員麼范曰昨過萍鄉邑宰張希顏好官員也詠曰焉得知其為好曰自入其境橋路完美田園闊闢野無惰農市無賭博夜聞更皷分明必知有美政者詠曰希顏固賢矣天使亦好官員即日同薦於朝上讚曰二人皆國之良使也遂陞延齡為閣下候希顏為發運使張詠字復之封定國公閣下乃三公美稱高大貌三公者太師天子所師太傅傅相天子太保保安天子又語錄云宰相三公郡守俱稱閣下雪堂和尚謂閣下之賢不在張忠定公之下老僧年邁伏乞請本為薦福住持可以為叢林盛美之事也吳公遂大喜本因此即日得遷薦福號令嚴禮法備古風俱在也兼之養深蓄厚為人所慕仰者必矣此篇教學人堅志確修自他兩利也雪堂曰金隄千里潰於蟻壤白璧之美離於瑕玷況無上玅道非特金隄白璧也而貪慾瞋恚非特蟻壤瑕玷也要在志之端謹行之精進守之堅確修之完美然後可以自利而利他也與王十朋書隄河岸也金隄者非以金作隄取其堅固如鐵作也謂千里之堅隄所壞只在一蟻穴白璧之最美所離只在一瑕玷離者謂人見其瑕玷而離棄之也且無上玅道之最尊貴最堅剛又不比金隄之堅白璧之美也而世人之貪慾瞋恚其利害又不比蟻壤之潰瑕玷之離也必在學者立志要端謹行之要精進守持要堅確修習要完美如此始可以自利而復能利於人也若不如是金隄頺白璧壞矣自救不暇烏能及人哉此篇見古人篤志深修不為情境所遷也雪堂曰予在龍門時昺鐵面住太平有言昺行脚離鄉未久聞受業一夕遺火悉為煨燼昺得書擲之於地乃曰徒亂人意耳東湖集謂予在龍門時昺鐵面住太平有人謂我言昺當初行脚時離鄉未久忽聞受業師處一夕失火悉為煨燼煨燼者火之無餘也昺得師來書未及開讀即擲之于地乃曰徒然作此攪亂吾人之意耳不是鐵石心肝畢竟為情所絆事無濟矣此篇謂聖賢事業貴在中正偏邪則與道遠矣雪堂謂晦菴光和尚曰予弱冠之年見獨居士言中無主不立外不正不行此語宜終身踐之聖賢事業備矣予佩其語在家修身出家學道以至率身臨眾如衡石之定重輕規矩之成方圓捨此則事事失準矣廣錄信州龜峯晦菴惠光禪師建寧人嗣雪堂行機禪師男子二十方冠謂之弱冠獨居士即雪堂之父曰人生作事胸中不成主宰的意決定不要立外面不端正的事決定不要行此語宜當終身行之則聖賢之事業備矣佩大帶也古人凡遇嘉言善行即書于佩示不忘也雪堂謂予佩書其語在家以此而修身出家以此而學道及至出世之時亦以此率身臨眾猶如衡石之定重輕規矩之成方圓無不頭頭合轍若捨此則事事失準則矣獨居士兩句語傳之千古只是說得真見得透此篇言學人當倣傚于先哲言行始得志願不負也雪堂曰高菴臨眾必曰眾中須知有識者予因問其故高菴曰不見溈山道舉措看他上流莫謾隨於庸鄙平生在眾不沈於下愚者皆出此語此節謂眾中須知有高人高菴和尚每臨眾必曰稠人眾中須知有好人予因問其故高菴曰不見溈山道學者舉止之間須要看他上一流輩謾與慢同謂不可忽意隨于庸鄙高菴曰予平生在大眾中不沉沒于下愚者皆出此語稠人廣眾中鄙者多識者少鄙者易習識者難親果能自奮志於其間如一人與萬人敵庸鄙之習力盡真挺特沒量漢也予終身踐其言始得不負出家之志廣錄此節明倣傚要當有識者葢稠人廣眾中鄙人最多而識者甚少況且庸人易習有智識者甚是難親要須是自有主宰果能奮發大志于稠人之間如一人與萬人相敵相似久之使頑庸鄙陋之習氣消盡乃真果是一員挺特沒有涯量之大丈夫也雪堂曰予終身履踐斯言始得不負我此生出家之志此章書得力在如一人與萬人敵一句你看力氣如何用能知此者即可以教人出頭天外望矣此篇謂審言行務合中道宜檢責其身心也雪堂謂且菴曰執事須權重輕發言要先思慮務合中道勿使偏頗若倉卒暴用鮮克有濟就使得成而終不能萬全予在眾中備見利病惟有德者以寬服人常願後來有志力者審而行之方為美利此節謂作事應須有德真州長蘆且葊守仁禪師越之上虞人嗣雪堂行禪師南嶽下十六世謂主法者用執事人須權衡其重輕若當重用者返輕當輕用者返重則其事難成矣發言必先要思慮倉卒橫暴而為之少能有濟其事者莫道不成縱使得成而終不能萬全其美予在眾中備悉見其利病惟獨有德之者以寬宏度量自能服人常願後來有志力之主人須當審察而細行之方為甚美之利益也靈源甞曰凡人平居內照多能曉了及涉事外馳便乖混融喪其法體必欲思紹佛祖之任啟廸後昆不可不常自檢責也廣錄此節明涉世全在智照靈源和尚甞曰凡人燕居獨處攝心內照一一明白無不曉然及乎經涉事緣外馳應物便乖違靜照混融之道喪失法體若有志力廣大者必欲思紹佛祖之重任啟廸開導于後昆不可不常常檢束其身尅責其心也內照外馳之不相應病在於何此中間不容髮一有覬覦即蒙情矣此篇見尊人以德不為世相所累也應菴華和尚住明果雪堂未甞一日不過從間有竊議者雪堂曰華姪為人不悅利近名不先譽後毀不阿容苟合不色巧言加以見道明白去住翛然衲子中難得予固重之且菴逸事明州天童應菴曇華禪師蘄州汪氏子嗣虎丘隆禪師南嶽下十六世住明果時雪堂每常過于室以相從之間或有私議失尊卑之禮者雪堂曰雖則班次有別而我所重者德也華姪為人極端正不悅利不近名與人交不先譽而後毀不阿諛取容而苟且和合于人不作人顏色無巧弄人之言語加以見徹悟理極是明白去住舉止之間甚是脫灑翛然衲子中間欲求一箇如華姪者最為難得予故此而尊重之也始知古人一片至誠忘情至此當力效之此篇論人氣志不可偏存偏則無益也雪堂曰學者氣勝志則為小人志勝氣則為端人正士氣與志齊為得道賢聖此節教人氣志須均等志心志也氣血氣也以理養心志不昬以志帥氣氣不墮論云氣聽命于心者賢人也心聽命于氣者小人也夫氣者志之卒也志者氣之帥也苟心隨氣變則氣反為志之帥也氣為帥則吾心之志衰斯乃心為氣役也聖賢君子以心御氣而不為氣所御以心移氣而不為氣所移也雪堂曰凡學者若是氣勝而志劣者終不能成其大事一味用氣則小人也若志強而氣弱者即為端人正士此猶是志到而氣不到尚有欠焉若是志氣均齊者此必定得無上道為聖為賢矣何也人雖有成聖成賢之志若氣不勝行之不力何以能斷最深之惑能除最重之昬是所以須志氣均者乃能斷惑證真也有人剛狠不受規諫氣使然也端正之士雖強使為不善寧死不二志使然也廣錄此節明用氣志之不同今叢林下有一種剛強狠戾不受鍵錘教訓者氣之所使也端正之士雖強教他為不善之業即至于死地亦不改其行此志之所使也志與氣吾本有也觀率而行之者何如偏勝則成敗立見並致而不相悖聖賢事業得矣此篇謂美器固自天成而度量不容狹小也雪堂曰高菴住雲居普雲圓為首座一材僧為書記白楊順為藏主通烏頭為知客賢真牧為維那華姪為副寺用姪為監寺皆是有德業者此節通舉眾材南康軍普雲自圓禪師綿州雍氏子嗣高菴悟禪師南嶽下十六世首座解見前一材僧未詳或指水菴書記執掌文翰凡山門榜疏書簡祈禱詞語悉皆屬之撫州白楊法順禪師綿州文氏子嗣佛眼遠禪師南嶽下十五世師示眾曰染緣易就道業難成不了目前萬緣差別祇見境風浩浩凋殘功德之林心火炎炎燒盡菩提之種道念若同情念成佛多時為眾如為己身彼此事辦不見他非我是自然上敬下恭佛法時時現前煩惱塵塵解脫藏主執掌經藏兼通義理函帙目錄常加點對缺者補完斷者粘綴也通烏頭真州北山法通禪師嗣長蘆真歇清了禪師青原下十四世知客知典賓客緇白相遇應對欵接務令整齊南康軍歸宗真牧正賢禪師潼州陳氏子嗣佛眼遠禪師南嶽下十五世維那華梵兼舉也綱維叢林曲盡調攝僧事內外無不掌之副寺掌常住金穀錢帛米麥出入隨時支籍也用姪婺州雙林德用禪師本郡戴氏子嗣高菴悟禪師監寺梵語摩監帝此云寺主此職早夜勤事香火應接官員歷事須廉能公直內外無怨者充之已上七位皆是有德行道業者用姪尋常廉約不點常住油華姪因戲之曰異時做長老須是鼻孔端正始得豈可以此為得耶用姪不對此節獨論廉約用姪尋常處己最清廉最儉約以一極小者論之不點常住油華姪因戲之曰異時你去做長老只要鼻孔端正本事明白便是豈可以此些微而為得耶用姪不對用姪處己雖儉與人甚豐接納四來略無倦色高菴一日見之曰監寺用心固難得更須照管常住勿令疎失用姪曰在某失為小過在和尚尊賢待士海納山容不問細微誠為大德高菴笑而已故藂林有用大盌之稱逸事此節方明大體用姪處己雖是最儉而與人卻又甚豐接納四來之衲子了無倦怠之色高菴一日見之曰監寺尋常用心固然難得如汝者更須要細心照管常住勿令有所疎失用姪曰若在某甲分上縱有疎失猶為小過在和尚必要尊重賢德優待智士其量如大海之納百川如山谷之藏萬物不問諸𤨏碎微末此誠為住持之大德也高菴笑而已是故藂林有用大盌之名言不虗也言大盌者能容受多物故也羣英畢集大德斯彰乃雲龍際會時也可謂旦暮之遇此篇謂主賓契合固非偶然有風雲際會之勢也雪堂曰學者不知道之所向則尋師友以參扣之善知識不可以道之獨化故假學者贊佑之是以主招提有道德之師而成法社必有賢智之衲子是為虎嘯風冽龍驤雲起此節用主賓貴在相孚謂學人不知玅道之所趨向必須尋明師訪良友參求之扣益之善知識欲行此道豈以一己而能獨化故必要假學者贊助之扶佑之是以主招提者若是有道行德業之師建立法社自有賢能智識之衲子來相佐助所謂虎嘯必風冽龍驤而雲起嘯吹氣之聲冽寒氣也驤騰躍遠舉之貌易乾卦九五飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親乎上本乎地者親乎下則各從其類也昔江西馬祖因百丈南泉而顯其大機大用南嶽石頭得藥山天皇而著其大智大能所以千載一合論說無疑翼然若鴻毛之遇風沛乎似巨魚之縱壑皆自然之勢也遂致建藂林功勳增佛祖光耀此節顯師勝而見子強所以昔日江西馬祖本為有道德之師因得百丈與南泉輩乃為賢智衲子故顯其大機而發其大用又如南嶽石頭是有道之師因得藥山與天皇之賢智衲子故著其大智而成其大能澧州藥山惟儼禪師絳州韓氏子得法于石頭希遷禪師青原下二世師將順世一夜登山經行忽雲開見月大嘯一聲應澧陽東九十里許明晨居民迭相推問直抵藥山乃知為師嘯聲朗州刺史李翱贈以詩曰選得幽居愜野情終年無送亦無迎有時直上孤峰頂月下披雲嘯一聲荊州天皇道悟禪師婺州東陽張氏子得法于石頭遷禪師青原下二世師初住荊州當陽紫陵山學徒駕肩接踵而來都人嚮風而至時崇業寺僧以狀聞於郡師請住城東天皇寺師素不迎送客無貴賤皆坐而揖之江陵令裴公稽首問法師接之無加禮裴愈歸敬由是石頭道法稱為極盛如是師徒可謂千載奇逢一朝契合故凡所議論凡有言說師纔舉著弟子即了然無疑也翼然者如大鵬纔展翅而忽遇大風乘之必遠舉也沛然者如巨魚將鼓浪而忽逢滂沛因之而縱壑也壑即大海此皆自然之勢也由此師與弟子合會遂能建藂林功勳增佛祖光耀亦皆自然之勢先師住龍門一夕謂予曰我無德業不能浩歸潮海衲子終愧老東山也言畢潸然予甞思之今為人師法者與古人相去倍萬矣與竹庵書此節明自謙以彰師德先師住龍門一夕謂余曰我無德行又少道業不能浩浩然歸致湖海衲子實自慚愧安得如老東山之集眾也言畢潸然淚下雪堂曰我甞思之今日之為人師法者實與古人相去遠甚一萬倍猶不止也有聖師則賢弟子至響順聲和誠足以植萬古徽猷豈偶然哉須知其所以來賓于八表者唯道德而已也此篇見道人知機識宜終不為聲勢所屈也雪堂曰予在龍門時靈源住太平有司以非意擾之靈源與先師書曰直可以行道殆不可為枉可以住持誠非我志不如放意於千巖萬壑之間日飽蒭粟以遂餘生復何惓惓乎不旬浹間有黃龍之命乃乘興歸江西聰首座記聞謂予昔住舒州龍門時靈源和尚住持太平寺有司官以非意擾害之非意者謂無罪而致害也靈源與先師佛眼和尚書曰直心直行是行道之本卻將行不去殆將也枉屈行事實非道人本意柳下惠曰直道而事人焉往而不三黜枉道而事人何必去父母之邦若必欲我屈意承事于人何益之有到不如放意于千巖萬壑之間每日飽其蒭粟蒭粟艸子也便是快活遂我餘生之志也何得憂憂悶悶作此去就惓惓憂悶也十日為旬十二日為浹不旬浹間便有黃龍之命請師住持乃乘其興竟歸江西道人心如直弦委曲非所宜也凡為藂林主合當如此此篇言學者作事當審思勿暴用也雪堂曰靈源好比類衲子曰古人有言譬為土木偶人相似為木偶人耳鼻先欲大口目先欲小人或非之耳鼻大可以小口目小可以大為土偶人耳鼻先欲小口目先欲大人或非之耳鼻小可以大口目大可以小夫此言雖小可以喻大矣學者臨事取捨不厭三思可以為忠厚之人也記聞謂靈源和尚好比方物類于衲子者曰古人有言譬如世間有以土作或以木作而相似于人者偶像也作木像之人者耳鼻必先欲大口目先必欲小人有非之者曰何故如是須知耳鼻先大修之削之而後自小也口目孔竅先小者開之鑿之而後自大也又如以土做人者耳鼻先欲小口目先欲大人或非之要曉得耳鼻雖小培之揑之而後可大也口目雖大衰之撮之而後可小也靈源曰此言雖是不要緊之小事其實可以喻人不細心而壞大事矣學者大凡臨事于取捨之間莫厭三思然後方可以為忠厚之人也語平而意玅豈徒有激而然哉戒人孟浪不思可謂至訓矣此篇舉有德者為今人法以儆求名利人也雪堂曰萬菴送高菴過天台回謂予言有德貫首座隱景星巖三十秊影不出山龍學耿公為郡特以瑞巖迎之貫辭以偈曰三十年來獨掩關使符那得到青山休將𤨏末人間事換我一生林下閒使命再至終不就耿公歎曰今日隱山之流也此節明古人志在於道江州東林萬菴道顏禪師潼州解氏子嗣大慧杲禪師送高菴過天台回謂予言彼中有箇德貫即世奇首座成都人得法于佛眼遠禪師南嶽下十五世遠命分座說法師固辭曰此非細事如金針刺眼毫髦若差睛則破矣願生生居學地而自煅煉遠美以偈曰有道只因頻退步謙和元自慣回光不知已在青雲上猶更將身入眾藏後隱居景星巖三十載影不出山者謂形不動而影不流也龍學耿公為郡守特以瑞巖禪剎迎之貫辭以偈曰三十年來獨掩關使符那得到青山符乃漢制以竹長六寸分而相分為符信也休將𤨏末人間事謂做長老事多𤨏碎零末皆人世間事也換我一生林下閑我林間得意幽閑不為君所換也公必欲致請使命再至師終不就耿公因而歎曰此師可為今時之隱龍山流類也萬菴曰彼有老宿能記其語者乃曰不體道本沒溺死生觸境生心隨情動念狼心狐意諂行誑人附勢阿容狥名苟利乖真逐妄背覺合塵林下道人終不為也予曰貫亦僧中間氣也逸事此節顯至人行真言切萬菴曰彼有一老宿能記師示眾之語曰不體道本沒溺死生觸境生心隨情動念狼心狐意狼多貪狐多疑皆害物者也諂行誑人謂以諂之行欺誑于人也附勢阿容狥名苟利乖真逐妄背覺合塵林下道人終不為也見此語便知貫之為人雪堂聞此乃曰貫亦僧中間氣也不世而出曰間氣如伊尹周公之類又謂出格之人與世無干也有德者不在千人萬人圍遶為得也建勳立事別有良途巖穴風規令人攀仰莫及此篇見清廉自守不事于物也雪堂生富貴之室無驕倨之態處躬節儉雅不事物住烏巨山衲子有獻鐵鏡者雪堂曰溪流清泚毛髮可鑑蓄此何為終卻之行實雪堂和尚生來本是富貴之家而卻無驕奢倨傲之體態于日用之間都卻有撙節而又儉約雖品格清雅而不以奇好玩物關心何以知之師住烏巨山時有僧獻一銕鏡此奇物也雪堂曰我此溪流清而亦泚泚水清也即毛髮俱可鑑炤蓄此何為終卻而不受以此知其不事于物也如此西蜀王名宗壽掘地得鐵鏡一面晦無所覩一日忽光發遠燭千里偶一青衣小兒求鏡曰鏡是吾之室宅何得隱之王取鏡出小兒入鏡不見因知為神物也富貴人習氣多愛翫物有神鏡而不蓄足知所蓄者道至深而德至厚也此篇明學道要志堅無妄仁慈為用也雪堂仁慈忠恕尊賢敬能戲笑俚言罕出于口無峻阻不暴怒至於去就之際極為介潔甞曰古人學道於外物淡然無所嗜好以至忘勢位去聲色似不勉而能今之學者做盡伎倆終不奈何其故何哉志不堅事不一把作匹似間耳行實師所賦之性有仁愛而又慈忍忠恕者盡己謂忠讓人謂恕賢者尊之能者敬之凡一切戲謔嬉笑鄙語俗言少出于口形色無孤峻險阻之狀舉止無橫暴恚怒之氣至于去住之際亦不留戀極為耿介清潔甞曰古人學道于身外之物淡然無所嗜好所以能忘勢位能去聲色似非勉強葢自然如此也今時學者我見他做盡了伎倆伎倆者能巧多藝也終竟不奈勢位聲色何不能忘此何故也無別只是立志不堅持事不一把作匹似間耳方語匹似間謂不要緊也至人言行聞者一皆作金石聲豈是泛泛能比雖是生成亦藉造就此節見知識用心逆順皆真切乃作成人品也雪堂曰死心住雲巖室中好怒罵衲子皆望巖而退此節明鉗椎逈別舉死心和尚住雲巖日室中凡有相見者師好怒罵之且怒罵豈是人好得的此一好字便有意思也衲子輩不會師意俱不敢相近所謂望似險崖無能進步也方侍者曰夫為善知識行佛祖之道號令人天當視學者如赤子今不能施慘怛之憂垂撫循之恩用中和之教奈何如仇讐見則詬罵豈善知識用心乎此節出請問之由方侍者即吉州禾山超宗惠方禪師嗣黃龍新禪師南嶽下十四世因而白曰夫為善知識本當行佛祖之道以號令于人天者宜當視學者如赤子赤子者謂初生之子最為可憐慘怛即悲痛惻隱之心也撫安也循順也乃屈尊就卑之意如今和尚既不能施慈悲惻隱之憂念又不肻垂撫育隨順之恩德且不用中和之教訓中和者理無偏頗事無緩急又喜怒哀樂未發謂之中發而皆中節謂之和而返要如仇讐相似讐者懷冤相報之意凡有來見者便自怒罵如此豈善知識用心乎玅哉不因方公之申白安見知識之玅用也死心拽拄杖趂之曰爾見解如此他日諂奉勢位苟媚權豪賤賣佛法欺罔聾俗定矣予不忍故以重言激之安有他哉欲其知耻改過懷慕不忘異日做好人耳記聞此節出怒罵之意死心和尚聞方侍者語即拽拄杖趂之曰你作者般見解麼將來你去為人必然要諂媚以奉承勢位苟且以獻權豪裨販我如來大法欺惑彼聾夫俗子定矣予不忍此輩因循無知不發勇猛不明至道故以重言激勵之耳此乃吾真施慘怛之憂真垂撫循之恩其意不止于痛哭流涕也安有他哉實欲望他知廉識耻自新改過聞我之厲言使其懷慕不忘異時令他做箇好衲僧去也逆行順行天機莫測陶育之私何其篤厚如此也此節說為主人者失德悖禮無以垂範于人也死心新和尚曰秀圓通嘗言自不能正而欲正他人者謂之失德自不能恭而欲恭他人者謂之悖禮夫為善知識失德悖禮將何以垂範後乎與靈源書汴梁法雲寺圓通法秀禪師秦州隴城辛氏子嗣天衣懷禪師青原下十一世秀師甞言為善知識者自家身心不端正而只要人端正謂之失德自家身心不恭謹而只要人恭謹謂之悖禮夫為人天師表既失德悖禮不知將何為法則以垂于後乎讀之使人寒毛卓豎不端不謹者自然無容身地此篇誨學者心不可存物恐害其正也死心謂陳瑩中曰欲求大道先正其心少有忿懥則不得其正少有嗜慾亦不得其正然自非聖賢應世安得無愛惡喜怒直須不置之於前以害其正是為得矣廣錄謂人欲求無上大道必先要正此心勿存疑礙稍存些些外境於其中此心則不正矣忿是怒之甚懥是怒之滯少有忿怒于胸中此心則偏于忿怒矣少有嗜慾于胸中則此心偏于嗜慾矣然則自非聖賢應現於世安得無愛惡喜怒之心設或有之直須勿安之于胸中以害吾所守之正如是者可謂得之矣此中玅在直須不置之于前一句果爾如是何患乎心之不正而道之不辦者哉此篇謂學道以節儉為要乃可造其所以也死心曰節儉放下最為入道捷徑多見學者心憤憤口悱悱孰不欲繼踵古人及觀其放下節儉萬中無一恰似世俗之家子弟不肻讀書要做官人雖三尺孺子知其必不能為也廣錄節儉即是放下放不下即捨不得安能稱為節儉要知節儉輕而放下二字最重如佛語外道云我教你放下內六根外六塵中六識並者放下的亦須放下外道從此悟入是知放下最為入道之直捷路徑也多見學者心中憤憤然欲通而未能通口裏悱悱然欲言而未能言誰不欲相繼接踵于古人及觀其他尋常行履中要個放得下有撙節儉約者萬中難得其一恰似世俗之家子弟不肻讀書只要想去做官人不但智者為之可咲雖三尺孺子也曉得必無此事不能為也放下二字中有百千解脫門百千三昧門證入者即亞聖矣此篇謂學者要有才識雅量懷邪逐勢者無用也死心謂湛堂曰學者有才識忠信節義者上也其才雖不高謹而有量者次也其或懷邪觀望隨勢改易此真小人也若置之於人前必壞叢林而汙瀆法門也實錄死心禪師謂湛堂曰大凡學者之性情不一有才學見識有忠信節義者此為上也又或才識不高但能恭謹而有度量者次之也若是一種胸中所懷者私邪傍觀窺望于人隨其勝敗之勢而更改其心者此真小人也若將此輩安置于眾人之前必破壞叢林而汙瀆法化之門庭不可不慎瀆混也舉此要人各知所守始見習與智長化與心成然敗德其誰之過歟此篇謂住持以誠信為本感人必深也死心謂艸堂曰凡住持之職發言行事要在誠信言誠而信所感必深言不誠信所感必淺不誠之言不信之事雖平居庶俗猶不忍行恐見欺於鄉黨況為叢林主代佛祖敷宣法化發言行事苟無誠信則湖海衲子孰相從焉黃龍實錄凡當住持之職非尋常人物于發言行事之間要在誠信言若誠實而取信于人則感發者必深言不誠信則感之于人必定是淺至于不誠之言不信之事雖是尋常庶民俗子尚不忍行何也恐見欺于鄉黨一萬二千家為鄉五百家為黨況為叢林主人本為代佛祖宣揚法化者發言行事假若無有誠信則湖海中之衲子誰與之而相從焉誠信存則正而不譎孰不感之以義也返是遇物則落落不合矣此篇謂道與利不得兼行此一定之理也死心曰求利者不可與道求道者不可與利古人非不能兼之葢其勢不可也使利與道兼行則商賈屠沽閭閻負販之徒皆能求之矣何必古人棄富貴忘功名灰心泯智於空山大澤之中㵎飲木食而終其身哉必謂利與道行之不相違礙譬如捧漏巵而灌焦釜則莫能濟矣與韓子蒼書師謂求利者乃世間心只知欲利不可與言道也求道者已知利為害道之機焉得復與之言利乎古人非不能兼此二者並行于世葢其事勢不能並也若使利與道可以相兼而不悖則世間一切人皆可行之如行為商人坐為賈客與夫屠宰者沽酒者閭閻即里巷之門肩荷背負賤買貴賣之販人俱能求得此道何必古人要棄卻富貴忘了功名灰世間之心泯技巧之智深入空山大澤之中以㵎而飲以木為食而終此一生以求道耶設有人必竟說利與道不妨共行而不相違礙如是者好似甚麼譬如有人手執漏壞之酒巵欲要灌救焦紅之巨釜豈能濟其事哉漏巵注酒之器古云江河不能滿漏巵焦釜者昔秦伐趙趙取救于齊齊不明周子曰今日亡趙明日患及齊救趙之急務宜若捧漏巵而沃焦釜果可兼求則釋迦翻為不智奚為必欲捨王宮而入雪山耶必欲兼求非愚即狂此篇見有德者人所感慕有如此也死心曰晦堂先師昔遊東吳見圓照赴淨慈請蘇杭道俗爭之不已一曰此我師也汝何奪之一曰今我師也汝何有焉一本見林間錄謂晦堂先師昔遊東吳姑蘇時見東京慧林寺圓照宗本禪師常州無錫管氏子嗣天衣懷禪師青原下十一世師因漕使李復圭請開法瑞光武林守陳襄以承天興教二剎命師擇居蘇人擁道遮留赴杭州淨慈請日蘇杭兩處道俗共相爭之不止蘇人曰此我師也汝何奪之杭人曰今已受吾等之請乃我師也汝何有焉杭州郡守移文諭蘇人曰借師三年為邦人植福不敢久占道體蘇人始從看他是甚麼奇貨爭之不已畢竟知可爭者人獨無而師獨有也此篇見古人以道義處人無所私也死心住翠巖聞覺範竄逐海外道過南昌邀歸山中迎待連日厚禮津送或謂死心喜怒不常死心曰覺範有德衲子鄉者極言去其圭角今罹橫逆是其素分予以平日叢林道義處之識者謂死心無私於人故如此西山記聞死心住江西翠巖時聞覺範被貶竄逐海外路經南昌遂使人邀迎入翠巖山中欵待數日臨別盡禮以津送之或謂死心和尚喜怒不常死心曰覺範是有德之衲子鄉與向同向者我雖極力非之者正所以愛惜之也意欲使他勿露圭角于外冀其以免禍難今一旦遭此橫逆乃是他素分不可逃也我今以平日藂林道義處置之固無他也識者聞之謂死心和尚一片公正之心無有私事于人故所以如此至人之情真無二用以愛憎擬之是以常情度至人不達其所以同也學者當深體會此篇謂人有生成之性不可強移使之為善為惡也死心謂艸堂曰晦堂先師言人之寬厚得於天性若強之以猛必不悠久猛而不久則返為小人侮慢然邪正善惡亦得於天性皆不可移惟中人之性易上易下可從而化之實錄晦堂先師言世人所賦之性有寬宏厚重者咸皆本乎天造非勉強能之若其性本柔而強之以猛原非本性故不能悠久若使一回猛然高舉不久之間則頺然息矣返為小人輕慢謂汝志力衰微行之不恒耳然不惟此者即人之邪正善惡亦皆得于天性俱不可強移惟有中人之性隨其邪正善惡之氣以熏之則易得而上易得而下可以從其類應而變化之也天賦之性固是一定抑性而行之過也上智下愚俱難移易要知率性亦非智人妙用此篇教人治心當于未萌情生念起難以處置也艸堂清和尚曰燎原之火生於熒熒壞山之水漏於涓涓夫水之微也捧土可塞及其盛也漂木石沒丘陵火之微也勺水可滅及其盛也焦都邑燔山林與夫愛溺之水瞋恚之火曷常異乎此節舉事以騐其微隆興府艸堂善清禪師南雍州何氏子嗣黃龍祖心禪師南嶽下十三世謂世人本有貪欲之水瞋恚之火極難調伏而處置之故先舉喻以明燎燒也熒火星也譬如燎燒原野之火始發于一星崩壞丘陵之水初漏于一滴夫水之未發在細流之微滴則一捧土可以塞絕之矣及其盛大將來漂流木石沉沒丘陵而不已火之未然在一星之微小則一勺水可以沃滅之矣及其猛烈將來焦燎都邑燔爍山林而不已天子所居曰都周禮云四縣曰都四井為邑然世人愛溺之水瞋恚之火又何常異乎此者也古人之治其心也防其念之未生情之未起所以用力甚微收功甚大及其情性相亂愛惡相攻自則傷其生他則傷其人殆乎危矣不可救也此節教防情以正始然古人治其心也防其念之未生絕其情之未起所以用力甚微其實収功甚大也若使情與性相亂于其境愛與惡交攻于其心自則傷其吾生他則傷其同人殆乎其危必矣豈復能救之哉人固無情乎所謂防之治之者制其嗔愛之水火不可使之逸也逸則禍延無際不可救矣此篇謂住持欲經大傳遠當察人情知上下為要也艸堂曰住持無他要在審察人情周知上下夫人情審則中外和上下通則百事理此住持所以安也人情不能審察下情不能上通上下乖戾百事矛盾此住持所以廢也此節以審察人情為用住持人沒有別法只要審實詳察其眾人之情周遍深知通其上下之意則事可濟矣夫人情若能審知則中外無不和合上下若能周通則百事自然調理此住持所以安矣若使人情不能審察下情不與上通使上下乖違背戾而百事自然矛盾此住持所以廢矣其或主者自恃聰明之資好執偏見不通物情捨僉議而重己權廢公論而行私惠致使進善之途漸隘任眾之道益微毀其未見未聞安其所習所蔽欲其住持經大傳遠是猶却行而求前終不可及與山堂書此節教去其私蔽為要其或作主人者自恃我有聰明之資格一味好執自己偏見不通人情僉眾也捨眾人之公議而重一己之私權而且又廢公眾之正論行私己之小惠如此者致使進善之路途漸次隘塞矣任眾之大道益加微薄矣便成箇孤陋寡聞漢本來未見未聞之事而返毀之以為非自家所習所蔽之過而返安之以為是若如是必欲住持之道經大傳遠猶如轉背而行又欲求前到者終不可及也孔子在衛時冉求言于季孫曰國有聖人而不能用欲以求治是猶卻行而求前豈可及乎審人情知上下義無不合何往而不達失於義徒恃聰明安其所蔽則氣勢所至無不敗也此篇教學者處心端正則不落異議也艸堂曰學者立身須要正當勿使人竊議一涉異論則終身不可立矣昔太陽平侍者道學為叢林推重以處心不正識者非之遂致終身坎坷逮死無歸然豈獨學者而已為一方主人尤宜祗畏與一書記書草堂和尚曰學者欲成立一生人品須要正當勿使人私竊議論一有落于異論則終此一身便不可立矣昔太陽平侍者預明安之室有年雖盡得其旨惟以生滅為己任擠陷同列忌出其右時瑯琊廣炤公安圓鑑居眾時汾陽昭禪師令其探明安宗旨明安曰興洞山一宗非遠即覺也二師曰有平侍者在安以手指胸曰此處不佳又揑拇指叉中示曰平向去當死於此耳既明安遷化遺囑曰瘞身十年無難當為太陽山打供入墖時門人恐平將不利於師遂將李和文都尉所施黃白器物書于塔銘實無也後平住太陽忽云先師靈骨風水不利取而焚之山門耆宿切諫平云與我有妨遂發墖見師顏貌如生薪盡儼然眾皆驚異平以钁破其腦益以油薪俄成灰燼眾以其事聞於官坐平謀塔中物不孝還俗平後自稱為黃秀才謁瑯琊瑯琊曰昔年平侍者今朝黃秀才我在太陽時見你做出來遂不納又謁公安安亦然平流浪無依後于三叉路口遭大蟲食之竟不免太陽手叉之記悲哉且而論其平之道學亦為藂林推重然由為人處心不正故為識者非之遂致終身坎坷坎坷不平貌逮死無歸然此豈獨學者而已為一方主人于立身行事之際更當要謹慎而敬畏之也心誠身正則氣葢山河竊議何從而施也不誠不正者乃自喪乎身宜無容于天地間矣此篇教住持當親賢遠侫即得大體也艸堂謂如和尚曰先師晦堂言稠人廣眾中賢不肖接踵以化門廣大不容親疎於其間也惟在少加精選苟才德合人望者不可以己之所怒而疎之苟見識庸常眾人所惡者亦不可以己之所愛而親之如此則賢者自進不肖者自退叢林安矣安吉州道場法如禪師衢州徐氏子嗣雲蓋守智禪師南嶽下十三世此節順理必得謂先師晦堂言稠人廣眾中所謂龍蛇溷雜賢與不肖者接踵而同居接踵者步履相隨也以其此法化之門庭廣大于中不容簡擇以親之疎之也惟在主人略加精選衲子果有才德能合于眾人所仰望者自當親之不得以己所怒而疎之也若果見識庸常是眾人共所惡者自當疎之亦不得以己所愛而親之也如此使賢者自然進趨而不肖者自然退去則叢林即安樂矣若夫主者好逞私心專己喜怒而進退於人則賢者緘默不肖者競進紀綱紊亂叢林廢矣此節背理自喪若夫主者好逞私心專主自家喜怒而進退于人則賢者緘默緘封也默不言也時孔子觀周入后稷之廟見金人焉三緘其口而銘其背曰天機不密四時何行地機不密萬物何生人機不密萬事何成此古慎言之人也不肖者競爭而進遂使紀綱紊亂而叢林即廢也此二者實住持之大體誠能審而踐之則近者悅而遠者傳則何慮道之不行衲子之不來慕乎疎山石刻此節總明大體親賢智遠不肖此二者實是住持之大體誠能審察而行親疎有道則使近者歡悅而遠者宣傳如是者尚何憂乎道之不行衲子之不來向慕乎親疎得宜是致身之要訣拔萃之宏功也此篇說主者善于用人必致道昌法盛也艸堂謂空首座曰自有叢林已來得人之盛無如石頭馬祖雪峯雲門近代唯黃龍五祖二老誠能收拾四方英俊衲子隨其器度深淺才性能否發而用之譬如乘輕車駕駿駟總其六轡奮其鞭䇿抑縱在其顧盻之間則往而不達哉廣錄草堂和尚謂性空首座空乃黃龍悟新和尚之嗣曰善得人者必善用人自有叢林已來得人之極盛者莫過于石頭馬祖雪峯義存禪師南安魯氏子嗣德山宣鑑禪師青原下五世雲門文偃禪師嘉興張氏子嗣雪峯存禪師青原下六世近代獨有黃龍南五祖演此二老真果能收拾四方所有的英俊衲子智過千人曰俊又能隨其人之器具大小量度淺深才力性情之能否開發而選用之譬如乘輕車者駕之以駿駟四馬在軛曰駕駿馬之良者一乘四馬曰駟總其六轡者車有四馬各二轡共八轡以驂馬內兩轡繫于軾驂馬外兩轡及夾轅兩服馬四轡分置兩手以為六轡奮之以鞭䇿䇿馬箠以鞭擊馬也或抑或縱或緩或急抑即收也縱即放也皆在吾左顧右盻之間顧盻者回視也如是者則何往而不到哉收拾人假一毫虗偽不得唯誠唯切慈深智廣馭之無不得也此篇教住持勿偏聽自專審其可否行之即得矣艸堂曰住持無他要在戒謹其偏聽自專之弊不主乎先入之言則小人諂迎合之讒不可得而惑矣葢眾人之情不一至公之論難見須是察其利病審其可否然後行之可也疎山實錄謂做住持別無他故只要戒其偏聽謹其自專此二者大弊病也而更要不以先入耳之言為是但以理度之如此則小人之諂迎合于人之讒言不可得而惑亂汝矣葢眾人之性情不是一樣所以至公之論甚是難見須在主者察其人之利病審其人之可否然後行之可保無過矣偏聽病于愚自專病于傲皆不起之症能戒能謹生意在矣此篇教人定是非以理使姦不能惑也艸堂謂山堂曰天下之事是非未明不得不慎是非既明以理決之惟道所在斷之勿疑如此則姦不能惑強辯不能移矣清泉記聞世間事俱有是者非者若是非未得分明不可不自慎也使是非既已明了更當要以正理決之正理即道之所在也決之既以理而斷之又要勿疑如此主宰一定使姦者不能惑汝之聰明強辯者不能移汝之定度也道之所在如衡石之定物何有移于我哉第不可偏偏則是非生矣此篇言道人以適性為樂名不能動也山堂震和尚初却曹山之命郡守移文勉之山堂辭之曰若使梁囓肥作貪名之衲子不若艸衣木食為隱山之野人清泉才菴主記聞隆興府黃龍山堂道震禪師金陵趙氏子嗣泐潭善禪師南嶽下十四世因曹山有請師不肯受本郡太守移文勸勉其出世山堂辭曰若使去粱囓肥粱美穀囓噬也肥膩也言所圖佳美之食作一箇貪名之衲子返不如以草為衣以木為食作箇隱山之野人豈不快哉古人不食祿而食薇形不肥而名肥千古之下斯人猶卓卓然也此篇謂忘機即是至道疑人而人自疑也山堂曰蛇虎非鴟鳶之讐鴟鳶從而號之何也以其有異心故牛豕非鸜鵲之馭鸜鵲集而乘之何也以其無異心故昔趙州訪一菴主值出生州云鵶子見人為甚飛去主罔然遂躡前語問州州對曰為我有殺心在此節辯存心異不異之故謂蛇虎惡蟲獸也鴟鳶亦惡鳥也蛇虎與鴟鳶雖無讐怨而各有異心故見則相從而號呌矣鸚鵲即八哥牛豕雖非鸜鵲之駕馭以其無異心故得集而乘之矣昔者趙州訪一菴主值出生州云鵶子見人為甚飛去鵶與鴉同菴主罔然莫測遂仍躡前語以問州州對曰為我有殺心在是故疑於人者人亦疑之忘於物者物亦忘之古人與蛇虎為伍者善達此理也老龐曰鐵牛不怕獅子吼恰似木人見花鳥斯言盡之矣與周居士書此節明忘情是不是俱空是故我不忘情而疑于人人亦不能忘情而疑于我也我既無心礙于物物固無心礙于我矣如大空和尚有二虎隨侍嚴陽尊者蛇虎來手中就食與之為伍者五人相聚曰伍又伴侶也此皆善達于忘情之理也襄州龐蘊字道玄居士衡陽人得法于馬祖有偈曰但自無心于萬物何妨萬物常圍繞鐵牛不怕獅子吼恰似木人見花鳥木人本體自無情花鳥逢人亦不驚心境如如只者是何慮菩提道不成龐公斯言可謂盡其忘情之理也先佛有云心生則種種法生我方有疑于人之心而人則先疑于我矣我剛有忌于人之意而人則先忌于我矣此中響應何其疾也此篇謂賞罰須當有道過之則驕怨起矣山堂曰御下之法恩不可過過則驕矣威不可嚴嚴則怨矣欲恩而不驕威而不怨恩必施於有功不可妄加於人威必加於有罪不可濫及無辜故恩雖厚而人無所驕威雖嚴而人無所怨功或不足稱而賞之以厚罪或不足責而罰之至重遂使小人故生驕怨矣御者治也使也謂治人之法恩威須加之于有道每甞以恩與人不可過于所賞若過施之返令其人生驕奢矣用威制人亦不可過于所嚴若迴治之人必自然生怨恨矣若要有恩而不合人驕用威而不令人怨必竟如何可得亦有道也但恩必施于有功不可妄加于無任之人用威必加于有罪不可濫及于無辜之士若使有功受恩安心乘之何驕之有若無功受恩勢必驕矣若使有罪見威甘心受之何敢生怨濫及無辜勢必怨矣故恩雖厚而人無所驕威雖嚴而人無所怨乃各有其道也彼人之功小本不足稱而賞之以厚彼人之罪輕本不足責而罰之至重遂使小人必生驕怨矣善御者調適有方險夷可以並駕情不周智不到未有不見驕怨者也此篇言持身惟在節謹而不吝改過也山堂曰佛祖之道不過得中過中則偏邪天下之事不可極意極意則禍亂古今之人不節不謹殆至危亡者多矣然則孰無過歟惟賢達之士改之勿吝方稱為美也謂佛祖所傳持之道不過得中而已得中者得中道之至理也過中即出于理外則返成偏邪天下萬事所求不可盡意盡意而求則越分也即成禍亂古今之人不自知持正不自知謹慎殆至喪身失業者多矣然則孰無過歟雖則有過宜乎知改惟有賢才達理之士知過即改而不吝如是方稱為美也道人于理不可過中求情不為越分此真警世良言不可不細心討究此篇見智人涉患難皆有主宰也山堂同韓尚書子蒼萬菴顏首座賢真牧避難於雲門菴韓公因問萬菴近聞被李成兵吏所執何計得脫萬菴曰昨被執縛饑凍連日自度必死矣偶大雪埋屋其所繫屋壁無故崩倒是夜幸脫者百餘人公曰正被所執時如何排遣萬菴不對公再詰之萬菴曰此何足道吾輩學道以義為質有死而已何所懼乎公頷之因知前輩涉世禍害死生皆有處斷矣山堂同韓尚書子蒼萬菴顏首座及賢真牧四人避賊難于雲門菴時韓公名駒字子蒼任至尚書問道于山堂南宋高宗紹興元年李成作亂聚集浙江各處賊宼十餘萬戰據江淮十餘州自號李天王劫掠襄陽遇岳飛殺敗投入江者不知其數李成敗走投金自此襄漢悉平韓公因而問萬菴曰近來聞師被李成兵吏所執未審何計而得脫去萬菴曰昨者被伊執縛饑凍連日自度必定死矣偶因大雪埋屋其所繫屋壁無故一時崩倒無故者見非有意使之而倒乃生機也是夜幸然得脫者百餘人公曰正當被所執之時師乃道人不知于此作何排遣萬菴以問之不當即不對公再詰之萬菴曰此事何足言哉吾輩學道人本以仁義為質不過一死而已何所畏懼乎你將謂死是甚麼難事公頷之因此而知從上古人涉歷世間凡于禍害死生之際皆自有主宰能處斷矣未得了當而惡死之心恒情所具也不知他得的人視死如歸何懼之有此箇主宰非常人所得此篇見至人必不失其正舉止皆有道也山堂退百丈謂韓子蒼曰古之進者有德有命故三請而行一辭而退今之進者惟勢與力知進退而不失其正者可謂賢達矣記聞師退百丈時謂韓子蒼曰古之進為住持者先選其德次待其命故三請而後行一辭即便退古云三讓而進一辭而退言士之自重也今之求進為住持者惟持之以勢使之以力所以失其正也欲求其知進退而不失其正者可謂賢達人矣正人君子不蘄於必進唯進以德復進以命返此非至人矣此篇言住持公正無私邪無所入也山堂謂野菴曰住持存心要公行事不必出於己為是以他為非則愛惡異同不生於心暴慢邪僻之氣無自而入矣幻菴集隆興府石亭野菴祖璇禪師嗣大慧杲禪師南嶽下十六世謂住持人所存之心要公要正凡所行事不必出於己者為是以他人者為非一味從乎正理則愛惡異同之心不生使外面暴慢邪僻之氣自然無路而入矣公正二字行乎天下炳如日星何處能隱其私無私則道自行矣此篇舉古人器節俱玅人所罕及也山堂曰李商老言玅喜器度凝遠節義過人好學不倦與老夫相從寶峯僅四五載十日不見必遣人致問老夫舉家病腫玅喜過舍躬自煎煑如子弟事父兄禮既歸元首座責之玅喜唯唯受教識者知其大器此節明節義人不可及山堂舉廬山李商老每言玅喜和尚之為人才器與夫量度凝澄而悠遠又且節義過人好學不卷與老夫相從寶峯謹有四五載而人情亦是周密若隔去十日不見必定遣人致問老夫家因修造動土觸犯土神致舉家患腫病求醫不効妙喜來到我舍躬自為之煎煑如子弟事父兄之禮惟勤惟謹遂令焚香齋戒持熾盛光王神呪祈之未及七日夜夢老人著白衣騎牛陷地旋沒而去翌日全家疾愈矣妙喜既歸元首座以叢林體段責之元即昭覺道元禪師嗣佛果勤禪師南嶽下十五世妙喜聞責唯唯受教唯者應之速而無疑也加唯唯者順從之至也識者以此知其為法門大器湛堂甞曰杲侍者再來人也山僧惜不及見湛堂遷化玅喜蠒足千里訪無盡居士於渚宮求墖銘湛堂末後一段光明玅喜之力也日涉記此節顯道眼鑑物無遺湛堂甞曰杲侍者再來人也山僧年邁惜乎不及見其為人也既而湛堂遷化妙喜請覺範狀其行實又得龍安照然禪師書而為紹介紹介者因相佐助也遂蠒足行千里蠒足者謂足傷起皮如重蠒也昔楚欲伐宋墨子自魯趨楚十日十夜足腫如重蠒而不休息也特往荊州謁無盡居士求塔銘初見無盡問祇恁麼著草鞋遠來妙喜曰某數百里特來見相公公曰年多少喜曰二十四又問水牯牛年多少喜曰兩箇公曰甚麼處學得箇虗頭來喜曰今日親見相公公笑曰且坐喫茶纔坐又問遠來有何事緣師趨前曰湛堂和尚示寂茶毗眼睛牙齒數珠不壞得舍利無數山門耆宿皆欲得相公大手筆作墖銘激勵後學特地遠來瀆鈞聽公曰被罪在此不曾為人作文字今有一問若道得即作塔銘道不得即與錢五貫褁足却歸兜率參禪去喜曰請相公問公曰聞準老眼睛不壞是否喜曰是公曰我不問你這箇眼睛喜曰問甚麼眼睛公曰金剛正眼喜曰若是金剛正眼在相公筆頭上公曰如此老夫則為點出光明令他照天照地去也喜乃揖曰先師多幸謝相公塔銘公唯唯而笑其略曰舍利孔老之書無聞也先佛世尊滅度之後弟子收其舍利起墖供養趙州從諗禪師舍利多至萬粒近世龍慶閑百丈肅煙氣所及皆成舍利大抵出家人本為生死事大若生死到來不知下落則不如三家村裏省事漢臨終囑付一一分明四大色身諸緣假合從本以來舍利豈有體性若梵行清潔白業堅固靈明廓徹預知報謝不驚不怖則依正二報毫𨤲不失若世間麤心于本分事上十二時中不曾照管微細流注生大我慢此是業空鬼來借宅如此而欲舍利數珠諸根不壞豈可得乎由是則湛堂和尚末後一段光明乃得妙喜忠孝之力也雅量殊特大義昭然自天性中出非汎汎輩可得而擬
