front:
  text: 禪林寶訓筆說序寶訓一書葢古人撫育情深肝膈語也作之記之誠不啻嚼食餧嬰苦心極矣且三百篇皆英瑋絕世之才凌跨百代發纖穠於簡古寄至味於澹泊天機暢發語句尋常而究之後人行之猶登渺莾難於措足鮮克有珍之惜之而心醉神酣者也予自參學以來讀之已四十春秋如飲醍醐如餐玅藥立身接物之際間甞竊取一二言奉為典型雖不能媲美乎前贒亦或者不見哂於今世邇來謝事寒巖萬機鋟削日唯作壁觀僧擔朽木任而於是書置焉弗問無何為禪者請說予曰吾老矣筋倦骨衰豈堪復如子願耶而請之益堅却之弗獲只得強起命楮頴二子代為說之日漬月浸遂以成帙命之曰筆說以是知予縱能說亦有其地亦有其時說有間也唯筆說不拘時不擇地續微學於將墜發玅理於淺近風柯月渚語遍溪山要即古人之言以達古人之意而已敢曰寄茲說於將來啟蒙迷於未悟也耶惟祈學者肯綮深思細心窮翫融古人之言為己言通古人之志為己志斯則匪惟弗辜前輩嚼食餧嬰之婆心而亦不負今日白首青燈之朽志也已旹康熙歲在丙戌仲夏月退隱叟智祥頻吉聽雲道人書於雲峰牧麟堂中禪林寶訓序禪林寶訓四字作兩對法喻喻法釋禪字是法林即喻也寶字是喻訓即法也梵語禪那此云靜慮以寂靜為義又云思惟修所謂禪定者定對亂言稍亂則非禪矣林者多木為林譬諸禪師嘉言善行說非一人故喻如林也比此諸老皆深修禪定之人所集之言甚多故曰禪林寶者有貴重義世人以財帛為寶君子以文言為寶至人以道德為寶故先舉喻使人知先德之文言字字可珍可惜也訓者誨也教誡也謂諸禪師之法言皆訓誨教誡之辭此四字乃一書之題名得其名可以知三百篇之義序者頭緒也凡書有序如衣之有領網之有綱也又曰序謂述此一書之原由也寶訓者昔玅喜竹菴誅茅江西雲門時共集此述陳集寶訓之來源也者字有虗實兩用此是虗用語助之辭凡文有者字所以分別隔異也昔者往也前代也玅喜即徑山宗杲大慧禪師寧國奚氏子嗣佛果克勤禪師竹葊即溫州龍翔士珪禪師成都史氏子嗣佛眼清遠禪師二師皆南嶽下十五世誅茅斬艸也言二師于江西古雲門舊址結葊隱居時共集此書予淳熙間遊雲居得之老僧祖葊惜其季深蠧損首尾不完此方出陳續集之由予者我也淳熙宋孝宗年號遊涉歷也謂我于淳熙間遊方至江西雲居山得此寶訓於一老僧名祖葊者即岳山祖葊主得法于青原惟信南岳下十四世師住衡岳三十載人無知者有偈曰小鍋煑菜上蒸菜熟香人正饑一飽饑瘡了無事明朝依樣畵貓兒由是衲子競相參慕無盡張公力挽出世不從復隱雲居十餘載而終惜者意有所憐其字指物之辭蠧乃蟲名能食紙其狀似魚昔周成王外國貢表封于箱三載一日帝命取閱見蠧篆成福壽字上大喜後哲頌云蠧魚元不宿清波赴紙橫穿𥨊食阿無意成文經御覧古今書篋惜偏多謂雖得是書但恨其歷歲深久為蠧魚所食篇章不完或有前而無後缺失者多是可惜也後來或見於語錄傳記中積之十年僅五十篇餘仍取黃龍下至佛照簡堂諸老遺語節葺類三百篇其所得有先後而不以古今為詮次此序集續次第之所以後來是得此書之後或者不定之辭密顯真機曰語總集眾事曰錄博載古今曰傳廣誌賢哲曰記積者漸漸收積僅謂方纔也謂自得此書以來將首尾不全者遍討羣集及至十年之中方纔得五十餘篇而已仍者復也舊也黃龍寺名在隆興府今名南昌惠南禪師信州張氏子嗣石霜楚圓禪師南岳下十一世下至者謂從十一世至十六世佛炤即明州育王寺德光拙菴禪師臨江彭氏子嗣大慧禪師簡堂即國清寺行機禪師台州楊氏子嗣護國景元禪師二師皆南嶽下十六世諸老者統攝不盡之辭遺語者人雖往矣而遺留語句在也節者檢制也葺者漸次修補也然黃龍簡堂輩曾為大慧竹菴二師已皆收集因首尾不完只得仍舊將諸師遺語節制而補葺之竝前五十類之得三百篇然其所得非一時一處原有先後隨得隨錄故不以往古為先來今為後作詮顯次第耳大槩使學者削勢利人我趨道德仁義而已此正出集寶訓之本意槩者率也削者刪除也勢威勢利財利人我者彼此對待之稱謂集此書之本意原為要使學者將威勢財乃人我之心盡情刪除不可留也道者乃一切聖凡共由之達道也日用事物當然謂之道德者得也行道有得于心謂之德僧修戒定慧儒行孝弟忠信皆謂之德仁者心之德愛之理也義者心之制事之宜也趨者向也取也謂前之非理者當除此之當理者宜取要使學者趨向道德仁義而已而已者結盡無餘之意其文理優游平易無高誕荒邈詭異之迹實可以助入道之遠猷也且將刊木以廣流傳必有同志之士一見而心許者予雖老死丘壑而志願足矣此伸明寶訓之文文謂文辭理即義理優游自如之貌平者平常易者簡易高者其言孤危難近誕者其語誑妄不實荒者荒蕪無稽之談邈者渺邈無措之句詭者譎詐之諭異者怪異之辭謂此等言辭本文中不但無其實求其迹亦不可得如此真實無妄之訓誨誠可以助入道之遠猷也猷者法也遠猷者深遠法則也此序言其効下明流通之意且者權且也且將者暫欲之辭刊木即鐫板以便廣遠流通必有者謂此書既行諒必有與我同此志者此人一見定當心許我也許者𠃔從之義書既行予雖老朽死于丘壑生平志願得滿足矣丘土阜之高者壑者谷也坑也志者心之所向願者情之所希已上伸釋序文已竟後出序主名東吳沙門淨善書古稱三吳東吳即蘇州也沙門梵語此云勤息謂勤行眾善息滅諸惡後學不可單稱先輩之名當曰上淨下善即序主名也宋時人蒲姑之高僧得法氏族未詳書者舒也舒布其言陳于簡牘也
