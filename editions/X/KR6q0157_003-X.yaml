body:
  text: 楚衡雲峯智祥述此篇見古人雅尚賢德恭儉如此也妙喜杲和尚曰湛堂每獲前賢書帖必焚香開讀或刊之石曰先聖盛德佳名詎忍棄置其雅尚如此故其亡也無十金之聚惟唐宋諸賢墨蹟僅兩竹籠衲子競相詶唱得錢八十餘千助茶毗禮可菴集謂湛堂和尚每得前賢書集筆帖必欲焚香而後開展讀之或將之刊於石乃曰此皆先聖之盛德佳名豈忍棄置於高閣而不永垂於世耶其雅愛尊尚前輩有如此故去世之日撿點所存無十金之聚唯所蓄唐宋諸賢墨蹟字帖僅兩竹籠比時諸衲子輩爭相詶唱得錢八十餘千以資茶毗之禮梵語茶毗此云火化尊前賢存遺德正所以見胸襟磊落誠敬難似也錢穀奴曷克臻此此篇言上下名分當正不可忽也玅喜曰佛性住大溈行者與地客相毆佛性欲治行者祖超然因言若縱地客摧辱行者非惟有失上下名分切恐小人乘時侮慢事不行矣佛性不聽未幾果有莊客弒知事者可菴集潭州大溈佛性法泰禪師漢州李氏子嗣佛果勤禪師南嶽下十五世住大溈日行者與地客相打地客即佃民也佛性欲以叢林規法處行者祖超然不肯因而言曰若縱佃戶摧辱行者不獨有失上下名分切恐小人乘機生事慢主輕僧則常住之事不得而行矣況行者佛子上也地客佃民下也各有名分所存不宜失也佛性不聽必謂僧家豈有與人交拳相打宜當處之未久之間果有佃戶弒知事者以下殺上曰弒此見超然之有識如此住持處斷必應得宜權不可失況小人不知法情不可縱失之縱之羣機生矣此篇謂小人狡猾當預知之也玅喜曰祖超然住仰山地客盜常住穀超然素嫌地客意欲遣之令庫子行者為彼供狀行者欲保全地客察超然意抑令供起離狀仍返使呌喚不肯供責超然怒行者擅權二人皆決竹篦而已葢超然不知陰為行者所謀烏乎小人狡猾如此可菴集臨安府佛日超然文祖禪師嗣天衣懷禪師青原下十一世住仰山時地客盜常住穀超然平素極嫌地客意中必欲遣去令庫下行者為彼以盜穀事特去呈狀以便逐去而不知行者亦小人類不惟不呈狀而返欲保全地客察知超然有強令地客供起離狀之意仍返使地客呌喚不服不肯供呈其責超然怒行者擅自行權返與地客作主如是二人只好俱決竹篦而止竟不能遣也葢超然不知小人黨與暗地商謀已就竟不能驅逐之也烏乎小人奸詐狡猾勢有如此狡猾者奸頑多詐也古人舉此一章以為後人法令須知小人肝膽極險極惡不可不察也此篇言愛惡不可輕信有妨大體也妙喜曰愛惡異同人之常情惟賢達高明不被其所轉昔圓悟住雲居高菴退東堂愛圓悟者惡高菴同高菴者異圓悟由是叢林紛紛然有圓悟高菴之黨此節謂聽言須當審察謂愛與惡相返異與同有別此人人之恒情也惟有賢達高明不被其情之所轉昔圓悟和尚住雲居高菴禪師退東堂之時有一等愛圓悟者即惡高菴又有同高菴者便異圓悟由是叢林中到處皆紛紛紜紜有圓悟高菴之黨類竊觀二大士播大名於海上非常流可擬惜乎昧於輕信小人諂言惑亂聰明遂為識者笑是故宜其亮座主隱山之流為高尚之士也此節言輕信必然成累竊觀二大士大士者有德之稱謂常代英賢志拔群類才出眾情弘道利生故稱大士此二老播揚大名於海內非泛常人物之可擬惜乎輕信小人諂媚之言以致惑亂自己之聰明遂為有智識者所笑以此觀之為人最難與其出世不如避世為高宜乎亮座主與隱龍山之流誠為高尚之士也亮座主西蜀人頗講經論因參馬祖發明大事隱于洪州山更無消息至北宋政和間有熊秀才遊山過翠巖謁思文長老文與秀才俱是鄱陽人故遣二力士輿送所經林壑草木蔭翳偶見一僧貌古神清龐眉雪頂編葉為衣坐于盤石如壁間畵佛圖澄之狀佛圖澄域人在臂傍有一孔圍四五寸以帛塞之齋後就水邊取膓胃出洗之復納孔中夜則除帛讀經光照一室熊自謂曰今時無這般僧甞聞亮座主隱于西山疑其猶在出輿踧踖而前曰莫是亮座主麼僧以手向東指熊方與二力隨手東看遂回視失僧所在時小雨初歇熊登石視其坐處猶乾躊躇四顧大息曰宿緣不厚雖遇而不遇也隱山即潭州龍山禪師亦參馬祖發明心要後隱龍山一日洞山與密師伯遊山見溪流菜葉莫有道人居否遂撥草循溪行六七里忽見師在菴前便問此山無路闍黎何處來洞曰無路且置和尚從何而入師曰我不從雲水來洞曰和尚住此山多少時師曰春秋不涉洞曰此山先住和尚先住師曰不知洞曰為甚麼不知師曰我不從人天來洞曰和尚得何道理便住此山師曰我見兩箇泥牛鬬入海直至如今絕消息洞山良久具威儀禮拜便問如何是主中主師曰長年不出戶洞曰如何是主中賓師曰青山覆白雲洞曰賓主相去幾何師曰長江水上波洞曰賓主相見有何言句師曰清風拂白雲洞山辭退師乃述偈曰三間芽屋從來住一道神光萬境閑莫把是非來辯我浮生穿鑿不相干自此焚菴遁入深山不知所在因號隱山出世避世各有作用未可槩論以不出為高但輕信二字最要理會此篇謂住持能遷善改過乃足為法則也妙喜曰古人見善則遷有過則改率德循行思勉無咎所患莫甚於不知其惡所美莫善於好聞其過然豈古人之才智不足識見不明而若是耶誠欲使後世自廣而狹於人者為戒也此節舉古法為戒古之人見人有善我即遷改而從之自家有過即時革除而悔之率遵修也遵修其德依操其行而每每常思勉其無過耳人之所患者莫甚於不知己之惡所美者莫善於好聞己之過如是慎謹豈古人之才智不足識見不明而如此耶非也誠欲使後世自尊自大而卑小于人者為戒也夫叢林之廣四海之眾非一人所能獨知必資左右耳目思慮乃能盡其義理善其人情苟或尊居自重謹細務忽大體賢者不知不肖者不察事之非不改事或是不從率意狂為無所忌憚此誠禍害之基安得不懼或左右果無可咨詢者猶宜取法於先聖豈可如嚴城堅兵無自而入耶此殆非所謂納百川而成大海也與寶和尚書此節明事當謹畏夫叢林建置之廣四海儕類之眾固非一人所能獨知必竟要假左右之耳目眾人之思慮乃能盡其經常之義理善其海眾之人情若使主人尊居自重細末之事毫不放過大體段處忽略不經賢者竟不能知不肖者自不能察自己所行非處不知改眾人所作是處不肯從縱意妄為全不忌憚如此誠為滋培禍害之基本如何不畏若使左右之耳目眾中之思慮果無有可扣問者即當取法則于先聖之成言豈可自封己見如嚴禁之城堅勇之兵竟無門無路而可入也耶即此取法先聖亦一路也住持人若不能取法于先聖又豈得所謂收納百川而成大海之胸襟也自滿自大玅藥難醫能革能遷聖域可躋學者不可不知此此篇言舉人貴要端正可以救今時之利弊也玅喜曰諸方舉長老須舉守道而恬退者舉之則志節愈堅所至不破壞常住成就叢林亦主法者救今日之弊也且詐狡猾之徒不知羞耻自能諂奉勢位結托於權貴之門又何須舉與竹菴書謂今諸方舉長老出世為一方主人者必須要舉箇有道德節義及恬靜退守之人乃可當也葢此人一舉出則其所守之志所存之節轉加堅固凡所至之處自然不破壞常住事事俱能完美成就叢林此亦是今日主法者具擇賢之能得賢人繼席正所以救今日之弊病也若是那一等詐狡猾之徒不知羞耻若使居其位必欲諂奉有勢位之人結托于權貴之門如是者用亦何為則不必舉也舉人者宜諦審諦思稍一不法其害非細關係亦非小可此篇謂叢林舉人若合公論自無缺失也玅喜謂超然居士曰天下惟公論不可廢縱抑之不行其如公論何所以叢林舉一有道之士聞見必欣然稱賀或舉一不諦當者眾人必慽然嗟嘆其實無他以公論行與不行也烏乎用此可以卜叢林之盛衰矣可菴集郡王趙令衿字表之號超然居士任南康嗣圓悟勤禪師謂公論乃天下古今之正議不可廢也縱使勉強抑止之不行又怎奈公論何所以叢林中或舉一住持或立一首職若是箇有道德節義之人聞見必欣然稱賀者公論也若舉道行不諦實之人眾人必慽然嗟歎之慽憂也其實無他以至公之論有行與不行故也烏乎以公論推之則可以卜知叢林將來之盛衰矣大抵一切是非真假不可固執有公論在公論在則天下之至正在矣此篇明修身入道以節儉為要也玅喜曰節儉放下乃修身之基入道之要歷觀古人鮮有不節儉放下者年來衲子遊荊楚買毛褥過浙右求紡絲得不愧古人乎世人為貪毒所害累劫縈纏如今欲超凡入聖第一要放得下有節度能簡儉所謂頓捨塵勞便是修身之基入道之要也細看從上古人誰不是能節儉能放下者近年已來衲子遊荊楚者便去買幾件毛褥氈子過浙右者便去買他些紡絲紬物如此行脚豈得不有媿于古人乎此說搜盡時人放不下的弊病讀者當生慚愧此篇教住持當存大體合公論也玅喜曰古德住持不親常住一切悉付知事掌管近代主者自恃才力有餘事無大小皆歸方丈而知事徒有其虗名耳嗟乎苟以一身之資固欲把攬一院之事使小人不蒙蔽紀綱不紊亂而合至公之論不亦難乎與山堂書謂古人立住持原只為主持大法提獎衲子本不教親理常住事件一切所有悉付與知事人掌管此大體也于今作主人者自恃才力有餘凡事不論大小俱皆要歸于方丈掌管而知事者徒有其虗名而已嗟乎苟以一身之資力固欲把持主張一院之事而欲使小人不來蒙蔽法令不致參差又要合于至公之論豈可得乎凡事合公論至要也一涉私足為小家氣象此篇教學道須要及時光陰不可虗棄也玅喜曰陽極則陰生陰極則陽生盛衰相乘乃天地自然之數惟豐亨宜乎日中故曰日中則昃月滿則虧天地盈虧與時消息而況於人乎此節明陰陽迭變之理謂世間循環總不出陰陽之數如純陽既盡則一陰生于其下純陰既極則一陽生于其下有盛有衰兩相乘除乃天地一定自然之數也惟豐亨宜乎日中上震為雷下離為火名雷火豐卦豐者大也以明而動盛大之勢也故其占有亨道焉然盛極將衰又有憂道焉聖人以為徒憂無益但守常不至過盛故彖辭云日中則昃月盈則食天地盈虗與時消息而況人乎況于鬼神乎葢言豐盛難常以常為戒也日中盛極則當昃昧月望盈極則有虧缺天地之盈虧尚隨時消息況人生于天地之間鬼神為天地之氣豐盛之時以此為戒欲人守中不至於過盛也處豐之道豈容易哉陰死為消陽死為息所以古之人當其血氣壯盛之時慮光陰之易往則朝念夕思戒謹彌懼不恣情不逸慾惟道是求遂能全其令聞若夫隳之以逸慾敗之以恣情殆於不可救方頓足扼腕而追之晚矣時乎難得而易失也薌林書此節見古人究心之切所以古人當年少血氣壯盛之時便自痛惜光陰之易去歲月固難留朝也念道夕也思道必謹必戒更加恐懼不敢恣縱于七情不敢放逸于五欲時時惟以守道為心遂能保全生平之美名也若使放縱于五欲其身則隳壞矣恣蕩于七情其心則滅裂矣其危亡必至于不可救之地然後纔頓足扼腕追之晚矣足見時字最為緊要時乎難得而易失也李左軍謂韓信曰夫功難成而易敗時難得而易失謂時乎時乎不再來古云難平者事也易失者時也若非從深定中融會過來畢竟究不到這等細密處慎勿輕易看過此篇教學者名節當立而自思造入也玅喜曰古人先擇道德次推才學而進當時苟非良器置身於人前者見聞多薄之由是衲子自思砥礪名節而立此節以道德才學為本謂古人揀選學者先擇道德須是見地明白德業正當次則方取他才學而進用須當其時倘不是美器將他置于眾人之前見聞者多是輕之薄之也由是衲子自己思量必須琢磨操守名節而成立焉比見叢林凋喪學者不顧道德少節義無廉耻譏淳素為鄙朴獎囂浮為俊敏是故晚輩識見不明涉獵抄寫用資口舌之辯日滋月浸遂成澆漓之風逮語於聖人之道瞢若面牆此殆不可救也與韓子蒼書此節返顯人要實學比見叢林凋喪學者道不實學德不真修少節義無廉耻返去譏誚性淳質素之人為之鄙朴獎美囂頑浮薄者為之俊敏是故晚輩識見不明猶如涉水捕魚獵山取獸的相似東抄寫謀聚些語言文字以為實學用助口舌之辯今日滋培明日浸長久久之間遂成澆漓淺薄之風及至問他聖人之至道口似磉盤眼如瞢瞽四面不通如覩墻壁然如此等人殆乎不可救也論語云子謂伯魚曰汝為周南召南矣乎曰人而不為周南召南猶面墻而立也歟言其一物無所見一步不可行也學者所謂究心也得心而後可以合天下之異以為同融萬類之疎以為親抄寫之學徒喪光陰復何益也此篇警後人各知所守以利人為急也玅喜曰昔晦堂作黃龍題名記曰古之學者居則巖穴食則土木衣則皮艸不係心於聲利不籍名於官府自魏晉齊梁隋唐以來始剏招提聚四方學徒擇賢者規不肖俾智者導愚迷由是賓主立上下分矣此節言當正名分謂昔日晦堂作黃龍題名記曰上古之學道者居則高巖深穴食則土菜木果衣則樹皮草葉不關心於聲利不投名於官府此真天地間閑人也自曹操稱魏時司馬懿稱晉時蕭道成稱齊時蕭衍稱梁時楊堅稱隋時李淵稱唐時諸朝代已來始創建招提聚四海之廣眾選有德者規正夫不肖令智慧者引導乎愚迷由是賓主立上下分矣夫四海之眾聚於一寺當其任者誠亦難能要在總其大捨其小先其急後其緩不為私計專利於人比汲汲為一身之謀者實霄壤矣今黃龍以歷代住持題其名於石使後之來者見而目之曰孰道德孰仁義孰公於眾孰利於身烏乎可不懼乎石刻此節謂當全道德夫四海之多人聚集于一院擔荷此大任者誠非容易所能為要在總其大綱捨其小節先其當急後其可緩更不為私自作計專以利人為要較之於切切為自己一身謀受用者實如天地之隔矣今黃龍以歷代住持題其名勒之于石使後來繼住此者見而目之曰誰是有道德者誰是有仁義者誰能公于眾誰獨利于身烏乎為住持者可不懼乎者箇名字怕殺人難當難當若不慎思力行未免不失身于世津津為人唾棄也此篇謂舉首領須是其人否則無補於法門也張侍郎子韶謂玅喜曰夫禪林首座之職乃選賢之位今諸方不問賢不肖例以此為僥倖之津途亦主法者失也然則像季固難得其人若擇其履行稍優才德稍備識廉耻節義者居之與夫險進之徒亦差勝矣可菴集曰夫叢林中首座之職乃人天眼目實是選賢才之位今諸方竟不管賢不肖一槩以此為僥倖之津路藉此射名網利破壞規模亦皆是主法者之失于用人也雖則末法中本難得好人也須要擇其操履行事稍勝于人才力德業稍備于己要識些廉耻有些節義者居于此位方纔稱職比夫險競進之徒差可以勝些些也近今居此位者尤然可耻法門大體不顧人間利害不知正猶蛇虎睥睨其傍蜋不顧其後也惜哉此篇舉有德人為後學之法式也玅喜謂子韶曰近代主法者無如真如喆善輔𢏺叢林莫若楊岐此節雙標二美謂近代之主持大法者無有如真如喆禪師善輔𢏺叢林者莫有過于楊岐和尚議者謂慈明真率作事忽略殊無避忌楊岐忘身事之惟恐不周惟慮不辦雖衝寒暑未甞急己惰容始自南源終於興化僅三十載總柄綱律盡慈明之世而後已此節明輔弼之實行有議論者謂慈明為人真誠槩率作事忽略無廻避無忌諱楊岐忘其身以奉其事惟恐一事不周全惟慮一法不具辦雖即衝嚴寒冐溽暑未甞有急于愛惜自己生懈惰之容自慈明始受宜春太守黃守旦南源之請次受定林沙門本延道吾之請後遷石霜及福嚴終于興化諸剎且三十載總柄叢林紀綱法律以至盡慈明終世而後方止由此知其補弼之實也如真如者初自束包行脚逮於應世領徒為法忘軀不啻如饑渴者造次㒹沛不遽色無疾言夏不排冬不附火一室翛然凝塵滿案甞曰衲子內無高明遠見外乏嚴師良友尠克有成器者此節明主法之清嚴又如真如者始自出家束包行脚做禪和子時至于出世領眾匡徒弘法忘身不止如饑渴者而求飲食相似造次者急遽苟且之時顛沛者傾覆流離之際當此之時不見有勃然而變其色疾然而出其語夏不排取凉冬不附爐求煖一丈室翛然無物自如唯凝塵滿案而已即此知其奉法之誠也甞曰衲子家自己心內無高明遠見而外又乏嚴師良友罕有能成器者故當時執抝如孚鐵脚倔強如秀圓通諸公皆望風而偃嗟乎二老實千載衲子之龜鑑也可菴記聞此節總結楷模故當時執抝如孚鐵脚孚即長蘆應天永孚禪師嗣泐潭懷澄禪師青原下十四世執抝者謂剛硬孤高不近人情也師行脚時夜至一旅邸有娼女為母逼惑師趺坐達旦女告母母嘆曰真佛子也師性好遊歷故叢林有平生孚鐵脚道價喧宇宙之語倔強如秀圓通倔梗也強孤硬也諸公者指同時出世諸知識見真如與楊岐二師如此認真皆望風而偃偃者仆也倒也孔子曰君子之德風小人之德草草上之風必偃嗟乎以此而知真如之與楊岐二大老實為千載已下衲子之神龜寶鑑也龜知未來之禍福鑑照現在之妍𡟎自古德風拂人快有餘想至千百年猶清涼不已人何其不為也耶此篇言為法者不顧身義有所在也子韶同玅喜萬菴三人詣前堂本首座寮問疾玅喜曰林下人身安然後可以學道萬菴直謂不然必欲學道不當更顧其身玅喜曰爾遮漢又㒹耶子韶雖重玅喜之言而終愛萬菴之語為當記聞謂三人同往前禪堂本首座寮問安本即博山悟本妙喜曰林下人身安然後可以學道萬菴直言不廻互也以謂不然必欲造進此道不當要更顧惜此身忘身乃可以學道也妙喜曰爾者漢又顛耶即今爾我來此原為安慰病者之心又作與麼說話子韶雖重妙喜之言而終愛萬菴之語以為切當當字去聲謂發言之中節也玅喜以情通為言萬菴唯據理而論各有所見慎勿泥矣此篇謂住持得衲子使法道隆而己事盡也子韶問玅喜方今住持何先玅喜曰安著禪和子不過錢穀而已時萬菴在座以謂不然計常住所得善能樽節浮費用之有道錢穀不勝數矣何足為慮然當今住持惟得抱道衲子為先假使住持有智謀能儲十秊之糧座下無抱道衲子先聖所謂坐消信施仰愧龍天何補住持子韶曰首座所言極當玅喜回顧萬菴曰一箇箇都似你萬菴休去已上竝見可菴集子韶問妙喜曰于今叢林住持以何務為先妙喜答曰安著禪和子不過要銀錢米穀而已時萬菴在座以謂不然若論錢穀有好執事計較常住所有或多或少善能撙節撙節者量其所入度其所出無使浪費用之有道則錢穀不勝其多矣何足為慮然當今住持惟得抱守道德之衲子最為先務假使住持人有智能有謀略能儲積十年之糧座下若無得箇抱守道德之人先聖謂之坐消信施仰愧龍天于住持者有何所補子韶美之曰首座所言甚為當理誠不謬為人天眼目妙喜回首顧視萬菴曰人之智識深淺不同一箇箇都像似你萬菴休去默然領之也聖賢應世原為了一大事因緣必以得人為要不得人乃古人之隱憂也此篇謂主法者要自重不可率然而語也萬菴顏和尚曰玅喜先師初住徑山因夜參持論諸方及曹洞宗旨不已次日音首座謂先師曰夫出世利生素非細事必欲扶振宗教當隨時以救弊不必取目前之快和尚前日作禪和子持論諸方猶不可妄況今登寶華王座稱善知識耶先師曰夜來一時之說焉首座曰聖賢之學本於天性豈可率然先師稽首謝之首座猶說之不已江州東林萬菴道顏禪師潼川鮮于氏子嗣大慧禪師曰玅喜先師初住徑山因夜參持論諸方法道有深淺不同及論曹洞所立宗旨說之不已曹洞者即撫州曹山本寂禪師嗣洞山良价禪師初離洞山入曹溪禮祖塔回吉州之吉水眾響師名遂請開法師擬曹溪凡所居處立曹為號洞山之道至師大弘諸方推尊故稱曹洞宗次日音首座乃謂先師曰夫出世本為利益眾生原非細事必要扶持法門大振五宗之教化正好隨時以捄末法之積弊可也不必要趂目前一時快意𫁉性而談和尚昔日做禪子持論諸方猶不可妄恐有失言之過況今日已登寶華王座弘宣大法稱為善知識耶先師曰昨夜偶爾一時之說耳首座曰為聖賢之學本出乎人之天性豈可率然語耶率然者忽略也先師稽首謝之首座猶說之不止首座有直言敢諫之誠和尚有寬宏納諫之量咸可以為人天法式此篇謂德人臨難猶為人慕戀不已也萬菴曰先師竄衡陽賢侍者錄貶詞揭示僧堂前衲子如失父母涕泗愁歎居不遑處音首座詣眾寮白之曰人生禍患不可苟免使玅喜平生如婦人女子陸沉下板緘默不言故無今日之事況先聖所應為者不止於是爾等何苦自傷此節示其素分昔先師因侍郎張九成未第時談及楊文公呂微仲諸儒所造精妙皆由學禪而至於是慕禪學聞寶印楚明禪師道風敬往參請明舉栢樹子話令時時提撕一日聞蛙鳴釋然契入有偈曰春天月下一聲蛙撞破乾坤共一家正恁麼時誰會得嶺頭脚痛有玄沙宋高宗紹興七年七月十一日詔玅喜住徑山能仁寺至紹興十一年張九成與諸大夫輩往謁評議格物話玅喜曰公祗知有格物不知有物格諸公茫然妙喜大笑公曰師能開諭乎喜曰不見小說載唐人有安祿山叛者其人先為閬州守有畵像在焉時唐明皇幸蜀見之怒令使臣以劍擊之像首落時其人隱居陝首忽然墮地公聞頓領深旨呈偈題于軒壁曰子韶格物妙喜物格欲識一貫兩箇五百妙喜重其悟入時為上堂引神臂弓一發透過千層甲老僧拈來看直甚臭皮襪之句是時軍國邊事方議神臂弓之用右相秦檜以為譏議朝政五月民佛日竄衡陽貶九成為南康軍妙喜自紹興七年住徑山至十一年五月內貶衡州府衡陽縣也了賢侍者嗣大慧禪師錄貶詞揭示僧堂前揭示者高舉張示也衲子見之如失父母涕泗愁歎居處不安音首座往眾人寮中白之曰人生于天地間禍與患難原不可苟免設使妙喜平生如婦人女子但有閨門之志而無境外之心者又或如陸行水宿居于下位者緘封其口默然無語者故無今日之事況先聖如獅子尊者罹難二祖鄴都償債皆所當為以示現于人者又豈止如此耶爾等何苦自傷自痛昔慈明瑯琊谷泉大愚結伴參汾陽適當西北用兵遂易衣混火隊中往今經山衡陽相去不遠道路絕間關山川無險阻要見玅喜復何難乎由是一眾寂然翌日相繼而去廬山智林集此節明欲見不難昔慈明瑯琊南嶽芭蕉葊大道谷泉禪師泉州人嗣汾陽昭禪師南嶽下十世瑞州大愚山守芝禪師亦嗣汾陽結伴參汾陽即汾州太子院善昭禪師大原俞氏子嗣首山念禪師南嶽下九世適當西北用兵時澤州潞安一帶屯兵無敢往者慈公六人不顧危阻渡榮澤河登太行山易衣混兵隊中露眠艸宿不辭勞苦而往參汾陽今徑山與衡陽相去不甚遠道路中本絕間關且無妨礙山川又無險阻一直可往要復相見于妙喜有何難乎由是大眾寂然明日相繼而去莊子曰豚子之不飼于死母非愛其形愛其使形者衲子之奔趨于衡陽德所致也此篇謂評議人品須異跡原心不可以偶然貶抑論也萬菴曰先師移梅陽衲子間有竊議者音首座曰大凡評論於人當於有過中求無過詎可於無過中求有過夫不察其心而疑其跡誠何以慰叢林公論玅喜既貶衡陽因集正法眼藏三帙被人重譖復貶廣東潮州府梅陽縣未幾詔復形服時四方虗席以邀不就紹興二十年十一月詔住明州阿育王寺二十八年詔再住徑山孝宗隆興元年八月初一日示寂宋時自秦檜專國士大夫名望者悉屏之遠方齷齪委靡不振之徒一言契合即登正府仍止除一廳謂之伴拜稍出一言斥而去之不異奴隷也此節言評人不可妄議衲子間有竊議者音首座曰大凡評論于人當于有過失之中求他一段無過失之理使人所有之過亦可改革豈可于無過失中返去求其有過此非理也夫不察妙喜集書之心而但疑再貶之跡誠何以安慰叢林之公論且玅喜道德才器出於天性立身行事惟義是從其量度固過於人今造物抑之必有道矣安得不知其為法門異時之福耶聞者自此不復議論矣智林集此節明遇難必有道理且妙喜道德才器出于天性立身與行事惟義是從其豁達量度本過于人今天道故抑遏之似必別有道理也安知此事不為法門他日之福耶聞者自此之後更不復議論矣于有過中求人無過惟常不輕是其人微是皆不可語于此者也此篇教主者當以公正接人母涉于私也音首座謂萬菴曰夫稱善知識當洗濯其心以至公至正接納四來其間有抱道德仁義者雖有讐隙必須進之其或姦邪險薄者雖有私恩必須遠之使來者各知所守一心同德而叢林安矣與妙喜書謂稱善知識弘宣大法先當洗滌自己之心勿使有一毫染污習氣存于胸中然後以至公之法至正之道接納于四來之學者其中若有抱守道德仁義者雖與他有些讐隙必須要推舉而進用之其或所懷的是姦邪險薄者雖與我有些私恩必須要屏去而疎遠之如是使四方來者各知其己之所守有德無德而後從焉其間雖千人萬人亦皆同一心而修德行則叢林自然安泰矣剖斗折衡只為自平至公至正復何言哉此篇教住持當正己利人存誠厚德也又曰凡住持者孰不欲建立叢林而鮮能克振者以其忘道德廢仁義捨法度任私情而致然也誠念法門凋喪當正己以下人選賢以佐佑推獎宿德疎遠小人節儉修於身德惠及於人然後所用執侍之人稍近老成者存之便者疎之貴無醜惡之謗偏黨之亂也如此則馬祖百丈可侔臨濟德山可逮智林集謂既作住持為主法之人誰不欲建立叢林光大門閭然而竟少能有克振其家聲者無別以其人道未實悟德不真修加之廢失仁義捨擲法度又兼私情而不改致使其家聲不振也果實有念法道凋零門庭冷落自當先正其心以謙下于人稠人眾中選擇賢良端正之士以為輔弼而佐佑之必須要推獎耆舊有德之者疎遠小人無知之輩更加以節儉修吾身以德惠施于人然後身傍所用執侍左右者要稍近于老成者存之便者疎之何故貴在無醜惡之讒謗而免使偏邪黨類為之攪亂也若能如此即使馬祖與百丈之道望可與之相齊而臨濟德山之家聲亦可與之相及也鎮州臨濟院義玄禪師曹州南華刑氏子嗣黃檗希運禪師南嶽下四世鼎州德山宣鑑禪師簡州問氏子嗣龍潭崇信禪師青原下四世理叢林者守道藏德乃公天下之大宗大本也又能選賢遠修身惠物自然群英畢集何患乎道之不行也此篇教人知憂勞是良藥禍患不可逃也音首座曰古之聖人以無災為懼乃曰天豈棄不穀乎范文子曰惟聖人能內外無患自非聖人外寧必內憂古今賢達知其不能免甞謹其始為之自防是故人生稍有憂勞未必不為終身之福葢禍患謗辱雖堯舜不可逃況其他乎與妙喜書古之至人每每見無災無患即生恐懼乃自愧曰天道無私豈獨棄我之不穀乎穀善也不穀者不善人也又罪也謂我有罪天似棄而不憐我也范文正公有言惟聖人能于內外俱無所患自非聖人外身雖安而內心必憂古今賢人達士自知憂患不能免故嘗嘗以戒忍二度為墻籬以禪定智慧為鎧杖而自防也故人生于世稍有憂勞有患難未必不為終身之福葢人身之禍患世之謗辱雖堯舜至聖亦有不仁之謗不孝之辱尚不可逃況今人為凡品乎要知多勞多苦即是削欲除邪之鏌鎁誠不可得勞苦中有無限受用宜深體究此篇謂住持要行解相應勿苟名利也萬菴顏和尚曰此見叢林絕無老成之士所至三百五百一人為主多人為伴據法王位拈槌豎拂互相欺誑縱有談說不涉典章宜其無老成人也此節返顯叢林須仗老成之士謂比來所見叢林之中竟沒有幾多老練成實之人所至之處或三百或五百共居一院以一人為主多人即其伴侶也為主者自無正見登據法王座上胡言亂語上首白椎長老豎拂大家打哄互相欺誑縱有些言談說話都是杜撰竟不涉于典章此皆由其無老成人隨情稱意而亂為之也夫出世利生代佛揚化非明心達本行解相應詎敢為之譬如有人妄號帝王自取誅滅況復法王如何妄竊烏乎去聖逾遠水潦鶴之屬又復縱橫使先聖化門日就淪溺吾欲無言可乎此節正明持法必欲行解相應夫出世利濟眾生本是代替如來宣揚法化的事若非明了自心洞徹根源行與解其互相應者豈敢妄自而為之耶楞嚴云譬如有人妄號帝王自取誅戮況復出世的法王如不見到佛祖地位無真實道德敢虗妄而竊取乎嗚呼去佛世愈遠矣而一種水潦鶴之屬到處稱揚稱鄭縱橫於世昔阿難至竹林中聞有比丘誦偈曰若人生百歲不見水潦鶴不如生一日而得覩見之阿難聞已慘然歎曰世間眼滅何期速乎煩惱諸惡如何便起違返聖教自生妄滅無有慧明常處癡暗永當流轉生死便語比丘此非佛語不可修行汝今當知二人謗佛一雖多聞而生邪見二解深義顛倒妄說有此二法為自毀傷不能令人離三惡道汝今當聽我演佛偈若人生百歲不解生滅法不如生一日而得解了知爾時比丘即語其師師曰阿難老朽言多錯謬不可信也汝還如前誦阿難後聞比丘復誦前偈問其故比丘具呈師言阿難思惟彼輕我言或受餘教即入三昧推求勝德不見有能回挽彼意作是念言異哉異哉不復正也當墮三途文出阿育王傳仗先聖教化之門庭日愈下矣沉淪而沒溺也我豈得不言可乎屬菴居無事條陳傷風敗教為害甚者一二流布叢林俾後生晚進知前輩兢兢業業以荷負大法為心如冰凌上行劍刃上走非苟名利也知我罪我吾無辭焉智林集此節囑令荷負大法屬者值遇也正值菴居無事條陳者謂布列條章陳設法度以救末法之弊故我條陳者近今叢林中有許多傷風化敗教門為害至甚者略陳數件以流布于叢林使後生晚進得知前輩主持者兢兢然如履薄氷而懼陷業業然如蹈劍刃而恐傷惟以荷負大法為心非苟且圖其虗名貪其財利也知我者以吾言為是罪我者以語言為非是非之責吾豈敢辭焉知我罪我者孔子作春秋以寓王法其大要皆天子之事知孔子者謂此書之作遏人欲于橫流存天理於既滅為後世慮至深遠也罪孔子者以謂無其位而托二百四十二年南面之權使亂臣賊子禁其欲而不敢肆則慽矣要知古人一片血心總只教人做出世丈夫莫自陷其身豈有他哉此篇言法久成弊慎勿以生滅為心也萬菴曰古人上堂先提大法綱要審問大眾學者出來請益遂形問答此節明理所當然謂古人所以上堂者原為要與學人抽釘拔楔先舉大法綱領要旨審問大眾看眾中有會其意者否學者因不會其意故出眾請求利益遂形之而有問答此自然之理也今人杜撰四句落韻詩喚作釣話一人突出眾前高吟古詩一聯喚作罵陣俗惡俗惡可悲可痛前輩念生死事大對眾決疑既以發明未起生滅心也此節明非理妄作今人不然長老先自杜撰四句落韻譜的詩喚作釣他學者杜撰者杜塞也撰造也述也言不通古法而自造也如杜光庭道士假竊佛經而作道經也忽有一人突然而出眾人之前高聲吟他古詩兩句喚作相罵的陣勢以為法戰有是理乎俗惡之極可悲可痛者總歎法道凋零也竟不知前輩自己痛念生死不明乃最大之事凡所到處放下腰包便來扣請師家或上堂小參他即對大眾前決擇深疑既得發明己躬大事何曾有一毫生滅之心人我之見耶此章說出古今為法者如明鏡在架令人無處逃遁學者可不慎歟此篇教主法者須知賓主之儀不可忽也萬菴曰夫名行尊宿至院主人陞座當謙恭敘謝屈尊就卑增重之語下座同首座大眾請陞於座庶聞法要此節先教如理謂凡有德行名望的尊宿知識至院主人先須為他陞座說法謂之引座必要謙和恭順敘謝他降重之意或班序大小當屈尊就卑說話益加用厚重之語說法訖下座同首座與大眾請尊宿知識陞座庶者冀也有望聞于法要此正理也多見近時相尚舉古人公案令對眾批判喚作驗他切莫萌此心先聖為法忘情同建法化互相詶唱令法久住肻容心生滅興此惡念耶禮以謙為主宜深思之此節明不如理每見近時沿習相尚者舉則古人公案令他尊宿來對眾批評判斷勘驗他識見何如有此禮耶後之為主人者切忌莫萌此勝負之心有傷風化先聖為法念切彼此忘情本要同建法幢興隆教化而必要互相詶唱令佛法久住世間豈肻容心起生滅而興此惡念耶況賓主之禮原以謙下為主此一節事當深思之知識本欲與人解黏去縛而返以法作弊吾不知其是何心行也此篇教接納外護須存大體勿節外生枝也萬菴曰比見士大夫監司郡守入山有處次日令侍者取覆長老今日特為某官陞座此一節猶宜三思此節明待外護之大體謂比來見士君子與諸大夫及地方所監司之官或是本郡太守因其事或有處分來入山中知事頭首次日報侍者取覆長老取覆者反白也謂取士名通報長老也今日特為某官長陞座此一節事不可亂做猶宜三思而行也然古來方冊中雖載皆是士大夫訪尋知識而來住持人因參次略提外護教門光輝泉石之意既是家裏人說家裏兩三句淡話令彼生敬如郭功輔楊次公訪白雲蘇東坡黃太史見佛印便是樣子也豈是特地妄為取笑識者此節謂士大夫來訪尋然古來語錄中雖載有為官長上堂的事要知皆是他士大夫慕道而來訪尋知識開發指示住持因他來求參語畢次後略提外護教門光輝泉石之意他若是佛法中人便向他說佛法中幾句無義味話使彼增長敬信如郭功輔楊次公訪白雲于舒州之海會功輔事蹟見前楊次公官至禮部夜思無托遂樂佛教歷參十二員知識未契其旨後聞白雲道風大振往見之值白雲為眾入室夜至三更公求見雲弗之公于外效鷄鳴雲曰不知時節之物惑亂諸方即得令侍者擒來殺之者扭入方丈公鳴不止雲作犬聲公乃休遂引頸于師前雲執公鬚曰長毛似尾公曰棄取毛尾時如何雲曰看鷄公鳴一聲雲搊住托開曰鷄在籠裏討甚麼碗遂閉却門復召曰次公公應諾雲曰出籠也未公無語侍者云相公且歇來日再見和尚公休去東坡詣金山值佛印與學徒入室次印曰此間無坐榻坡曰暫借佛印四大為坐榻印曰山僧有一問居士道得即請坐道不得即輸腰間玉帶子坡欣然曰便請印曰適來道暫借山僧四大為坐榻祇如山僧四大本空五陰非有你向甚麼處坐坡不能答印召侍者收取玉帶永鎮山門印却贈以衲衣坡述偈曰病骨難堪玉帶圍鈍根仍落箭鋒機欲教乞食歌姬院故與雲山舊衲衣黃太史見佛印在禪牀上坐問雙林滅後誰為佛海印發光印是誰印曰江南東瓜江北種江北西瓜江北栽史無語一夜不安次日飯間印云天地玄黃未見黃輸盤造閭未見堅如何是黃庭堅史起身拱立印曰我不問者黃庭堅史曰豈有兩箇印曰瞎云云如上諸公皆是自己為道訪求而來是家裏人說家裏話便是樣子也豈是無知輩特地者無故也又不請你又不問你無故要上堂虗妄作為得不取笑于識者而今不止與他上堂還去多方攀仰惟恐不至俾萬菴聞之又不知作何說也此篇教主者勿以法抑人須存古規也萬菴曰古人入室先令挂牌各人為生死事大踊躍來求决擇多見近時無問老病盡令來納降欵有麝自然香安用公界驅之因此妄生節目賓主不安主法者當思之謂古來主法者煅煉學人要人入室先令侍者挂牌曉諭大眾學人各以生死事大他自然踊躍歡喜來求知識决擇疑滯此正理也多見近時叢林不管老者病者都要他來納箇降欵降疑者輸誠盡敬之貌設有不到者便謂不依規矩輕視方丈此何故也你果是個通天徹地的知識所謂有麝自然香何必要公然立其界限以制之強驅其來也因此謂之妄生枝節妄假條目以致賓主不安矣主法之人宜深思之敬生于誠誠仰其德我果備德鬼神將來室何況人乎此篇謂道源以法古尊先無所分別也萬菴曰少林初祖衣法雙傳六世衣止不傳取行解相應世其家業祖道愈光子孫益繁大鑑之後石頭馬祖皆嫡孫應般若多羅懸讖要假兒孫脚下行是也二大士玄言妙語流布寰區潛符密證者比比有之此節明法源有自謂自有佛祖已來傳宣此道至我震旦中以少林達摩大師為始祖傳衣授法二者雙行至六祖始謂衣乃爭端不復傳矣但取行與解相應行說俱到者世其家業世者代代相承也由是祖道愈見其光大子孫益見其繁茂大鑒六祖之後石頭希遷禪師馬祖道一禪師皆面稟親承于青原南嶽是六祖之嫡孫正當般若多羅懸遠之符讖謂要假兒孫脚下行是也達摩大師得法後問般若多羅云當往何國而作佛事祖曰汝雖得法未可遠往且止南天待吾滅後六十七歲當往震旦施大法藥直接上根慎勿遠行衰於日下又問彼有大士堪為法器否千載之下有留難否祖曰汝之所化獲菩提者不可勝數吾滅度後六十七載彼國有難水中文布善自降之汝至時勿住彼國唯好有為功德不見佛理聽吾偈曰路行跨水復逢羊路行跨水者謂遇梁武名衍復逢羊者魏武帝是羗人獨自凄凄暗渡江謂摘蘆的事日下可憐雙象馬日下即洛陽可憐雙象馬謂梁武魏武二株嫩桂久昌昌即臨濟曹洞二宗又云一百五十年有小難聽吾偈曰心中有吉外頭㐫心中有吉是周字外頭㐫謂周武滅僧川下僧房名不中川下即太湖縣僧房名不中即司空山若遇毒龍生武子若遇毒龍明帝是武王之父生武子即武帝忽逢小鼠寂無窮忽逢小鼠謂子年生宣帝大興佛法寂無窮者周為楊堅滅稱隋又曰却後林下見一人當得道果聽吾偈曰震旦雖濶無別路謂馬祖道一也要假兒孫脚下行即石頭也金雞解銜一粒粟謂南嶽讓乃金雞縣人供養十方羅漢僧謂馬祖是四川什邡縣羅漢寺僧祖嗣南嶽之法故爾謂般若多羅懸讖石頭馬祖為曹洞臨濟之宗祖也二大士玄奧之言精玅之語已流通于寰區之中矣潛符者謂暗合默契于無言之表者也密證者明教曰密非不言而暗證也真密也謂外傳信衣內授密證乃吾佛祖真實秋密之法也每每有之者言符證之人恒有也師法既眾學無專門曹溪源流派別為五方圓任器水體是同各擅佳聲力行己任等閒垂一言出一令網羅學者叢林鼎沸非苟然也由是互相詶唱顯微闡幽或抑或揚佐佑法化語言無味如煑木札羮炊鐵釘與後輩齩嚼目為拈古其頌始自汾陽暨雪竇宏其音顯其旨汪洋乎不可涯此節明派別分流師家之法既眾使學者所習無一定之法門故令曹溪源流一派而分之為五矣宗雖分為五家法則不異也如器有方圓水體無二然而五家各各專敷教化之門而各有佳聲又各各致力以行己任等閒之間或出一言或行一令網羅者收拾籠絡之意網羅四方學者叢林興盛如鼎之沸然豈徒然哉由是五家互相詶唱顯其微妙闡其幽深或抑而奪之或揚而縱之無非是彼此佐佑以助成其法門教化而已凡所發之言皆是無義味語如煑木札為羮如炊鐵釘作與後人齩嚼名之為拈古以拈提古人之公案也其所謂頌古者始自汾陽善昭禪師及明州雪竇重顯禪師遂州李氏子嗣智門光祚禪師青原下九世自此二老大弘其音著顯其旨而所以發揮其意者汪洋浩瀚如大海之不可涯際亦皆出乎二老之宏才博學也後之作者馳騁雪竇而為之不顧道德之奚若務以文彩煥爛相鮮為美使後生晚進不克見古人渾淳大全之旨此節明變故失宗後來欲倣效其法強為頌古者馳騁雪竇而作之馳騁者如二馬之並驅也竟不顧自己見解為何如專以華美之言新鮮之句為奇特而不知聖人之本旨失矣致使後生晚進不克見古人渾融淳厚大全之意旨烏呼予遊叢林及見前輩非古人語錄不看非百丈號令不行豈特好古葢今之人不足法也望通人達士知我於言外可矣此節教以古為法烏呼予曾行脚遊歷各處叢林及見他前輩尊宿非古人語錄必不肯看非百丈號令必不肯行豈是特為好古葢近時人不足以為法則也如我作此說話惟望通人達士知我之意于言語之外斯可矣也道味本是醍醐三變即成水矣昧本求華渾淳大全之旨夫復何得此篇教學者要豁達通情莫以偏見自蔽也萬菴曰比見衲子好執偏見不通物情輕信難迴愛人己順之則美逆之則疎縱有一知半解返被此等惡習所蔽至白首而無成者多矣已上並見智林集謂比來每見衲子好固執一己之偏見竟不通曉眾人之情纔有一言入耳不察其是非便自輕信一信決定難以挽迴加之又喜人奉承于己順則歡悅而美近之逆則惱恨而疎遠之這般學者縱有一知半解返被此等惡見習氣所蔽到老不得成器者多矣良醫用藥不在海方隨拈一味可以醒狂迷矣受用得者一篇百事可成此篇摧邪顯正要人持誠存信也萬菴曰叢林所至邪說熾然乃云戒律不必持定慧不必習道德不必修嗜慾不必去又引維摩圓覺為證贊貪瞋癡殺盜淫為梵行烏呼斯言豈特起叢林今日之害真法門萬世之害也此節謂邪說無知為害不細謂如今叢林中正法無人舉揚而凡所到處多種邪謬之說如火之熾然而不息也乃曰戒律極為繁雜拘束其身不必持也定慧是小果禪止息其心不必習也道德乃本有之故物何必要修嗜慾乃人之常情何必要除恐人不信以為魔言又引維摩經居士說大乘菩薩入諸婬舍示欲之過雖有妻子常修梵行等語又圓覺了義說一切障礙即究竟覺乃至諸戒定慧及婬怒癡俱為梵行假此等說話以為證據竟不知彼大權聖人示迹利生為同事攝經意何等明白而外道邪人返以此誑人濫膺恭敬烏乎者般說話豈獨引發叢林今日目前之害實實為法門千萬世之害也且博地凡夫貪瞋愛慾人我無明念念攀緣如一鼎之沸何由清冷先聖必思大有於此者遂設戒定慧三學以制之庶可迴也今後生晚進戒律不持定慧不習道德不修專以博學強辯搖動流俗牽之莫返予固所謂斯言乃萬世之害也此節言凡夫惑重須假法化博地即大地也貪者引取無厭又愛欲也由愛心計著而發瞋者忿怒之盛又剛烈也由心氣相作而發然心屬火氣屬金心火轉熾氣金轉剛故也癡者述惑無知又愚昧也由輕慢恃己而發且世人之貪瞋愛慾人我無明念念不息猶如一鼎沸湯相似何由而得清冷先聖思念眾生三毒利害最難制伏必須用箇大有制伏之方然後可除故特為凡夫興大慈悲作大利益遂設戒定慧三學以制之防非止惡曰戒止息諸緣曰定破惑證真曰慧此三者乃入道之門也有此三法則三毒庶幾可挽迴矣今後生𣆶進戒律不持定慧不習道德不修專以博學強辯惑弄無智之人搖動流俗之輩一往揑怪牽去不自返我固所謂斯言乃萬世之害也惟正因行脚高士當以生死一著辯明持誠存信不為此輩牽引乃曰此言不可信猶鴆毒之糞虵飲之水聞見猶不可況食之乎其殺人無疑也識者自然遠之矣與草堂書此節明智者知非自然遠之惟有因心端正之人本分行脚具高舉遠見之志單單以生死一著子必欲辯明持其誠心守其正信自能不為此輩業人牽引乃曰此等妄談最不可信猶鴆毒鳥之糞如惡蛇飲之水聞見尚乎不可況欲食之乎若使一滴沾著其殺人無疑矣惟有智識之君子自能遠之真風既墜大偽斯彰誰不疾首痛心焉萬菴和尚如此激濁揚清乃萬世之箴規也此篇見主人嚴潔有禮所以上行下效也萬菴曰艸堂弟子唯山堂有古人之風住黃龍日知事公幹必具威儀詣方丈受曲折然後備茶湯禮始終不易有智恩上座為母修冥福透下金二錢兩日不尋聖僧才侍者因掃地而得之挂拾遺牌一眾方知葢主法者清淨所以上行下效也謂草堂弟子惟獨山堂有古人之風化何以見知住黃龍日凡知事者或常住有公幹必先具威儀往方丈受分付然後始備茶湯之禮以酬復之始終不易眾中有智恩上座為母修冥福以追悼慈恩移下金二錢兩日竟不知尋有聖僧才侍者因掃地得之將金挂于拾遺牌上大眾見而皆知法令有在也此葢知主法者清淨所以上既行而下必效也鋤金不顧拾金不取非難也而所難者在不欺騙人耳此篇見古人提持有道使人各知所守也萬菴節儉以小參普說當供衲子間有竊議者萬菴聞之曰胡饗膏粱暮厭麤糲人之常情汝等既念生死事大而相求於寂寞之濵當思道業未辦去聖時遙詎可朝夕事貪饕耶真牧集萬菴節儉有以小參普說當供此真供養以其持法真認道實乃能如是衲子中間亦有私自議論者萬菴聞之曰大凡世人朝餐膏粱美味暮來便厭粗食此常情也汝等既然痛念生死莫大之事而來相求我于此寂寞山水之間則不可負汝之來意宜當以法為食資汝慧命也汝等亦當思念道業未辦去聖時遙努力真修方是丈夫志節豈可朝夕貪饕希圖口腹為事耶貪財為饕貪食為餮普賢菩薩凡設供養種種如須彌山尚謂諸供養中法供養最而今返欲竊議者真饕餮之徒此篇見機思至妙曉人如目覩也萬菴天性仁厚處躬廉約尋常出示語句辭簡而義精博學強記窮詰道理不為苟止而妄隨與人評論古今若身履其間聽者曉然如目睹衲子甞曰終歲參學不若一日聽師談論為得也記聞萬菴和尚所稟之天性有仁慈又忠厚處己最為廉約尋常出言開示于人言辭雖簡而義理至精學最廣記猶強善能窮究詳詰其中旨趣于理于事決不苟且而止息又不虗妄而隨人言說凡與人評論古今事理說得最清白猶如自己親到其間使聽者了然如目所見衲子甞曰我輩終歲參學不如一日聽師談論深有所得也自家既到七通八達之地凡所發言自然如天繒妙綵見之必定𭥹目此篇教人直心直行勿趨勢利也萬菴謂辯首座曰圓悟師翁有言今時禪和子少節義勿廉耻士大夫多薄之爾異時儻不免做遮般蟲豸常常在繩墨上行勿趨勢利人顏色生死禍患一切任之即是不出魔界而入佛界也法語辯首座即成都府昭覺寺大辯禪師嗣大溈法泰禪師南嶽下十六世謂我圓悟師翁有言今時禪和子既少節義又勿廉耻所以士大夫多有輕薄之者自所致也汝輩他年後日儻或不免也要去做遮般手脚有足曰蟲無足曰豸要須常常在規矩正路上行甚不可趨求勢利作媚人之顏色至于生死禍患之際一切任之而無所却若能如是即是不出魔界而入佛界也有如是主宰也須是其人始得不然依舊隨他去也此篇見道人不貴裝點惟在自適也辯首座出世住廬山棲賢常擕一笻穿雙屨過九江東林混融老見之呵曰師者人之模範也舉止如此得不自輕主禮甚滅裂辯笑曰人生以適意為樂吾何咎焉援毫書偈而去偈曰勿謂棲賢窮身窮道不窮艸鞵獰似虎拄杖活如龍渴飲曹溪水饑吞栗棘蓬銅頭鐵額漢盡在我山中混融覧之有媿月窟集辯首座出世住廬山棲賢之時凡出山但擕竹杖著艸鞋過九江轉至東林混融長老即普融知藏福州人得法于五祖演禪師南嶽下十四世在五祖典藏主凡人至則以閩語誦俚言人謂之混融一日見辯即呵之曰師者人之模範也一舉一止皆宜與人取法你者等行徑豈不自輕況且為主人之禮大煞無體裁之甚辯笑曰人生以稱適其性即為樂也吾但率吾性而動止也何過咎焉乃援筆書偈而歸偈曰勿謂棲賢窮者箇窮境界誰能及得身窮道不窮取之不竭用之不盡草鞋獰似虎踏殺天下人拄杖活如龍極能興波作浪渴飲曹溪水一口吸盡饑吞栗棘蓬碎嚼無餘楊岐示眾云透得金剛圈吞得栗棘蓬便與三世諸佛把手共行歷代祖師同一鼻孔其或未然參須真參悟須實悟銅頭銕額漢車載斗量盡在我山中游泳自在混融老一見此偈甚有媿焉威鳳俊鶻終非籬邊野所能企及此篇教衲子宜修實行勿恃浮華也辯公謂混融曰像龍不足致雨畵餅安可充饑衲子內無實德外恃華巧猶如敗漏之船盛塗丹雘使偶人駕之安於陸地則信然可觀矣一旦涉江湖犯風濤得不危乎月窟集謂如世人所作相似之龍像者似也豈能興雲布雨又如所畵之餅豈可飽腹充膓此由其不真也師以之喻禪者家論其道德內實無有而外面徒然恃著些華言巧語以哄弄于人此等人大似朽敗之船甚塗五彩裝點得極齊整又使箇土木做的偶人駕之安于陸地之上人見之誰不信以為美觀若使一旦泛之于江湖一觸著于風濤只好隨之而沒安得不危乎者等錦心繡口一似楊花柳絮輕輕一點使人痛入骨髓不真不實者未審作何去就此篇謂主者作事當盡其誠勿擇利害也辯公曰所謂長老者代佛揚化要在潔己臨眾行事當盡其誡豈可擇利害自分其心在我為之固當如是若其成與不成雖先聖不能必吾何苟乎月窟集謂做長老者本是替佛祖宣揚法化貴乎潔己身心臨于大眾凡所有之事當質直無偽盡己之至誠不可揀擇其利害以分其心此事在我以至誠之心行之理應如此若論事之成與不成一有定數雖在古聖先賢尚不能必使之而成吾何能苟且而強成乎一尺水一丈波令人下脚不得若說是容易話却行不去真箇措置人于不可奈何之地此篇要人尚清廉而勿為虗飾也辯公曰佛智住禪衲子務要整齊惟水葊賦性冲澹奉身至薄昂昂然在稠人中曾不屑慮佛智因見之呵曰奈何䖃苴如此水菴對曰某非不好受用直以貧無可為之具若使有錢亦欲做一兩件皮毛同入社火既貧固無如之何佛智笑之意其不可強遂休去月窟集慶元府育王寺佛智禪師吳楚王之裔也嗣圓悟勤禪師臨安府淨慈水菴端一禪師婺州馬氏子嗣佛智禪師南嶽下十六世謂佛智和尚住西禪時相隨衲子俱要威儀端肅衣帽整齊惟獨水菴一人所賦之性本冲虗而澹泊奉身至薄其志氣昂昂然在稠人眾中不自輕屑亦無憂慮昂昂者高舉自如之貌佛智見而呵之曰奈何䖃苴如此䖃苴者中州人謂蜀人不遵軌轍也水菴對曰端一非不好受用直云總是箇貧字無可以為之得具齊也此一貧字大有主宰若使我有錢也好去做一兩件皮毛同入社火也好隨羣逐隊既貧固無可奈之何也佛智聞而笑之意知此人不在外貌上著脚不強使為之也遂乃休去衲僧家宜其念念在道如救頭然豈有閑工夫去裝點者速朽之具此篇言制妄想須覺照之力也佛智和尚曰駿馬之奔逸而不敢肆足者銜轡之禦也小人之強橫不敢縱情者刑法之制也意識之流浪不敢攀緣者覺照之力也烏乎學者無覺照猶駿馬無銜轡小人無刑法將何以絕貪慾治妄想乎與鄭居士法語先用喻明謂駿馬之性追風可及而不敢肆足奔逸者由有銜勒韁轡以禦之也小人最剛強橫暴而不敢恣縱情欲者由國法典刑以制之也人之意識如暴流猛浪而竟不敢攀引妄緣者由覺照之力也烏乎學者時中若無覺照實如駿馬無銜轡如小人無刑法復將何以絕諸貪慾而治諸妄想乎事理雙彰無不入妙但時中有幾人能覺照者欲得不負古人完全自己何異星中揀月此篇言住持之本末惟道德仁義推而廣之以完佛祖之道也佛智謂水菴曰住持之體有四焉一道德二言行三仁義四禮法道德言行乃教之本也仁義禮法乃教之末也無本不能立無末不能成此節先舉四法為要謂作住持之大體有四法焉一道德二言行三仁義四禮法道德與言行乃教化之根本也仁義禮法乃教化之枝末也無根本何以立乎身無枝末烏能成其事先聖見學者不能自治故建叢林以安之立住持以統之然則叢林之尊非為住持四事豐美非為學者皆以佛祖之道故此節正明建立之故先聖見學者無識力不能自治故建立叢林使身有所歸又立一有道德節義者為住持而統理之使學者性有所狥然則叢林眾中之所尊非尊為住持之人要飲食衣服臥具醫藥四事俱豐美者非獨為學者作受用也總皆為欲人行持佛祖之道故尊之備之也是以善為住持者必先尊道德守言行能為學者必先存仁義遵禮法故住持非學者不立學者非住持不成住持與學者猶身之與臂頭之與足大小適稱而不悖乃相須而行也故曰學者保於叢林叢林保於道德住持人無道德則叢林將見其廢矣實錄此節方乃勸修道德是以善能為住持者必先要尊崇道德謹守言行善能為學者的必先要懷存仁義遵依禮法故住持人若無學者佐佑如孤掌難鳴豈獨能竪立耶學者若非住持教化如根苗不雨豈自能成就耶住持之與學者相須而不離須者資用也如人身之有臂頭之有足大小相適相稱而不逆乃相資用而行也故曰學者所保守者叢林而叢林所保守者道德住持人若不敬存道德謹守言行叢林將來必見其廢矣如嫋如縷綿綿不絕只要持循道德秉權據令者寧不愓然于衷乎此篇言生死乃人之大患當預為處置可也水菴一和尚曰易言君子思患而預防之是故古之人思生死大患防之以道遂能經大傳遠此節言古人念念思道謂易經水火既濟卦云成德君子心中時時慮患而預先防之是故古之人思念生死乃吾人之大患故將聖人指迷之大道念念于心為之隄防故所經濟必大所傳持必遠今之人謂求道迂濶不若求利之切當由是競習浮華計較毫末希目前之事懷苟且之計所以莫肯為周歲之規者況生死之慮乎所以學者日鄙叢林日廢紀綱日墜以至陵夷㒹沛殆不可救嗟乎不可鑑哉此節言今人時時競利今之人則不然謂求道甚迂遠極曠濶難以應目前衣食之急到不如求其財利尤為切當由是奔競成習侈其浮費用之奢華計較于毫釐細末只圖眼前之事而不存大計第懷苟求利養之心得一日便過一日欲求箇終歲之恒規尚未有也況有究生念死之慮乎所以學者見識日愈鄙陋叢林禮法日益凋殘紀綱號令日至隳墜陵夷者夷平也言法道之將頹如丘陵之漸平也顛沛流離殆不可救嗟乎有志之士可不一鑑照之哉古云修德者矜細行圖治者憂未然況生死之至重至切者也人不重其所當重而返重其所不當重者迷中之倍人也此篇謂學道心要極正勿涉于偏邪也水菴曰昔遊雲居見高菴夜參謂至道徑挺不近人情要須誠心正意勿事矯飾偏邪矯飾則近詐偏邪則不中正與至道皆不合矣竊思其言近理乃刻意踐之逮見佛智先師始浩然大徹方得不負平生行脚之志與月堂書言吾昔行脚到雲居時見高菴和尚夜參云至道徑直而挺特勢不近于人情學者要誠心正意以學此道勿事矯妄粉飾偏僻私邪矯飾與詐相近偏邪乃不中正此皆是人情與至道相返則不合矣我聞此言竊思之甚是有理乃銘刻于意而履踐之及至後來見佛智先師始得于一言之下浩然大徹皆本于此也由是方得不負平生行脚之志要知刻意踐之正是得大徹大悟的根本多少人聞過去便置在無事甲裏如何得徹透此篇戒人勿事貪求恐滋咎累也水菴曰月堂住持所至以行道為己任不發化主不事登謁每歲食指隨常住所得用之衲子有志充化導者多却之或曰佛戒比丘持鉢以資身命師何拒之弗容月堂曰我佛在日則可恐今日為之必有好利者而至於自鬻矣因思月堂防微杜漸深切著明稱實之言今猶在耳以今日觀之又豈止自鬻而已矣法語臨安府淨慈月堂道昌禪師潮州寶谿吳氏子嗣妙湛慧禪師青原下十四世謂月堂和尚其性梗介為住持日凡所到之處只以行持道法為自己重任不遣發化主不登謁貴人指與旨同言每歲所需飲食之甘旨一皆隨常住恒產恒規之所得或多或少隨其豐儉而用之也衲子有見常住艱難欲為化主者多却之不許或曰佛戒諸比丘每常晨朝托鉢乞食以資身命師何故拒絕之而不容耶月堂曰我佛在日則可到今日作此等事必有好利者乘其貪圖之固習廣費信心之重施必招將來苦報豈不是使人自賣其身非是益人而返為害己我故不許為緣事也水菴謂因思月堂防之細微杜絕漸進之弊此深而切著而明唐丘志曰安居慮危防微杜漸此古人憂之深慮之遠而防之於未然也吾聞此稱真實之言至今猶然在耳若以今時叢林之住持與夫化募者百計搜尋又豈止自賣而已哉禪和子是誰敢賣只好自賣但不知賣了的物事將為何用返思之自有驚心萬斛此篇見古人忘身為法不憚勞苦也水菴謂侍郎尤延之曰昔大愚慈明谷泉瑯琊結伴參汾陽河東苦寒眾人憚之惟慈明志在於道曉夕不怠夜坐欲睡引錐自刺歎曰古人為生死事大不食不𥨊我何人哉而縱荒逸生無益於時死無聞於後是自棄也一旦辭歸汾陽歎曰楚圓今去吾道東矣西湖記聞侍郎姓尤名裒字延之號遂初居士問道于水菴端一禪師水菴和尚引古人為道真切與尤延之說昔日大愚芝慈明圓谷泉道瑯琊覺結伴參汾陽昭禪師河東即太原汾州所屬地值冬嚴寒眾人多畏憚之惟有慈明志力深廣念念在道曉夜不敢自縱生怠惰想每常夜坐力究此道設欲昏睡即引錐自刺其股復歎曰古人為生死事大日切於斯則忘其食夜切于斯則忘其𥨊我是何等人才遠不逮古人而返縱其荒怠生放逸之心致使在生之日自無所益故無所益于時至死之後自無道行故無以聞于後實自慚之甚也及至異時功成業就一旦辭師歸去汾陽歎曰楚圓今既歸去吾道法亦隨之而東矣昔山東丁寬學易於田何一日辭歸何曰吾道東矣乘萬里雲衝大海水可謂孤風絕侶矣然千載之下猶凜然道骨此篇教真率為人不可苟簡自恣也水菴曰古德住持率己行道未甞苟簡自恣昔汾陽每歎像季澆漓學者難化慈明曰甚易所患主法者不能善導耳汾陽曰古人淳誠尚且三二十年方得成辦慈明曰此非聖哲之論善造道者千日之功或謂慈明妄誕不聽此節言道無難易而在人言古為住持者先尊率己躬力行此道凡所當為者未甞苟且簡略而自生恣縱昔者汾陽每每歎息像季之時甚是澆漓學者實不易化慈明曰不難所憂者在主法之人不能善為誘引耳汾陽曰上古之人賦性淳素而且誠篤尚要二十三年工夫方得成辦此件大事豈容易耶慈明曰此非聖賢之至論若是肯發勇猛力究真參善能深造此道者只消千日之功便自七通八達矣或謂慈明狂妄虗誕之言不足以為聽而汾地多冷因罷夜參有異比丘謂汾陽曰會中有大士六人奈何不說法不三秊果有六人成道者汾陽甞有頌曰胡僧金錫光請法到汾陽六人成大器勸請為敷揚西湖記聞及僧寶傳此節證其靈應而不妄且汾地近北多冷有夜立而足破血流者因罷止夜參忽有一異比丘乃聖僧也謂汾陽曰今會中有大士六人奈何止參而不說法言訖即自隱去過後不尚三年果有六人成道者即慈明大愚瑯琊谷泉法華舉天勝泰汾陽甞有偈曰胡僧金錫光請法到汾陽六人成大器勸請為敷揚獅是獅行象是象步安有跛脚驢能蹈波涉海跨倒神州耶此篇因弟子而顯師家之高尚也投子清和尚畫水菴像求贊曰嗣清禪人孤硬無敵晨昏一齋脇不至席深入禪定離出入息名達九重談禪選德龍顏大悅賜以金帛力辭者三上乃嘉歎真道人也艸木騰煥傳予陋質炷香請贊是所謂青出於藍而青於藍者也見畫像舒州投子山義清禪師嗣水菴一禪師南嶽下十七世畫水菴和尚幀子仍請求贊水菴贊曰清禪人吾嗣也其人之孤硬世無能與敵者每日只是一齋無餘食也脇不至席惟兀坐也深入禪定離出入息見定之深也於禪定中有出入息則不名深定名聞達於九重謂天子之居有九重也談禪選德謂召入選德殿中問道也龍顏大悅賜以金帛若有錫即受不為高也力辭者三上乃嘉歎凡屬人君皆稱曰上此指宋孝宗也嘉歎投子為真道人天子一言不惟法門有幸致使草木皆騰煥而發光矣傳予陋質復炷香而請予贊吾無所置焉如子者是所謂青出於藍而青返過于藍者也荀子勸學篇青色乃由藍而染其色返深於藍弟子學不輟而勝于師乃後賢勝前賢也會說話者所謂入室操戈不資餘力者般手筆是最不易得的此篇謂利生全在得人非獨力能化也水菴曰佛智先師言東山演祖甞謂耿龍學曰山僧有圓悟如魚之有水鳥之有翼故丞相紫巖居士贊曰師資相可希遇一時始終之分誰能間之紫巖居士可謂知言矣此節明師資道合佛智先師言東山演祖甞謂耿龍學曰山僧有圓悟如魚之有水鳥之有翼此見其得人之相孚也有水乳針芥之相合如魚有水者乃劉玄德得武侯時雲長翼德皆不悅玄德云孤之有孔明猶魚之有水也願君請無復言重孔明以曉二人也丞相張浚字德遠號紫巖居士紹興初拜封為和國公問道于圓悟勤禪師甞為贊曰凡師資之相可相得授受相應可謂千載之奇逢而不多遇如雲龍風虎之一時也始終相契有一定之素分是誰得而間隔之哉紫巖居士可謂知人之言也師資者師乃人之模範為人之長訓物之規資者助也助發己身之行業又師以道傳于弟子弟子資學於師非即謂師徒也比見諸方尊宿懷心術以御衲子衲子挾勢利以事尊宿主賓交利上下欺侮安得法門之興叢林之盛乎與梅山潤書此節明上下相欺比及也及見諸方尊宿巧用心術以御衲子御使用也而衲子所挾者唯勢與利以事尊宿致使主賓所交者皆利也上下所懷者皆欺也如此又安能得法門之興叢林之盛乎師資相契處有刀斧劈不開之勢苟上下欺侮求其不喪心背理足矣安得有投契若是乎此篇引昔人以教子尊道濟世為急務也水菴曰動人以言惟要真切言不真切所感必淺人誰肯懷昔白雲師祖送師翁住四面叮嚀曰祖道凌遲危如累卵毋恣荒逸虗喪光陰復敗至德當寬容量度利物存眾提持此事報佛祖恩當時聞者孰不感慟此節明言切而能動人謂為主者其感動乎人之言貴要真實要切當言若不真實切當縱能感人必定膚淺誰人肯相懷慕也昔日白雲師祖送演師翁住四面時叮嚀囑付曰祖道凌遲凌遲者凋敗也其危殆真如累卵也晉靈公建九層之臺三年不成有臣荀息諫曰臣能累十二棊子又加九卵在其上公曰危哉息曰不危公造九層之臺三年不成男不耕女不織其危甚矣公聞之遂止毋莫也謂切莫恣縱其心荒其道而逸其行虗喪光陰必敗自己之至德更當以寬宏之量容納于眾利人存人實為至緊時時提持此一大事報佛祖之深恩乃吾願也老祖如是所囑當時聞者孰不感動而慟念之爾昨來召對宸庭誠為法門之幸切宜下身尊道以利濟為心不可矜己自伐從上先哲謙柔敬畏保身全德不以勢位為榮遂能清振一時美流萬世予慮光景不長無復面會故此切囑見投子書此節明德全而能利物以下乃水菴和尚語投子曰汝昨來聖天子召對宸庭宸庭乃天子北辰之宮也誠為法門之幸事切宜屈己尊行此道要以利人濟物為心不可矜誇自己以恃聲勢也你試看從上先德誰不是謙柔敬畏保其身全其德者先哲雖有勢位而自不以為榮顯所以得清聲振揚於當世美名流播于萬代豈不為成始成終之大丈夫耶吾老矣如晨星曉月慮光景不久恐將去無復面會之期故爾切切囑公也至人一片舌是轉凡成聖的妙藥說到極真極實處不覺令人心如水洗此篇出陳古人天資奇異以行道建立為心也水菴少倜儻有大志尚氣節不事浮靡不循細檢胸次岸谷狥身以義雖禍害交前不見有殞穫之色住持八院經歷四郡所至兢兢業業以行道建立為心淳熈五年退西湖淨慈有偈曰六年灑掃皇都寺瓦礫翻成釋梵宮今日宮成歸去也杖頭八面起清風士庶遮留不止小舟至秀之天寧未幾示疾別眾告終行實倜儻者卓異也謂雅致慷慨瀟灑無羈也言水菴和尚年齒少稚之時便能倜儻自若生來有遠大之志而又能高其氣節不事習浮華不檢校毫末胸襟濶大如高岸如深谷不可涯量也徇從也唯以身從義雖有極大的禍害交攻于前不見有殞穫之色儒行篇云不殞穫於貧賤註云如籜殞而飄零似禾穫而枯槁也又殞者如有所墜穫者如有所割刈也乃困迫失志之貌住持八處叢林經歷四郡教化凡所到之處無不自存兢兢業業之心以行道教化建立叢林為己任淳熈五年退西湖淨慈上堂說偈曰六年灑掃皇都寺瓦礫翻成釋梵宮今日宮成歸去也杖頭八面起清風士庶強欲遮攔稽留而不止乃以小舟至嘉興秀水縣之天寧寺未久示疾別眾告終哲人君子骨頭節節皆香立在人前使人慕羨不已涎唾咽盡此篇教學者當遵先聖禮法不可隨情越矩也月堂昌和尚曰昔大智禪師慮末世比丘驕惰特製規矩以防之隨其器能各設攸司主居丈室眾居通堂列十局頭首之嚴肅如官府居上者提其大綱在下者理其眾目使上下相承如身之使臂臂之使指莫不率從是以前輩遵承翼戴拳拳奉行者以先聖之遺風未泯故也此節明前輩遵行不背謂昔日百丈大智禪師每慮末世時人性多驕奢而又懶惰何能成就無上妙道故特製規矩以隄防之隨其人之器量才能各以一事與伊掌執為主者居于方丈眾居則通堂耳于眾人之間開列作十局頭首即兩堂首座書記藏主知客都管監寺副寺維那典座各各所掌之職嚴令恭肅如官家之有法度森嚴也為主者居于上提持其大綱法令也為職事者居于下分理其眾目事務也使上下各相承接如身之使臂臂之使指莫不統率而相從焉此百丈之始創也以是前輩遵承其所製之典型與建立之禮法無不翼翼恭敬而頂戴拳拳服膺而奉行之也此皆由先聖所遺來之風化猶然而未泯絕故耳比見叢林衰替學者貴通才賤守節尚浮華薄真素日滋月浸漸入澆漓始則偷安一時及翫習既久謂其理之當然不謂之非義不謂之非理在上者惴惴然畏其下在下者睽睽然伺其上平居則甘言屈體以相媚悅得間則狠心詭計以相屠獪成者為賢敗者為愚不復問尊卑之序是非之理彼既為之此則傚之下既言之上則從之前既行之後則襲之烏乎非彥聖之師乘願力積百年之功其弊固則莫能革矣與舜和尚書此節舉時弊縱情違理比來所見叢林道衰法替參學者只以通些才學為貴重以守節義為卑賤所尊尚者是虗浮華飾所輕薄者是真實朴素由此日滋月浸漸漸不覺便入澆漓澆者沃也漓水入地也始則不過上下偷安於一時之際及狎翫慣習已久反以謂理該如是人之才識必要通節義不必守可也竟不知如此所行非義也非理也惴惴者憂也在上者既是苟利偷安常懷憂悶以畏其在下者之檢點睽睽者斜視貌在下者亦苟利違心常行窺探以候其在上者之過隙閒暇無事之際則甘言美語卑顏屈體以相諂媚而取豫悅少間背後則狼心詭計以相屠獪宰殺曰屠殺戮曰獪皆謀害之意或于事有能成立者即謂之賢若于事少有乖違者便謂之愚竟不問于人有尊卑智愚之次序于事有是非善惡之道理先一人既如此行後來者必去倣傚在下者既已狂言亂語在上者竟相從而不敢違前者作俑之後者蹈襲之總不察道理之何如也烏呼到者般時事若不是賢聖之師乘宿生大願更要積百年之化功方能轉攝乃可入道不然其弊惡堅固而不能革除矣遺風凋喪敗弊紛然上下一皆以虗文飾貌相處何能還復先聖之製也此篇見授受不苟慎重其道也月堂住淨慈最久或謂和尚行道經年門下未聞有弟子得不辜玅湛乎月堂不對他日再言之月堂曰子不聞昔人種瓜而愛甚者盛夏之日方中而灌之瓜不旋踵而淤敗何也其愛之非不勤然灌之不以時適所以敗之也諸方老宿提挈衲子不觀其道業內充才器宏遠止欲速其為人逮審其道德則淫汙察其言行則乖戾謂其公正則邪得非愛之過其分乎是正猶日中之灌瓜也予深恐識者笑故不為也北山記聞謂月堂和尚住淨慈多年未有嗣續法道者或問曰和尚行道已經多載門下未聞有付受弟子承紹宗旨者豈不辜負妙湛師乎福州雪峯妙湛思慧禪師錢塘俞氏子嗣法雲善本禪師青原下十三世月堂不對他日再言之月堂曰子不聞昔日有人種瓜愛之至甚欲其速成之盛夏者謂于六七月極猛熱之時當日正中而澆灌之其瓜不唯不速長而能茂未及退步瓜則淤敗枯瘁矣此何故也其愛之非不殷勤由灌之不及時適所以返成敗壞矣如今之諸方老宿作養提挈諸衲子輩亦然竟不觀他道德福慧充足否又不顧他才智器度遠大否止要速令他出來做人及至出頭之際審他的道德則淫泆穢污而不堪察他的言行則乖違背戾而不當說他有公正其實私邪便而無耻事事總皆虗浮如此得非愛之過其分乎此正似日中之灌瓜者無異也予深恐為識者所笑故不作此虗妄付授之事也金鑄之不可也錦繡之不可也然則何物方可只要四字足以克選道德言行此篇見古人敬師重道至誠之甚也月堂曰黃龍居積翠因病三月不出真淨宵夜懇禱以至然頂煉臂仰祈陰相黃龍聞之責曰生死固吾分也爾參禪不達理若是真淨從容對曰叢林可無克文不可無和尚識者謂真淨敬師重法其誠至此他日必成大器北山記聞謂黃龍和尚居積翠時因病三月不愈未出方丈真淨至午夜誠懇禱祝于三寶前以至頂上然香臂間灼燈以作供養仰祈神力陰相致助使師病愈則法有所賴也黃龍聞而責之曰生死固吾定分苟可免乎爾為參禪衲子不通曉道理亦至於此真淨從容對曰叢林可以無我克文必不可無和尚禱祝之意法源所係也識者謂真淨敬師重法其誠切至此則他日之成大器不待言也此事非他人使能為之一皆出于誠信今時之敬師重法之心總皆如波頹瀾倒矣痛哉此篇言以至誠待人而道自行也月堂曰黃太史魯直甞言黃龍南禪師器量深厚不為事物所遷平生無矯飾門弟子有終身不見其喜怒者雖走使致力之輩一以誠待之故能不動聲氣而起慈明之道非苟然也一本見黃龍石刻山谷居士甞言黃龍和尚器深不可測量廣而有容不為一切事物之所遷變一生來作事無矯詐無修飾在門下久居弟子有終身不見師有喜怒之色者雖于走使致力之輩一皆以誠心待之無二意也所以他全不動聲氣而自然振起慈明之道法豈苟且徒然而致哉黃太史述黃龍和尚生平行實太似一座須彌山撼搖不動所以從古迨今猶令人感愧交集也此篇見古人臨難不苟視死如歸也月堂曰建炎己酉上巳日鍾相叛於澧陽文殊導禪師厄於難賊勢既盛其徒逸去師曰禍可避乎即毅然處於丈室竟為賊所害此節明師遇難不可避建炎宋高宗年號己酉上巳日上巳即三月三鍾相乃賊名紹興五年洞庭湖鍾相作亂自稱天皇大王傷殘人民得張俊官兵敗死澧陽即湖廣常德府澧陽州文殊導禪師困于難師于建炎三年春示眾舉臨濟將滅囑三聖因緣曰正法眼藏瞎驢滅臨濟何曾有此說今古時人皆妄傳不信但看後三月果至明年三月鍾相兵至其徒欲與師南奔師曰學道所以了生死何得避之毅者剛也果決也師即毅然處于丈室俄而賊至師曰速當見殺快汝心志賊舉槊刺之血皆白乳賊大驚引蓆覆之而去無垢居士䟦其法語曰夫愛生惡死人之常情惟至人悟其本不生雖生而無所愛達其未甞滅雖死而無所畏故能臨死生禍患之際而不移其所守師其人乎以師道德節義足以教化叢林垂範後世師名正導眉州丹稜人佛鑑之嗣也一本見廬山岳府惠大師記聞此節判師節操必當法無垢居士䟦其法語曰夫愛生惡死乃世人之常情惟至理之人悟知本來不生雖生而實無所愛達其本來不滅雖死而實無所畏故能臨死生患禍之際雖白刃加身而終不移其所守之道即導禪師是其人也以師生平所存之道德節義足可以教化于叢林垂範于後世又何況此末後一段神迹也師名正導眉州丹稜徐氏子佛鑑之嗣也有曰禍當趨避君子之風範也有曰禍不可避丈夫之作略也如導師曰速當見殺快汝心志則視身固如浮雲視死亦等兒戲足見學道之有驗如此此篇言本色師家極能針人之病使之得至道也心聞賁和尚曰衲子因禪致病者多有病在耳目者以瞠眉努目側耳點頭為禪有病在口舌者以㒹言倒語胡喝亂喝為禪有病在手足者以進前退後指東劃為禪有病在心腹者以窮玄究玅超情離見為禪據實而論無非是病台州萬年寺心聞曇賁禪師永嘉人嗣育王介諶禪師南嶽下十六世四明太守以雪竇請師主之師辭以偈曰閙藍方喜得抽頭退鼓而今打未休莫把乳峯千丈雪重來換我一雙眸此節言造道不真師一日示眾曰如今衲子因學禪而返致病者極多有一種人病在耳目者以瞠眉努目側耳點頭將者些瞎弄便喚作六根門頭放光動地以為是禪有病在口舌者以顛言倒語胡喝亂喝哄弄愚夫說者箇是剿絕葛藤最為直指以為是禪有病在手足者以進前退後指東劃西便謂之不涉咽喉唇吻格外之家風以為是禪有病在心腹者以窮玄究妙超情離見便去閉却眼睛只顧向鬼窟裏作想謂之離相離名以為是禪若據真實是佛祖所指示的第一義諦而論此等總皆謂之病也惟本色宗師明察幾微目擊而知其會不會入門而辯其到不到然後用一錐一劄脫其廉纖攻其搭滯驗其真假定其虗實而不守一方便昧乎變通俾終蹈於安樂無事之境而後已矣實錄此節明師真不妄惟有本色宗師明眼道者自能明察於極微極細之地纔一相見便曉得他是會的他是不會的纔一到門即辯知此為到家者此為未到家者然後于未會未到的與他痛處下一錐深處用一劄使纏綿不斷之廉纖一時脫去凝結不開之搭滯盡情攻發更要驗其所得之真假定其所行之虗實如其不然須別用方便不是死守一法昧其利人之變通必竟要使學者蹈于安樂無事之境大休大歇之場而後已方纔是本色師家濟人之作略也拘方用藥殺人無疑須看何等人受何等病以何等方下何等藥始是良醫然而病雖無盡藥亦無窮一味用香蘇散決非醫家妙手此篇教人勤學聚德去虗取實為根本也心聞曰古云千人之秀曰英萬人之英曰傑衲子有智行聞於叢林者豈非近英傑之士邪但能勤而參究去虗取實各得其用則院無大小眾無多寡皆從其化矣此節言取人須識其誠古云積千人之秀氣于一己方謂之英積萬人之英才于一身方謂之傑凡衲子有智慧德行之名聞之于叢林者豈非是近于英傑之人耶但只自能去其虗假存乎真實各有智行隨得而用之如是則院不在大小眾不在多少皆可以從其化矣昔風穴之白丁藥山之牛欄常公之大梅慈明之荊楚當此之時悠悠之徒若以位貌相求必見而詒之一旦據師席登華座萬指圍繞發明佛祖叔世之光明叢林孰不望風而靡矧前輩皆負瓌偉之材英傑之氣尚能區區於未遇之際含耻忍垢混世同波而若是況降茲者歟此節明非時宜當自重風穴延沼禪師錢塘餘杭劉氏子嗣南院慧顒禪師南嶽下七世白丁地名在郢州多小人風穴因𡨥亂隱居數年人無知者牛欄即山名在燕京東北藥山隱居于此法常禪師襄陽鄭氏子見馬祖後隱于鄞縣南七十里大梅山慈明未出世時寓迹于荊楚間此四老當其未遇之時凡世間悠悠之徒見之亦不過一泛常之師而已若以位求猶在學地若以貌取亦似常人所以見者多忽慢之詒者慢也一旦龍天推出據于師席登寶華王座萬指圍繞發揮顯明佛祖之道叔世即末法也于末法之際建大光明幢諸方叢林孰不望風而偃且前輩皆負瓌偉奇大之材瓌與瑰同瓊瑰次玉又偉也偉者奇也大也而又有英傑之氣槩此所謂天降斯人尚且于碌碌未遇之際亦常含人之羞耻忍人之汙垢混于人世同其波流而如此況下此者歟烏乎古猶今也此猶彼也若必待藥山風穴而師之千載一遇也若必待大梅慈明而友之百世一出也葢事有從微而至著功有積小而成大未見不學而有成不修而先達者若悟此理師可求友可擇道可學德可修則天下之事何施而不可古云知人誠難聖人所病況其他乎與竹菴書此節謂品操總在力學烏乎古之人猶今之人也此之世猶彼之世也若必欲待如藥山風穴乃可以為師千載始得一遇也若必欲待如大梅慈明可以為友百世方能一出也此亦不必若是也葢事先本從于隱微而至於顯著功有以些小而至廣大亦皆積累而成未見世有不學而能成不修而先達者若悟此必學必修之理則師不待高而可求友不待奇而可擇道不待時而可學德不待人而可修則天下之事頭頭法法何施而不可為也由此而知在人不在法古云知人誠難聖人所患又況其他乎佛非生成聖是人作若欲分聖凡論今古又隔却了自己孰非堯舜但患其力弗銳耳此篇謂至道不繁變之即成弊也心聞曰教外別傳之道至簡至要初無他說前輩行之不疑守之不易此節明道本不易謂教外別傳者言此道人人本來自具三藏聖教詮註不到別有拈花一機是謂別傳心要也此事至簡而不繁至要而切當初祖傳至震旦但曰行解相應初有何說前輩尊承此道行之無所疑守之無所變天禧間雪竇以辯博之才美意變弄求新琢巧繼汾陽為頌古籠絡當世學者宗風由此一變矣此節明宗風初變天禧是宋三帝真宗年號雪竇具有宏辯博學之才美其意思更變欺弄向古人意中求其新鮮琢磨奇巧繼續汾陽為頌古籠絡當世學者籠絡者如鳥之在籠馬之羈絡不得自由祖師風化由此一變矣逮宣政間圓悟又出己意離之為碧巖集彼時邁古淳全之士如寧道者死心靈源佛鑑諸老皆莫能迴其說於是新進後生珍重其語朝誦暮習謂之至學莫有悟其非者痛哉學者之心術壞矣此節謂流入義學宣政乃宋八帝徽宗年號圓悟禪師又出自己之意將雪竇顯公之頌古評釋之提唱之分之名為碧巖集碧巖山名圓悟和尚居此作評唱故置此名比時尚有諸方大老能超今越古者皆道德淳全之士如寧道者即潭州開福道寧禪師歙溪汪氏子嗣五祖演禪師南嶽下十四世又如死心靈源佛鑒輩皆莫能挽迴他評唱之說于是新進法門後生晚學見此評論有義路可求皆珍惜以尊重其說朝誦暮習謂之至學莫有箇學人悟此以為非者痛哉學者之心體道術皆為義學所害不可救也紹興初佛日入閩見學者牽之不返日馳月騖浸漬成弊即碎其板闢其說以至祛迷援溺剔繁撥劇摧邪顯正特然而振之衲子稍知其非而不復慕然非佛日高明遠見乘悲願力救末法之弊則叢林大有可畏者矣與張子韶書下出廣錄此節方明救正紹興是宋十帝高宗年號佛日寺名是大慧和尚之道場閩即福建見學者被一本碧巖集牽引習學而不能止馳騖皆奔走義日馳一日月奔一月愈行愈遠浸漬如水之潤物已成弊病所以大慧和尚親往福建即碎其板復出示語以闢其說故能祛遣學者之迷執拯援學者之沉溺剔削其繁撥置其劇劇者增也甚也摧邪顯正使別傳之道特然而振起之由是衲子稍知其非而不復羨慕此書也然則非妙喜之高明遠見乘大悲普濟之願救末法義學之弊則叢林大有可畏者其混亂可知矣古人之意非不善也但恨學者習之不以時棄本逐末故致罪于師佛日乃待法不待人正為圓悟老人顯發光明之無際也此篇見美器固自生成非心思可擬也拙葊佛照光和尚初參雪堂於薦福有相者一見而器之謂雪堂曰眾中光上座頭顱方正廣顙豐七處平滿他日必為帝王師孝宗皇帝淳熙初召對稱旨留內觀堂七宿待遇優異度越前來賜佛照之名聞於天下記聞慶元府育王山佛照德光禪師臨江軍彭氏子嗣大慧杲禪師南嶽下十六世初參雪堂和尚於薦福寺有相士一見而歎曰此美器也即謂雪堂曰眾中有光上座生成人也試觀他頭顱頂骨方而且正顙即額即頷也額廣而豐又加兩手兩足兩肩及頂七處俱皆平滿此人他日必為帝王之師孝宗皇帝淳熙初召師見對果稱帝心留于內觀堂七宿其欵待相遇甚為優勝而特異之度越即超過也超過從前已來帝王禮師尊法之誠賜佛照之名聞於天下我見一等人生出幾多奇異心想要望去作國師而不知五鳳樓猶高在此篇謂道不可以智愚論惟得其人而成之也拙葊謂虞允文丞相曰大道洞然本無愚智譬如伊呂起於耕漁為帝王師詎可以智愚階級而能擬哉雖然非大丈夫其孰能與焉允文姓虞名尹字彬甫十歲時善賦詩詞有驚人語後孝宗時拜為相置翹村舘舍以筵四方賢士拙菴謂丞相曰凡選賢之道在人之德而不在名位上論且大道之體空洞無私品質于人原無愚智譬如伊尹傷中國無賢君歎斯道不行隱耕有莘之野以樂堯舜之道有莘古城名在開封東五十里湯三往聘之拜為相自曰世無成湯之君則終于有莘之野必不枉道而求從也又如呂望東海人姓姜名尚字子牙釣魚于寶雞縣之磻溪周伯將出獵卜之曰所獲者非熊非羆非彪非虎覇王之輔既出獲姜尚于渭水之陽與語大悅乃曰自吾先君太公甞言當有至人適周子莫是乎尚曰然曰太公望子久矣故號太公望立以為師封為呂侯後佐武王伐紂胡曾詩云岸艸青青渭水流子牙從此獨垂鈎當時未入非熊兆幾向斜陽歎白頭此二人者可謂朝為田舍郎暮登天子堂矣豈可以智愚階級而能比擬之哉雖則不以智愚論若非伊呂如是之大丈夫其孰能及焉大道本不可以智愚論而得道者反出于智愚之表若必以智愚論道其得者無幾矣此篇言至人自重起居不二也拙菴曰璇野菴常言黃龍南禪師寬厚忠信恭而慈愛量度凝遠博學洽聞常同雲峯悅遊湖湘避雨樹下悅箕踞相對南獨危坐悅瞋目視之曰佛祖玅道不是三家村古廟裏土地作死模樣南稽首謝之危坐愈甚故黃太史魯直稱之曰南公動靜不忘恭敬真叢林主也幻菴集野菴祖璇禪師嗣大溈果禪師南嶽下十八世常言黃龍南禪師所賦之性寬厚忠信其身至恭至肅而慈愛于人兼且量度凝遠博學多聞常同雲峯悅和尚遊湖西湘陰時避雨于樹下悅箕踞相對箕踞即長伸兩足以兩手按膝上其形似箕南和尚獨危然而坐悅即瞋其目而視之曰佛祖微玅之道原不是那三家村古廟裏的土地你作者死模樣做麼南公稽首謝之然後仍更危坐而復愈甚故黃太史魯直稱之曰南公動靜不忘恭敬真果是叢林主人也即此真見寬厚其性凝遠其量無些毫執相悅公如是琢磨真良友也此篇謂學道以智覺為先失之則亂矣拙菴曰率身臨眾要以智遣妄除情須先覺背覺合塵則心蒙蔽矣智愚不分則事紊亂矣晝監寺書凡衲僧家率身臨于大眾之中要以智慧為先導至于遣妄想除情識又須以覺照為根本若使背了覺照合於塵境此心即蒙蔽矣若于大眾之中智愚不能分別則于事必紊亂矣只此數語大似三百斤擔子無人挑得起有力者試挑看此篇見古人智量深玅主賓皆有道也拙菴曰佛鑑住太平高菴充維那高菴齒少氣豪下視諸方少有可其意者一日齋時鳴楗見行者別器置食於佛鑑前高菴出堂厲聲曰五百僧善知識作遮般去就何以範模後學佛鑑如不聞見逮下堂詢之乃水虀菜葢佛鑑素有脾疾不食油故高菴有愧詣方丈告退佛鑑曰維那所言甚當緣惠懃病乃爾甞聞聖人言以理通諸礙所食既不優於眾遂不疑也維那志氣明遠他日當柱石宗門幸勿以此芥蒂逮佛鑑遷智海高菴過龍門後為佛眼之嗣昔佛鑑住太平時高菴當維那高菴年雖少而志氣甚豪下視諸方尊宿似無有人可當其意者一日鳴楗錘將受齋時忽見行者別以一器置食于佛鑑前高菴未審其為何物即出眾厲聲曰五百僧善知識做遮般行止不知將何以模範于後學佛鑑默然如不聞其聲不見其色及至下堂去詢問之乃水虀菜葢佛鑑素來有脾疾不敢食油故耳高菴即有愧遂詣方丈告退佛鑒曰維那所言甚是當理緣惠懃病故乃爾甞聞聖人言惟以理能通諸礙今我所食者既不勝過大眾人何所疑哉維那志氣甚是高明遠達他日當為宗門之棟梁支撐大法如磐石之固也幸勿以今日些小之言而自鯁逆也芥蔕刺鯁也如骨不下咽謂人直言難受如鯁骨留咽也又望人豁略曰幸勿芥蔕及佛鑑遷主智海高菴即過龍門後為佛眼之嗣高菴氣魄雄厲能于萬人叢裏奪標若非佛鑒有天空海濶之量賓主必有間隙矣此篇謂與官人論道要去他知解使超然直入也拙菴曰大凡與官員論道酬酢須是剗去知解勿令他坐在窠窟裏直要單明向上一著子玅喜先師甞言士大夫相見有問即對無問即不可又須是箇中人始得此語有補於時不傷住持之體切宜思之與興化普菴書住持人大凡與護法宰官評論至道于一酬一酢之間莫涉連纖須是剗削他心知意解毋令坐在葛藤窠裏直要單提直指與他發明向上一著子乃是衲僧體段妙喜先師甞言凡與士大夫相見有問必要如法相對無問則不必強與之言至于談論之時又須知是道法中人始得與他說箇中話不然說無益也先師此語實有補益于今時庶不傷住持之體凡為主法者于此一節切宜思之多見近時接待士大夫不管他信不信只顧和盤子將去爭奈渠棄如涕唾可咲可咲此篇誨主人當善養士使法門光大也拙菴曰地之美者善養物主之仁者善養士今稱住持者多不以眾人為心急己所欲惡聞善言好蔽過惡恣行邪行縱快一時之意返被小人就其好惡取之則住持之道安得不危乎與洪老書譬如世間土地之膏腴者必能生長良苗為住持者之有仁慈必能保養智士此一定之理也今時之稱為住持者多不以仁愛保持大眾為心每以己之所好以為急務凡有善言厭惡不肯聽受自己過惡都將掩飾一切不正之事任意而行縱快目前一時之意由是被一輩小人乘其機罅迎就己之好惡而取得之也如此者則住持之道安得不致危險乎以仁愛養士天下之至當也竊權私用喪心背理幸毋蹈其故轍喪不旋踵也此篇謂鋒鋩不可太露恐招傷闕也拙菴謂野菴曰丞相紫巖居士言玅喜先師平生以道德節義勇敢為先可親不可疎可近不可迫可殺不可辱居處不淫飲食不溽臨生死禍患視之如無正所謂干將鏌鎁難與爭鋒但虞傷闕耳後如紫巖之言幻菴記聞昔丞相紫巖居士言妙喜和尚平生修身治心惟道與德故此身既正而有節則此心亦正而合義凡時有所作為亦皆以勇銳果敢為先所以其為人也如孔子儒行篇言士但可親而不可疎只可近而不可迫寧可殺而不可辱禮記云居家不淫飲食不溽淫流蕩也恣縱貪味曰溽即使臨于生死禍患之間視之如無操持如此正所謂干將鏌鎁誰能與之較鋒利哉虞憂也但恐有不測之患為傷闕耳後果如紫巖之言按孝子傳云楚襄王夫人夏乘凉抱鐵柱感孕生一銕塊王令匠者干將造劍三年乃成雌雄二劍匿雄持雌進王王秘之匣中每聞悲鳴王問羣臣臣曰劍有雌雄鳴者雌憶雄耳王大怒欲誅干將將知必死藏劍于屋柱中其妻名鏌鎁有孕將產干將以簡囑云日出戶東南山有松松生于石劍在其中又云汝若生男長而告之其妻後果生男眉間有赤點因名眉間赤至年十五問母曰吾父安在母出簡示云汝父枉被誅戮赤聞大怒日夜思惟與父報讐遂出戶三反望山松不見悶臥堂中忽見堂壁松柱省之剖而得劍王預夢一小兒眉間有赤言報父讐王懼出令凡能擎眉間赤或得首者當厚賞之赤聞逃入山中忽遇樵客見而問曰子莫非眉間赤否答曰然客曰吾甑山人近聞王令拘子子定難逃何不將子頭共劍付吾吾為子報讐赤曰幸甚遂將劍自刎其頭與客客將劒隱于身持頭進王王大喜客曰勇士之首恐有後患當以油烹之王甚喜遂設油鑊烹之三晝夜不爛口目開合如生客請王視乃出劍揮王頭落于鑊中于是二頭相囓客恐赤頭不勝遂自刎頭助之三頭相囓俄頃俱爛羣臣不可識別分其湯肉塟之故通名三王墓在汝南府宜春縣吹毛利刃須待巧力磨之造化若不砥礪則鈍滯矣此篇教住持要賢德者佐之則道乃大也拙菴曰野菴住持通人情之始終明叢林之大體甞謂予言為一方主者須擇有志行衲子相與毗贊猶髮之有梳面之有鑑則利病好醜不可得而隱矣如慈明得楊岐馬祖得百丈以水投水莫之逆也幻菴集言野菴和尚為住持極善通人情保始慎終又能明知叢林大體甞謂予言為一方主者必須要選擇有志力廣大道行精進之衲子相與輔揚而贊助之毗輔也若得好人輔佐則為住持者如髮之有梳面之有鑒凡所有一切利病好醜皆不可得而隱之矣如慈明得楊岐無事不周馬祖得百丈無法不圓此皆心心相應猶若以水投水豈復更有違逆哉賢智者置其前若目辯蒼黃手數奇偶何弊迹之可隱則使住持之道恢弘無際矣此篇教學道須盡底蘊乃可鑒深知遠也拙菴曰末學膚受徒貴耳賤目終莫能究其奧玅故曰山不厭高中有重巖積翠海不厭深內有四溟九淵欲究大道要在窮其高深然後可以照燭幽微應變不窮矣與覲老書謂末法時人不肯深究本源所學者皆皮面上工夫耳東京賦云末學膚受貴耳賤目膚皮膚也皮膚之受言無深學也外受淺薄內實無有貴耳者喜于聽聞賤目者懶于看讀謂纔聽得別人幾句澹話便自以為得雖有前人教誡之言竟不過目如此者必不能窮究到至深至妙之地故云山不厭高惟其高所容亦廣其中有重巖積翠之幽奇也海不厭深惟其深所納亦厚其間有四溟九淵之浩瀚也四溟即東南北之四海也水黑色謂之溟九淵列子云鯤旋之潘為淵止水不潘為淵流水之潘為淵濫水之潘為淵沃水之潘為淵氿水之潘為淵雍水之潘為淵汧水之潘為淵肥水之潘為淵是為九淵淵者深也止水也水盤旋處為淵學者欲究明大道必竟要窮其極高極深然後自能炤燭幽微應用權變無窮之妙自然得矣貴耳賤目時人通病其能究深知遠陶鑄堯舜者乃天生之間氣也此篇言聖賢之學貴在持久乃無過失也拙菴謂尤侍郎曰聖賢之意含緩而理明優游而事顯所用之事不期以速成而許以持久不許以必進而許以庶幾用是推聖賢之意故能亘萬世而持之無過失者乃爾幻菴集謂聖賢所立之本意貴在含緩而使道理開明又貴在優游自如而令事務彰顯凡所用之事不要倉卒期以速成惟許人以持久為要不許以必然競進而許人以庶幾近之也如能用是功夫推詳聖賢之意得其鄭重持久之法故能通亘萬世而持守之乃保其無有過失故能如是也聖賢之意多生造就豈是躁進得的果欲達聖賢之意須辦一片劫石心肝做去自有萬古不磨之功也此篇以古語誡人冀其遵信而奉行也侍郎尤公曰祖師已前無住持事其後應世行道迫不得已然居則蓬蓽取蔽風雨食則麤糲取充饑餒辛苦憔悴有不堪其憂而王公大人至有願見而不可得者故其所建立皆磊磊落落驚天動地此節明至人以道自樂尤公述妙喜之言教誡時人曰祖師已前原沒有立住持之事待後出來應化世間行持此道皆是人尊其有道逼迫不得已而始出世然所居只是蓬蓽織荊為門儒行云儒有一畝之宮環堵之室蓽門圭竇蓬戶甕牖取其遮蔽風雨而已食則粗糲取其充足饑餒而已每每自樵自種辛苦其身憔悴其心外面似有不堪之憂然形貌雖勞而道德實充王侯公卿有願欲求一相見而不可得者故此前輩凡有所建立皆磊磊落落如眾石之崩落而無阻也此皆喻大人之相無物滯於胸中如干戈叢裏橫身直過荊棘林中擺手便行脚跟下無五色線舌頭上無十字關鼻端無泥痕眼中無金屑生平作用乃能驚天動地也後世不然高堂廣廈美衣豐食指如意於是波旬之徒始洋洋然動其心趦趄權門搖尾乞憐甚者巧取豪奪如正晝攫金不復知世間有因果事此節謂愚夫競習浮華後代人則不然矣高堂廣廈美衣豐食頷也但動其揮其指顧盻舉止之間無有不如意者由是有一輩波旬魔者之徒貪求無厭洋洋然動其心洋洋者流蕩之貌趦趄權門趦趄者欲行而不行也搖尾乞憐更其甚者百般巧取恃勢豪奪猶如正晝攫金不顧有傍觀者攫爪取也列子云昔齊人有欲金者清旦衣冠之市適鬻金所竊金而去金主捕之曰人皆在焉爾何攫人之金答曰正取金時不見有人以此言世人但貪其利而忘其耻見其利而忘其害也只知妄求竟不復知世間有善惡因果之事也玅喜此書豈特為博山設其拈盡諸方自來習氣不遺毫髮如飲倉公上池之水洞見肝腑若能信受奉行安用別求佛法靈隱石刻此節尤公因之以勸勉妙喜和尚此書豈獨獨為博山所設其實拈盡了諸方長老自來所懷之習氣一絲一髮皆不遺失如人得飲倉公上池之水洞然能見肝膈與諸肺腑若人能信受妙喜此語不必更別求諸佛法也滄公上池之水古史云蘆越之東有扁鵲姓秦名緩渤海郡人故稱滄公少時為舍長客張桑君見扁鵲獨奇常勤遇之出入十餘年一日與鵲私坐間語之曰予有藥方今年老欲傳與公公勿洩漏鵲敬諾君遂出懷中藥與之示以上池之水服之上池即竹木上露水三七日當自見物盡取藥方授之忽不見始悟其為仙人也鵲如其言服之三七日能視垣外一方人物後視病洞見五臟癥結故特以胗脉遂得名耳感古傷今字字皆從大悲心裏流出幾人能加額信受也此篇謂為主者要謙恭持法使後輩有所取則也侍郎尤公謂拙菴曰昔玅喜中興臨濟之道於凋零之秋而性尚謙虗未甞馳騁見理平生不趨權勢不苟利養甞曰萬事不可佚豫為不可奢態持葢有利於時而便於物者有其過而無其功者若縱其奢佚則不濟矣不肖佩服斯言遂為終身之戒此節舉昔言為戒中興者謂廢而復興也如光武中興漢業昔日玅喜和尚中興臨濟之道于落末凋零之秋而所稟之性其崇尚者唯謙唯虗雖是見道幽深而未甞馳騁自負生平以來不肯趨承權勢之人不苟且貪求利養甞言世間萬事不可縱情悅意而為須用勤勞而作之也又不可以奢華驕態而持須是節儉而用之也世事散漫原非一種葢有一般事業能利于時而與物相便者又有一種事務作之祇益其過而無其功者若使一皆以奢華佚悅而為則于事必不濟矣不肖佩服斯言遂以為終身之戒老師昨者遭遇主上留宿觀堂實為佛法之幸切冀不倦悲願使進善之途開明任眾之道益大庶幾後生𣆶輩不謀近習各懷遠圖豈不為叢林之利濟乎然侍者記聞此節勸力行其道老師昨者遭遇聖上殊恩留宿于內觀堂誠為佛法中之大幸事也切冀莫倦悲心勿忘慈願使人間進善之路益見其開明令衲僧任眾之道愈加其廣大庶幾後生晚輩各知趨向自然不謀小近之習各懷遠大之求豈不為叢林之利益而遍濟羣生耶述妙喜和尚胸襟豁達為自己大戒轉以勸行悲濟為後人法式真庖丁妙手也此篇教人當知所習宜崇乎禮也密菴傑和尚曰叢林興衰在於禮法學者美惡在乎俗習使古之人巢居穴處㵎飲木食行之於今時則不可也使今之人豐衣文采梁囓肥行之於古時亦不可也安有他哉習不習故夫人朝夕見者為常必謂天下事正宜如此一旦驅之就彼去此非獨生疑而不信將恐亦不從矣用是觀之人情安於所習駭其未見是其常情又何足怪與施司諫書慶元府天童密菴咸傑禪師福州鄭氏子嗣應菴華禪師南嶽下十七世曰大凡叢林之興衰果何所致也無他在于禮法之有無而已若使主人端正法令肅齊上下之情通而叢林自見其興苟若返此必然衰矣學者之美惡亦非別法在于風俗之所習若平時習之于善則為美習之于不良則為惡彼古之人以巢為居依穴而處㵎而飲木而食皆一時所習各以為安若使今人行之則斷斷乎不能為也以今人之豐衣文采粱囓肥必欲使古人亦如是作更不可也此豈別有一道使古今之人大相逕庭之如是耶非也總只在人之習與不習之故耳夫人從朝至暮所見所聞以為常事便謂天下之事本當要如是作為乃是箇當然之事設若一旦有人驅遣他却此豐衣文采就彼之草衣木食非獨生疑而不信將恐必不從其所遣也用是觀之人情安于平時所習驚駭其未見未聞者葢常情耳又何足為之怪學者于靜深午夜中清心返照看我之所習是何等光境得何等受用久之自然寒生骨肋也此篇教人守中晦迹勿惑於聲利也密菴謂悟首座曰叢林中惟浙人輕懦少立子之才器宏大量度淵容志向端確加以見地穩密他日未易言但自韜晦無露圭角毀方瓦合持以中道勿為勢利少枉即是不出塵勞而作佛事也與笑菴書臨安府五雲悟禪師苕溪吳興人密菴和尚語之曰叢林中惟獨有浙中人輕忽懦弱少有能卓立者子雖浙人且才力與夫器質皆宏大矣加以量度淵深容納一切志氣高尚端嚴確實兼之見道地步甚是穩密他時後日其發揚未可容易言也但自己更要韜光晦跡不要露其圭角須是毀方瓦合可也儒行云儒有博學而不窮篤行而不倦慕賢而容眾毀方而瓦合寬有如此者註云如陶瓦者其初則圓剖而為四其形則方是為毀其圓而為方合其方而為圓葢于涵容之中未甞無分辨也此所以教人勿偏于一邊但持之中道又要不為勢利所屈若能如此即是不出塵勞而能作諸佛事隨寓而安無不如也才器宏見地穩已超凡品若能涵容不枉則入聖矣此篇謂賢不肖當擇宜自慎也密菴曰應菴先師甞言賢不肖相反不得不擇賢者持道德仁義以立身不肖者專勢利詐以用事賢者得志必行其所學不肖者處位多擅私心妒賢嫉能嗜慾苟財靡所不至是故得賢則叢林興用不肖則廢有一於斯必不能安靜見岳和尚書曰應菴先師甞言賢不肖二者相反為主人者當須擇識若是賢者他自能持道德守仁義以立身不肖者本無廉耻專以勢利詐用事賢人一得其志必要行他所學之道德仁義不肖者一處其位多專一己之私心而且嫉賢妒能嗜慾苟利無所不為是故得賢者則叢林必興用不肖者使法度便廢此等小人若有一箇于眾中攪亂擾害于叢林使內外俱不能安靜矣古人出言立義元為要人持正道識大體賢不肖非一定不易者在人之所習也若甘心為世所棄其誰之過歟此篇教主人于三事不可不知也密菴曰住持有三莫事繁莫懼無事莫尋是非莫辯住持人達此三事則不被外物所惑矣慧侍者記聞作住持有此三莫須當識取凡叢林中百事藂積少不得一一調攝將去切莫要畏懼懼則事不了也或時無事內外閑靜恬然自得切莫要尋尋則返多累也凡是非于我種種順逆一切任之切莫要辯辯則羣機生也住持達此三者自然不被外物迷惑矣三箇莫字處置多少妙理只是難于受用受用得外物何能惑我哉此篇謂人之隱惡甚於傾邪不可不深加檢察也密菴曰衲子履行傾邪素有不善之迹者叢林互知此不足疾惟眾人謂之賢而內實不肖者誠可疾也與普慈書衲子尋常所履踐行持之事不甚端正平素以來有不善之形迹者一切人互相知之此不足以為惡何也本非器也惟獨有一種眾人皆謂之賢而此人內實不肖此誠可疾可惡之甚也人賢我而我自不肖必死之症縱扁鵲臨門無下手處真可惜也此篇言人存性須要渾厚不可妄陳管見也密菴謂水菴曰人有毀辱當順受之詎可輕聽聲言妄陳管見大率便有類邪巧多方懷險詖者好逞私心起猜忌者偏廢公議葢此輩趨向狹促所見暗短固以自異為不羣以沮議為出眾然既知我所用終是而毀謗固自在彼久而自明不須別白亦不必主我之是而訐觸於人則庶可以為林下人也師謂水菴曰人有毀謗耻辱于我者當順其來意而忍受之不可輕易纔聽得他所有言語便自妄陳幾多意想此小見也管見者于管中窺天見之不廣也此言人之知識暗短無高明遠見恐傷法體大槩便之人原有黨類邪巧之輩心術多端懷險詖者詖不平之言又也謂有險之人必有諂之語故好逞私心起猜疑忌憎謂忘人大恩記人小過是己非人故偏廢公論葢此等之人趨向最狹促所見極暗短以執迷己見遠異于人便謂是超羣以沮壞眾人之議不與眾人同情便謂之出眾是所以異于君子也然既知我之所運用者是道是理而所毀謗適為他自謗自毀也久而自明不須更要與之分別明白亦不必主我之是以攻訐觸忤于人如是則庶幾可以為林下之有道人也人情易發而難制惟怒為甚能順受其辱先聖皆以為賢則彼小人轉致自謗自毀也此篇言人能至誠向道雖愚即是其器亦可用也自得輝和尚曰大凡衲子誠而向正雖愚亦可用而懷邪雖智終為害大率林下人操心不正雖有才能而終不可立矣見簡堂書杭州淨慈自得慧輝禪師會稽張氏子嗣天童正覺禪師青原下十六世曰大凡衲子胸中至誠而所趨向者皆為道德雖是愚鈍者亦可舉用何故有所本也誠若口多諂而心裏懷邪者雖有智識終必為害斷不可用也大抵叢林中人操守其心若不端正雖有才學有能力終有大害苟立為一方之主必致壞於叢林矣九穴之珠雖小猶為人珍惜若是碔砆任其耀目無所用也此篇言道人須體本正末嚴持大法也自得曰大智禪師特剏清規扶救末法比丘不正之弊由是前賢遵承拳拳奉行有教化有條理有始終紹興之末叢林尚有老成者能守典刑不敢斯須而去左右此節明前賢奉教曰大智禪師特特要剏建規矩者何故原為扶正末法比丘不正之積弊也因此先哲遵依承戴拳拳奉行于是法門中有教化上行下效有條理條整也理治也始條理終條理出孟子紹興之末乃宋高宗晚年叢林尚有老成之人能持先聖典刑不敢頃刻而捨離于左右也近年以來失其宗緒綱不綱紀不紀雖有綱紀安得而正諸故曰舉一綱則眾目張弛一機則萬事隳殆乎綱紀不振叢林不興此節顯今人失宗近年以來漸漸消落失其綱宗壞其紀緒主法者綱不成綱眾理之紀不成紀雖則綱紀仍存安得有如百丈者再起而正諸乎所以在主者舉一綱則眾目自然恢張若主人弛一機弛廢也則萬機俱成隳壞危乎綱紀不能振起禮法隨亦喪亡叢林安得而興也惟古人體本以正末但憂法度之不嚴不憂學者之失所其所正在於公今諸方主者以私混公以末正本上者苟利不以道下者賊利不以義上下謬亂賓主混淆安得衲子向正而叢林之興乎與尤侍郎書此節明古今差別惟聖人體究其根本而正其枝末但憂主人法制禁令不自嚴密而不必憂學者不得其所守然其所以正之者果何在在于公平正直而已然今日諸方主法者全是以私心混公正假公事濟私情本末俱成顛倒在上者苟求利養而不以道德為心在下者賊竊利欲而不知仁義為本上下俱成謬亂賓主總是混淆如是住持安得衲子向正而致叢林之興盛耶言愈平意愈厲如波瀾浩瀚勢不可遏得力處只在秉公持正弘道濟世而已此篇言舉賢任能在主人之智識也自得曰良玉未剖瓦石無異名驥未馳駑駘相雜逮其剖而瑩之馳而試之則玉石駑驥分矣此節先以喻曉曰彼世之良玉當其抱璞而未剖也與瓦石何別名驥在羣而未馳也與駑駘何分逮其剖石而出玉則見其光瑩潔潤也馳騁而試之便知其追風千里也則玉之與石駑之與驥判然而分矣夫衲子之賢德而未用也混於稠人之中竟何辯別要在高明之士與公論舉之任以職事騐以才能責以成務則與庸流逈然不同矣此節方顯其人與夫衲子之有賢才德行未經引用混於稠人之中有何辯別要在主人具擇人眼目真高明有識之士以至公之論舉而出之任他以其職事驗他所有才能責他以其成務使伊才德俱展然後始知與諸庸流逈然不同矣千珠萬珠裏摘得一珠自然價倍尋常其實在賈者之精心妙手也此篇見隱迹自重不為名譽所動也或菴體和尚初參此菴元布袋於天台護國因上堂舉龐馬選佛頌至此是選佛場之句此菴喝之或菴大悟有投機頌曰商量極處見題目途路窮邊入試場拈起毫端風雨快遮回不作探花郎自此匿迹天台丞相錢公慕其為人乃以天封招提勉令應世或菴聞之曰我不解懸羊頭賣狗肉也即宵遁去鎮江府焦山或菴師體禪師台州羅氏子嗣此菴景元禪師南嶽下十六世謂或菴初參此菴元布袋于天台護國寺之時因此菴和尚上堂舉龐居士問馬祖曰不與萬法為侶者是甚麼人祖曰待汝一口吸盡江水即向汝道居士豁然大悟呈偈曰十方同聚會箇箇學無為此是選佛場心空及第歸至此是選佛場之句此菴厲聲一喝或菴聞之豁然大悟有投機頌曰商量極處見題目途路窮邊入試場拈起毫端風雨快遮回不作探花郎自此之後即匿迹于天台山丞相錢相祖字象先問道于或菴禪師仰慕師之為人乃以天封寺請師住持勸勉令其出世或菴聞而笑曰我不解懸羊頭賣狗肉也是夜竟爾逃遁隱身而去實証的人不在名位上著脚試看他遁去是何意思若是今時人惟恐其晚也此篇乃因語識人覓之舉其出世也乾道初瞎堂住國清因見或菴讚圓通像曰不依本分惱亂眾生瞻之仰之有眼如盲長安風月貫今昔那箇男兒摸壁行瞎堂驚喜曰不謂此菴有此兒耶遍索之遂得於江心固於稠人中請充第一座乾道是宋孝宗年號臨安府靈隱寺瞎堂慧遠禪師眉山彭氏子嗣圓悟勤禪師南嶽下十五世因見或菴贊圓通像曰不依本分惱亂眾生瞻之仰之有眼如盲長安風月貫今昔那箇男兒摸壁行瞎堂一見此贊且驚且喜曰不謂此菴有此拔萃超羣之兒耶即徧求之後得于江心焦山寺就于稠人眾中請充第一座為人天眼目名因實顯實至而名自彰何在力求學者勉之此篇見至人識囑不爽時至而符合也或菴乾道初翩然訪瞎堂於虎丘姑蘇道俗聞其高風即詣郡舉請住城中覺報或菴聞之曰此菴先師囑我他日逢老壽止今若合符契矣遂欣然應命葢覺報舊名老壽菴也虎丘記聞翩者如鳥疾飛之貌又自如也訪瞎堂和尚于虎丘寺姑蘇諸僧俗聞或菴有高尚之風即到郡守處舉請住城中覺報寺或菴聞之曰此菴先師囑我他日逢老壽即止若昔者之分符而今得合符契矣遂欣然應命葢覺報舊名老壽菴也雖則事有一定不移之理何故便曰逢老壽止須知慧眼精明見透無遺也此篇明至言感人誰不敬愛也或菴入院後施主請小參曰道常然而不渝事有弊而必變昔江西南嶽諸祖若稽古為訓考其當否持以中道務合人心以悟為則所以素風凌然逮今未泯若約衲僧門下言前薦得屈我宗風句下分明沈埋佛祖雖然如是行到水窮處坐看雲起時由是緇素喜所未聞歸者如市語錄異此或菴入覺報院後施主請法陞座曰佛祖之道通亘古今本不變易世間之事從名入利自然有變昔者如江西馬祖南嶽石頭諸祖若有所作皆稽考前賢之法以為訓誡考究其可不可以定綱宗持以中道專力以合人心必教以悟為則所以淳素之風凜然猶在至今未泯若約衲僧門下一著子縱饒你向言前薦得早已是屈我宗風若更向句下分明轉見沉埋了佛祖雖然如是行到水窮處坐看雲起時便下座由此一番說法緇素聽者喜其聞所未聞自是歸敬者如塵市之來往不絕也黃金有價白玉有光總不是從人得的此篇言知人以道如水投水也或菴既領住持士庶翕然來歸衲子傳至虎丘瞎堂曰遮箇山蠻杜抝子放拍盲禪治你那一隊野狐精或菴聞之以偈答曰山蠻杜抝得能憎領眾匡徒似不曾越格倒拈苕帚柄拍盲禪治野狐僧瞎堂笑而已記聞或菴和尚既領覺報住持之後士庶翕然如鳥之羣聚于于然而來歸向有諸衲子傳言至虎丘者瞎堂聞而喜戲而語曰遮箇山蠻杜抝子杜乃不依軌轍抝是不順人情也來者裏放出些拍盲禪拍拊也盲者自不能行拍拊人肩而行謂其不脫洒也只好治你們者一夥野狐精此言似謔其實著力稱贊欽羨之極或菴聞之以偈答曰山蠻杜抝得能僧是賊識賊領眾匡徒似不曾切莫躲跟越格倒拈苕帚柄大煞顯露拍盲禪治野狐僧箇中能有幾人知瞎堂笑而已怕殺人語出偶然而心情畢露真果是傾葢之遇也不知語脉者豈識二師玅處此篇謂學道要持其平輕重俱不宜也或菴謂侍郎曾公逮曰學道之要如衡石之定物持其平而已偏重可乎推前近後其偏一也明此可學道矣見曾公書謂曾公曰學道之至要猶如秤物者但以平為是偏也不得重亦不可推前則謂之重近後即謂之偏俱過而不平矣昔佛語比丘云學道如調絃之法緊則令弦易斷緩則使聲不和緩急得宜可也明此可以學至道矣朝勤夕怠通病也願以此為準則但持平一句極所難能倘非切于至道者終不得平此篇謂主法者當知叢林根本不可棄厭衲子也或菴曰道德乃叢林之本衲子乃道德之本住持人棄厭衲子是忘道德也道德既忘將何以修教化整叢林誘來學古人體本以正末憂道德之不行不憂叢林之失所故曰叢林保於衲子衲子保於道德住持無道德則叢林廢矣見簡堂書曰人能守道存德實為叢林之大根大本英人哲士乃能成其所學則衲子又為道德之根本也住持人不獎誘衲子是棄厭道德道德既忘住持又將何法修行教化整理叢林誘引來學耶古之人乃體本以正末其所憂者憂吾道德之不行竟不憂叢林之得所不得所也故曰叢林原為衲子所設故其所保者是衲子衲子乃行道德之人而其所保者又在道德住持不保護衲子衲子若無道德是二俱喪亡則叢林必見其廢也是篇詞旨娓娓纍若貫珠總只教人認得根本此篇言主者要在知賢得賢者而法有所繼也或菴曰夫為善知識要在知賢不在自賢故傷賢者愚蔽賢者暗嫉賢者短得一身之榮不如得一世之名得一世之名不如得一賢衲子使後學有師叢林有主也與圓極書夫為善知識要具知人之明識得眾中誰是賢德之者此真為賢德主人也原不在以自賢為賢以得賢為真賢若使傷毀賢人誰為贊助難免愚癡之失蔽覆賢人誰為告語難免暗昧之弊嫉妬賢人誰為相長難免短淺之譏縱使得一身之榮顯不如得一世之美名得一世之美名又不如得一賢德之衲子更為美也此何故也使後之學者有真正之師叢林有道行之主也得人授任實為盛舉果得一真正道者立綱陳紀卓冠一世能繼千載之嘉聲豈不快哉此篇見古人去來自在無所繫戀也或菴遷焦山之三載寔淳熈六秊八月四日也先示微恙即手書竝硯一隻別郡守侍郎曾公逮至中夜化去公以偈悼之曰翩翩隻履逐風一物渾無布袋中留下陶泓將底用老夫無筆判虗空或菴再住焦山之第三載是日實淳熈六年八月朔四將入滅先示微疾手作一書並硯一隻預別郡守侍郎曾公逮至即日半夜化去及明晨曾公至師已逝矣乃作偈而傷悼之曰翩翩隻履逐西風此句言師如初祖之歸也一物渾無布袋中此句又言如憨布袋是物納于袋中而師之布袋竟無一物顯其來去自由也留下陶泓將底用陶泓是硯名有寶泓石泓涵星泓之類此句言師臨終以硯見寄也將底用者謂師之硯我無能用所以云老夫無筆判虗空此句乃侍郎自謙之辭亦是極贊之語謂師之道大如太虗空我亦無此一筆能判此虗空也主賓故是妙手然此中有箇生死不相關處人能知否知之可以與語矣此篇言人器能自有分定不可強教也瞎堂遠和尚謂或菴曰人之才器自有大小誠不可教故楮小者不可懷大綆短者不可汲深鴟鵂夜撮蚤察秋毫晝則瞋目之不見丘山葢分定也此節明人生本有分定曰人生之才力與夫器量本有大小賦性已定豈可教之為大小耶譬如楮之小者決不可以包藏大物楮乃木之皮蔡倫將此造紙綆取水之繩繩之短者豈能汲及其深出莊子至樂篇鴟鵂怪鳥也鳴之則雨晝目無所見夜則能察秋毫亦出莊子秋水篇今引以為譬謂此鳥亦毛羽之屬何故夜間極黑處能撮蚤察秋毫及白日之下大張其目即丘山在前亦不能見此何故也葢生成之分定耳昔靜南堂傳東山之道頴悟幽奧深切著明逮應世住持所至不振圓悟先師歸蜀同範和尚訪之大隨見靜率略凡百弛廢先師終不問回至中路範曰靜與公為同參道友無一言啟廸之何也先師曰應世臨眾要在法令為先法令之行在其智能能與不能以其素分豈可教也範頷之虎丘記聞此節言既定難以強為前舉事物作譬此以人曉之昔者彭州大隨南堂元靜禪師閬州玉山大儒趙約仲之子嗣五祖演禪師傳東山之道法可稱頴悟其幽深奧妙之旨深切而著明東山曾印之曰諸方關楗無逃子掌握矣及至出世住持凡所到處不能振起東山之道圓悟先師歸蜀同覺範和尚訪之大隨見靜公凡于事大率忽略而叢林大體百般規條盡皆弛廢先師知其才器如此一皆不問回至中途範問曰靜與公為同參道友昨見他百凡不整竟無一言啟發開導之何也先師曰大凡應世行道臨眾領徒全要在以法令為先其法令之必行在乎人之智識能力耳其能與不能乃人平素之分定他非不知乃不能行也彼既不能行我豈能教之哉範聞而頷之頷者意有所領也高視濶步大家氣象而威嚴濟濟人孰不知其奈做不出真果差一絲毫不得學者宜自悚慄也此篇言學道要先正心心正而萬物從化也瞎堂曰學道之士要先正其心然後可以正己正物其心既正則萬物定矣未聞心治而身亂者佛祖之教由內及外自近至遠聲色惑於外四肢之疾也妄情發於內心腹之疾也未見心正而不能治物身正而不能化人此節教先正其心謂凡欲發出世心學無上道者先要將此一片心立教端正洗滌得潔淨然後才能正自己之身心亦能正他人之身心也其心既是端正則萬物皆隨而正之矣未聞有人心既治而此身猶亂者也佛祖之教法總皆由內而至于外自近而至于遠聲色之迷人四肢之患外疾也妄想之情欲心腹之患內疾也未見有自心安靜而不能治物自身端正而不能化人者葢一心為根本萬物為枝葉根本壯實枝葉榮茂根本枯悴枝葉夭折善學道者先治內以敵外不貪外以害內故導物要在清心正人固先正己心正己立而萬物不從化者未之有也與顏侍郎書此節明心為根本葢一心為根本萬物為枝葉若根本壯大而充實則枝葉自然榮秀而茂盛若是根本枯悴則枝葉必定夭折所以善學道者先要治其內內治自能敵諸外境不要貪逐外塵而返害自心彼欲引迷導物要先自清淨其心欲去正治乎人必先要正乎自己心既正己既立而萬物不從其教化者未有是理也正心誠意便是出世根基根基匪立萬事俱弛廢矣此篇見道行有時滋養至而味自全也簡堂機和尚住番陽筦山僅二十年羮藜黍若絕意於榮達甞下山聞路旁哀泣聲簡堂惻然逮詢之一家寒疾僅亡兩口貧無斂具特就市貸棺塟之鄉人感歎不已此節明迹雖晦而仁心自顯簡堂和尚住饒州鄱陽縣筦山僅二十載菜用藜藿飯即黍粟胸中絕無一念求榮華顯達之想每嘗下山聞路傍人家有哀泣之聲簡堂為之惻然及詢問之答曰時因寒病竟亡兩人以家貧無斂塟之具所以哀也師就市中貸其棺以埋塟之鄉人感歎不已侍郎李公謂士大夫曰吾鄉機老有道衲子也加以慈惠及物筦山安能久處乎會樞密汪宣撫諸路達於九江郡守林公虗圓通法席迎之簡堂聞命乃曰吾道之行矣即欣然曳杖而來登座說法曰圓通不開生藥舖單單只賣死貓頭不知那箇無思算喫著通身冷汗流緇素驚異法席因茲大振嬾菴集此節明時既至而道化自彰侍郎李公名浩字德遠號椿年幼閱楞嚴如遊舊國參應菴和尚有省謂士大夫曰吾鄉機老真有道德衲子加之仁慈恩惠于人筦山小院安能為師之久居乎即會樞密汪明遠樞密即今稱都察院宣撫即今巡按也諸路宋云路今稱為府以書致于九江郡守林公叔達虗廬山圓通法席迎之簡堂聞命乃曰吾道其行矣即欣然曳杖而來登座說法曰圓通不開生藥舖單單只賣死猫頭此因僧問曹山曰世間何物㝡貴山曰死猫頭丹霞頌曰腥臊紅爛不堪聞動處輕輕血汙身何事杳無人著價為伊不是世間珍喻向上事也不知那箇無思算喫著通身冷汗流緇素聞之一皆驚異法席因茲大振古人三二十年冷山角裏無一點熱氣忽然被人推出來便見熏天炙地詎可與今時旋蒸熱賣者同日而語此篇教學者當存大體勿拘小節也簡堂曰古者修身治心則與人共其道興事立業則與人共其功道成功著則與人共其名所以道無不明功無不成名無不榮此節言古人純公而無私謂古人修其身治其心身正心通之後不私受其道則與一切人共明此道或興一事立一業事成業就之後不私立其功則與一切人共顯其功道既成功既顯不私得其名則與一切人共彰其名所以語其道則道無不明論其功則功無不成著其名則名無不榮所以亘千百世而不泯也宜矣今人則不然專己之道惟恐人之勝於己又不能從善務義以自廣也專己之功不欲他人有之又不能任賢與能以自大也專己之名不與他人共之又不能謙光導物以自達也是故道不免於蔽功不免於損名不免於辱此古今學者之大分也此節謂今人專私而無公今人則不然專行一己之道惟恐人之道勝于己又不肻虗心從善務合其義惟以自為廣也設使立功專欲掩人之功不與他人共之又不能任彼賢能之士以扶助之惟以自為大也設使名成務以為自顯不欲與他人共之又不能謙恭蓄德和光同塵引接于人惟以自為達也如此一片私心雖有道不免為私心所蔽雖有功不免為私心所損雖有名不免為私心所辱此兩般學者乃古今一定之大分別也公私一判品類天淵所以名播寰區而道揚今昔者公也彼私心自恃者所謂根疎者不固基薄者易危故道有蔽功有損有辱必然之理也此篇言學道宜苦志深修蓄養厚大方可發而用之也簡堂曰學道猶如種樹方榮而伐之可以給樵薪將盛而伐之可以作榱桷稍壯而伐之可以充楹枋老大而伐之可以為梁棟得非取功遠而其利大乎此節先以物情況顯謂學道工夫猶如世人種樹相似纔榮長便欲伐之雖無大用可以供給樵薪及稍長盛茂而即伐之可以作榱桷周曰榱齊曰桷即椽也稍壯堅固而欲伐之可以充楹枋楹柱也枋枅枋也老大而後伐之可以為梁棟脊木曰棟負棟曰梁此豈非取功遠而其利大乎所以古之人惟其道固大而不狹其志遠奧而不近其言崇高而不卑雖適時齟齬窮於饑寒殆亡丘壑以其遺風餘烈亘百千年後人猶以為法而傳之鄉使狹道苟容邇志求合卑言事勢其利止榮於一身安有餘澤溥及於後世哉與李侍郎二書此節正明道必真修所以古之學道者惟知其此道固是廣大而無際非狹小之量可學故所立之志高遠深奧而不淺近所發之言尊崇曠濶而不卑小雖遭時勢之齟齬齟齬者謂人齒相值一前一却比坎坷之意或窮于饑寒以至危亡于丘壑人雖往矣其所遺留之道風餘剩之功烈亘百千年而不泯後人猶以為法則世世相與傳之而不休也嚮使他視此道為狹小操守之際苟且取容于己以淺近之志阿諛求合于人以卑小之言事奉權勢之家縱得些利益只好榮顯于一身又安有餘澤恩惠普及於千百世之後哉喻得曉然說得通暢只是無人効行為可惜也此篇見道義相投不異如水乳相合也簡堂淳熈五秊四月自天台景星巖再赴隱靜給事吳公佚老於休休堂和淵明詩十三篇送行其一曰我自歸林下已與世相疎賴有善知識時能過我廬伴我說道話愛我讀佛書既為巖上去我亦為膏車便欲展我隨師同飯蔬脫此塵俗累長與巖石居此巖固高矣卓出山海圖若比吾師高此巖還不如簡堂和尚淳熈五年四月自天台景星巖再赴隱靜寺之請吏科給事吳公芾乃宋之明儒逸老于休休堂和陶淵明先生韻一十三首與簡堂和尚送行其一曰我自致仕以來休歸林下已與世間久疎遠矣幸賴有師乃真善知識時時能過我之草廬為我說出世妙道之語又愛我能讀先佛經書師歸巖上我亦備其膏車與師同去既到巖中師即展而食于我我亦幸然同師飯蔬脫卸塵勞一切惡俗之累也但願長長與師同居此巖然則此巖固是極高峻矣卓然逈出于山海圖𦘕之表山海經中有圖寫盡天下名山勝境巖雖高妙若將比對吾師道德之高而此巖又則不如矣我生山窟裏四面是孱顏有巖號景星欲到知幾年今始信奇絕一覧小眾山更得師為主二玅未易言其二曰我休餘生于山窟裏四面皆是孱顏之狀孱顏者山高貌殊可愛也別有一巖名曰景星意每欲到而未能往懷之亦幾年矣今日既到始才信知果然奇絕何以見奇試一觀覽之眾山矗矗萬水溶溶俱小之也豈非奇絕乎不惟巖之奇妙更得吾師為巖之主以此二妙未可容易言也我家湖山上觸目是林丘若比茲山秀培塿固難儔雲山千里見泉石四時流我今纔一到已勝五湖遊其三曰我家搆居于湖山之上目之所觸無非是綠水青山幽林丘阜可謂得其所矣若比此巖之高絕秀麗則吾之居處若培塿然豈能儔類之哉培塿小阜也其所以不能儔匹者何試看此處一放目間則雲山千里可見又所喜者泉石四時常流我今日剛纔一到幽趣瀟然便已勝過昔日之五湖遊矣我年七十五木末掛殘陽縱使身未逝亦能豈久長尚冀林間住與師共末光孤雲俄暫出遠近駭蒼黃其四曰我今年已七十五矣其光景猶如木梢之上挂得一片殘陽相似縱使此身雖存未往又豈能久長耶所謂來日無多雖則老去而意中尚望住此林間與師共攝其末光也師今雖有別去亦如孤雲之暫出遠近總皆驚駭蒼黃蒼黃急遽貌昔湯時七年不雨忽孤雲暫出犬吠狂走皆蒼黃失措也愛山端有素拘俗亦可憐昨守當塗郡不識隱靜山羨師來又去媿我復何言尚期無久住歸送我殘年其五曰喜愛山林端的是素來性分也拘執俗情誠為可憐如我向來出守於當塗時孜孜宦海竟不知有箇隱靜在彼為奇為妙此皆為俗事之所拘也獨羨吾師曾從隱靜來今向隱靜去而真得隱靜之樂我媿不知復何言哉去雖復去惟期切莫久住願歸來送我了此一段殘年也師心如死灰形亦如槁木胡為衲子歸似響答空谷顧我塵垢身正待醍醐浴更願張佛燈為我代明燭其六曰吾師之心萬慮俱忘已如死灰然心既靜形亦槁矣莊子云子游問南郭子綦曰何居乎心固可使如死灰形固可使如槁木乎然則心形俱寂何故又為四方衲子之所歸從此亦似響答于空谷應物無心也顧我塵勞垢穢之身正欲待師以醍醐而浴我也更祈吾師張顯佛祖心燈以代光明而燭于我也扶疎巖上樹入夏總成陰幾年荊棘地一旦成叢林我方與衲子共聽海潮音人生多聚散離別忽驚心其七曰巖上之樹一一扶疎掩映一入夏來茂盛成陰蔭覆巖中可謂清凉之極也昔時乃荊棘叢生之地幾年之間不覺一旦竟成梵剎我方才與四來衲子聽吾師說法如海上潮汐之音不失時也幸然相聚而又要別去大抵人生世間苦多聚散而今日又云離別不由人不忽地而驚心也我與師來往歲月雖未長相看成二老風流亦異常師宴坐巖上我方為聚糧倘師能早歸此樂猶未央其八曰我與師相與往來歲月雖未久長而彼此相看竟成二老人也夫既老矣其彼此風流較之異于常輩昔日師來寂然宴默敷坐巖上我則聚糧作供養主倘若吾師早得歸來此等之樂亦未盡矣紛紛學禪者腰包競奔走纔能說葛藤癡意便自負求其道德尊如師葢希有願傳上乘人永光臨濟後其九曰紛紛紜紜不知幾許學參禪者而腰包頂笠競逐馳驅奔南走北竟無一箇真實參學的衲子三年兩載口裏學得幾句扯葛藤語一片愚癡之心便自負以為得手求其道隆德勝如師者實所希有我更願師相傳此道必須要大乘根器之人使將來永遠光大繼起臨濟之後可也吾邑多緇徒浩浩若雲海大機久已亡賴有小機在仍更與一岑純全兩無悔堂堂二老禪海內共期待其十曰吾此鄉邑之中染衣剃落者極多浩浩然如雲興海湧不可勝數大機即杭州天寧寺重機明真禪師台州人嗣玄沙師備禪師久已遷化矣幸喜而有小機在也小機即簡堂行機禪師仍復更有一岑即圓極岑和尚今此二老乃道純德全之真善知識彼此無過無悔二師之道風堂堂大盛海內禪流總其相期相待也古無住持事但只傳法旨有能悟色空便可超生死庸僧昧本來豈識歸履買帖坐禪牀佛法將何恃其十一曰古來原無住持之事但只各自所證以心印心為傳法之宗旨也凡學者果有能真實悟到諸色皆空之處便可以超越生死庸僧者戚戚于衣食念念于名利生不知來死不知去尋常粥飯之流也竟爾昧失天真本來之性自己尚且不知又豈知西來大意乎來意既不得知至于西歸之履轉更不知矣達磨大師御塟熊耳山魏武帝使宋雲往域回至𦵇嶺遇師手𢹂隻履雲乃問何往師曰西天去雲歸告帝帝令起壙唯空龕隻履在焉且今時衰道喪竟有廣送珍奇買著貴人長者之書帖舉薦來坐禪席虗妄如此佛法將何可恃而能振也僧中有高僧士亦有高士我雖不為高心麤能知止師是箇中人特患不為爾何幸我與師俱是鄰家子其十二曰出家為僧者實有道充德備之高僧吾儒士中亦有超羣拔萃之高士我雖不能為高人而此心粗能知止足也粗略也師本是高僧中一箇挺特丈夫為欲隱其形迹特不肯居其高尚如是之人誠難儔侶不審我有何緣幸然得與吾師生同鄰隱同山道同樂也師本窮和尚我亦窮秀才忍窮心已徹老肯不歸來今師雖暫別泉石莫相猜應緣聊復我師豈有心哉其十三曰師之志能固守斯窮是箇窮得的和尚我亦固守斯窮是箇窮得的秀才忍窮之心彼此俱已得透徹矣可謂無礙解脫人也然彼此既能證得此窮字受用今且老矣豈肯不歸心于此樂耶如今師雖暫別我故告諸泉石中人幸勿猜疑師今為應彼之緣聊以我復之也豈真是有心而欲往哉理學名儒深窮道窟不感而感也解脫宗師應化無方不應而應也二公良遇豈非千載之幸乎此篇見遁迹自持果熟香飄無心道大也給事吳公謂簡堂曰古人灰心泯智於千巖萬壑之間㵎飲木食若絕意於功名而一旦奉紫泥之詔韜光匿迹於負舂賤役之下初無念於榮達而卒當傳燈之列故得之於無心則其道大其德宏計之於有求則其名卑其志狹此節明古人無心而道自顯吳公謂簡堂和尚曰古之學者死灰其心泯滅其智深藏于千巖萬壑之間從溪㵎而飲以草木為食何甞有意于功名利養及至道成德備聲名遠播一旦奉天子紫泥之詔紫泥者天子六璽皆以武都紫泥以封函匣使鬼神不敢視也武都即今階州其山水皆赤故將以為印色猶然韜光匿迹或在負舂賤役之下本無心於榮達而後竟當傳燈之列非有冀望非是希求要皆得之于無心故其道益大其德愈宏若使作計以求則其所得之名返卑所存之旨轉狹矣惟師度量凝遠繼踵古人乃能棲遲於筦山一十七年遂成叢林良器今之衲子內無所守外逐紛華少遠謀無大體故不能扶助宗教所以不逮師遠矣此節證簡師深蓄而德自彰惟師之度量凝遠乃可繼續慧命接踵古人也遲止息于筦山一十七年甘守名分遂成法門之良器邇來衲子觀其內無實德而外逐紛華競爭名利少有法門遠計全無教化大體所以不能扶助宗教以此輩較之誠不及師遠矣替古人爭豪強為今人添憎習誠有忿然不平之感此正舉其名而指其實使人知世有所尊所褻也此篇教人行事要存正理勿縱私心也簡堂曰夫人常情罕能無惑大抵蔽於所信阻於所疑忽於所輕溺於所愛信既偏則聽言不考其實遂有過當之言疑既甚則雖實而不聽其言遂有失實之聽輕其人則遺其可重之事愛其事則存其可棄之人斯皆苟縱私懷不稽道理遂忘佛祖之道失叢林之心故常情之所輕乃聖賢之所重古德云謀遠者先驗其近務大者必謹於微將在博采而審用其中固不在慕高而好異也與吳給事書世人之常情觸境隨情少有不被其所惑者大抵被惑有四種一則凡聞人語不審察是非是為輕信所蔽也二則或遇事欲為不為是阻于所疑也三則或于他人心存褻慢是忽于所輕也四則或于物我極意營求是溺于所愛也信既有偏則所聽之言定不考其虗實遂有過情不及情之言其惑一也我既有疑于彼則彼之言雖是當理亦不肯聽遂有失實之聽其惑二也我苟輕忽彼人則彼實有可尊之事亦並棄之不肯用其惑三也我若深愛其事而不問彼實是可棄之人但因其事以信存其人其惑四也此四者皆是苟且以縱其私情而不稽考真正道理遂致忘佛祖之道違背大眾之心凡尋常人情之所輕忽者實為聖賢之至重者也古德云欲謀遠大之事必先以近小者驗之欲為廣大之作必先于微細處謹之凡事將在博采廣覽而審用于其中詩云勞心博采用固不在慕高而好異也縱情背理慕高好異由不學之所至也勞心博采用聖人言也思之思之此篇見古人以道自適外境不能移也簡堂清明坦夷慈惠及物衲子稍有詿誤蔽護保惜以成其德甞言人誰無過在改之為美此節出其言行謂簡堂和尚生平為人清明坦夷清乃廉而不淈明乃善知賢否坦蕩而平夷加以慈恩惠及於人詿誤即過差也衲子中稍或有些差錯過失便與他蔽護保惜暗使悔改以成人之德行甞言人誰無過在改之為美也住鄱陽筦山日適值隆冬雨雪連作饘粥不繼師如不聞見故有頌曰地爐無火客囊空雪似楊花落歲窮衲被蒙頭燒榾柮不知身在寂寥中平生以道自適不急於榮名赴廬山圓通請日拄杖艸屨而已見者色莊意解九江郡守林公叔達目之曰此佛法中津梁也由是名重四方其去就真得前輩體格歿之日雖走使致力為之涕下此節明其實事住鄱陽筦山日正遇季冬月雨雪連日不止饘厚粥也饘粥不繼者似絕餐也師宴如也如不聞見故有頌曰地爐無火客囊空雪似楊花落歲窮衲被蒙頭燒榾柮不知身在寂寥中榾柮乃樹無枝葉短木也即此知其清廉之至也平生以道自得為樂不急於求名赴廬山圓通請之日惟拄杖草屨而已有見師形儀使人之顏色敬而莊鄙意消而解也九江郡守林公一見乃曰此佛法中之津筏橋梁也由是名重四方其師之行止去就真得古人之體格入寂之日雖尋常走使用力之人無不痛哭流涕葢其德感人如此凡學者看書要看一篇之中那裏是關係處如此中謂雨雪連作如不聞見者是勉強做得的麼觀此則眾德備宜矣此篇教人當知時識機任緣而住也侍郎張公孝祥致書謂楓橋演長老曰從上諸祖無住持事開門受徒迫不得已像法衰替乃至有實封投狀買院之說如鄉來楓橋紛紛皆是物也此節明常人無智侍郎張孝祥致書與蘇州楓橋橋在寒山寺前演長老即常州華藏遯菴宗演禪師福州鄭氏子得法于大慧禪師南嶽下十六世孝祥問道于師謂曰從上諸祖無有立住持之事或有開剏山門受納徒眾皆不得已為人逼迫而為之也像季之時佛法衰替乃至有一種求名之輩結托當道有力宰官轉本以求實封賜額賜號者更有求利者投托士夫商賈申投情狀偽賣偽買以網錢帛者這些說話一向已來楓橋寺裏紛紛紜紜說長道短角觜不止皆是此等人物也公之出處人具知之啐同時元不著力有緣即住緣盡便行若稗販之輩欲要此地造地獄業不若兩手分付為佳耳寒山寺石刻此節明演公出處如公之或出或處領眾行道人皆知之啐者如鷄抱卵子將欲出以嘴吮曰啐母知欲出以嘴囓曰啄謂人之機緣相投亦如之也若使啐同時元不要人著力有緣即任緣而住無緣則拽杖便行若使稗販之輩欲要貪戀此地巧用心機乃造地獄業也公不若以兩手分付與他返為佳耳稗販者稗是草似稻而非稻俗謂良田中𦴭稗松林中荊棘也或作裨販裨音悲附也謂裨附我法中以佛法貪販利養也故楞嚴云裨販如來造種種業此一篇語勝轉一大藏摩訶般若自能令汝消災獲福此篇美有實德者不隨世改易也慈受深和尚謂徑山訥和尚曰二三十年來禪門蕭索殆不堪看諸方長老奔南走北不知其數分煙散眾滿目皆是惟師兄神情不動坐享安逸豈可與碌碌者同日而語也欽歎欽歎此段因緣自非道充德實行解相應豈多得也更冀勉力誘引後昆使曹源涸而復漲覺樹凋而再春實區區下懷之望也筆帖東京慧林寺慈受懷深禪師壽春夏氏子嗣長蘆崇信禪師青原下十三世臨安府徑山妙空智訥禪師亦嗣長蘆信禪師慈受和尚贊美徑山曰近二三十年來禪門下漸漸蕭索寂寥也殆不堪看諸方作長老為著名利二字不是奔南便是走北如此者不知其數又一種沒意志的不是分煙便是散眾如此者滿目皆是者一段光境甚為可慘惟獨老師兄神與情皆凝然不動自能坐享安逸此等受用豈可與碌碌庸常輩同時而語也欽歎欽歎乃敬服之極也此段因緣自非道德充實行解相應豈可多得也泯解而修曰行心明朗徹曰解更所冀望者惟敏勉道力誘引來學且曹溪之淵源今將涸竭矣惟兄之法澤能使之復漲菩提之覺樹今將凋落矣惟兄之道風能使之再春此實區區下懷之所望也區區小貌自謙之辭此篇不重在贊德人之德而重在勉力于後昆也所謂源將涸而復漲樹將凋而再春其企望不淺此篇教人忍讒息謗勿事爭競也靈芝照和尚曰讒與謗同耶異耶曰讒必假謗而成葢有謗而不讒者未見讒而不謗者也夫讒之生也其始因於憎嫉而終成於輕信為之者諂小人也古之人有輸忠以輔君者盡孝以事親者抱義以結友者雖君臣之相得父子之相愛朋友之相親一日為人所讒則反目攘臂擯逐離間至於相視如宼讐雖在古聖賢所不能免也然有初不能辯久而後明者有生而不能辯死而後明者有至死不能辯終古不能明者不可勝數矣此節戒人切毋輕信杭州靈芝圓照湛然律師餘杭唐氏子禮慧才法師受戒時感觀音像放光師自設問曰讒譖與誹謗是一樣是兩樣讒者言深切譖害賢良也謗者未至深切但言人之惡也答曰大抵讒害于人者必先假誹謗而成葢世人但有誹謗而不加讒害者有之未見有讒害于人而不先加誹謗者也夫讒之所以生其始皆因憎惡嫉忌于人而終成于輕聽傍人之說作此等說話者原是諂媚便之人不可聽也此事不但今日如此如古之為人臣者有捐軀赴死輸忠以奉君為人子者有委曲承順盡孝以事親為結友者有輔仁抱義盡心以相契然此情和理順之際君臣之相得父子之相愛朋友之相親可謂至矣忽然一旦為小人讒謗致使父子生瞋而反目兄弟鬪諍而攘臂君臣疎斥而擯逐一相接見視之如宼讐孟子曰君之視臣如草芥則臣視君如宼讐此等情狀雖上古聖賢所不能免皆由小人之讒謗也然有初時不知為小人愚弄成此離間久而後知者有之又有盡此一生竟不能辯直至死而後知者亦有之更有至死之後亦不能辯即遲之終古不能明知者不可勝數矣子游曰事君數斯辱矣朋友數斯疏矣此所以戒人遠讒也烏乎讒與謗不可不察也且經史載之不為不明學者覽之莫不知其非往往身自陷於讒口噎鬱至死不能自明者是必怒受讒者之不察為讒者之諂也至有羣小至其前復讒於他人則又聽之以為然是可謂聰明乎葢善為讒者巧便鬬搆迎合蒙蔽使其瞢然如為鬼所魅至有終身不能察者此節教人明察其非此又承上忠君信友而來言讒謗之害不小乃引古人之言為證子游孔子弟子姓言名偃字子游數頻凟也事君苟諫之不行則去之可也若頻為凟諫則聽者厭煩小人乘間讒謗輕則去其爵重則傷其身是求榮而返辱也是謂事君數斯辱矣導友不納則止之可也若頻為勸賣則聽者厭煩小人乘間讒謗小則口然而心怒大則憤恨而仇報是求親而返疎也故曰朋友數斯疏矣此所以戒人遠讒也烏乎讒之與謗不可不深加審察宜一切經史載之註之不為不詳一一分明說出凡諸學者讀之覧之莫不知聽人讒謗終是敗德往往見人此身陷落于讒人口中噎是哽于喉也鬱結于心也哽結至死而不能自察明白者無別是必怒時偶受讒人之言而不審實竟受讒人之諂也至有羣小立于吾前復讒于他人則吾又輕聽愈篤信之以為然自既受其讒復信讒于他人是可謂之聰明乎葢善為讒謗者有多般作權弄巧多種方法便利鬬搆兩頭逢迎取合于人將他蒙昧著覆蔽著使人昬瞢猶如鬼魅所著以至終身而不能察識為讒人所迷惑于我心也傷哉孔子曰浸潤之譖膚受之愬其言浸潤之來不使人預覺雖曾參至孝母必疑其殺人市非林藪人必疑其有虎間有不行焉者則謂之明遠君子矣此節教人預覺其言此又承上孝親而來言讒謗之害人不小能令至孝之子亦見疑于賢母孔子姓孔名丘字仲尼周靈王庚戌二十一年十一月初四日生於魯國兖州鄒邑平鄉晉昌里父叔梁紇母顏氏至唐七帝玄宗諡號文宣子張問明子曰浸潤之譖膚受之愬不行焉可謂明矣註曰浸潤者如水浸灌滋潤漸漬而不驟也譖者毀人之行言毀人之行漸漬而不驟則聽者不覺其入而信之深也膚受謂肌膚所受利害切身愬與訴同愬者訴己之怨也言人訴冤急迫而切則聽者不及致詳而發之暴矣二者皆難察識人能察之則可見其心之明照之遠不蔽于近也曾參字子興孔子弟子武城人至孝孔子因之作孝經秦之甘茂曰魯人與曾參同名者殺人人告其母曰汝子殺人母曰吾子仁孝不殺人織機自若少頃人又告曾參殺人母又自若又一人告之其母投杼下機踰牆而走今臣賢不及曾參王信臣又不及參母疑臣者不特三人臣恐大王投杼矣秦武王任使甘茂伐韓故作此語也韓子曰龐葱與魏大子質于邯鄲謂魏王曰今一人言市有虎大王信乎王曰否曰二人言信乎王曰疑之矣曰三人言信乎王曰寡人信之矣曰夫市無虎明矣然三人言而既信今邯鄲去大梁遠于市議臣者過于三人願王察之王曰寡人自為知方辭行果有讒言于王者間有不疑不信此等說話者致令讒謗不得行焉此可謂高明遠達之君子也予以愚拙疎懶不喜諂附妄悅於人遂多為人所讒謗予聞之竊自省曰彼言果是歟吾當改過彼則我師也彼言果非歟彼亦徒為耳焉能凂我哉於是耳雖聞之而口未甞辯士君子察不察在彼才識明不明耳吾孰能申其枉直求知於人哉然且不知久而後明耶後世而後明耶終古不明耶文中子曰何以息謗曰無辯吾當事斯語矣芝圖集此節方出自己之言此乃靈芝和尚自敘忍讒之由引文公息謗以自消弭也謂我賦性愚拙為人疎散而懶墮生平不喜諂媚阿附虗妄取悅于人遂多為小人讒謗予聞人讒謗之語私自省察曰彼言果是吾當自知改過彼人即是我之師也彼言若非彼自作自受徒然妄為耳浼染污也又焉能染污于我哉于是耳雖聞之而口未甞辯士君子或能審察于我或不能審察在彼人自家才識之明與不明耳吾豈必欲申明是枉是直求知于士君子哉然且不知今日不明久而後明也或有之又或此生不明後世而後明也亦有之甚至有終古而不能明者亦有之也文中子曰何以息謗曰無辯吾當承事斯語以自忍也文中子姓王名通字仲淹洛陽龍門人歿後門人諡為文中子遊長安見隋煬帝奏太平言十二䇿帝大悅既歸九年續修六經大備賈瓊問曰何以息謗子曰無辯問如何止怨曰無爭乃云聞謗而怨者讒之囮見譽而喜者之媒絕囮去媒讒遠矣囮音訛鳥媒也古人氣魄何其廓落如此處難處之事非至人則不能也此為真知悔者誠意所至耳此篇教真參實學究其至極之所以也懶菴樞和尚曰學道人當以悟為期求真善知識決擇之絲頭情見不盡即是生死根本情見盡處須究其盡之所以如人常在家愁什麼家中事不辦此節期以頓悟臨安府靈隱寺懶菴道樞禪師嗣道場居惠禪師南嶽下十八世謂若要做出世丈夫必當以徹悟為期更須要真正明眼之師為我剖決其疑滯揀擇其邪正所謂悟後正要見人若有一絲頭情識念頭未盡即是生死根本及到情見盡處更須要究竟他極盡之所以古云莫謂無心云是道無心猶隔一重關譬如人常常在自己家中愁什麼家中大小事務不辦溈山云今時人雖從緣得一念頓悟自理猶有無始習氣未能頓盡須教渠淨除現業流識即是修也不是別有行門令渠趨向溈山古佛故能發此語如或不然眼光落地時未免手脚忙亂依舊如落湯螃蠏也此節引證真修溈山祐祖道今時道流雖則從緣得一念頓悟自理猶尚有無始劫來三業十惡之習氣未能頓然除盡須教他二六時中但自己淨盡除去現前業識流浪中之微細生滅即是修也不是此外別有箇甚的法門令渠趨向溈山古佛乃能發此語如或孟浪承當待到眼光落地之時未免手忙脚亂依舊猶如箇落沸湯的螃蠏相似可歎也靈丹一粒點鐵成金又何須千言萬語只要受持得淨除現業流識一語可以成等正覺此篇見招提中物不可輕用因果歷然也懶菴曰律中云僧物有四種一者常住常住二者十方常住三者現前常住四者十方現前常住且常住之物不可絲毫有犯其罪非輕先聖後聖非不丁寧此節言僧物不可涉私律中云僧物有四種一者常住常住謂眾僧舍宅什物樹木田園僕畜米麥等物以體局當處不通餘界但得受用不許分賣故重云常住常住也二者十方常住謂寺中供僧成熟之飲食等物體具十方非局本處善現律云不打鐘食犯偷盜罪今諸寺同居同食食既成熟乃打鐘鼓葢明十方僧俱有分故也三者現前常住此有二種謂一物現前二僧眾現前但此物惟施此處現前僧眾故也四者十方現前常住謂亡僧之物施輕體同十方唯本處現在得分故毗婆沙論云盜亡僧物則于誰處得根本罪答已作羯磨者于羯磨眾處得若未作羯磨者普于一切善說諸法眾得今詳分亡僧物十方來僧在羯磨數前即得羯磨後來不得也且常住之物不可絲毫有犯設一犯著其罪苦非輕先聖如諸佛後聖如諸祖誰不以此常住之物切切戒之也往往聞者未必能信信者未必能行山僧或出或處未甞不以此切切介意猶恐有所未至因述偈以自警云十方僧物重如山萬劫千生豈易還金口共譚曾未信他年爭免鐵城關人身難得好思量頭角生時歲月長堪笑貪他一粒米等閒失却半年糧此節教戒謹須當諦信往往或住持或執事聞此叮嚀教戒之言未必能信縱信知謂地獄罪苦不輕而未必能行山僧或行脚時或住院時出處之間未甞不以此眾僧之物切切存之于心也不可輕犯猶恐時中有所未到因述偈以自警云十方僧物重如山萬劫千生豈易還金口共譚曾未信他年爭免鐵城關金口即大覺金仙之口乃佛說也人身難得好思量頭角生時歲月長堪笑貪他一粒米等閑失却半年糧此如午夜鐘聲不覺令人大夢警起更有沉于醉鄉者雖聞亦不醒也為之奈何此篇申明禪教不是二法元一理也懶菴曰涅槃經云若人聞說大涅槃一句一字不作字相不作句相不作聞相不作佛相不作說相如是義者名無相相達磨大師航海而來不立文字者葢明無相之旨非達磨自出新意別立門戶此節總明佛旨無差佛言若有人聞我所說大涅槃梵語涅槃此云滅度謂滅除煩惱度生死海也又涅即不生槃即不滅不生不滅之理名大涅槃或聞一句或聞一字于其中間不作字相者知文字性空不作句相者達言語性空不作聞相者能聞之性本空不作佛相者能說之人亦空不作說相者所說之法亦空如是義者指上五種空相此為無相之相也菩提達磨乃香至國王之次子在西天為二十八祖東土為初祖謂大師泛舟渡海而來面壁嵩山直指人心見性成佛不立文字葢本涅槃經說乃明此無相之旨非初祖新出己意別開一無相法門也然則如來如此而說祖師以此教人豈有兩般近世學者不悟斯旨意謂禪宗別是一種法門以禪為宗者非其教以教為宗者非其禪遂成兩家之說互相詆訾譊譊不能自已噫所聞淺陋一至於此非愚即狂甚可歎息也心地法門此節言無識妄生分別近世粗心學者不悟知佛祖一理謂禪宗別是一種法門以禪為宗者單主于禪即非習教者之人以教為宗者單主于教又非習禪者之士遂成兩家之說不惟分疆立界而返致互相毀謗譊譊喧爭也喧爭而不止噫者歎息此輩不通大道者所聞卑淺而兼鄙陋相爭相謗以至如此要知此等人不是愚人即是狂徒甚可歎息也于三百篇之後出此一篇收盡從前許多說話總歸于無相旨中而已若人知得經意祖意了了無疑則三百篇皆為剩語旨哉言乎左都御史張照得天居士心賦并序臣幼誦詩書惟通章句長緗窺素徒亂狂華既理障之沉深亦欲根之堅固周旋樂趣彌益苦荄意蕊紛開頭燃良痛側聞宗說能使心地清凉乃閱教文涉獵龍宮寶藏初知山河大地本是妄生地水火風原從幻結一身非有此外何言然而明暗色空塵塵和合身親民物了了當前欲遣去則皆非豈混同而猶是捨一取一罔息於馳求前三後三彌增其較計得少謂足中止化城慕聖厭凡兩頭壁壘惟身惟口惟意步步交加曰貪曰嗔曰癡層層涉入滅此生彼終無已時誤後悔前豈能自在幸十世福田之廣種遇一人首出之垂慈欽惟皇上參贊三無經綸萬有用周孔之典則致唐虞之恊和尊居九重而如遊山澤恩覃八極而視等浮雲同太虗之穆清若杲日之明照現帝王身而為說法發如來藏於一微塵夙契一貫之心源宏闡別傳之妙旨未嘗言說已震雷音普示提撕常垂甘露憐臣迷頭認影為臣解結開巾遂使蛙出井心翹首而瞻天際蜂穿紙隙翾飛以近日輝始知本性如然此門不二大學之道固御世之權衡直指之傳乃明德之統要非敘倫庸禮脩政明刑何以妙此心之法相非破妄泯真圓通普覺何以濬萬化之靈源空有相倚而成盡其有纔圓空性幻實異名而一履其實始了幻因名相空華涅槃實際如猶未到寸絲不挂之實際將何以采萬善具足之空華世出世間不取一法空投空際𡩋捨萬緣歷劫難報斯恩大千的歸一旨今者奉勅恭撰心賦一篇進呈御覧爰述此序自志本末夫心也者譬喻莫施敷陳奚盡嬰兒開口已了根源佛祖相商莫能下語即金針在手何由捉霞彩以裁縫縱綵筆凌雲豈可取太清以繪畫然一絲孔宛然華藏千須彌不異毫毛物物圓成頭頭顯露豈臣斯賦獨乃非心心亦非心賦甯是賦蓋即鸚鵡剪舌而學語蚯蚓鼓脰而鳴歡黃花對日而舒顏翠竹因風而吟籟云爾賦曰無生無滅無在無遷慈氏以後威音以前卓爾獨存而離彼離此湛然常住而匪中匪邊惟圓斯覺惟覺斯圓圓不見圓圓周他自覺無所覺覺徧人天拈起十方虗空不足以絜其大數盡恒沙萬有不足以語其全芥子孔中容納四大海水屈伸臂頃直過萬八千年攘為己有則曰正法眼藏權當人情則曰直指別傳何凡何俗何聖何賢何迷何悟何法何禪六趣三塗全該真體十身四智靡隔妄緣起而無生諸佛入涅槃於眾生識海寂而常動眾生墮生死於諸佛心源無一塵而不入如大圓鏡無一剎而非真是金剛圈若大火之聚空濯手難近若水銀之墮地轉瞬渺然法法依之影現如摩尼珠體非一色物物仗此光騰如寶絲網層映相連擴為六合而又包六合之外故莫量其外之際碎為微塵而又居微塵之中故莫測其中之堅色色全彰頭頭顯露廓然無相而眾相交橫寂爾無音而羣音並吐欲要其終智勝之所不能窮欲原其始然燈之所不能遡欲走以避則九天九地總相逢欲捉以觀則千劫千生不能遇茫無朕跡何地可以染污周遍大千何所容其保護大小同量高卑同度有無同體生滅同住亦是亦非亦起亦仆亦遠亦近亦緇亦素了之則一道齊平執之則千途各立依回於地水火風眩轉於受想行識牽纏於見聞覺知泥滯於去來今昔迷誤於狐唾貍涎尋探於破書殘籍茫昧於泬寥杳冥計較於寸分丈尺拈弄於有覺精魂斷滅於無知木石厭棄於人我眾生埋沒於暗明空色安排於佛剎道場起倒於世諦徽纆習慣於揑目生花癡著於遺金拾礫淆亂於欣就厭離紛紜於得失損益烏非黑鶴非白無始劫來名相迹道黑道白鶴正白烏正黑六結當心不調直疑白疑黑是以著處便粘交加不釋以膠投漆而漆亦為膠以客迎賓而賓全是客春蠶成繭而繭還縛身夏蟲依冰而冰先喪魄熱毒海漫漫沉沉鐵圍山巍巍岌岌四種相怪怪奇奇一個我綿綿脉脉枕中槐國指揮鳥虎龍蛇石裏火光分別卵胎化濕人間之滴水難消地獄之程途孔亟火厚二百肘何處蓮華風吹三千年幾時安宅病既千端丹斯萬品西天四七受藥師之親傳東土二三共醫王之正稟或拈大地作伊蒲之饌充彼飢虗或緝浮雲成金縷之衣蘇其凚㾕或然香燈寶炬照彼昏酣或驅法電智雷醒其寱寢或喻空花或方二月滌除有漏根窠或指四大或標六塵卷却無明衾枕或現檀那之力佛鉢可滿以少華或建精進之幢金剛不雜於凡餁或戒香薰習出白淨於泥塗或定水淵澄返真常以漸寖或禁嗔蛇之妄動免燒功德之林或喻太末之難緣拈出菩提之錦或收狂象以擐拴或禁亡猿以圈檻或揮智慧劍破欲網之重重或棹般若航度愛河之黮黮或說乾城大海上無邊龍蜃樓臺或譚淨土寶池中無數金銀菡萏或顯三身應現非斷非常或示一顆圓成不增不減裂開一味平等之法爾如然演出萬般差別之教宗頓漸超方便住圓覺止啼楊葉婆娑成佛果斷輪回翳眼空花荏苒蓋燒須彌雅宜螢火而束虗空純賴龜毛撥開幻影浮光玉龍迴跋築著銀山鐵壁石虎聲猇花亂澄空五宗各飄其香雨浪翻平地三關長卷夫銀濤非半非滿非偏非圓一種沒花之果有權有實有照有用單通無木之橋走殺天下參禪衲子惑倒世間成佛英豪獅兒口喝樹頭風縛歸袖裏兔子角挑潭底月挂在眉稍八海水化為醍醐無非毒藥一些子現成法寶只這毫毛即此是實際理地即此是夢幻影泡何愛何憎刀割檀塗一般滋味何取何舍釋迦調達兩處逍遙非見非聞涉解會而皆為自棄非無非有滯方隅而即起塵勞等量均齊若動一念即資其顛倒本來具足若向他求轉益其紛囂必也如杲日之皎皎必也如太虗之寥寥必也如風輪之急轉必也如川月之普照須如是人明者個事寶鏡光千千不隱切忌眼觀師子弦喤喤厥聲直須目視如水成冰是冰非水而全水是冰如金成器是器非金而全金皆器開眼作夢中之佛六度萬行圓滿方成一事不為操心降鏡裏之魔十聖六凡齊遣始知兩頭皆是事即理理即事二障全消迷即悟悟即迷雙因並置隔時能隔所隔是名為愚了却無了可了乃稱曰智似騰蛇之遊霧住霧非空若番象之渡河履河皆地不執緣以修證不住相以布施玉水自然澄澈一任波濤金山不畏泥封何為嗔恚德瓶撲而不破只因包舉三千道岸登而捨航始信泥洹不二夫惟者個不落圈䙡無一法自中出無一法自外至昭昭太古之先歷歷窮未來際大光明藏覿體無依清淨本然獨尊至貴生人生物生佛絕妄絕真絕對即別而同四不離一即同而別一不離四一本無一四甯有四能所兩亡色空雙寄體離凡聖路絕彼己靡間一絲云何可秘本無所悟強名曰會蓋見以心明而絕明以見絕而澄見絕故真俗垢淨不礙眼光何大千之可辨心明則菩提煩惱一路涅槃何七處之可徵一珠入一切珠一切珠入一珠無分無合一月普現一切水一切水月一月攝頓圓頓成窮三際而直立亘十方而大橫百千萬劫如是南北東西等平斯為華嚴會之方廣是以無量壽而圓明和碩雍親王圓明居士上諭朕意禪宗莫盛於今日亦莫衰於今日直省剎寺棊布開堂秉拂者不可勝計固莫盛於今日也然天下宗徒不特透得向上一關者罕有其人即能破本參具正知見者亦不多得宗風如此實莫衰於今日也夫達磨西來九年面壁方得二祖慧可傳衣以佛祖之慧力接引人天尚俟九年之久始得一人今溥天之下萬剎萬僧萬僧萬拂師以盲傳弟以盲受人人提唱宗乘箇箇不了自心豈不使正法眼藏涅槃妙心垂絕如綫雖曰豈能必如達磨之傳二祖然亦必真參實悟自具正知正見而得正知正見之人而授之豈有盲傳盲受毫無著落若以此為振興佛教續佛慧命與毀佛滅法何殊甚至名利熏心造大妄語動稱悟道喝佛罵祖不重戒律彼此相欺賣拂賣衣同於市井將佛祖之慧命作世諦之人情雖竊有佛祖兒孫之名並無人天師範之實如法藏弘忍輩惟以結交士大夫倚托勢力為保護法席計士大夫中喜負作家居士之名者受其顢頇互相標榜世尊當日雖以佛法付囑國王大臣善信護持未有令枉道而從人也況乃不結制不坐香惟務吟詩作文以媚悅士大夫捨本逐末如是居心與在家何異若此則將來佛法掃地矣夫西來的意不落言詮網宗之設所以揀魔辨異雖更換面目接人何嘗有意別立言說離單提向上之正旨橫分畛域各立門庭也於今宗徒多將識神生死本傍語言文字邊拾人唾餘學人饒舌問者答者互相亂統棒者喝者翻成躲跟忽於解路中相逢便作交融之水乳謂是我宗密意若然與外道邪魔何異正所謂一盲引眾盲相牽入火坑自負良重何言利生以限量心起分別見向真如境上皷動業識齊文定旨逐語分宗令後學者雖欲勤心力參奈荊棘布地熱毒迷空措足無從依心生業日積月久雖宗徒愈盛而宗旨愈泯矣良可愍歎特頒明諭曉示叢林目今直省諸剎堂頭若有自信無疑已臻向上如願來見朕者著來京朕自以佛法接之其深山窮谷之中或有獨老烟霞不肯受盲師衣拂自具正知正見之人宜念宗風頹敗當出而仰報佛恩果是實蹋三關知見超越朕必褒賜禪師之號令續從上諸祖法乳設若以名利心生徼倖想一至朕前水落石出伊既希冀出榮朕即投諸法網其或本未自信不過依樣葫蘆既稱禪徒只得說法正見魔見兩皆不具者聞朕此旨當竭力領眾結制坐香勤求本分或摘鍾撤板或棄拂捨篦重復加力參學必期了證毋再自欺悞人若大誑語成則善因而遭惡果何苦如此其餘緇侶未受付囑者當念佛祖留此法門原為眾生生死若不以了生死為念披袈裟何事要了生死須明心地勿守一知半解得少為足勿墮學識依通未證謂證勿但圖妄囑出頭悞人勿苟合世法求名損己所謂業識茫茫無本可據上則孤負佛祖眉毛拖地之深思下則孤負自己本來具足之面目長受沉淪永依苦趣誠為可憫豈不惕然是宜真心切念求了求當惟有大悟大徹方免醉生夢死其或未能且堅守佛制嚴淨梵行莫犯貪嗔癡常修戒定慧不可妄為知證貽悞後學存此佛種以待機緣若惟以邪知邪見密傳口授欺己欺人貪名逐利世諦流布毀戒犯律則俗子之不如豈法門所宜有亟須自省知往修來毋負朕諄切護法訓誨之至意著該部傳諭直省督撫曉示天下宗門禪林
